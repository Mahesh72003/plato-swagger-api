<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Swagger UI</title>
    <link rel="icon" type="image/png" href="images/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="images/favicon-16x16.png" sizes="16x16" />
    <link href='css/typography.css' media='screen' rel='stylesheet' type='text/css'/>
    <link href='css/application.css' media='screen' rel='stylesheet' type='text/css'/>
    <link href='css/reset.css' media='screen' rel='stylesheet' type='text/css'/>
    <link href='css/screen.css' media='screen' rel='stylesheet' type='text/css'/>
    <link href='css/reset.css' media='print' rel='stylesheet' type='text/css'/>
    <link href='css/print.css' media='print' rel='stylesheet' type='text/css'/>
    <link rel="stylesheet" type="text/css" href="css/swagger-ui.css" >
    <script type="text/javascript">
      $(function () {
        var url = window.location.search.match(/url=([^&]+)/);
        if (url && url.length > 1) {
          url = decodeURIComponent(url[1]);
        } 
        
        // else {
        //   url = "http://petstore.swagger.io/v2/swagger.json";
        // }
      
        hljs.configure({
          highlightSizeThreshold: 5000
        });
      
        // Pre load translate...
        if(window.SwaggerTranslator) {
          window.SwaggerTranslator.translate();
        }
        window.swaggerUi = new SwaggerUi({
          url: url,
          dom_id: "swagger-ui-container",
          supportedSubmitMethods: ['get', 'post', 'put', 'delete', 'patch'],
          onComplete: function(swaggerApi, swaggerUi){
            if(typeof initOAuth == "function") {
              initOAuth({
                clientId: "your-client-id",
                clientSecret: "your-client-secret-if-required",
                realm: "your-realms",
                appName: "your-app-name",
                scopeSeparator: ",",
                additionalQueryStringParams: {}
              });
            }
      
            if(window.SwaggerTranslator) {
              window.SwaggerTranslator.translate();
            }
          },
          onFailure: function(data) {
            log("Unable to Load SwaggerUI");
          },
          docExpansion: "list",
          jsonEditor: false,
          defaultModelRendering: 'schema',
          showRequestHeaders: false
        });
      
        window.swaggerUi.load();
      
        function log() {
          if ('console' in window) {
            console.log.apply(console, arguments);
          }
        }
      });
    </script>
  </head>
  <body class="swagger-section">
    <div class="headTag">
      <div class="headContainer">
        <a href="index.html">
          <div class="oracleLogo"><img src="./images/oracle_logo.png" alt="oracle_logo" height="50" width="180" style="margin:11px"></div>
        </a>
        <div class="headerText">Service API</div>
      </div>
    </div>
    <div class="homeContainer">
      <a href="index.html">
        <div style="float: left; cursor: pointer"><img src="./images/arrow-97-24.png" alt="home_link" height="20" width="20"/></div>
        <div style="float: left; margin-left: 5px; font-size: 20px; font-style: italic; color: #d02023">home</div>
      </a>
    </div>
   <!-- <div id="message-bar" class="swagger-ui-wrap" data-sw-translate>&nbsp;</div>  -->
    <div id="swagger-ui" class="swagger-ui-wrap"></div>
  </body>
  <script src="lib/swagger-ui-bundle.js" charset="UTF-8" type='text/javascript'> </script>
  <script src="lib/swagger-ui-standalone-preset.js" charset="UTF-8" type='text/javascript'> </script>
  <script>
    window.onload = function() {
      // Begin Swagger UI call region
      const ui = SwaggerUIBundle({
        url: "https://petstore.swagger.io/v2/swagger.json",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout"
      })
      // End Swagger UI call region
    
      window.ui = ui
    }
  </script>
</html>
