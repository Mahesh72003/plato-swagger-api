asyncapi: '2.0.0'
id: 'urn:com:oracle:fsgbu:obcm:report:asyncapi:cashSlipTxnTmDetail'
info:
  title: Cashslip Transaction Master Subscriber Event
  version: '1.0.0'
  description: Subscribe to CashSlip Transaction Master Event
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  development:
    url: whf00mip.in.oracle.com:9092
    description: Development server
    protocol: kafka
channels:
  cashSlipTxnTmDetail:
    description: CashSlip Transactions Master Topic
    subscribe:
      summary: Subscribed to cashSlipTxnTmDetail event
      message:
        description: On saving or updating the cashslip master transaction the message is sent on this channel in collections transaction service
        $ref: '#/components/messages/ObcmCashSlipTmDto'
components:
  messages:
    ObcmCashSlipTmDto:
      name: Cashslip Master Transaction Generated Message Format
      title: Cashslip Master Transaction
      summary: Cashslip Master Transaction Generation Message
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ObcmCashSlipTmDTOPayload"
  schemas:
    ObcmCashSlipTmDTOPayload:
      type: object
      description: Cashslip Master Transaction Model
      properties :
        ObcmInstCollTxnTmData :
          type : object
          description: Instrument Collection Transaction Master Data
          $ref: "#/components/schemas/ObcmInstrCollTxnTmDto"
        ObcmCashSlipTxnTmData :
          type : array
          description: Cashslip Transaction Master Data
          $ref: "#/components/schemas/ObcmCashSlipTxnTmDto"          
      required : [ "ObcmInstCollTxnTmData", ObcmCashSlipTxnTmData ]
    ObcmInstrCollTxnTmDto:
