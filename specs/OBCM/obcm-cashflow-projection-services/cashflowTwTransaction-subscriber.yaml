asyncapi: '2.0.0'
id: 'urn:com:oracle:fsgbu:obcm:cashflow:projection:asyncapi:cashflowTwTransaction'
info:
  title: Cashflow Projection Work Subscriber Event
  version: '1.0.0'
  description: Published to Cashflow Tw Transaction Event-(cashflowTwTransaction)
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  development:
    url: whf00mip.in.oracle.com:9092
    description: Development server
    protocol: kafka
channels:
  cashflowTwTransaction:
    description: Cashflow Transaction topic
    subscribe:
      summary: Published to Cashflow Transaction event
      message:
        description: The cashflow Txns which are processed are sent for saving the TW data on this output channel in projection 
        $ref: '#/components/messages/CashflowTxnAvroDTO'          

components:
  messages:
    CashflowTxnAvroDTO:
      name: Cashflow Transaction Generated Message Format
      title: Cashflow Transaction 
      summary: Cashflow Transaction Generation Message
      contentType: application/json
      payload:
        $ref: "#/components/schemas/CashflowTxnAvroDTOPayload"
  schemas:
    CashflowTxnAvroDTOPayload:
      type: object
      properties :
        externalReferenceNo :
          type : string
          description: "External Reference No"
        cashflowType :
          type : string
          description: "CashFlow Type"
        corporateId :
          type : string
          description: "Corporate Id"
        code :
          type : string
          description: "Cashflow Code"
        description :
          type : string
          description: "Cashflow Description"
        bankAccountNumber :
          type : string
          description: "Bank Account Number"
        amount :
          type : string
          description: "Amount"
        ccy :
          type : string
          description: "Currency"
        expectedDate :
          type : string
          description: "Expected Date"
        actualDate :
          type : string
          description: "Actual Date"
        revisedExpectedDate :
          type : string
          description: "Revised Expected Date"
        channel :
          type : string
          description: "Channel"
        applicationName :
          type : string
          description: "Application"
        partyName :
          type : string
          description: "Party Name"
        partyId:
          type: string
          description: "Party Id"
        virtualAcctNo:
          type: string
          description: "Virtual Account No"
        actualCashflowAmt:
          type: string
          description: "Actual Cash Flow Amount"
        narration:
          type: string
          description: "Narration"
        status:
          type: string
          description: "Status"
        reconStatus:
          type: string
          description: "Recon Status"
        udfTxt1:
          type: string
          description: "User Defined Text 1"
        udfTxt2:
          type: string
          description: "User Defined Text 2"
        udfTxt3:
          type: string
          description: "User Defined Text 3"
        udfTxt4:
          type: string
          description: "User Defined Text 4"
        udfTxt5:
          type: string
          description: "User Defined Text 5"
        udfTxt6:
          type: string
          description: "User Defined Text 6"
        udfTxt7:
          type: string
          description: "User Defined Text 7"
        udfTxt8:
          type: string
          description: "User Defined Text 8"
        udfTxt9:
          type: string
          description: "User Defined Text 9"
        udfTxt10:
          type: string
          description: "User Defined Text 10"
        summaryProcessed:
          type: string
          description: "Summary Processed Flag"
        reverseFlag:
          type: string
          description: "Reverse Flag"
        fyStartDate:
          type: string
          description: "FY Start Date"
        quarter1:
          type: string
          description: "Quarter 1"
        quarter2:
          type: string
          description: "Quarter 2"
        quarter3:
          type: string
          description: "Quarter 3"
        quarter4:
          type: string
          description: "Quarter 4"
        summaryEventFlag:
          type: string
          description: "Summary Event Flag"
        fileRefNo:
          type: string
          description: "File Reference No"
        customerRefNo:
          type: string
          description: "Customer Ref No"
        corporateName:
          type: string
          description: "Corporate Name"
        varianceAmount:
          type: string
          description: "Variance Amount"
        excludeRecon:
          type: string
          description: "Exclude Recon"
        transactionStatus:
          type: string
          description: "Transaction Status"
        lastActionPerformed:
          type: string
          description: "Last Action Performed"
      required : [ "externalReferenceNo", "cashflowType", "corporateId", "code", "description", "bankAccountNumber", "amount", "ccy", "expectedDate", "actualDate", "revisedExpectedDate", "channel", "applicationName", "partyName", "partyId", "virtualAcctNo", "actualCashflowAmt", "narration","reconStatus", "udfTx1", "udfTx2", "udfTx3", "udfTx4", "udfTx5", "udfTx6", "udfTx7", "udfTx8", "udfTx9", "udfTx10", "modNo", "id", "parentId", "summaryProcessed", "reverseFlag", "fyStartDate", "quarter1", "quarter2", "quarter3", "quarter4", "summaryEventFlag", "fileRefNo", "corporateName", "varianceAmount", "excludeRecon", "transactionStatus", "lastActionPerformed" ]