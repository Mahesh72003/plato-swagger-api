        amount:
          type: string
        ccy:
          type: string
        expectedDate:
          type: string
        actualDate:
          type: string
        revisedExpectedDate:
          type: string
        channel:
          type: string
        applicationName:
          type: string
        partyName:
          type: string
        partyId:
          type: string
