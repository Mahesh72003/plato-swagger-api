asyncapi: '2.0.0'
id: 'urn:com:oracle:fsgbu:obcm:asyncapi:cashflowtransactions'
info:
  title: Kafka Application - cashflow transactions updated event
  version: '1.0.0'
  description: Kafka Application - cashflow transactions updated event
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  development:
    url: whf00mip.in.oracle.com:9092
    description: Development server
    protocol: kafka
channels:
  cashflowTransactions:
    description: cashflow transactions topic
    subscribe:
      summary: Get cashflow transactions event
      message:
        description: Get updated cashflow transactions list
        $ref: '#/components/messages/CashflowGeneratedDTO'          
components:
  messages:
    CashflowGeneratedDTO:
      name: Cashflow Generation Message
      title: Cashflow Generation
      summary: Cashflow Generation Message
      contentType: application/json
      payload:
        $ref: "#/components/schemas/CashflowGeneratedDTOPayload"
  schemas:
    CashflowGeneratedDTOPayload:
      type: object
      properties:
        cashflowTWTxn:
          type: array
          description: ""
          items: 
            $ref: "#/components/schemas/data"
