asyncapi: '2.0.0'
info:
  title: Kafka Application - Response Ack Generation event
  version: '1.0.0'
  description: Kafka Application - Response Ack Generation event
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  development:
    url: whf00pfl.in.oracle.com:9092
    description: Development server
    protocol: kafka
channels:
  responseAckGenerationData:
    description: This kafka topic is used to generate response acknowledgements.
    subscribe:
      summary: Response Ack Generation Event
      message:
        description: Get Response Ack Generation Data
        $ref: '#/components/messages/ResponseAckGenerationData'          

components:
  messages:
    ResponseAckGenerationData:
      name: Response Ack Generation Message
      title: Response Ack Generation
      summary: Response Ack Generation Message
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ResponseAckGenerationDataPayload"
  schemas:
    ResponseAckGenerationDataPayload:
      type: object
      properties:
        fileRefId:
          type: string
          description: ""
        status:
          type: string
          description: ""
        tName:
          type: string
          description: ""
        FileDetailsDto:
          $ref: "#/components/schemas/FileDetailsDto"        
    FileDetailsDto:
      type: object     
      properties:
        fileRefId: 
          type: string
        internalRefId:
          type: string
        workflowInstanceId:
          type: string
        fileStatus:
          type: string
        fileOriginalName:
          type: string
        fileModifiedName:
          type: string
        transactionId:
          type: string
        transactionModNo:
          type: string
        formatId:
          type: string
        formatModNo:
          type: string
        channelId:
          type: string
        corporateId:
          type: string
        corporateModNo:
          type: string
        corporateRef:
          type: string
        totalRecords:
          type: string
        successRecords:
          type: string
        failedRecords:
          type: string
        totalAmount:
          type: string
        totalAmountCurrency:
          type: string
     
  