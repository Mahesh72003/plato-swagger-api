asyncapi: '2.0.0'
id: 'urn:com:oracle:fsgbu:obcm:asyncapi:paymentUpdated'
info:
  title: Kafka Application - payment updated event
  version: '1.0.0'
  description: Kafka Application - payment updated event
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  development:
    url: whf00mip.in.oracle.com:9092
    description: Development server
    protocol: kafka
channels:
  paymentUpdated:
    description: payment Updated topic
    subscribe:
      summary: Payment Updated event
      message:
        description: Get updated payment list
        $ref: '#/components/messages/UpdatePaymentDto'          

components:
  messages:
    UpdatePaymentDto:
      name: Update Payment Message
      title: Update Payment
      summary: Update Payment Message
      contentType: application/json
      payload:
        $ref: "#/components/schemas/UpdatePaymentDto"
  schemas:
    UpdatePaymentDto:
      type: object
      properties:
        PaymentRefNo:
          type: string
        serviceBranchCode:
          type: string
        userId:
          type: string