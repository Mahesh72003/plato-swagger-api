asyncapi: '2.0.0'
id: 'urn:com:oracle:fsgbu:obcm:asyncapi:paymentUpdated'
info:
  title: Kafka Application - file updated event
  version: '1.0.0'
  description: Kafka Application - file updated event
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  development:
    url: whf00mip.in.oracle.com:9092
    description: Development server
    protocol: kafka
channels:
  fileUploadUpdated:
    description: file Updated topic
    subscribe:
      summary: File Updated event
      message:
        description: Get updated file list
        $ref: '#/components/messages/UpdateFileUploadDto'          

components:
  messages:
    UpdateFileUploadDto:
      name: Update File Message
      title: Update File
      summary: Update File Message
      contentType: application/json
      payload:
        $ref: "#/components/schemas/UpdateFileUploadDto"
  schemas:
    UpdateFileUploadDto:
      type: object
      properties:
        invoiceFileId:
          type: number
        channel:
          type: string
        fileType:
          type: string
        fileName:
          type: string
        status:
          type: string
        fileRef:
          type: string
        uploadDate:
          type: string
        totalRecords:
          type: number
        totalSuccessRecords:
          type: number
        totalFailedRecords:
          type: number
        reasonCode:
          type: string
  