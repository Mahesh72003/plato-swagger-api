asyncapi: '2.0.0'
id: 'urn:com:oracle:fsgbu:obcm:asyncapi:relationshipMaster'
info:
  title: Kafka Application - relationship master updated event
  version: '1.0.0'
  description: Kafka Application - relationship master updated event
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  development:
    url: whf00mip.in.oracle.com:9092
    description: Development server
    protocol: kafka
channels:
  relationshipMaster:
    description: relationship master topic
    subscribe:
      summary: Get relationship master event
      message:
        description: Get updated relationship master list
        $ref: '#/components/messages/UpdateRelationshipMasterDto'          

components:
  messages:
    UpdateRelationshipMasterDto:
      name: Update Relationship Master Message
      title: Update Relationship Master
      summary: Update Relationship Master Message
      contentType: application/json
      payload:
        $ref: "#/components/schemas/UpdateRelationshipMasterDto"
  schemas:
    ObcmRelationshipDetailsData:
      type: object
      properties:
           externalCode:
             type: string
           divisionCode:
             type: string
           corporateDivisionCode:
             type: string
           id:
             type: string
           relationshipDetailId:
             type: string
    ObcmRelationshipDetailsRecord:
       type: object     
       properties:
         id:
           type: string
         relationsMasterId:
           type: string
         counterpartyid:
           type: string
         counterpartyname:
           type: string
         partyType:
           type: string
         autoAcceptance:
           type: string
         expiresOn:
           type: string
         noOfDays:
           type : string
         status:
           type: string
         ObcmTmRelationshipDetailsDataDTO:
           type: object
           properties:
             updateRelationshipDetailsDataDtoList:
               type: array
               description: ""
               items: 
                 $ref: "#/components/schemas/ObcmRelationshipDetailsData"
    UpdateRelationshipMasterDto:
      type: object     
      properties:
        id: 
          type: string
        authStat:
          type: string
        recordStat:
          type: string
        modNo:
          type: string
        checkerDtStamp:
          type: string
        makerDtStamp:
          type: string
        makerId:
          type: string
        checkerId:
          type: string
        onceAuth:
          type: string
        relationshipCode:
          type: string
        relationshipName:
          type: string
        corporateId:
          type: string
        corporateName:
          type: string
        autoAcceptance:
          type: string
        effFromDate:
          type: string
        expiresOn:
          type: string
        product:
          type: string
        noOfDays:
          type: string
        ObcmRelationshipDetails:
          type: object
          properties:
            updateRelationshipDetailsDtoList:
              type: array
              description: Get Relationship Detail Record
              items: 
                $ref: "#/components/schemas/ObcmRelationshipDetailsRecord"
  
           