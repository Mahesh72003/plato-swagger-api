asyncapi: '2.0.0'
id: 'urn:com:oracle:fsgbu:obcm:asyncapi:invoicePaymentUpdate'
info:
  title: Kafka Application - invoicing Payment updated event
  version: '1.0.0'
  description: Kafka Application - invoicing Payment updated event
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  development:
    url: whf00mip.in.oracle.com:9092
    description: Development server
    protocol: kafka
channels:
  invoicePaymentUpdate:
    description: invoicing Payment update topic
    subscribe:
      summary: Get invoicing Payment update event
      message:
        description: Get updated invoicing list
        $ref: '#/components/messages/UpdatePaymentInvoiceDto'          

components:
  messages:
    UpdatePaymentInvoiceDto:
      name: Update Invoice Payment Message
      title: Update Invoice Payment Generation
      summary: Update Invoice Payment Message
      contentType: application/json
      payload:
        $ref: "#/components/schemas/UpdatePaymentInvoiceDto"
  schemas:
