      message:
        description: Send account balance notification
        $ref: '#/components/messages/eventMessage'
  vamlm.bankchargeeventrequest:
    description: Sends Bank Charge events.
    publish:
      summary: Sends Bank Charge events.
      message:
        description: Send account balance notification
        $ref: '#/components/messages/bankChargeEventRequest'
  vamlm.branchchargeeventrequest:
    description: The topic on which account balance notification updated.
    publish:
      summary: Sends Branch Charge events.
      message:
        description: Sends Branch Charge events.
        $ref: '#/components/messages/branchChargeEventRequest'
  vamlm.structurechargesnotification:
    description: Sends structure charges notification.
    publish:
      summary: Sends structure charges notification.
      message:
        description: Send account balance notification
        $ref: '#/components/messages/structureCharges'
  vamlm.pricingmapnotification:
    description: Sends pricing map notification.
    publish:
      summary: Sends pricing map notification.
      message:
        description: Send account balance notification
        $ref: '#/components/messages/pricingMap'
