    publish:
      summary: Sends structure creation notification
      message:
        description: Sends structure creation notification
        $ref: '#/components/messages/eventMessage'
  structure-createdAndAuthorized:
    description: Sends notification when newly created structure is authorized
    publish:
      summary: Sends notification when newly created structure is authorized
      message:
        description: Send account balance notification
        $ref: '#/components/messages/eventMessage'
  structure-modified:
    description: Sends structure creation notification.
    publish:
      summary: Sends structure creation notification.
      message:
        description: Send account balance notification
        $ref: '#/components/messages/eventMessage'
