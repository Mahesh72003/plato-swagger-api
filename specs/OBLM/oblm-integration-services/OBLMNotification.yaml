  structure-closedAndAuthorized:
    description: Sends notification when closed structure is authorized
    publish:
      summary: Sends notification when closed structure is authorized
      message:
        description: Send account balance notification
        $ref: '#/components/messages/eventMessage'
  structure-reopen:
    description: The topic on which account balance notification updated.
    publish:
      summary: Sends structure re-open notification.
      message:
        description: Sends structure re-open notification.
        $ref: '#/components/messages/eventMessage'
  structure-reopenAndAuthorized:
    description: Sends notification when re-opened structure is authorized
    publish:
