         operationId: getRecordJourney
         parameters:
            -  name: fileId
               in: query
               description: Id of File
               required: true
               type: string
            -  name: recordId
               in: query
               description: Id of Record
               required: true
               type: string
            -  name: transactionName
               in: query
               description: Name of the Transaction
               required: true
               type: string

