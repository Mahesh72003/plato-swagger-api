swagger: '2.0'
info:
   description: File Inquiry service for OBEDX.
   version: 1.0.0
   title: File Inquiry Service
host: whf00gmh.in.oracle.com:8100
basePath: /obedx-inquiry-service
consumes:
   - application/json
produces:
   - application/json
tags:
   -  name: FileInquiryAPI
      description: Endpoint for File Inquiry
schemes:
