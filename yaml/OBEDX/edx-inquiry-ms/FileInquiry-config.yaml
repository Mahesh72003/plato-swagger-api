paths:
   /file-inquiry:
      get:
         tags:
            - FileInquiryAPI
         summary: Get all valid File Inquiries.
         description: Get all valid File Inquiries.
         operationId: getAllFiles
         parameters:
            -  name: corporateAliasName
               in: query
               description: Alias Name of the Corporate
               required: false
               type: string
            -  name: corporateId
               in: query
               description: Corporate Id
               required: false
               type: string
            -  name: fileRefId
               in: query
               description: Reference Number of the File
               required: false
               type: string
            -  name: messageId
               in: query
               description: message Id
               required: false
               type: string
            -  name: transactionCategory
               in: query
               description: Transaction Category
               required: false
               type: string
            -  name: transactionType
               in: query
               description: Transaction Type
               required: false
               type: string
            -  name: transactionName
               in: query
               description: Transaction Name
               required: false
               type: array
               items:
                  type: string
            -  name: valueDate
               in: query
               description: Value Date
               required: false
               type: string
            -  name: fromDate
               in: query
               description: From Date
               required: false
               type: string
            -  name: toDate
               in: query
               description: To Date
               required: false
               type: string
            -  name: fileStatus
               in: query
               description: fileStatus
               required: false
               type: array
               items:
                  type: string
            -  name: fileStatusLike
               in: query
               description: File Status LIKE search
               required: false
               type: string
            -  name: fileName
               in: query
               description: File Name
               required: false
               type: string
            -  name: corporateName
               in: query
               description: Corporate Name
               required: false
               type: string
            -  name: searchKeyword
               in: query
               description: Search Keyword
               required: false
               type: string
            -  name: offset
               in: query
               description: offset is starting no of records to be fetched
               required: false
               type: integer
            -  name: limit
               in: query
               description: limit is maximum no of records to be fetched
               required: false
               type: integer
         responses:
            '201':
               description: Returns message of succes or failure
               headers:
                  Location:
                     description: ''
                     type: string
               schema:
                  $ref: '#/definitions/FileDetailsCollection'
            '400':
               description: Malformed syntax.
            '401':
               description: Request does not have sufficient credentials.
            '403':
               description: Request is not authorized.
            '405':
               description: Invalid input
            '500':
               description: Internal error
