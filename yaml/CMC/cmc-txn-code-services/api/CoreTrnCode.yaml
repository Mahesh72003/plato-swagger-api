definitions:
 TransactionCodeDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     trnCode:
      type: string
      description: "Transaction code"
      minLength: 1
      maxLength: 3
      pattern: '[a-zA-Z0-9]+'
     trnDesc:
      type: string
      description: "Description for Transaction Code"
      minLength: 0
      maxLength: 105
     sourceSystem:
      type: string
      description: "Name of the Source System"
      minLength: 0
      maxLength: 35
     sourceSystemTrnCode:
      type: string
      description: "Transaction code in the source system"
      minLength: 0
      maxLength: 35
      pattern: '([a-zA-Z0-9]+)?'
    required:
     - trnCode
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 TransactionCodeCollection: 
  description: "Collection of coretrncode."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/TransactionCodeDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 TransactionCodeWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/TransactionCodeDTO"
