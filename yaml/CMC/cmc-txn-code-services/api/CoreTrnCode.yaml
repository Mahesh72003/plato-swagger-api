swagger: "2.0"
info:
 description: "This is a sample server coretrncodes server." 
 version: "1.0.0"
 title: "coretrncodes Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "coretrncodes"
   description: "Source Transaction Codes can be created using this service. Transaction codes represents various types of transactions, for example, transfer charges, incoming mail transfer, incoming telex transfer, reserve, incoming clearing transfer etc."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../coretrncodes

 /coretrncodes:
  post:
   tags:
    - "coretrncodes"
   summary: "Adds a new coretrncodes."
   description: "Adds a new coretrncodes. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "coretrncodes" 
      in: "body" 
      description: "Request Body that contains data required for creating a new coretrncodes" 
      required: true
      schema:
       $ref: "#/definitions/TransactionCodeDTO"
    
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created coretrncodes" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "coretrncodes"
   summary: "Get all valid coretrncodes."
   description:  "Get all valid coretrncodes. This endpoints will be used to Get all valid coretrncodes maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: trnCode
     required: false
     type: string
   - in: query
     name: trnDesc
     required: false
     type: string
   - in: query
     name: sourceSystem
     required: false
     type: string
   - in: query
     name: sourceSystemTrnCode
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: checkerId
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/TransactionCodeCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../coretrncodes/xxx
#   DELETE    .../coretrncodes/xxx
#   GET       .../coretrncodes/xxx
#   GET       .../coretrncodes/xxx?version=latestrecord
#   GET       .../coretrncodes/xxx?version=1

 /coretrncodes/{id}:
  put:
   tags:
    - "coretrncodes"
   summary: "Update an existing coretrncodes."
   description:  "Update an existing coretrncodes."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the coretrncodes Maintenance"
      required: true
      type: "string"
    - name: "coretrncodes"
      in: "body"
      description: "Request Body that contains data required for updating an existing coretrncodes"
      required: true
      schema:
       $ref: "#/definitions/TransactionCodeDTO"
   
   responses:
    200:
     description: "Returns updated coretrncodes"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "coretrncodes"
   summary: "Retrieves the coretrncodes by ID."
   description:  "Retrieves the coretrncodes by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the coretrncodes based on given id."
     schema:
      $ref: "#/definitions/TransactionCodeWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "coretrncodes"
   summary: "Deletes the coretrncodes identified by given ID."
   description:  "Deletes the coretrncodes identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the coretrncodes maintenance"
      required: true
      type: "string"
    - name: "coretrncodes"
      in: "body"
      description: Request body contain coretrncodes and Modification no of coretrncodes maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

