# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../externalchartaccounts

 /externalchartaccounts:
  post:
   tags:
    - "externalchartaccounts"
   summary: "Adds a new externalchartaccounts."
   description: "Adds a new externalchartaccounts. Add additional information here for this endpoint."
   operationId: "saveRecord"
   consumes:
   - "application/json"
   - "application/xml"
   produces:
   - "application/json"
   - "application/xml"   
   parameters:
    - name: "externalchartaccounts" 
      in: "body" 
      description: "Request Body that contains data required for creating a new externalchartaccounts" 
      required: true
      schema:
       $ref: "#/definitions/GlmasterDto"
   
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created externalchartaccounts" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "externalchartaccounts"
   summary: "Get all valid externalchartaccounts."
   description:  "Get all valid externalchartaccounts. This endpoints will be used to Get all valid externalchartaccountsmaintanence records."
   operationId: "getAll"
   produces:
   - "application/json"
   - "application/xml"   
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: glCode
     required: false
     type: string
   - in: query
     name: recordStatus
     required: false
     type: string
   - in: query
     name: authStatus
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/GlmasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

