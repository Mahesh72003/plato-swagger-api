      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the externalchartaccounts based on given id."
     schema:
      $ref: "#/definitions/GlmasterWrapperDto"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "externalchartaccounts"
   summary: "Deletes the externalchartaccounts identified by given ID."
   description:  "Deletes the externalchartaccounts identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
