   - "application/xml"   
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the externalchartaccounts Maintenece"
      required: true
      type: "string"
    - name: "externalchartaccounts"
      in: "body"
      description: Request body contain externalchartaccounts and Modification no of externalchartaccounts Maintenece which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
