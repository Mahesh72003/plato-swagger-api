definitions:
 GlmasterDto:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     glCode:
      type: string
      minLength: 0
      maxLength: 20
      pattern: ^[A-Z0-9*_]*$
     glDesc:
      type: string
      minLength: 0
      maxLength: 105
     sourceSystem:
      type: string
      minLength: 0
      maxLength: 35
     sourceSystemGlCode:
      type: string
      minLength: 0
      maxLength: 35
     category:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^[0-9]$
     block:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^(?:Y|N)$
    required:
     - glCode
     - category
     - block
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDtoWrapper:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string   
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string

 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 GlmasterCollection: 
  description: "Collection of glmaster."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/GlmasterDto"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 GlmasterWrapperDto:
  type: object
  properties:
   data:
    $ref: "#/definitions/GlmasterDto"