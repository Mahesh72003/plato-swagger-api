   - "application/json"
   - "application/xml"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the customercategories Maintenance"
      required: true
      type: "string"
    - name: "customercategories"
      in: "body"
      description: "Request Body that contains data required for updating an existing customercategories"
      required: true
      schema:
       $ref: "#/definitions/CmcTmCustomerCategoryDto"
   responses:
    200:
