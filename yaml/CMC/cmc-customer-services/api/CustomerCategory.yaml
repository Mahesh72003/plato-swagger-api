   description: "Adds a new customercategories. Add additional information here for this endpoint."
   operationId: "saveRecord"
   consumes:
   - "application/json"
   - "application/xml"
   produces:
   - "application/json"
   - "application/xml"
   parameters:
    - name: "customercategories" 
      in: "body" 
      description: "Request Body that contains data required for creating a new customercategories" 
      required: true
      schema:
       $ref: "#/definitions/CmcTmCustomerCategoryDto"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created customercategories" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
