definitions:
 CmcTmCustomerCategoryDto:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     customerCategory:
      type: string
      description: "customerCategory"
      minLength: 0
      maxLength: 10
      pattern: "^[A-Z0-9*_]*$"
     customerCategoryDesc:
      type: string
      description: "customerCategoryDesc"
      minLength: 0
      maxLength: 105
     populateChangesLog:
      type: string
      description: "populateChangesLog"
      minLength: 0
      maxLength: 1
      pattern: "^(?:Y|N)$"
    required:
    - customerCategory
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CmcTmCustomerCategoryCollection: 
  description: "Collection of customercategory."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CmcTmCustomerCategoryDto"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CmcTmCustomerCategoryWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CmcTmCustomerCategoryDto" 

