     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "customercategories"
   summary: "Get all valid customercategories."
   description:  "Get all valid customercategories. This endpoints will be used to Get all valid customercategoriesmaintanence records."
   operationId: "getAll"
   produces:
   - "application/json"
   - "application/xml"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: "customerCategory"
     in: "query"
     description: "Filtered on basis of Customer Category"
     type: "string"
   - in: query
     name: authStatus
     required: false
     type: string
   - in: query
     name: recordStatus
     required: false
     type: string
   responses: 
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmCustomerCategoryCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
