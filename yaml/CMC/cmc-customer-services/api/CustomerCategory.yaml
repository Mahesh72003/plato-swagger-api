    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "customercategories"
   summary: "Retrieves the customercategories by ID."
   description:  "Retrieves the customercategories by ID."
   operationId: "getById"
   produces:
   - "application/json"
   - "application/xml"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the customercategories based on given id."
     schema:
      $ref: "#/definitions/CmcTmCustomerCategoryWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "customercategories"
   summary: "Deletes the customercategories identified by given ID."
   description:  "Deletes the customercategories identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   consumes:
   - "application/json"
   - "application/xml"
   produces:
   - "application/json"
   - "application/xml"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the customercategories maintenance"
      required: true
      type: "string"
    - name: "customercategories"
      in: "body"
      description: Request body contain customercategories and Modification no of customercategories Maintenece which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

