swagger: "2.0"
info:
 description: "This is a sample server corecustomers server." 
 version: "1.0.0"
 title: "corecustomers Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "corecustomers"
   description: "This is the service to  maintain the record for  external customers.It has the option to create different type and different category for the customers, also it takes the source system and source system customer number as input and maps the source system customer number to a unique customer."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../corecustomers

 /corecustomers:
  post:
   tags:
    - "corecustomers"
   summary: "Adds a new corecustomers."
   description: "Adds a new corecustomers. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "corecustomers" 
      in: "body" 
      description: "Request Body that contains data required for creating a new corecustomers" 
      required: true
      schema:
       $ref: "#/definitions/CoreCustomerDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created corecustomers" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "corecustomers"
   summary: "Get all valid corecustomers."
   description:  "Get all valid corecustomers. This endpoints will be used to Get all valid corecustomers maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: country
     required: false
     type: string
   - in: query
     name: language
     required: false
     type: string
   - in: query
     name: nationality
     required: false
     type: string
   - in: query
     name: deceased
     required: false
     type: string
   - in: query
     name: frozen
     required: false
     type: string
   - in: query
     name: rmId
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: modNo
     required: false
     type: integer
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: checkerId
     required: false
     type: string
   - in: query
     name: onceAuth
     required: false
     type: string
   - in: query
     name: walkinCustomer
     required: false
     type: string
   - in: query
     name: sourceSystem
     required: false
     type: string
   - in: query
     name: sourceSystemCustNo
     required: false
     type: string
   - in: query
     name: customerNo
     required: false
     type: string
   - in: query
     name: hostCode
     required: false
     type: string
   - in: query
     name: customerType
     required: false
     type: string
   - in: query
     name: customerCategory
     required: false
     type: string
   - in: query
     name: customerName1
     required: false
     type: string
   - in: query
     name: shortName
     required: false
     type: string
   - in: query
     name: addressLine1
     required: false
     type: string
   - in: query
     name: pincode
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CoreCustomerCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../corecustomers/xxx
#   DELETE    .../corecustomers/xxx
#   GET       .../corecustomers/xxx
#   GET       .../corecustomers/xxx?version=latestrecord
#   GET       .../corecustomers/xxx?version=1

 /corecustomers/{id}:
  put:
   tags:
    - "corecustomers"
   summary: "Update an existing corecustomers."
   description:  "Update an existing corecustomers."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the corecustomers Maintenance"
      required: true
      type: "string"
    - name: "corecustomers"
      in: "body"
      description: "Request Body that contains data required for updating an existing corecustomers"
      required: true
      schema:
       $ref: "#/definitions/CoreCustomerDTO"
   responses:
    200:
     description: "Returns updated corecustomers"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "corecustomers"
   summary: "Retrieves the corecustomers by ID."
   description:  "Retrieves the corecustomers by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the corecustomers based on given id."
     schema:
      $ref: "#/definitions/CoreCustomerWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "corecustomers"
   summary: "Deletes the corecustomers identified by given ID."
   description:  "Deletes the corecustomers identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the corecustomers maintenance"
      required: true
      type: "string"
    - name: "corecustomers"
      in: "body"
      description: Request body contain corecustomers and Modification no of corecustomers maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

