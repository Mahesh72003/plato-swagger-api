definitions:
 CoreCustomerDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     country:
      type: string
      description: "Country code of the customer?s address"
      pattern: '([a-zA-Z0-9]+)?'
     language:
      type: string
      description: "Customer's preferred language of communication"
     nationality:
      type: string
      description: "Nationality of the customer"
     locale:
      type: string
      description: "Locale of the customer"     
     deceased:
      type: string
      description: "Identifies that customer is deceased"
     frozen:
      type: string
      description: "Identifies that the customer's account is frozen"
      pattern: '[Y,N]'
     whereaboutsUnknown:
      type: string
      description: "Identifies that the customer's whareabouts not known"
      pattern: '[Y,N]'
     rmId:
      type: string
      description: "Relational Manager's Id"
      minLength: 0
      maxLength: 12
      pattern: '([a-zA-Z0-9]+)?'
     sanctionsChecksRequired:
      type: string
      description: "Indicates that the sanction check should be done or not"
      pattern: '[Y,N]'
     staff:
      type: string
     walkinCustomer:
      type: string
      description: "Walkin Customer"
     sourceSystem:
      type: string
      description: "Name of the source system"
     sourceSystemCustNo:
      type: string
      description: "Customer identification details as per the source system."
      minLength: 1
      maxLength: 35
      pattern: '[a-zA-Z0-9]+'
     customerNo:
      type: string
      description: "Customer Number of the external customer"
      minLength: 1
      maxLength: 20
      pattern: '[a-zA-Z0-9]+'
     hostCode:
      type: string
      description: "Displays the host code that is linked to the transaction branch of the customer"
     customerType:
      type: string
      description: "Customer type can be Individual,Corporate or Bank"
      pattern: '[I,C,B]'
     customerCategory:
      type: string
      description: "Category to which the customer belongs to"
     customerName1:
      type: string
      description: "Name of the external customer"
      minLength: 0
      maxLength: 105
      #pattern: '([a-zA-Z0-9_\s]+)?'
     shortName:
      type: string
      description: "Short name of the custome"
      minLength: 0
      maxLength: 20
      #pattern: '([a-zA-Z0-9\s]+)?'
     addressLine1:
      type: string
      description: "First line of the customer?s address"
      minLength: 0
      maxLength: 35
     addressLine2:
      type: string
      description: "Second line of the customer?s address"
      minLength: 0
      maxLength: 35
     addressLine3:
      type: string
      description: "Third line of the customer?s address"
      minLength: 0
      maxLength: 35
     addressLine4:
      type: string
      description: "Fourth line of the customer?s address"
      minLength: 0
      maxLength: 35          
     pincode:
      type: string
      description: "Pincode of the customer?s address"
      minLength: 0
      maxLength: 15
      pattern: '([a-zA-Z0-9]+)?'
    required:
     - sourceSystem
     - sourceSystemCustNo
     - customerNo
     - customerType
     - customerName1
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CoreCustomerCollection: 
  description: "Collection of corecustomer."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CoreCustomerDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CoreCustomerWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CoreCustomerDTO"
 StepStatusUpdateDto:
  type: object
  properties:
     id:
      type: string
     branchId:
      type: string
      minLength: 0
      maxLength: 3
     currentDate:
      type: string
     jobId:
      type: string
     stepId:
      type: string
     action:
      type: string
     status:
      type: string
     statusDescription:
      type: string

 InvokeForgetBatchDTO:
  type: object
  properties:
     retentionPeriod:
      type: number
     branchCode:
      type: string
     eodDate:
      type: string
     eodId:
      type: string
     eodJobId:
      type: string
     eodStepId:
      type: string
 CmcTmLocaleDTO:
  type: object
  properties:
   languageCode:
    type: string
    minLength: 0
    maxLength: 3
    pattern: ^[A-Z0-9*_]*$
   countryCode:
    type: string
    minLength: 0
    maxLength: 3
   locale:
    type: string
    minLength: 0
    maxLength: 10