     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  put:
   tags:
    - "RateService"
   summary: "Update an existing rule."
   description:  "Update an existing rates."
   operationId: "modifyRecord"
   consumes:
   - "application/json"
   - "application/xml"
   produces:
   - "application/json"
   - "application/xml"
   parameters:
    - name: sourceCode
      description: "Source from which request is initiated"
      in: header     
      required: true
      type: string
    - name: "rates"
      in: "body"
      description: "Request Body that contains data required for updating an existing rates"
      required: true
      schema:
       $ref: "#/definitions/CmcTmCurrencyRateMasterDto"
   responses:
    200:
     description: "Returns updated rates"
