    - "RateService"
   summary: "Adds a new rates."
   description: "Adds a new rates. Add additional information here for this endpoint."
   operationId: "saveRecord"
   consumes:
   - "application/json"
   - "application/xml"
   produces:
   - "application/json"
   - "application/xml"
   parameters:
    - name: sourceCode
      description: "Source from which request is initiated"
      in: header     
      required: true
      type: string
    - name: "rates" 
      in: "body" 
      description: "Request Body that contains data required for creating a new rates" 
      required: true
      schema:
       $ref: "#/definitions/CmcTmCurrencyRateMasterDto"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created rates" 
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmCurrencyRateMasterResponseWrapperDTO"
