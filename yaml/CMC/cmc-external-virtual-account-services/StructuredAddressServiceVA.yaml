#   wrapper:
#     $ref: "#/definitions/ResponseDto" 
 StructuredAddressServiceCollection: 
  description: "Collection of StructuredAddress."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/StructuredAddressServiceDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoServiceWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/StructuredAddrResponseDto"
   data:
    $ref: "#/definitions/StructuredAddressServiceDTO"
 StructuredAddressServiceWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/StructuredAddressServiceDTO"