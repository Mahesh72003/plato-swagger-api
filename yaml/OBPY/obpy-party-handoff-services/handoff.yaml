definitions:
  HandOffTransactionHeader:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      errorCode:
        type: "string"
      status:
        type: "string"
      remarks:
        type: "string"
      moduleCode:
        type: "string"
      applicationNumber:
        type: "string"
      branchCode:
        type: "string"
      user:
        type: "string"
      listexceptionDto:
        type: "array"
        items:
          $ref: "#/definitions/ExceptionDto"
  HandOffRequestModel:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      processRefNo:
        type: "string"
      entityRefNo:
        type: "string"
      serviceName:
        type: "string"
      stageId:
        type: "string"
      moduleCode:
        type: "string"
      applicationNumber:
        type: "string"
      branchCode:
        type: "string"
      user:
        type: "string"
  FCUBSExceptiondto:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      listexceptionDto:
        type: "array"
        items:
          $ref: "#/definitions/ExceptionDto"
  ExternalHandoffStatusModel:
    description: ExternalHandoffService model
    type: object
    required:
      - applicationNumber
      - handoffRefNumber
    properties:
      handoffRefNumber:
        description: Handoff Reference Number
        type: string
      handoffExtRefNo:
        description: Handoff External Ref No
        type: string
      remarks:
        description: Remarks for the handoff
        type: string
      handoffStatus:
        description: Handoff Status
        type: string
      errorCode:
        description: Error Code for failed handoff
        type: string
      errorDescription:
        description: Error description
        type: string
  ExceptionDto:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      errorMessage:
        type: "string"
      errorCode:
        type: "string"
  HandOffServiceStatusModel:
    allOf:
      - $ref: '#/definitions/RepresentationModel'
      - type: "object"
        properties:
          partyId:
            type: "string"
          customerHandOffStatus:
            type: "boolean"
          liablityHandOffStatus:
            type: "boolean"
          liablityLinkageHandOffStatus:
            type: "boolean"
          versionNo:
            type: "integer"
            format: "int64"
          recordStat:
            type: "string"
          createdBy:
            type: "string"
          createdDate:
            type: "string"
            format: "date-time"
          updatedBy:
            type: "string"
          updatedDate:
            type: "string"
            format: "date-time"
          recordId:
            type: "string"
  HandOffCollection:
    description: "Collection of Handoff logs."
    type: "object"
    properties:
      HandOffList:
        type: "array"
        items:
          $ref: "#/definitions/HandOffTrackingModel"
  HandOffTrackingModel:
    type: "object"
    properties:
      id:
        type: "string"
      entityId:
        type: "string"
      entityType:
        type: "string"
      errorMessages:
        type: "string"
      status:
        type: "string"
      errorCode:
        type: "string"
      errorDate:
        type: "string"
        format: "date-time"
      applicationNumber:
        type: "string"


  FcubErrRep:
    type: "object"
    properties:
      errorDetailsList:
        type: "array"
        items:
          $ref: "#/definitions/ErrorDetails"
  ErrorDetails:
    type: "object"
    properties:
      errorCode:
        type: "string"
      errorDescription:
        type: "string"
  LinesDto:
    type: "object"
    description: "Response with line details"
    properties:
      blockAmount:
        type: "number"
      category:
        type: "string"
      description:
        type: "string"
      effectiveLineAmount:
        type: "number"
      limitAmount:
        type: "number"
      limitAmountBasis:
        type: "string"
      lineCode:
        type: "string"
      limitCurrency:
        type: "string"
      lineSerial:
        type: "string"
      mainLineCode:
        type: "string"
      revolvingLine:
        type: "string"
      lineStartDate:
        type: "string"
        format: "date"
      avl:
        type: "string"
      utilization:
        type: "string"
      userDefinedStatus:
        type: "string"
  ExtensibleResponseModel:
    properties:
      ExtensibleDTO:
        items:
          $ref: "#/definitions/ExtensibleDTO"
        type: array
    type: object
    xml:
      name: ExtensibleResponseModel
  ExtensibleDTO:
    properties:
      id:
        type: string
      uiKey:
        type: string
      dataReferenceKey:
        type: string
      fieldMetaDataVersion:
        type: string
      fieldData:
        items:
          $ref: "#/definitions/ExtensibleFieldModel"
        type: array
      applicationId:
        type: string
    #    required:
    #      - id
    type: object
    xml:
      name: ExtensibleDTO
  ExtensibleFieldModel:
    properties:
      id:
        type: string
      label:
        type: string
      type:
        type: string
      value:
        type: string
    #    required:
    #      - id
    type: object
    xml:
      name: ExtensibleFieldModel
  PartyMasterModel:
    allOf:
      - type: "object"
        description: "PartyMaster Retail Model"
        properties:
          recordId:
            type: "string"
          partyId:
            type: "string"
          status:
            type: "string"
          currentStage:
            type: "string"
          partySource:
            type: "string"
          partyType:
            type: "string"
          partyClass:
            type: "string"
          isBankCustomer:
            type: "string"
          externalCustomerNo:
            type: "string"
          createdBy:
            type: "string"
          recordStat:
            type: "string"
          createdDate:
            type: "string"
            format: "date-time"
          updatedBy:
            type: "string"
          updatedDate:
            type: "string"
            format: "date-time"
          versionNo:
            type: "integer"
            format: "int64"
  CoreCustomerDTO:
    type: object
    allOf:
      - $ref: '#/definitions/GenericDto'
      - type: object
        properties:
          country:
            type: string
            description: "Country code of the customer?s address"
            pattern: '([a-zA-Z0-9]+)?'
          language:
            type: string
            description: "Customer's preferred language of communication"
          nationality:
            type: string
            description: "Nationality of the customer"
          locale:
            type: string
            description: "Locale of the customer"
          deceased:
            type: string
            description: "Identifies that customer is deceased"
          frozen:
            type: string
            description: "Identifies that the customer's account is frozen"
            pattern: '[Y,N]'
          whereaboutsUnknown:
            type: string
            description: "Identifies that the customer's whareabouts not known"
            pattern: '[Y,N]'
          rmId:
            type: string
            description: "Relational Manager's Id"
            minLength: 0
            maxLength: 12
            pattern: '([a-zA-Z0-9]+)?'
          sanctionsChecksRequired:
            type: string
            description: "Indicates that the sanction check should be done or not"
            pattern: '[Y,N]'
          staff:
            type: string
          walkinCustomer:
            type: string
            description: "Walkin Customer"
          sourceSystem:
            type: string
            description: "Name of the source system"
          sourceSystemCustNo:
            type: string
            description: "Customer identification details as per the source system."
            minLength: 1
            maxLength: 35
            pattern: '[a-zA-Z0-9]+'
          customerNo:
            type: string
            description: "Customer Number of the external customer"
            minLength: 1
            maxLength: 20
            pattern: '[a-zA-Z0-9]+'
          hostCode:
            type: string
            description: "Displays the host code that is linked to the transaction branch of the customer"
          customerType:
            type: string
            description: "Customer type can be Individual,Corporate or Bank"
            pattern: '[I,C,B]'
          customerCategory:
            type: string
            description: "Category to which the customer belongs to"
          customerName1:
            type: string
            description: "Name of the external customer"
            minLength: 0
            maxLength: 105
            #pattern: '([a-zA-Z0-9_\s]+)?'
          shortName:
            type: string
            description: "Short name of the custome"
            minLength: 0
            maxLength: 20
            #pattern: '([a-zA-Z0-9\s]+)?'
          addressLine1:
            type: string
            description: "First line of the customer?s address"
            minLength: 0
            maxLength: 35
          addressLine2:
            type: string
            description: "Second line of the customer?s address"
            minLength: 0
            maxLength: 35
          addressLine3:
            type: string
            description: "Third line of the customer?s address"
            minLength: 0
            maxLength: 35
          addressLine4:
            type: string
            description: "Fourth line of the customer?s address"
            minLength: 0
            maxLength: 35
          pincode:
            type: string
            description: "Pincode of the customer?s address"
            minLength: 0
            maxLength: 15
            pattern: '([a-zA-Z0-9]+)?'
        required:
          - sourceSystem
          - sourceSystemCustNo
          - customerNo
          - customerType
          - customerName1
  GenericDto:
    allOf:
      - type: object
        discriminator: resource_type
  ResponseModel:
    properties:
      errors:
        type: object
      data:
        type: object
      paging:
        type: object        