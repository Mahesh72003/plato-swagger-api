        required: false
        type: string
      - name: facilityStartDate
        in: query
        description: List loan Reference Numbers based on facilityStartDate
        required: false
        type: string
        pattern: "[1-9]{4}-[0-1]{1}[0-2]{1}-[0-1]{1}[0-9]{1}"
      - name: facilityEndDate
        in: query
        description: List loan Reference Numbers based on facilityEndDate
        required: false
        type: string
