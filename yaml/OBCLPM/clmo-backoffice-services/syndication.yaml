      - name: jsonObject
        in: body
        description: Request Body that contains data required for creating Syndication Application through a backoffice services
        required: true
        type: string
      - name: branchCode
        in: header
        description: branch code from headers
        required: true
        type: string          
      responses:
        201:
          description: "Returns the Syndication Application reference number success and failure of the Syndication Application creation"
          schema:
            $ref: "#/definitions/SyndicationApplicationDTOWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /syndication/facilities:  
   get:
      tags:
        - "Facility"
      summary: "Query list of Syndication facilities"
      description:  "Query list of syndication facilities"
      operationId: "getFacilities"
      parameters:
      - name: productCode
        in: query
        description: List loan Reference Numbers based on Product Code
        required: false
        type: string
      - name: customerNumber
        in: query
        description: List loan Reference Numbers based on the Customer Number
        required: false
        type: string
      - name: facilityName
        in: query
        description: short description of facility
        required: false
        type: string        
      - name: facilityContractRefNo
