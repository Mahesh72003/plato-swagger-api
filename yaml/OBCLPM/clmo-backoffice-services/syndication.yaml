        required: false
        type: string
      - name: facilityAmount
        in: query
        description: List facility Reference Numbers based on loanAmount
        required: false
        type: number
      - name: branchCode
        in: header
        description: branch code from headers
        required: true
        type: string
      produces:
      - "application/json"
      - "application/xml"
      responses:
        200:
          description: "Successful performs the operation"
