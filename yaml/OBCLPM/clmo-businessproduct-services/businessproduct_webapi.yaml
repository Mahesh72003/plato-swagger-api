          in: "path"
          description: "Code of the Business product that needs to be fetched"
          required: true
          type: "string"       
      responses:
        200:
          description: "Returns the Business product product list based on given id."
          schema:
            $ref: "#/definitions/ProductCollection"
        400:
          description: "Malformed syntax."
