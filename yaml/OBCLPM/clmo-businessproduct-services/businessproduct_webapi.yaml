      description:  "Retrieves the holiday preferences associated with the specified Business product"
      operationId: "getHolidayPrefByBusinessProductCode"
      produces:
      - "application/json"
      - "application/xml"
      parameters:
        - name: "businessproductcode"
          in: "path"
          description: "Code of the Business product that needs to be fetched"
          required: true
