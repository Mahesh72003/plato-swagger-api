  /businessproducts/{id}/{action}:
    patch:
      tags:
        - "BusinessProduct"
      summary: "Close/reopen the Business product by given ID."
      description:  "Close/reopen the Business product identified by given ID."
      operationId: "performCloseAndReopen"
      consumes:
      - "application/json"
      - "application/xml"
      produces:
      - "application/json"
      - "application/xml"
      parameters:
        - name: "action"
          in: "path"
          description: "action of the Business product Maintenance"
          required: true
          type: "string"
        - name: "id"
          in: "path"
