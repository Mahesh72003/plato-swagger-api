swagger: "2.0"
info:
  description: "You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Business Products Service"
host: "whf00bfw:9000"
basePath: "/business-product-service"
tags:
  - name: "BusinessProductAPI"
    description: "API for Business product Operations"  
schemes:
- "http"

paths:
  /businessproducts/summary:
    get:
      tags:
        - "BusinessProduct"
      summary: "Get all valid applications categories with only id and name values."
      description:  " Get all valid applications categories with only id and name values..This endpoints will be used to Get all valid Business product maintanence records."
      operationId: "getBusinessproduct"
      produces:
      - "application/json"
      - "application/xml"
      parameters:
      - name: includecloseandunauth
        in: query
        description: includecloseandunauth need to be set to fetch summary record, defult value is false
        required: false
        type: boolean
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      responses:
        201:
          description: "Returns message of succes or failure"
          headers: 
           Location:
            description: ""
            type: "string"
          schema:
           type: object
           $ref: "#/definitions/BusinessProductSummaryCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  
  /businessproducts:
    post:
      tags:
        - "BusinessProduct"
      summary: "Adds a new Business product."
      description: "Adds a new Business product. Add additional information here for this endpoint."
      operationId: "saveRecord"
      consumes:
      - "application/json"
      - "application/xml"
      produces:
      - "application/json"
      - "application/xml"
      parameters:
        - name: "Business product"
          in: "body"
          description: "Request Body that contains data required for creating a new Business product"
          required: true
          schema:
            $ref: "#/definitions/BusinessProductModel"
      responses:
        201:
         description: "Returns the Id of the newly created Business product"
         headers:
          Location:
           description: "URL of newly created Business product"
           type: "string"
         schema:
           $ref: "#/definitions/ResponseDtoWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
    get:
      tags:
        - "BusinessProduct"
      summary: "Get all valid application categories."
      description:  "Get all valid application categories. This endpoints will be used to Get all valid Business product maintanence records."
      operationId: "getAll"
      produces:
      - "application/json"
      - "application/xml"
      parameters:
      - name: includecloseandunauth
        in: query
        description: includecloseandunauth need to be set to fetch summary record, defult value is false
        required: false
        type: boolean
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      - name: businessProductCode
        in: query
        description: businessProductName need to be set to fetch getall record
        required: false
        type: string
      - name: productCode
        in: query
        description: productCode need to be set to fetch getall record
        required: false
        type: string
      - in: query
        name: authStatus
        required: false
        type: string
      - in: query
        name: recordStatus
        required: false
        type: string
      responses:
        201:
          description: "Returns message of succes or failure"
          headers: 
           Location:
            description: ""
            type: "string"
          schema:
           type: object
           $ref: "#/definitions/BusinessProductCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /businessproducts/{id}:
    get:
      tags:
        - "BusinessProduct"
      summary: "Retrieves the Business product by id."
      description:  "Retrieves the Business product by id. Add additional information here for the this endpoint."
      operationId: "getById"
      produces:
      - "application/json"
      - "application/xml"
      parameters:
        - name: "id"
          in: "path"
          description: "id of the Business product that needs to be fetched"
          required: true
          type: "string"
        - name: "version"
          in: "query"
          description: "version of the Business product that needs to be fetched"
          required: true
          type: "string"
      responses:
        200:
          description: "Returns the Business product based on given id."
          schema:
            $ref: "#/definitions/BusinessProductWrapperDTO"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
    put:
      tags:
        - "BusinessProduct"
      summary: "Update an existing Business product."
      description:  "Update an existing Business product. Add additional information here for the this endpoint."
      operationId: "modifyRecord"
      consumes:
      - "application/json"
      - "application/xml"
      produces:
      - "application/json"
      - "application/xml"
      parameters:
        - name: "id"
          in: "path"
          description: "id of the Business product that need to be updated"
          required: true
          type: "string"      
        - name: "Business product"
          in: "body"
          description: "Request Body that contains data required for updating an existing Business product"
          required: true
          schema:
            $ref: "#/definitions/BusinessProductModel"
      responses:
        200:
          description: "Returns updated Business product"
          schema:
            $ref: "#/definitions/ResponseDtoWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error" 
    delete:
      tags:
        - "BusinessProduct"
      summary: "Deletes the BusinessProduct identified by given ID."
      description:  "Deletes the Business product identified by given ID. Add additional information here for the this endpoint."
      operationId: "delete"
      consumes:
      - "application/json"
      - "application/xml"
      produces:
      - "application/json"
      - "application/xml"
      parameters:
        - name: "id"
          in: "path"
          description: "id of the Business product Maintenance"
          required: true
          type: "string"
        - name: "Business product"
          in: "body"
          description: Request body contain Modification no of Business product Maintenance which need to be deleted"
          required: true
          schema:
           $ref: "#/definitions/ModListKeyDto"
      responses:
        200:
          description: "Successful operation."
          schema:
           $ref: "#/definitions/ResponseDtoWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
                   
