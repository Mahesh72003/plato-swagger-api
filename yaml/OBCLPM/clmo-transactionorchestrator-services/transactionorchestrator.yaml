definitions:
  RemarksModel:
    description: Remarks model
    type: object
    properties:
      id:
        description: Id of the Remarks
        type: string
      processRefNumber:
        description: Process Ref Number
        type: string
      applicationNumber:
        description: Application Number
        type: string 
      dataSegmentCode:
        description: Data segment code
        type: string
      remarks:
        description: Remarks
        type: string
      transactionHeader:
        $ref: '#/definitions/TransactionHeader'
  TransactionHeader:
    description: Transaction Headers
    type: object
    properties:
      processRefNo:
        description: Process Ref No
        type: string
      currentUser:
        description: Current User
        type: string
      taskPriority:
        description: Task Priority
        type: string
      branchCode:
        description: Branch Code
        type: string
      taskOutcome:
        description: Branch
        type: string
      processCode:
        description: Process Code
        type: string
      businessProcessCode:
        description: businessProcessCode
        type: string
      stage:
        description: Stage Code
        type: string
      key1:
        type: string 
      workflowId:
        type: string 
      taskId:
        type: string  
  CashflowDetailsModel:
    description: Cashflow Details model
    type: object
    properties:
      id:
        description: Id of the Cashflow
        type: string
        maxLength: 36
      applicationNumber:
        description: Application Number of the Cashflow
        type: string
        maxLength: 20
      processRefNumber:
        description: processRefNumber of the Cashflow
        type: string
        maxLength: 20  
      dataSegmentCode:
        description: Data segment code
        type: string
      updatedBy:
        description: Updated By
        type: string
      updatedTimeStamp:
        description: Updated Time Stamp
        type: string 
      stageCode:
        description: stageCode
        type: string
        maxLength: 36
      createdBy:
        description: createdBy
        type: string
        maxLength: 36
      status:
        description: status
        type: string
        maxLength: 36
      cashflowSummary:
        type: array
        items:
          $ref: '#/definitions/CashflowSummaryModel'
  CashflowDetailsCollection:
    description: Collection of Cashflow.
    type: object
    properties:
      CashflowList:
        type: array
        items:
          $ref: '#/definitions/CashflowDetailsModel'
  CashflowSummaryModel:
    description: Cashflow Summary model
    type: object
    properties:
      id:
        description: Id of the Cashflow
        type: string
        maxLength: 36
      cashflowId:
        description: Id of the Cashflow
        type: string
        maxLength: 36
      totalAmountDue:
        description: Total Amount Due  
        type: number  
      totalAmountPaid:
        description: Total Amount Paid
        type: number
      totalAmountAdjusted:
        description: Total Amount Adjusted
        type: number      
      currency:
        description: Currency
        type: string
      dueDate:
        description: Due Date
        type: string
      cashflowComponent:
        type: array
        items:
          $ref: '#/definitions/CashflowComponentModel'
  CashflowSummaryCollection:
    description: Collection of Cashflow Summary.
    type: object
    properties:
      CashflowList:
        type: array
        items:
          $ref: '#/definitions/CashflowSummaryModel'
  CashflowComponentModel:
    description: Cashflow Details model
    type: object
    required:
    - component
    - currency
    - amountPaid
    properties:
      id:
        description: Id of the Cashflow Component
        type: string
        maxLength: 36
      cashflowSummaryId:
        description: cashflow Id of the Cashflow Component
        type: string
        maxLength: 36
      component:
        description: Cashflow Component Id of the Cashflow Component
        type: string
        maxLength: 36
      currency:
        description: Cashflow Currency Code of the Cashflow Component
        type: string
        maxLength: 3
      amountPaid:
        description: Amount paid of the Cashflow Component
        type: number
      amountDue:
        description: Amount Due of the Cashflow Component
        type: number
      adjustedAmount:
        description: Adjusted Amount of the Cashflow Component
        type: number
  ApprovalMatrixModel:
    description: "ApprovalMatrixModel"
    type: "object"  
    properties:
      isMultiLevelApproval:
        description: "isMultiLevelApproval"
        type: "string"
      totalApprovals:
        description: "totalApprovals"
        type: "integer"
      isAutoDecision:
        description: "isAutoDecision"
        type: "string"
  CashflowComponentCollection:
    description: Collection of CashflowSummary.
    type: object
    properties:
      CashflowDetailsList:
        type: array
        items:
          $ref: '#/definitions/CashflowComponentModel'