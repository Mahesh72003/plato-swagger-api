paths:
  /web/v1/transactionorchestrator/stage/{applicationNumber}:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - TransactionOrchestrator
      summary: Based on the application Number, posts the aggregates available for the application number and performs a stage movement
      description: Based on the application Number, posts the aggregates available for the application number and performs a stage movement. Add additional information here for this endpoint.
      operationId: updateStage
      parameters:
      - name: remarksModel
        in: body
        description: Request Body that contains data required for creating a the remarks for stage movement
        required: true
        schema:
          $ref: '#/definitions/RemarksModel'
      - name: applicationNumber
        in: path
        description: Application Number
        required: true
        type: string
      responses:
        201:
          description: Returns the Id of the stage movement
          headers:
            Location:
              description: URL of newly created BankingInfo
              type: string
          schema:
            $ref: '../commondefinitions.yaml#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
