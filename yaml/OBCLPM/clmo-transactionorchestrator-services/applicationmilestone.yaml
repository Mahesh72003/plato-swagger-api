swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Application Milestone Service
host: 10.184.157.121:9000
basePath: /applicationmilestone-services
tags:
- name: ApplicationMilestone
  description: API for Application milstone resource 
schemes:
- http
paths:  
  /web/v1/applicationmilestone/{applicationNumber}/{processRefNumber}:
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - ApplicationMilestone
      summary: Updates Application Milestone status
      description: updates status of the Application Milestones  and returns the list of milestones with status information
      operationId: completeMilestones
      parameters:
      - name: applicationNumber
        in: path
        description: applicationNumber of the application
        required: true
        type: string
      - name: processRefNumber
        in: path
        description: processRefNumber of the application
        required: true
        type: string     
      - name: milestoneCode
        in: query
        description: milestone code of the application
        required: false
        type: string  
      responses:
        201:
          description: returns JsonObject containing list of application milestones with status information
          type: string
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
 