      - application/json
      - application/xml
      tags:
      - ApplicationTransactionMaster
      summary: Gets first disbursement processRef number and disburseNumber of given  disbursementProcessRefNumber
      description: Gets first disbursement processRef number and disburseNumber of given  disbursementProcessRefNumber
      operationId: getDisbursementDetail
      parameters:
      - name: disbursementProcessRefNumber
        in: path
        description: Disbursement ProcessRefNumber 
        required: true
        type: string
      responses:
        201:
          description: returns JsonObject containing first disbursement processRef number and disburseNumber
