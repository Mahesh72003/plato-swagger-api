      - application/json
      - application/xml
      tags:
      - ApplicationTransactionMaster
      summary: Creates rate quotation status
      description: Creates rate quotation status
      operationId: createRateQuotationStatus
      parameters:
      - name: ticketReferenceNumber
        in: path
        description: ticketReferenceNumber
        required: true
        type: string
      - name: processRefNumber
        in: path
        description: processRefNumber
        required: true
        type: string
      - name: RateQuotationStatusModel
        in: body
        description: Request Body that contains data required for creating a new RateQuotationStatus
        required: true
        schema:
          $ref: '../commondefinitions.yaml#/definitions/RateQuotationStatusModel'  
      responses:
        200:
          description: success status code.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error   
  /web/v1/applicationtransactionmaster/{processRefNumber}/ratequotationstatus:
    put:
      produces:
      - application/json
      - application/xml
      tags:
      - ApplicationTransactionMaster
      summary: Updates ratequotationstatus
      description: Updates aratequotationstatus
      operationId: updateRateQuotationStatus
      parameters:
      - name: processRefNumber
        in: path
        description: processRef number rate quotation process
        required: true
        type: string
      - name: loanProcessRefNumber
        in: query
        description: loan processRef number
        required: false
        type: string
      - name: customerAcceptanceStatus
        in: query
        description: customer Acceptance Status 
        required: false
        type: string  
      responses:
        200:
          description: success status code.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
