      produces:
      - application/json
      - application/xml
      tags:
      - ApplicationTransactionMaster
      summary: Updates Disbursement Application Number  in the disbursement  detail identified by given disbursementNumber
      description: Updates application number in the disbursement  detail identified by given id
      operationId: updateDisbursementDetails
      parameters:
      - name: processRefNumber
        in: path
        description: processRef number of the first disbursement
        required: true
        type: string
      - name: disbursementNumber
        in: path
        description: disbursement Number of the disbursement
        required: true
        type: string
      - name: disbursementProcessRefNumber
        in: query
        description: processRef number of the disbursement
        required: true
        type: string
      - name: disbursementBackOfficeReferenceNumber
        in: query
        description: back office reference number of the disbursement
        required: false
        type: string
      - name: disbursementStatus
        in: query
        description: disbursement status
        required: false
        type: string  
      responses:
        200:
          description: success status code.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
