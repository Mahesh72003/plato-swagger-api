      description: Creates  loan disbursement details
      operationId: createDisbursementDetails
      parameters:
      - name: applicationNumber
        in: path
        description: applicationNumber
        required: true
        type: string
      - name: processRefNumber
        in: path
        description: processRefNumber
        required: true
        type: string
      responses:
        200:
          description: success status code.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error   
