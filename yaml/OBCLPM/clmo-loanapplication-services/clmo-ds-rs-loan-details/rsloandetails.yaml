swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/rsloandetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - RSLoanDetails
      summary: Adds a new RSLoanDetails.
      description: Adds a new RSLoanDetails. Add additional information here for this endpoint.
      operationId: addLoanDetails
      parameters:
      - name: RSLoanDetails
        in: body
        description: Request Body that contains data required for creating a new RSLoanDetails
        required: true
        schema:
          $ref: '#/definitions/RSLoanDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created RSLoanDetails
          headers:
            Location:
              description: URL of newly created RSLoanDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - RSLoanDetails
      summary: Retrieves the list of existing RSLoanDetails.
      description: Retrieves the list of existing RSLoanDetails. Add additional information here for the this endpoint.
      operationId: getAllLoanDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      - name: page
        in: query
        description: Page
        required: false
        type: integer
      - name: limit
        in: query
        description: Page Size
        required: false
        type: integer
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/rsloandetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - RSLoanDetails
      summary: Retrieves the RSLoanDetails by id.
      description: Retrieves the RSLoanDetails by id. Add additional information here for the this endpoint.
      operationId: getLoanDetailsById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the RSLoanDetails based on given applicationNumber.
          schema:
            $ref: '#/definitions/RSLoanDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - RSLoanDetails
      summary: Update an existing RSLoanDetails.
      description: Update an existing RSLoanDetails. Add additional information here for the this endpoint.
      operationId: updateLoanDetails
      parameters:
      - name: id
        in: path
        description: id of the RSLoanDetails that need to be updated
        required: true
        type: string
      - name: RSLoanDetails
        in: body
        description: Request Body that contains data required for updating an existing RSLoanDetails
        required: true
        schema:
          $ref: '#/definitions/RSLoanDetailsModel'
      responses:
        200:
          description: Returns updated RSLoanDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - RSLoanDetails
      summary: Deletes the RSLoanDetails identified by given ID.
      description: Deletes the RSLoanDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteLoanDetails
      parameters:
      - name: id
        in: path
        description: Id of the RSLoanDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  RSLoanDetailsModel:
   description: RSLoanDetails model
   type: object
   allOf:
   - $ref: '#/definitions/GenericDatasegmentModel'
   - type: object
     required:
     - loanCurrencyCode
     - loanAmount
     properties:
      loanBranchCode:
        description: Loan Branch Code
        type: string
        maxLength: 3
      loanCurrencyCode:
        description: Loan Currency Code of the LoanDetails
        type: string
        maxLength: 3
      loanAmount:
        description: Loan Amount of the LoanDetails
        type: number
        minimum: 0
      loanTenor:
        description: Loan Tenor of the LoanDetails
        type: integer
        format: int64
        minimum: 0
      valueDate:
        description: Value Date of the LoanDetails
        type: string
      maturityType:
        description: Maturity Type of the LoanDetails
        type: string
      maturityDate:
        description: Maturity Date of the LoanDetails
        type: string
      noticePeriod:
        description: Notice Period of the LoanDetails
        type: string
      noticeFrequency:
        description: Notice Frequency of the LoanDetails
        type: string
      loanTenorType:
        description: Tenor type of loan details
        type: string
  RSLoanDetailsCollection:
    description: Collection of RSLoanDetails.
    type: object
    properties:
      RSLoanDetailsList:
        type: array
        items:
          $ref: '#/definitions/RSLoanDetailsModel'
  GenericDatasegmentModel:
   allOf:
    - type: object
      discriminator: resource_type  