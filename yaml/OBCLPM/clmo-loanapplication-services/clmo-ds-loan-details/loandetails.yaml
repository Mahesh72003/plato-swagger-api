swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/loandetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - LoanDetails
      summary: Adds a new LoanDetails.
      description: Adds a new LoanDetails. Add additional information here for this endpoint.
      operationId: addLoanDetails
      parameters:
      - name: LoanDetails
        in: body
        description: Request Body that contains data required for creating a new LoanDetails
        required: true
        schema:
          $ref: '#/definitions/LoanDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created LoanDetails
          headers:
            Location:
              description: URL of newly created LoanDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - LoanDetails
      summary: Retrieves the list of  LoanDetails.
      description: Retrieves the list of  LoanDetails. Add additional information here for the this endpoint.
      operationId: getAllLoanDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      - name: page
        in: query
        description: Page
        required: false
        type: integer
      - name: limit
        in: query
        description: Page Size
        required: false
        type: integer
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/loandetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - LoanDetails
      summary: Get a  LoanDetails.
      description: Get a  LoanDetail by given id. Add additional information here for the this endpoint.
      operationId: getLoanDetailsById
      parameters:
      - name: id
        in: path
        description: id of the LoanDetails that need to be retrieved
        required: true
        type: string
      responses:
        200:
          description: Returns updated LoanDetails
          schema:
            $ref: '#/definitions/LoanDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - LoanDetails
      summary: Update an  LoanDetails.
      description: Update an  LoanDetails. Add additional information here for the this endpoint.
      operationId: updateLoanDetails
      parameters:
      - name: id
        in: path
        description: id of the LoanDetails that need to be updated
        required: true
        type: string
      - name: LoanDetails
        in: body
        description: Request Body that contains data required for updating an  LoanDetails
        required: true
        schema:
          $ref: '#/definitions/LoanDetailsModel'
      responses:
        200:
          description: Returns updated LoanDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - LoanDetails
      summary: Deletes the A LoanDetailsidentified by given ID.
      description: Deletes the LoanDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteLoanDetails
      parameters:
      - name: id
        in: path
        description: Id of the LoanDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  LoanDetailsModel:
   description: LoanDetails model
   type: object
   allOf:
   - $ref: '#/definitions/GenericDatasegmentModel'
   - type: object
     required:
     - loanCurrencyCode
     - loanAmount
     properties:
      loanBranchCode:
        description: Loan Branch Code
        type: string
        maxLength: 3
      loanCurrencyCode:
        description: Loan Currency Code of the LoanDetails
        type: string
        maxLength: 3
      loanAmount:
        description: Loan Amount of the LoanDetails
        type: number
        minimum: 0
      loanTenor:
        description: Loan Tenor of the LoanDetails
        type: integer
        format: int64
        minimum: 0
      valueDate:
        description: Value Date of the LoanDetails
        type: string
      maturityType:
        description: Maturity Type of the LoanDetails
        type: string
      maturityDate:
        description: Maturity Date of the LoanDetails
        type: string
      noticePeriod:
        description: Notice Period of the LoanDetails
        type: string
      noticeFrequency:
        description: Notice Frequency of the LoanDetails
        type: string
      loanTenorType:
        description: Tenor type of loan details
        type: string
  LoanDetailsCollection:
    description: Collection of LoanDetails.
    type: object
    properties:
      LoanDetailsList:
        type: array
        items:
          $ref: '#/definitions/LoanDetailsModel'
  GenericDatasegmentModel:
   allOf:
    - type: object
      discriminator: resource_type  