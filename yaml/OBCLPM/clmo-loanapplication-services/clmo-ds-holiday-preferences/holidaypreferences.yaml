  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/holidaypreferences:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - HolidayPreferences
      summary: Adds a new HolidayPreferences.
      description: Adds a new HolidayPreferences. Add additional information here for this endpoint.
      operationId: addHolidayPreferences
      parameters:
      - name: HolidayPreferences
        in: body
        description: Request Body that contains data required for creating a new HolidayPreferences
        required: true
        schema:
          $ref: '#/definitions/HolidayPreferencesModel'
      responses:
        201:
          description: Returns the Id of the newly created HolidayPreferences
          headers:
            Location:
              description: URL of newly created HolidayPreferences
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - HolidayPreferences
      summary: Retrieves the list of  HolidayPreferences.
      description: Retrieves the list of  HolidayPreferences. Add additional information here for the this endpoint.
      operationId: getAllHolidayPreferences
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/holidaypreferences/{id}:
