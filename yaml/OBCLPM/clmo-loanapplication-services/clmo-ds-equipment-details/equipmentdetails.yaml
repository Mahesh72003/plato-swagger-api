swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/trancherepaymentschedules:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - EquipmentDetails
      summary: Adds a new EquipmentDetails.
      description: Adds a new EquipmentDetails. Add additional information here for this endpoint.
      operationId: addEquipmentDetails
      parameters:
      - name: EquipmentDetails
        in: body
        description: Request Body that contains data required for creating a new EquipmentDetails
        required: true
        schema:
          $ref: '#/definitions/EquipmentDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created EquipmentDetails
          headers:
            Location:
              description: URL of newly created EquipmentDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - EquipmentDetails
      summary: Retrieves the list of existing EquipmentDetails.
      description: Retrieves the list of existing EquipmentDetails. Add additional information here for the this endpoint.
      operationId: getAllEquipmentDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/trancherepaymentschedules/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - EquipmentDetails
      summary: Retrieves the EquipmentDetails by id.
      description: Retrieves the EquipmentDetails by id. Add additional information here for the this endpoint.
      operationId: getEquipmentDetailsById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the EquipmentDetails based on given applicationNumber.
          schema:
            $ref: '#/definitions/EquipmentDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - EquipmentDetails
      summary: Update an existing EquipmentDetails.
      description: Update an existing EquipmentDetails. Add additional information here for the this endpoint.
      operationId: updateEquipmentDetails
      parameters:
      - name: id
        in: path
        description: id of the EquipmentDetails that need to be updated
        required: true
        type: string
      - name: EquipmentDetails
        in: body
        description: Request Body that contains data required for updating an existing EquipmentDetails
        required: true
        schema:
          $ref: '#/definitions/EquipmentDetailsModel'
      responses:
        200:
          description: Returns updated EquipmentDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - EquipmentDetails
      summary: Deletes the EquipmentDetails identified by given ID.
      description: Deletes the EquipmentDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteEquipmentDetails
      parameters:
      - name: id
        in: path
        description: Id of the EquipmentDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
