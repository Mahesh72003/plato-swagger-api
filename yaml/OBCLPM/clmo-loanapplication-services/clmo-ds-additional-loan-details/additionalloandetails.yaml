 AdditionalLoanDetailsModel:
  allOf:
  - $ref: '#/definitions/GenericDatasegmentModel'
  - type: object
    required:
    - businessProductCode
    properties:
      productCode:
        description: Product Code
        type: string
        minLength: 0
        maxLength: 20
      productDescription:
        description: Product Description
        type: string
        minLength: 0
        maxLength: 50
      businessProductCode:
        description: businessProductCode
        type: string
        minLength: 0
        maxLength: 20
      purposeOfLoan:
        description: purposeOfLoan
        type: string
        maxLength: 40
      expenseCode:
        description: Expense Code
        type: string
        maxLength: 40
      expenseCodeDescription:
        description: Expense Description
        type: string
        maxLength: 40
      loanBranch:
        description: Loan Branch
        type: string
        maxLength: 3
      graceDays:
        description: Grace Days
        type: number
      facilityDetails:
        type: array
        items:
          $ref: '#/definitions/FacilityDetailsModel'
 FacilityDetailsModel:
    description: Additional LoanDetails model
    type: object
    properties:
      extFacilityId:
        description: Line Code of the Facility
        type: string
        maxLength: 36
      facilityType:
        description: Facility Type of the Facility
        type: string
        maxLength: 20
      facilityDescription:
        description: Facility Description of the Facility
        type: string
        maxLength: 105
 GenericDatasegmentModel:
  allOf:
   - type: object
     discriminator: resource_type