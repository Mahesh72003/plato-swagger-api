swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
   /web/v1/restructuringlinkage:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - RestructuringLinkage
      summary: Adds a new RestructuringLinkage.
      description: Adds a new RestructuringLinkage. Add additional information here for this endpoint.
      operationId: addRestructuringLinkage
      parameters:
      - name: RestructuringLinkage
        in: body
        description: Request Body that contains data required for creating a new RestructuringLinkage
        required: true
        schema:
          $ref: '#/definitions/DocumentLinkageModel'
      responses:
        201:
          description: Returns the Id of the newly created RestructuringLinkage
          headers:
            Location:
              description: URL of newly created RestructuringLinkage
              type: string
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
definitions:
  DocumentLinkageModel:
    description: DocumentLinkageModel 
    type: object
    properties:
      id:
        description: Id
        type: string
        maxLength: 36
      parentDatasegmentId:
        description: parentDatasegmentId
        type: string
        maxLength: 36
      documentLinkageId:
        description: documentLinkageId
        type: string
        maxLength: 36
      documentName:
        description: documentName
        type: string
        maxLength: 105
      documentType:
        description: documentType
        type: string
        maxLength: 50
  
