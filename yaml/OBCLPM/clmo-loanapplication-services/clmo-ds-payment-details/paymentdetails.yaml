swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/paymentdetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - PaymentDetails
      summary: Adds a new PaymentDetails.
      description: Adds a new PaymentDetails. Add additional information here for this endpoint.
      operationId: addPaymentDetails
      parameters:
      - name: PaymentDetails
        in: body
        description: Request Body that contains data required for creating a new PaymentDetails
        required: true
        schema:
          $ref: '#/definitions/PaymentDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created PaymentDetails
          headers:
            Location:
              description: URL of newly created PaymentDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - PaymentDetails
      summary: Retrieves the list of  PaymentDetails.
      description: Retrieves the list of  PaymentDetails. Add additional information here for the this endpoint.
      operationId: getAllPaymentDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/paymentdetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - PaymentDetails
      summary: Get a  PaymentDetails.
      description: Update a  PaymentDetails. Add additional information here for the this endpoint.
      operationId: getPaymentDetailsById
      parameters:
      - name: id
        in: path
        description: id of the PaymentDetails that need to be retrieved
        required: true
        type: string
      responses:
        200:
          description: Returns updated PaymentDetails
          schema:
            $ref: '#/definitions/PaymentDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - PaymentDetails
      summary: Update an  PaymentDetails.
      description: Update an  PaymentDetails. Add additional information here for the this endpoint.
      operationId: updatePaymentDetails
      parameters:
      - name: id
        in: path
        description: id of the PaymentDetails that need to be updated
        required: true
        type: string
      - name: PaymentDetails
        in: body
        description: Request Body that contains data required for updating an  PaymentDetails
        required: true
        schema:
          $ref: '#/definitions/PaymentDetailsModel'
      responses:
        200:
          description: Returns updated PaymentDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - PaymentDetails
      summary: Deletes the A PaymentDetails identified by given ID.
      description: Deletes the PaymentDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deletePaymentDetails
      parameters:
      - name: id
        in: path
        description: Id of the PaymentDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  PaymentDetailsModel:
   description: PaymentDetails model
   type: object
   allOf:
   - $ref: '#/definitions/GenericDatasegmentModel'
   - type: object
     properties:
      contractreferenceNumber:
        description: contractreferenceNumber of the PaymentDetails
        type: string
        maxLength: 16
      businessProductCode:
        description: ApplicationCategory Name of the PaymentDetails
        type: string
        maxLength: 36
      paymentType:
        description: PaymentType of the model
        $ref: '../../commondefinitions.yaml#/definitions/PaymentType'
      loanAmount:
        description: loanAmount of the  model
        type: number
        minimum: 0
        maxLength: 22          
      totalSettlementAmount:
        description: totalSettlementAmount of the  model
        type: number
        minimum: 0
        maxLength: 22  
      prepaymentPenaltyAmount:
        description: prepaymentPenaltyAmount of the  model
        type: number
        minimum: 0
        maxLength: 22
      isSightingFundReq:
        description: Is Sighting Funds Required
        type: string
        maxLength: 1
      loanCurrency:
        description: loan Currency
        type: string 
        maxLength: 3
      limitDate:
        description: limitDate of the model
        type: string
      effectiveDate:
        description: effectiveDate of the model
        type: string 
      paymentComponents:
        type: array
        items:
          $ref: '#/definitions/PaymentComponentsModel'
  PaymentComponentsModel:
    description: PaymentDetails model
    type: object
    properties:
      id:
        description: Id of the PaymentComponents
        type: string
        maxLength: 36
      paymentId:
        description: Id of the Payment
        type: string
        maxLength: 36
      componentName:
        description: component Name of the PaymentDetails
        type: string
      componentCurrency:
        description: component Currency of the PaymentDetails
        type: string
        maxLength: 3
      amountDue:
        description: amountDue of the PaymentDetails
        type: number
        minimum: 0
        maxLength: 22  
      overDue:
        description: overDue of the PaymentDetails
        type: number
        minimum: 0
        maxLength: 22  
      outStanding:
        description: outStanding of the PaymentDetails
        type: number
        minimum: 0
        maxLength: 22  
      overDueDays:
        description: overDueDays of the PaymentDetails
        type: number
        minimum: 0
        maxLength: 22
      taxPaid:
        description: tax of the PaymentDetails
        type: number
        minimum: 0
        maxLength: 22    
      payableAmount:
        description: payableAmount of the PaymentDetails
        type: number
        minimum: 0
        maxLength: 22  
      advance:
        description: advance of the PaymentDetails
        type: number
        minimum: 0
        maxLength: 22            
  PaymentDetailsCollection:
    description: Collection of PaymentDetails.
    type: object
    properties:
      PaymentDetailsList:
        type: array
        items:
          $ref: '#/definitions/PaymentDetailsModel'   
  GenericDatasegmentModel:
   allOf:
    - type: object
      discriminator: resource_type     