      produces:
      - application/json
      - application/xml
      tags:
      - ManagementProfiles
      summary: Get a  ManagementProfile.
      description: Update a  ManagementProfile. Add additional information here for the this endpoint.
      operationId: getManagementProfileById
      parameters:
      - name: id
        in: path
        description: id of the ManagementProfile that need to be retrieved
        required: true
        type: string
      responses:
        200:
          description: Returns updated ManagementProfile
          schema:
            $ref: '#/definitions/ManagementProfileModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - ManagementProfiles
      summary: Update an  ManagementProfile.
      description: Update an  ManagementProfile. Add additional information here for the this endpoint.
      operationId: updateManagementProfile
      parameters:
      - name: id
        in: path
        description: id of the ManagementProfile that need to be updated
        required: true
        type: string
      - name: ManagementProfile
        in: body
        description: Request Body that contains data required for updating an  ManagementProfile
        required: true
        schema:
          $ref: '#/definitions/ManagementProfileModel'
      responses:
        200:
          description: Returns updated ManagementProfile
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - ManagementProfiles
      summary: Deletes the A ManagementProfileidentified by given ID.
      description: Deletes the ManagementProfile identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteManagementProfile
      parameters:
      - name: id
        in: path
        description: Id of the ManagementProfile that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
