  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/managementprofiles:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - ManagementProfiles
      summary: Adds a new ManagementProfile.
      description: Adds a new ManagementProfile. Add additional information here for this endpoint.
      operationId: addManagementProfile
      parameters:
      - name: ManagementProfile
        in: body
        description: Request Body that contains data required for creating a new ManagementProfile
        required: true
        schema:
          $ref: '#/definitions/ManagementProfileModel'
      responses:
        201:
          description: Returns the Id of the newly created ManagementProfile
          headers:
            Location:
              description: URL of newly created ManagementProfile
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
