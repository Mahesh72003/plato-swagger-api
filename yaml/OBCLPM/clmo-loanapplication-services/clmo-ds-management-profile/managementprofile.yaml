      produces:
      - application/json
      - application/xml
      tags:
      - ManagementProfiles
      summary: Retrieves the list of  ManagementProfile.
      description: Retrieves the list of  ManagementProfile. Add additional information here for the this endpoint.
      operationId: getAllManagementProfile
      parameters:
      - name: applicationNumber
        in: query
