swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/tradedetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - TradeDetails
      summary: Adds a new TradeDetails.
      description: Adds a new TradeDetails. Add additional information here for this endpoint.
      operationId: addTradeDetails
      parameters:
      - name: TradeDetails
        in: body
        description: Request Body that contains data required for creating a new TradeDetails
        required: true
        schema:
          $ref: '#/definitions/TradeDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created TradeDetails
          headers:
            Location:
              description: URL of newly created TradeDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - TradeDetails
      summary: Retrieves the list of  TradeDetails.
      description: Retrieves the list of  TradeDetails. Add additional information here for the this endpoint.
      operationId: getAllTradeDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/tradedetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - TradeDetails
      summary: Get a  TradeDetails.
      description: Update a  TradeDetails. Add additional information here for the this endpoint.
      operationId: getTradeDetailsById
      parameters:
      - name: id
        in: path
        description: id of the TradeDetails that need to be retrieved
        required: true
        type: string
      responses:
        200:
          description: Returns updated TradeDetails
          schema:
            $ref: '#/definitions/TradeDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - TradeDetails
      summary: Update an  TradeDetails.
      description: Update an  TradeDetails. Add additional information here for the this endpoint.
      operationId: updateTradeDetails
      parameters:
      - name: id
        in: path
        description: id of the TradeDetails that need to be updated
        required: true
        type: string
      - name: TradeDetails
        in: body
        description: Request Body that contains data required for updating an  TradeDetails
        required: true
        schema:
          $ref: '#/definitions/TradeDetailsModel'
      responses:
        200:
          description: Returns updated TradeDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - TradeDetails
      summary: Deletes the A TradeDetailsidentified by given ID.
      description: Deletes the TradeDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteTradeDetails
      parameters:
      - name: id
        in: path
        description: Id of the TradeDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  TradeDetailsModel:
   description: TradeDetails model
   type: object
   allOf:
   - $ref: '#/definitions/GenericDatasegmentModel'
   - type: object
     required:
     - lcCurrency
     - lcBalance
     - dateOfShipment
     properties:
      lcNumber:
        description: Trade lc NUMBER of the TradeDetails
        type: string
        maxLength: 16
      lcCurrency:
        description: Trade lcCurrency of the TradeDetails
        type: string
        maxLength: 3
      bcCurrency:
        description: Trade bcCurrency of the TradeDetails
        type: string
        maxLength: 3
      dueAmount:
        description: Due amount of the TradeDetails
        type: integer
        format: int64
        minimum: 0
      amountAvailable:
        description: Trade amountAvailable of the TradeDetails
        type: integer
        format: int64
        minimum: 0
      purchaseOrderRefNo:
        description: Trade purchase order ref no of the TradeDetails
        type: string
        maxLength: 16
      currencyBcDueAmt:
        description: Trade currency bc amount of the TradeDetails
        type: integer
        format: int64
        minimum: 0
      puchaseOrderAmt:
        description: purchase order amount of the TradeDetails
        type: integer
        format: int64
        minimum: 0
      lcBalance:
        description: Trade lc balance of the TradeDetails
        type: integer
        format: int64
        minimum: 0
      tradeRefNo:
        description: Trade refno of the TradeDetails
        type: integer
        format: int64
      dateOfShipment:
        description: Maturity Date
        type: string
      lcExpiryDate:
        description: lcExpiryDate
        type: string
      purchaseOrderCurrency:
        description: Purchase Order Currency
        type: string
      tradeDetailsDocument:
        description: tradeDetailsDocument of the TradeDetails
        type: array
        items:
          $ref: '../clmo-ds-utility/documentLinkage.yaml#/definitions/DocumentLinkageModel'
  TradeDetailsCollection:
    description: Collection of TradeDetails.
    type: object
    properties:
      TradeDetailsList:
        type: array
        items:
          $ref: '#/definitions/TradeDetailsModel'
  GenericDatasegmentModel:
   allOf:
    - type: object
      discriminator: resource_type