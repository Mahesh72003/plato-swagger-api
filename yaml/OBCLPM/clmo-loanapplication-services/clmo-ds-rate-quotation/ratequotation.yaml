swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/ratequotations:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - RateQuotation
      summary: Adds a new RateQuotation.
      description: Adds a new RateQuotation. Add additional information here for this endpoint.
      operationId: addRateQuotation
      parameters:
      - name: RateQuotation
        in: body
        description: Request Body that contains data required for creating a new RateQuotation
        required: true
        schema:
          $ref: '#/definitions/RateQuotationModel'
      responses:
        201:
          description: Returns the Id of the newly created RateQuotation
          headers:
            Location:
              description: URL of newly created RateQuotation
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - RateQuotation
      summary: Retrieves the list of  RateQuotation.
      description: Retrieves the list of  RateQuotation. Add additional information here for the this endpoint.
      operationId: getAllRateQuotation
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/ratequotations/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - RateQuotation
      summary: Get a  RateQuotation.
      description: Update a  RateQuotation. Add additional information here for the this endpoint.
      operationId: getRateQuotationById
      parameters:
      - name: id
        in: path
        description: id of the RateQuotation that need to be retrieved
        required: true
        type: string
      responses:
        200:
          description: Returns updated RateQuotation
          schema:
            $ref: '#/definitions/RateQuotationModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - RateQuotation
      summary: Update an  RateQuotation.
      description: Update an  RateQuotation. Add additional information here for the this endpoint.
      operationId: updateRateQuotation
      parameters:
      - name: id
        in: path
        description: id of the RateQuotation that need to be updated
        required: true
        type: string
      - name: RateQuotation
        in: body
        description: Request Body that contains data required for updating an  RateQuotation
        required: true
        schema:
          $ref: '#/definitions/RateQuotationModel'
      responses:
        200:
          description: Returns updated RateQuotation
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - RateQuotation
      summary: Deletes the A RateQuotation identified by given ID.
      description: Deletes the RateQuotation identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteRateQuotation
      parameters:
      - name: id
        in: path
        description: Id of the RateQuotation that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  RateQuotationModel:
   description: RateQuotation Model
   type: object
   allOf:
   - $ref: '#/definitions/GenericDatasegmentModel'
   - type: object
     required:
     - loanAmount
     - loanCurrency
     properties:
      ticketReferenceNumber:
        description: ticketReferenceNumber
        type: string
        maxLength: 20
      expenseCode:
        description: expenseCode
        type: string
        maxLength: 20
      rmName:
        description: Relationship Manager Name
        type: string
        maxLength: 20
      loanCurrency:
        description: loanCurrency
        type: string
        maxLength: 3
      loanAmount:
        description: loanAmount
        type: number
        minimum: 0
      costOfFunds:
        description: costOfFunds
        type: number
        minimum: 0
      margin:
        description: margin
        type: number
        minimum: 0
      specialRate:
        description: specialRate
        type: number
        minimum: 0
      allInRate:
        description: allInRate
        type: number
        minimum: 0
  RateQuotationCollection:
    description: Collection of RateQuotationModels.
    type: object
    properties:
      EquipmentDetailsList:
        type: array
        items:
          $ref: '#/definitions/RateQuotationModel'
  GenericDatasegmentModel:
   allOf:
    - type: object
      discriminator: resource_type  