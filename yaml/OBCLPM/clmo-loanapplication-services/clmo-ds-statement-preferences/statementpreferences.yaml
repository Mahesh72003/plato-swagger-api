swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/statementpreferences:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - StatementPreferences
      summary: Adds a new StatementPreferences.
      description: Adds a new StatementPreferences. Add additional information here for this endpoint.
      operationId: addStatementPreferences
      parameters:
      - name: StatementPreferences
        in: body
        description: Request Body that contains data required for creating a new StatementPreferences
        required: true
        schema:
          $ref: '#/definitions/StatementPreferencesModel'
      responses:
        201:
          description: Returns the Id of the newly created StatementPreferences
          headers:
            Location:
              description: URL of newly created StatementPreferences
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - StatementPreferences
      summary: Retrieves the list of existing StatementPreferences.
      description: Retrieves the list of existing StatementPreferences. Add additional information here for the this endpoint.
      operationId: getAllStatementPreferences
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/statementpreferences/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - StatementPreferences
      summary: Get a  StatementPreferences.
      description: Get a  StatementPreferences by given id. Add additional information here for the this endpoint.
      operationId: getStatementPreferencesById
      parameters:
      - name: id
        in: path
        description: id of the StatementPreferences that need to be retrieved
        required: true
        type: string
      responses:
        200:
          description: Returns updated StatementPreferences
          schema:
            $ref: '#/definitions/StatementPreferencesModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - StatementPreferences
      summary: Update an existing StatementPreferences.
      description: Update an existing StatementPreferences. Add additional information here for the this endpoint.
      operationId: updateStatementPreferences
      parameters:
      - name: id
        in: path
        description: id of the StatementPreferences that need to be updated
        required: true
        type: string
      - name: StatementPreferences
        in: body
        description: Request Body that contains data required for updating an existing StatementPreferences
        required: true
        schema:
          $ref: '#/definitions/StatementPreferencesModel'
      responses:
        200:
          description: Returns updated StatementPreferences
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - StatementPreferences
      summary: Deletes the StatementPreferences identified by given ID.
      description: Deletes the StatementPreferences identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteStatementPreferences
      parameters:
      - name: id
        in: path
        description: Id of the StatementPreferences that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  StatementPreferencesModel:
   description: StatementPreferences model
   type: object
   allOf:
   - $ref: '#/definitions/GenericDatasegmentModel'
   - type: object
     properties:
      cycleCode:
        description: Cycle code of the StatementPreferences
        type: string
        maxLength: 22
      day:
        description: Day of the StatementPreferences
        type: string
      type:
        description: Type of the StatementPreferences
        type: string
        maxLength: 20
  StatementPreferencesCollection:
    description: Collection of StatementPreferences.
    type: object
    properties:
      StatementPreferencesList:
        type: array
        items:
          $ref: '#/definitions/StatementPreferencesModel'
  GenericDatasegmentModel:
   allOf:
    - type: object
      discriminator: resource_type