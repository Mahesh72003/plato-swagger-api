swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/interestdetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Adds a new InterestDetails.
      description: Adds a new InterestDetails. Add additional information here for this endpoint.
      operationId: addInterestDetails
      parameters:
      - name: InterestDetails
        in: body
        description: Request Body that contains data required for creating a new InterestDetails
        required: true
        schema:
          $ref: '#/definitions/InterestDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created Charges
          headers:
            Location:
              description: URL of newly created Charges
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Retrieves the list of existing InterestDetails.
      description: Retrieves the list of existing InterestDetails. Add additional information here for the this endpoint.
      operationId: getAllInterestDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/interestdetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Get a  InterestDetails.
      description: Get a  InterestDetails by given id. Add additional information here for the this endpoint.
      operationId: getById
      parameters:
      - name: id
        in: path
        description: id of the InterestDetails that need to be retrieved
        required: true
        type: string
      responses:
        200:
          description: Returns updated InterestDetails
          schema:
            $ref: '#/definitions/InterestDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Update an existing InterestDetails.
      description: Update an existing InterestDetails. Add additional information here for the this endpoint.
      operationId: updateInterestDetails
      parameters:
      - name: id
        in: path
        description: id of the InterestDetails that need to be updated
        required: true
        type: string
      - name: InterestDetails
        in: body
        description: Request Body that contains data required for updating an existing InterestDetails
        required: true
        schema:
          $ref: '#/definitions/InterestDetailsModel'
      responses:
        200:
          description: Returns updated InterestDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Deletes the InterestDetails identified by given ID.
      description: Deletes the InterestDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteInterestDetails
      parameters:
      - name: id
        in: path
        description: Id of the InterestDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/interestdetails/{applicationNumber}/components:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Get list of component details based on given schedule type.
      description: Get list of component details based on given schedule type.
      operationId: getComponentByScheduleType
      parameters:
      - name: applicationNumber
        in: path
        description: Loan application number
        required: true
        type: string
      - name: "scheduleType"
        in: "query"
        description: "Schedule Type"
        required: true
        type: "string"
      responses:
        200:
          description: Returns list of ComponentDetails
          schema:
            $ref: '#/definitions/ComponentDetailsLOVCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
definitions:
  InterestDetailsModel:
   description: InterestDetails model
   type: object
   allOf:
   - $ref: '#/definitions/GenericDatasegmentModel'
   - type: object
     required:
     - loanBranchCode
     - loanCurrencyCode
     - loanAmount
     properties:
      loanBranchId:
        description: loanBranch Code of the InterestDetails
        type: string
        minLength: 0
        maxLength: 3
      loanCurrencyCode:
        description: loanCurrencyCode of the InterestDetails
        type: string
        minLength: 0
        maxLength: 3
      loanAmount:
        description: loanAmount of the InterestDetails
        type: integer
        format: int64
        minLength: 0
        maxLength: 22
      valueDate:
        description: valueDate of the InterestDetails
        type: string
      componentDetails:
        type: array
        items:
          $ref: '#/definitions/ComponentDetailsModel'
      interestDetailsDocument:
        description: interestDetailsDocument of the interestDetails
        type: array
        items:
          $ref: '../clmo-ds-utility/documentLinkage.yaml#/definitions/DocumentLinkageModel'
  InterestDetailsCollection:
    description: Collection of InterestDetails.
    type: object
    properties:
      InterestDetailsList:
        type: array
        items:
          $ref: '#/definitions/InterestDetailsModel'
  ComponentDetailsModel:
    description: ComponentDetails model
    type: object
    required:
    - componentName
    - rateType
    - subRateType
    properties:
      id:
        description: Id of the ComponentDetails
        type: string
        maxLength: 36
      interestDetailsId:
        description: interestDetailsId of the ComponentDetails
        type: string
        maxLength: 36
      componentName:
        description: componentName of the ComponentDetails
        type: string
        maxLength: 35
      rateTypeId:
        description: rateTypeId of the ComponentDetails
        type: string
        maxLength: 20
      rateCode:
        description: rateCode of the ComponentDetails
        type: string
        maxLength: 20
      subRateTypeId:
        description: subRateTypeId of the ComponentDetails
        type: string
        maxLength: 20
      spread:
        description: spread of the ComponentDetails
        type: number
      rate:
        description: Rate of the ComponentDetails
        type: number
      amount:
        description: amount of the ComponentDetails
        type: number
      amountCurrencyCode:
        description: CurrencyCode of the InterestDetails
        type: string
        maxLength: 3
      allInRate: 
        description: All In rate of the InterestDetails
        type: number
      minAllInRate: 
        description: All In rate of the InterestDetails
        type: number
      maxAllInRate: 
        description: All In rate of the InterestDetails
        type: number
      billingNoticeDays: 
        description: All In rate of the InterestDetails
        type: number
      intPeriodBasis:
        description: subRateTypeId of the ComponentDetails
        type: string
        maxLength: 20
      rateFixingRequired:
        description: subRateTypeId of the ComponentDetails
        type: string
        maxLength: 1
      rateFixingDays:
        description: subRateTypeId of the ComponentDetails
        type: number
      billingNoticeRequired:
        description: subRateTypeId of the ComponentDetails
        type: string
        maxLength: 1
      waiver:
        description: subRateTypeId of the ComponentDetails
        type: string
        maxLength: 1
      resetTenor:
        description: subRateTypeId of the ComponentDetails
        type: number
      basisAmountCategory:
        description: basisAmountCategory of the ComponentDetails
        type: string
        maxLength: 1
  ComponentDetailsCollection:
    description: Collection of ComponentDetails.
    type: object
    properties:
      ComponentDetailsList:
        type: array
        items:
          $ref: '#/definitions/ComponentDetailsModel'
  ComponentDetailsLOVModel:
    description: ComponentDetails model
    type: object
    required:
    - componentName
    - rateType
    - subRateType
    properties:
      componentName:
        description: componentName of the ComponentDetails
        type: string
        maxLength: 35
      rateTypeId:
        description: rateTypeId of the ComponentDetails
        type: string
        maxLength: 20
      rateCode:
        description: rateCode of the ComponentDetails
        type: string
        maxLength: 20
      subRateTypeId:
        description: subRateTypeId of the ComponentDetails
        type: string
        maxLength: 20
      waiver:
        description: subRateTypeId of the ComponentDetails
        type: string
        maxLength: 1
      basisAmountCategory:
        description: basisAmountCategory of the ComponentDetails
        type: string
        maxLength: 1
  ComponentDetailsLOVCollection:
    description: Collection of ComponentDetails.
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/ComponentDetailsLOVModel'
  GenericDatasegmentModel:
   allOf:
    - type: object
      discriminator: resource_type