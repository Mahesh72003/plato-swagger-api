swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /loanapplication-services
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/customeracceptances:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerAcceptance
      summary: Adds a new  Customer acceptance.
      description: Adds a new  Customer acceptance. Add additional information here for this endpoint.
      operationId: addCustomerAcceptance
      parameters:
      - name: Customer acceptance
        in: body
        description: Request Body that contains data required for creating a new  Customer acceptance
        required: true
        schema:
          $ref: '#/definitions/CustomerAcceptanceModel'
      responses:
        201:
          description: Returns the Id of the newly created  Customer acceptance
          headers:
            Location:
              description: URL of newly created  Customer acceptance
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerAcceptance
      summary: Retrieves the list of existing  Customer acceptance.
      description: Retrieves the list of existing  Customer acceptance. Add additional information here for the this endpoint.
      operationId: getAllCustomerAcceptance
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/customeracceptances/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerAcceptance
      summary: Retrieves the  Customer acceptance by id.
      description: Retrieves the  Customer acceptance by id. Add additional information here for the this endpoint.
      operationId: getCustomerAcceptanceById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the CustomerAcceptance based on given applicationNumber.
          schema:
            $ref: '#/definitions/CustomerAcceptanceModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerAcceptance
      summary: Update an existing  Customer acceptance.
      description: Update an existing  Customer acceptance. Add additional information here for the this endpoint.
      operationId: updateCustomerAcceptance
      parameters:
      - name: id
        in: path
        description: id of the CustomerAcceptance that need to be updated
        required: true
        type: string
      - name: CustomerAcceptance
        in: body
        description: Request Body that contains data required for updating an existing CustomerAcceptance
        required: true
        schema:
          $ref: '#/definitions/CustomerAcceptanceModel'
      responses:
        200:
          description: Returns updated CustomerAcceptance
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerAcceptance
      summary: Deletes the  Customer acceptance identified by given ID.
      description: Deletes the  Customer acceptance identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteCustomerAcceptance
      parameters:
      - name: id
        in: path
        description: Id of the  Customer acceptance that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  CustomerAcceptanceModel:
   description: Customer Acceptance model
   type: object
   allOf:
   - $ref: '#/definitions/GenericDatasegmentModel'
   - type: object
     properties:
      id:
        description: Id of the Customer Acceptance
        type: string
        maxLength: 36
      applicationNumber:
        description: Application Number of the Customer Acceptance
        type: string
        maxLength: 20
      processRefNumber:
        description: processRefNumber
        type: string
      acceptedBy:
        description: acceptedBy
        type: string
      customerAcceptancedate:
        description: customerAcceptancedate
        type: string
      extensionDays:
        description: extensionDays
        type: integer
        minLength: 0
      remarks:
        description: remarks
        type: string
        maxLength: 255
      customerAcceptanceAction:
        description: customer received action
        type: string
      customerAcceptanceReceived:
        description: customerAcceptanceRecieved
        type: string
      dataSegmentCode:
        description: Data segment code
        type: string
      updatedBy:
        description: Updated By
        type: string
      updatedTimeStamp:
        description: Updated Time Stamp
        type: string
      stageCode:
        description: stageCode
        type: string
        maxLength: 36
      createdBy:
        description: createdBy
        type: string
        maxLength: 36
      status:
        description: status
        type: string
        maxLength: 36
      customerAcceptanceDocument:
        description: customerAcceptanceDocument of the customerAcceptance
        type: array
        items:
          $ref: '../clmo-ds-utility/documentLinkage.yaml#/definitions/DocumentLinkageModel'  
  CustomerAcceptanceCollection:
    description: Collection of Disbursements.
    type: object
    properties:
      CustomerAcceptanceList:
        type: array
        items:
          $ref: '#/definitions/CustomerAcceptanceModel'
  GenericDatasegmentModel:
   allOf:
    - type: object
      discriminator: resource_type