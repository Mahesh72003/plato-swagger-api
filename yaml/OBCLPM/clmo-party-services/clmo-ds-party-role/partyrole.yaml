swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Party Role Service for OBCLPM
host: 10.184.157.121:9000
basePath: /clmo-party-role-services
tags:
- name: party-role-services
  description: API for party-role-services Operations
schemes:
- http
paths:
  /web/v1/partyrole:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - PartyRole
      summary: Adds a new Party.
      description: Adds a new Party. Add additional information here for this endpoint.
      operationId: addParty
      parameters:
      - name: Party
        in: body
        description: Request Body that contains data required for creating a new Party
        required: true
        schema:
          $ref: '#/definitions/PartyModel'
      responses:
        201:
          description: Returns the Id of the newly created Party
          headers:
            Location:
              description: URL of newly created Party
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - PartyRole
      summary: Retrieves the list of existing Party.
      description: Retrieves the list of existing Party. Add additional information here for the this endpoint.
      operationId: getAllParty
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      - name: partyNumber
        in: query
        description: partyNumber of the party to be fetched
        required: false
        type: string
      - name: roles
        in: query
        description: roles of the parties to be fetched
        required: false
        type: array
        items:
           type: string          
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/partyrole/summary:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - PartyRole
      summary: Retrieves the Party party details
      description: Retrieves the Party details. Add additional information here for the this endpoint.
      operationId: summary
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      - name: partyNumber
        in: query
        description: partyNumber of the party to be fetched
        required: false
        type: string
      - name: roles
        in: query
        description: roles of the parties to be fetched
        required: false
        type: array
        items:
           type: string
      responses:
        200:
          description: Returns the Party based on given applicationNumber.
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/partyrole/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - PartyRole
      summary: Retrieves the Party by id.
      description: Retrieves the Party by id. Add additional information here for the this endpoint.
      operationId: getPartyById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the Party based on given applicationNumber.
          schema:
            $ref: '#/definitions/PartyModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - PartyRole
      summary: Update an existing Party.
      description: Update an existing Party. Add additional information here for the this endpoint.
      operationId: updateParty
      parameters:
      - name: id
        in: path
        description: id of the Party that need to be updated
        required: true
        type: string
      - name: Party
        in: body
        description: Request Body that contains data required for updating an existing Party
        required: true
        schema:
          $ref: '#/definitions/PartyModel'
      responses:
        200:
          description: Returns updated Party
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - PartyRole
      summary: Deletes the Party identified by given ID.
      description: Deletes the Party identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteParty
      parameters:
      - name: id
        in: path
        description: Id of the Party that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  PartyDetailsCollection:
    description: Collection of Party.
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/PartyDetailsModel'
