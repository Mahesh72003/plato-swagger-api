swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Dashboard Service
host: 10.184.157.121:9000
basePath: /dashboards-services
tags:
- name: "dashboards"
  description: API for Widgets in the application Dashboard
schemes:
- http
paths:  
   /dashboards/conditionsubsequent:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - DashBoards
      summary: get the Conditionsubsequent details
      description: get the Conditionsubsequent details
      operationId: getConditionsubsequentSummary
      parameters:
      - name: rangeStart
        in: query
        description: rangeEnd
        required: false
        type: string
      - name: rangeEnd
        in: query
        description: rangeEnd
        required: false
        type: string
      responses:
        201:
          description: Returns ConditionsubsequentWidgetModelCollection
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
   /dashboards/pastconditionsubsequent/{rangeStart}:
     get:
      produces:
      - application/json
      - application/xml
      tags:
      - DashBoards
      summary: get the Conditionsubsequent details
      description: get the Conditionsubsequent details
      operationId: getPastConditionsubsequent
      parameters:
      - name: rangeStart
        in: path
        description: start date of the period for which loans to be fetched
        required: true
        type: string
      responses:
        201:
          description: Returns PastConditionsubsequentWidgetModelCollection
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error                          
definitions:
  ConditionsubsequentWidgetModelCollection:
     description: Collection of ConditionsubsequentWidgetModelCollection.
     type: object
     properties:
      data:
       type: array
       items:
        $ref: '#/definitions/ConditionsubsequentWidgetModel'
  ConditionsubsequentWidgetModel:
     type: object
     properties:
       month:
        type: string
       count:
        type: number
       parties:
          type: array
          items:
            $ref: '#/definitions/ConditionsubsequentWidgetPartyModel'
  PastConditionsubsequentWidgetModelCollection:
     description: Collection of PastConditionsubsequentWidgetModelCollection.
     type: object
     properties:
      data:
       type: array
       items:
        $ref: '#/definitions/PastConditionsubsequentWidgetModel'
  PastConditionsubsequentWidgetModel:
     description: Collection of PastConditionsubsequentWidgetModel.
     type: object
     properties:
      parties:
       type: array
       items:
        $ref: '#/definitions/ConditionsubsequentWidgetPartyModel'     
  ConditionsubsequentWidgetPartyModel:
    type: object
    properties:
      partyName:
         type: string
      partyNumber:
         type: string
      partyId:
         type: string 
      projects:
          type: array
          items:
            $ref: '#/definitions/ConditionsubsequentProjectWidgetModel'
  ConditionsubsequentProjectWidgetModel:
    type: object
    properties:
      keyId:
       type: string
      projectName:
          type: string
      keyProjectId:
          type: string
      conditionsubsequentDetails:
          type: array
          items:
            $ref: '#/definitions/ConditionsubsequentDetailsWidgetModel'  
  ConditionsubsequentDetailsWidgetModel:
    type: object
    properties:
     condSubsId:
      type: string
     description:
      type: string
     dueBy:
      type: string
     id:
      type: string
     name:
      type: string
     reminderDays:
      type: number
     status:
      type: string
   
                
  