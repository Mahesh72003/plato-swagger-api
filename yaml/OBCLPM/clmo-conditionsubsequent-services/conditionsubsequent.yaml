swagger: "2.0"
info:
 description: "This is a sample server conditionsubsequent server." 
 version: "1.0.0"
 title: "conditionsubsequent Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "conditionsubsequent"
   description: "Maintenance to capture Conditions Subsequent outside of the Loan application. User should be able to capture Conditions Subsequent outside of the loan application, which are not captured during the loan application life cycle.
User should be able to capture the Conditions Subsequent by selecting the appropriate Borrower and Project. These Conditions Subsequent should save in the maintenance along with the other Conditions Subsequent captured during the life cycle of the loan application."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../conditionsubsequent

 /conditionsubsequent:
  post:
   tags:
    - "conditionsubsequent"
   summary: "Adds a new conditionsubsequent."
   description: "Adds a new conditionsubsequent. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "conditionsubsequent" 
      in: "body" 
      description: "Request Body that contains data required for creating a new conditionsubsequent" 
      required: true
      schema:
       $ref: "#/definitions/ClmoTmCondSubsDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created conditionsubsequent" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "conditionsubsequent"
   summary: "Get all valid conditionsubsequent."
   description:  "Get all valid conditionsubsequent. This endpoints will be used to Get all valid conditionsubsequent maintenance records."
   operationId: "getAll"
   parameters:
   - name: partyNumber
     in: query
     description: partyNumber to filter
     required: false
     type: "string"
   - name: projectName
     in: query
     description: projectName to filter
     required: false
     type: "string"
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/ClmoTmCondSubsCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../conditionsubsequent/xxx
#   DELETE    .../conditionsubsequent/xxx
#   GET       .../conditionsubsequent/xxx
#   GET       .../conditionsubsequent/xxx?version=latestrecord
#   GET       .../conditionsubsequent/xxx?version=1

 /conditionsubsequent/{id}:
  put:
   tags:
    - "conditionsubsequent"
   summary: "Update an existing conditionsubsequent."
   description:  "Update an existing conditionsubsequent."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the conditionsubsequent Maintenance"
      required: true
      type: "string"
    - name: "conditionsubsequent"
      in: "body"
      description: "Request Body that contains data required for updating an existing conditionsubsequent"
      required: true
      schema:
       $ref: "#/definitions/ClmoTmCondSubsDTO"
   responses:
    200:
     description: "Returns updated conditionsubsequent"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "conditionsubsequent"
   summary: "Retrieves the conditionsubsequent by ID."
   description:  "Retrieves the conditionsubsequent by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the conditionsubsequent based on given id."
     schema:
      $ref: "#/definitions/ClmoTmCondSubsWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "conditionsubsequent"
   summary: "Deletes the conditionsubsequent identified by given ID."
   description:  "Deletes the conditionsubsequent identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the conditionsubsequent maintenance"
      required: true
      type: "string"
    - name: "conditionsubsequent"
      in: "body"
      description: Request body contain conditionsubsequent and Modification no of conditionsubsequent maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

