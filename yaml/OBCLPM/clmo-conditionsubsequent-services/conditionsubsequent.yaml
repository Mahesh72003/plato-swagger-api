definitions:
 ClmoTmCondSubsDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     partyId:
      type: string
      description: ""
     partyName:
      type: string
      description: ""
     partyNumber:
      type: string
      description: ""
     projectName:
      type: string
      description: ""
      maxLength: 105      
     condSubsDetails:
      type: array
      items:
       $ref: '#/definitions/ClmoTmCondSubsDetailsDTO'
 ClmoTmCondSubsDetailsDTO:
  type: object
  properties:
     condSubsId:
      type: string
      description: "cond Subs Id"
     description:
      type: string
      description: "description"
     dueBy:
      type: string
      description: "dueBy"
     id:
      type: string
      description: "Condition Subsequent Description"
     name:
      type: string
      description: "Condition Subsequent name"
     reminderDays:
      type: number
      description: "reminder Days"
     status:
      type: string
      description: "status"
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 ClmoTmCondSubsCollection: 
  description: "Collection of condsubs."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/ClmoTmCondSubsDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 ClmoTmCondSubsWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/ClmoTmCondSubsDTO"
