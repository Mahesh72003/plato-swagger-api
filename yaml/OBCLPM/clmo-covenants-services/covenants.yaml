definitions:
 ClmoTmCovenantsDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     partyId:
      type: string
      description: "partyId"
     partyName:
      type: string
      description: "partyName"
     partyNumber:
      type: string
      description: "partyNumber"
     projectName:
      type: string
      description: "projectName"
      maxLength: 105      
     covenantsDetails:
      type: array
      items:
       $ref: '#/definitions/ClmoTmCovenantsDetailsDTO'
 ClmoTmCovenantsDetailsDTO:
  type: object
  properties:
     covenantsId:
      type: string
      description: "covenantsId"
     description:
      type: string
      description: "description"
     dueBy:
      type: string
      description: "dueBy"
     endBy:
      type: string
      description: "endBy"
     frequency:
      type: string
      description: "frequency"
     id:
      type: string
      description: "id"
     name:
      type: string
      description: "name"
     reminderDays:
      type: number
      description: "reminderDays"
     status:
      type: string
      description: "status"
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 ClmoTmCovenantsCollection: 
  description: "Collection of covenants."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/ClmoTmCovenantsDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 ClmoTmCovenantsWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/ClmoTmCovenantsDTO"
 CovenantsWidgetModelCollection:
     description: Collection of CovenantsWidgetModelCollection.
     type: object
     properties:
      data:
       type: array
       items:
        $ref: '#/definitions/CovenantsWidgetModel'
 CovenantsWidgetModel:
     type: object
     properties:
       month:
        type: string
       count:
        type: number
       parties:
          type: array
          items:
            $ref: '#/definitions/CovenantsWidgetPartytModel'
 PastCovenantsWidgetModelCollection:
     description: Collection of PastCovenantsWidgetModelCollection.
     type: object
     properties:
      data:
       type: array
       items:
        $ref: '#/definitions/PastCovenantsWidgettModel'
 PastCovenantsWidgettModel:
     description: Collection of PastCovenantsWidgettModel.
     type: object
     properties:
      parties:
       type: array
       items:
        $ref: '#/definitions/CovenantsWidgetPartytModel'     
 CovenantsWidgetPartytModel:
    type: object
    properties:
      partyName:
         type: string
      partyNumber:
         type: string
      partyId:
         type: string 
      projects:
          type: array
          items:
            $ref: '#/definitions/CovenantsProjectWidgetModel'
 CovenantsProjectWidgetModel:
    type: object
    properties:
      keyId:
       type: string
      projectName:
          type: string
      keyProjectId:
          type: string
      covenantsDetails:
          type: array
          items:
            $ref: '#/definitions/CovenantsDetailsWidgetModel'  
 CovenantsDetailsWidgetModel:
    type: object
    properties:
     covenantsId:
      type: string
      description: "covenantsId"
     description:
      type: string
      description: "description"
     dueBy:
      type: string
      description: "dueBy"
     endBy:
      type: string
      description: "endBy"
     frequency:
      type: string
      description: "frequency"
     id:
      type: string
      description: "id"
     name:
      type: string
      description: "name"
     reminderDays:
      type: number
      description: "reminderDays"
     status:
      type: string
      description: "status"
