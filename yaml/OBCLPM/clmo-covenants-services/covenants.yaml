swagger: "2.0"
info:
 description: "This is a sample server covenantmaintenance server." 
 version: "1.0.0"
 title: "covenantmaintenance Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "covenantmaintenance"
   description: "Maintenance to capture covenants outside of the Loan application. User should be able to capture covenants outside of the loan application, which are not captured during the loan application life cycle."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../covenantmaintenance

 /covenantmaintenance:
  post:
   tags:
    - "covenantmaintenance"
   summary: "Adds a new covenantmaintenance."
   description: "Adds a new covenantmaintenance. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "covenantmaintenance" 
      in: "body" 
      description: "Request Body that contains data required for creating a new covenantmaintenance" 
      required: true
      schema:
       $ref: "#/definitions/ClmoTmCovenantsDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created covenantmaintenance" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "covenantmaintenance"
   summary: "Get all valid covenantmaintenance."
   description:  "Get all valid covenantmaintenance. This endpoints will be used to Get all valid covenantmaintenance maintenance records."
   operationId: "getAll"
   parameters:
   - name: partyNumber
     in: query
     description: partyNumber to filter
     required: false
     type: "string"
   - name: projectName
     in: query
     description: projectName to filter
     required: false
     type: "string"
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/ClmoTmCovenantsCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../covenantmaintenance/xxx
#   DELETE    .../covenantmaintenance/xxx
#   GET       .../covenantmaintenance/xxx
#   GET       .../covenantmaintenance/xxx?version=latestrecord
#   GET       .../covenantmaintenance/xxx?version=1

 /covenantmaintenance/{id}:
  put:
   tags:
    - "covenantmaintenance"
   summary: "Update an existing covenantmaintenance."
   description:  "Update an existing covenantmaintenance."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the covenantmaintenance Maintenance"
      required: true
      type: "string"
    - name: "covenantmaintenance"
      in: "body"
      description: "Request Body that contains data required for updating an existing covenantmaintenance"
      required: true
      schema:
       $ref: "#/definitions/ClmoTmCovenantsDTO"

   responses:
    200:
     description: "Returns updated covenantmaintenance"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "covenantmaintenance"
   summary: "Retrieves the covenantmaintenance by ID."
   description:  "Retrieves the covenantmaintenance by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the covenantmaintenance based on given id."
     schema:
      $ref: "#/definitions/ClmoTmCovenantsWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "covenantmaintenance"
   summary: "Deletes the covenantmaintenance identified by given ID."
   description:  "Deletes the covenantmaintenance identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the covenantmaintenance maintenance"
      required: true
      type: "string"
    - name: "covenantmaintenance"
      in: "body"
      description: Request body contain covenantmaintenance and Modification no of covenantmaintenance maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

