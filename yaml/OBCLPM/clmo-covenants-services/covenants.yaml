    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../covenantmaintenance/xxx/reopen

 /covenantmaintenance/{id}/reopen:
  patch:
   tags:
    - "covenantmaintenance"
   summary: "reopen the covenantmaintenance by given ID."
   description:  "reopen the covenantmaintenance identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
