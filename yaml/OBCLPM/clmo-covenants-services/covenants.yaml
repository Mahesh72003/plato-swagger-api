 /dashboards/covenants:
     get:
      tags:
       - "covenantmaintenance"
      produces:
      - application/json
      - application/xml
      summary: get the covenants details
      description: get the covenants details
      operationId: getCovenantsSummary
      parameters:
      - name: rangeStart
        in: query
        description: rangeEnd
        required: false
        type: string
      - name: rangeEnd
        in: query
        description: rangeEnd
        required: false
        type: string
      responses:
        201:
          description: Returns CovenantsWidgetModelCollection
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
