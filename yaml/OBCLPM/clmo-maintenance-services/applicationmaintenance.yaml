swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Application Maintenance Service
host: 10.184.157.121:9000
basePath: /applicationmaintenance-services
tags:
- name: ApplicationMaintenance
  description: API for Loan application Maintenance
schemes:
- http
paths:
  /web/v1/applicationmaintenance/{type}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ApplicationMaintenance
      summary: Get the application maintenance details for a given type
      description: Get the application maintenance details for a given type. Add additional information here for the this endpoint.
      operationId: getApplicationMaintenanceDetails
      parameters:
      - name: type
        in: path
        description: Type for which the maintenance details to be fetched
        required: true
        type: string
      - name: code
        in: query
        description: Code for which the maintenance details to be fetched
        required: false
        type: string
      responses:
        200:
          description: Returns maintenance data for the given type
          schema:
            $ref: '#/definitions/ApplicationMaintenanceModelCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/applicationmaintenance/utilities/calculatepercentage/{partValue}/{wholeValue}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ApplicationMaintenance
      summary: Get the Percentage for the given partValue and whole value
      description: calculate (partValue/wholeValue) * 100
      operationId: calculatePercentage
      parameters:
      - name: partValue
        in: path
        description: Part Value for which the Percentage to be calculated
        required: true
        type: string
      - name: wholeValue
        in: path
        description: Whole Value for which the Percentage to be calculated
        required: true
        type: string
      responses:
        200:
          description: Returns String value of the percentage
          type: string
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
