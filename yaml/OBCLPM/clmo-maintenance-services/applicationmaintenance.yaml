      produces:
      - application/json
      - application/xml
      tags:
      - ApplicationMaintenance
      summary: Get the Part Value for the given percentage and wholevalue
      description: calculate (percentage * wholeValue)/100
      operationId: calculatePartValue
      parameters:
      - name: percentage
        in: path
        description: Percentage for which the PartValue to be calculated
        required: true
        type: string
      - name: wholeValue
        in: path
        description: Whole Value for which the PartValue to be calculated
        required: true
        type: string
      responses:
        200:
