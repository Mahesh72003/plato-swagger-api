swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Payment Application Service
host: 10.184.157.121:9000
basePath: /payment-services
tags:
- name: PaymentApplication
  description: API for PaymentApplication Operations
schemes:
- http
paths:
  /service/v1/incomingpayment:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - IncomingPaymentsService
      summary: Retrieves the list of existing IncomingPayments.
      description: Retrieves the list of existing IncomingPayments. Add additional information here for the this endpoint.
      operationId: getIncomingPaymentsByQuery
      parameters:
      - name: borrowerNumber
        in: query
        description: borrowerName of the user that needs to be fetched
        required: true
        type: string
      - name: currency
        in: query
        description: currency of the user that needs to be fetched
        required: false
        type: string
      - name: valueDate
        in: query
        description: valueDate of the user that needs to be fetched
        required: false
        type: string
      - name: matchingStatus
        in: query
        description: matchingStatus of the user that needs to be fetched
        required: false
        type: string
      - name: amount
        in: query
        description: amount of the user that needs to be fetched
        required: false
        type: number        
        
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
