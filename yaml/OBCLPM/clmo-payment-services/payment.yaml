swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Payment Service for OBCLPM
host: 10.184.157.121:9000
basePath: /clmo-payment-services
tags:
- name: clmo-payment-services
  description: API for clmo-payment-services Operations
schemes:
- http
paths:
  /web/v1/payment:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - Payment
      summary: Saves a new Payment.
      description: Saves a new Payment.
      operationId: savePayment
      parameters:
      - name: Payment
        in: body
        description: Request Body that contains data required for creating a new Payment
        required: true
        schema:
          $ref: '#/definitions/PaymentDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created Payment
          headers:
            Location:
              description: URL of newly created Payment
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - Payment
      summary: Retrieves the list of existing Payment Details.
      description: Retrieves the list of existing Payment Details.
      operationId: getPaymentDetails
      parameters:
      - name: borrowerNumber
        in: query
        description: borrowerNumber of the user that needs to be fetched
        required: false
        type: string
      - name: contractRefNumber
        in: query
        description: contractRefNumber of the party to be fetched
        required: false
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error 
  /web/v1/paymentadviceentrydetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - PaymentAdviceEntryDetails
      summary: Adds a new PaymentAdviceEntryDetails.
      description: Adds a new PaymentAdviceEntryDetailsModel. Add additional information here for this endpoint.
      operationId: addPaymentAdviceEntryDetails
      parameters:
      - name: PaymentAdviceEntryDetails
        in: body
        description: Request Body that contains data required for creating a new PaymentAdviceEntryDetails
        required: true
        schema:
          $ref: '#/definitions/PaymentAdviceEntryDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created PaymentAdviceEntryDetails
          headers:
            Location:
              description: URL of newly created PaymentAdviceEntryDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/basicapplicationdetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - BasicApplicationDetails
      summary: Adds a new BasicApplicationDetails.
      description: Adds a new BasicApplicationDetails. Add additional information here for this endpoint.
      operationId: addBasicApplicationDetails
      parameters:
      - name: BasicApplicationDetails
        in: body
        description: Request Body that contains data required for creating a new BasicApplicationDetails
        required: true
        schema:
          $ref: '#/definitions/BasicApplicationDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created BasicApplicationDetails
          headers:
            Location:
              description: URL of newly created BasicApplicationDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - BasicApplicationDetails
      summary: Retrieves the list of  BasicApplicationDetails.
      description: Retrieves the list of  BasicApplicationDetails. Add additional information here for the this endpoint.
      operationId: getAllBasicApplicationDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/basicapplicationdetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - BasicApplicationDetails
      summary: Get a  BasicApplicationDetails.
      description: Update a  BasicApplicationDetails. Add additional information here for the this endpoint.
      operationId: getBasicApplicationDetailsById
      parameters:
      - name: id
        in: path
        description: Id of the BasicApplicationDetails that need to be retrieved
        required: true
        type: string
      responses:
        200:
          description: Returns updated BasicApplicationDetails
          schema:
            $ref: '#/definitions/BasicApplicationDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - BasicApplicationDetails
      summary: Update an  BasicApplicationDetails.
      description: Update an  BasicApplicationDetails. Add additional information here for the this endpoint.
      operationId: updateBasicApplicationDetails
      parameters:
      - name: id
        in: path
        description: id of the BasicApplicationDetails that need to be updated
        required: true
        type: string
      - name: BasicApplicationDetails
        in: body
        description: Request Body that contains data required for updating an  BasicApplicationDetails
        required: true
        schema:
          $ref: '#/definitions/BasicApplicationDetailsModel'
      responses:
        200:
          description: Returns updated BasicApplicationDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - BasicApplicationDetails
      summary: Deletes the A BasicApplicationDetailsidentified by given ID.
      description: Deletes the BasicApplicationDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteBasicApplicationDetails
      parameters:
      - name: id
        in: path
        description: Id of the BasicApplicationDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error         
definitions:
