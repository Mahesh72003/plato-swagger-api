swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Syndication Application Service
host: 10.184.157.121:9000
basePath: /syndicationapplication-services
tags:
- name: SyndicationApplication
  description: API for SyndicationApplication Operations
schemes:
- http
paths:
  /web/v1/entitydetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - EntityDetails
      summary: Adds a new EntityDetails.
      description: Adds a new EntityDetails. Add additional information here for this endpoint.
      operationId: addEntityDetails
      parameters:
      - name: EntityDetails
        in: body
        description: Request Body that contains data required for creating a new EntityDetails
        required: true
        schema:
          $ref: '#/definitions/EntityDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created EntityDetails
          headers:
            Location:
              description: URL of newly created EntityDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - EntityDetails
      summary: Retrieves the list of existing EntityDetails.
      description: Retrieves the list of existing EntityDetails. Add additional information here for the this endpoint.
      operationId: getAllEntityDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/entitydetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - EntityDetails
      summary: Retrieves the EntityDetails by id.
      description: Retrieves the EntityDetails by id. Add additional information here for the this endpoint.
      operationId: getEntityDetailsById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the EntityDetails based on given applicationNumber.
          schema:
            $ref: '#/definitions/EntityDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - EntityDetails
      summary: Update an existing EntityDetails.
      description: Update an existing EntityDetails. Add additional information here for the this endpoint.
      operationId: updateEntityDetails
      parameters:
      - name: id
        in: path
        description: id of the EntityDetails that need to be updated
        required: true
        type: string
      - name: EntityDetails
        in: body
        description: Request Body that contains data required for updating an existing EntityDetails
        required: true
        schema:
          $ref: '#/definitions/EntityDetailsModel'
      responses:
        200:
          description: Returns updated EntityDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - EntityDetails
      summary: Deletes the EntityDetails identified by given ID.
      description: Deletes the EntityDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteEntityDetails
      parameters:
      - name: id
        in: path
        description: Id of the EntityDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  EntityDetailsModel:
    description: EntityDetails model
    type: object
    properties:
      id:
        description: Id of the EntityDetails
        type: string
        maxLength: 36
      dataSegmentCode:
        description: Data segment code
        type: string
      updatedBy:
        description: Updated By
        type: string
      updatedTimeStamp:
        description: Updated Time Stamp
        type: string
      stageCode:
        description: stageCode
        type: string
        maxLength: 36
      createdBy:
        description: createdBy
        type: string
        maxLength: 36
      status:
        description: status
        type: string
        maxLength: 36
      applicationNumber:
        description: applicationNumber
        type: string
      processRefNumber:
        description: Process Ref Number 
        type: string   
      remarks:
        description: remarks
        type: string
      eDPartyDetails:
        type: array
        items:
          $ref: '#/definitions/EDPartyDetailsModel'
  EDPartyDetailsModel:
    description: EDPartyDetails model
    type: object
    required:
    - partyId
    - partyName
    properties:
      id:
        description: Id of the EDPartyDetails
        type: string
      entyDtlsId:
        description: entyDtlsId
        type: string
      partyId:
        description: Party ID
        type: string
        maxLength: 36
      partyNumber:
        description: Party Number
        type: string
        maxLength: 36
      partyName:
        description: Party Name
        type: string
        maxLength: 50
      eDPartyEntityDetails:
        type: array
        items:
          $ref: '#/definitions/EDPartyEntityDetailsModel'
  EDPartyEntityDetailsModel:
    description: EDPartyEntityDetails model
    type: object
    required:
    - entityName
    - entityDescription
    - primaryEntity
    properties:
      id:
        description: Id of the EDPartyEntityDetails
        type: string
      prtyDtlsId:
        description: prtyDtlsId
        type: string
      entityName:
        description: entityName
        type: string
      entityDescription:
        description: entityDescription
        type: string
      primaryEntity:
        description: primaryEntity
        type: string
  EntityDetailsCollection:
    description: Collection of EntityDetails.
    type: object
    properties:
      EntityDetailsList:
        type: array
        items:
          $ref: '#/definitions/EntityDetailsModel'
