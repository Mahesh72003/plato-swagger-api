swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Syndication Application Service
host: 10.184.157.121:9000
basePath: /syndicationapplication-services
tags:
- name: SyndicationApplication
  description: API for SyndicationApplication Operations
schemes:
- http
paths:
  /web/v1/holidaypreferences:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - HolidayPreferences
      summary: Adds a new HolidayPreferences.
      description: Adds a new HolidayPreferences. Add additional information here for this endpoint.
      operationId: addHolidayPreferences
      parameters:
      - name: HolidayPreferences
        in: body
        description: Request Body that contains data required for creating a new HolidayPreferences
        required: true
        schema:
          $ref: '#/definitions/HolidayPreferencesModel'
      responses:
        201:
          description: Returns the Id of the newly created HolidayPreferences
          headers:
            Location:
              description: URL of newly created HolidayPreferences
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - HolidayPreferences
      summary: Retrieves the list of existing HolidayPreferences.
      description: Retrieves the list of existing HolidayPreferences. Add additional information here for the this endpoint.
      operationId: getAllHolidayPreferences
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/holidaypreferences/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - HolidayPreferences
      summary: Retrieves the HolidayPreferences by id.
      description: Retrieves the HolidayPreferences by id. Add additional information here for the this endpoint.
      operationId: getHolidayPreferencesById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the HolidayPreferences based on given applicationNumber.
          schema:
            $ref: '#/definitions/HolidayPreferencesModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - HolidayPreferences
      summary: Update an existing HolidayPreferences.
      description: Update an existing HolidayPreferences. Add additional information here for the this endpoint.
      operationId: updateHolidayPreferences
      parameters:
      - name: id
        in: path
        description: id of the HolidayPreferences that need to be updated
        required: true
        type: string
      - name: HolidayPreferences
        in: body
        description: Request Body that contains data required for updating an existing HolidayPreferences
        required: true
        schema:
          $ref: '#/definitions/HolidayPreferencesModel'
      responses:
        200:
          description: Returns updated HolidayPreferences
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - HolidayPreferences
      summary: Deletes the HolidayPreferences identified by given ID.
      description: Deletes the HolidayPreferences identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteHolidayPreferences
      parameters:
      - name: id
        in: path
        description: Id of the HolidayPreferences that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
