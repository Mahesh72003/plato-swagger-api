swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Syndication Application Service
host: 10.184.157.121:9000
basePath: /syndicationapplication-services
tags:
- name: SyndicationApplication
  description: API for SyndicationApplication Operations
schemes:
- http
paths:
  /web/v1/parties:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - Party
      summary: Adds a new Party.
      description: Adds a new Party. Add additional information here for this endpoint.
      operationId: addParty
      parameters:
      - name: Party
        in: body
        description: Request Body that contains data required for creating a new Party
        required: true
        schema:
          $ref: '#/definitions/PartyModel'
      responses:
        201:
          description: Returns the Id of the newly created Party
          headers:
            Location:
              description: URL of newly created Party
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - Party
      summary: Retrieves the list of existing Party.
      description: Retrieves the list of existing Party. Add additional information here for the this endpoint.
      operationId: getAllParty
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/parties/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - Party
      summary: Retrieves the Party by id.
      description: Retrieves the Party by id. Add additional information here for the this endpoint.
      operationId: getPartyById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the Party based on given applicationNumber.
          schema:
            $ref: '#/definitions/PartyModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - Party
      summary: Update an existing Party.
      description: Update an existing Party. Add additional information here for the this endpoint.
      operationId: updateParty
      parameters:
      - name: id
        in: path
        description: id of the Party that need to be updated
        required: true
        type: string
      - name: Party
        in: body
        description: Request Body that contains data required for updating an existing Party
        required: true
        schema:
          $ref: '#/definitions/PartyModel'
      responses:
        200:
          description: Returns updated Party
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - Party
      summary: Deletes the Party identified by given ID.
      description: Deletes the Party identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteParty
      parameters:
      - name: id
        in: path
        description: Id of the Party that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  PartyModel:
    description: Party model
    type: object
    properties:
      id:
        description: Id of the Party
        type: string
        maxLength: 36
      dataSegmentCode:
        description: Data segment code
        type: string
      updatedBy:
        description: Updated By
        type: string
      updatedTimeStamp:
        description: Updated Time Stamp
        type: string
      stageCode:
        description: stageCode
        type: string
        maxLength: 36
      createdBy:
        description: createdBy
        type: string
        maxLength: 36
      status:
        description: status
        type: string
        maxLength: 36
      applicationNumber:
        description: applicationNumber
        type: string
      processRefNumber:
        description: Process Ref Number 
        type: string  
      remarks:
        description: remarks
        type: string
      partyDetails:
        type: array
        items:
          $ref: '#/definitions/PartyDetailsModel'
  PartyDetailsModel:
    description: PartyDetails model
    type: object
    properties:
      id:
        description: Id of the PartyDetails
        type: string
      partyInfoId:
        description: partyInfoId
        type: string
      partyNumber:
        description: id number of the party
        type: string
        maxLength: 36
      partyName:
        description: partyName
        type: string
      relatedPartyDetails:
        type: array
        items:
          $ref: '#/definitions/RelatedPartyDetailsModel'
  RelatedPartyDetailsModel:
    description: PartyDetails model
    type: object
    properties:
      id:
        description: Id of the PartyDetails
        type: string
      partyDetailsId:
        description: partyDetailsId
        type: string
      partyNumber:
        description: id number of the party
        type: string
        maxLength: 36
      partyName:
        description: partyName
        type: string
      relationshipType:
        description: relationshipType
        type: string
      partyId:
        description: partyId
        type: string
  PartyCollection:
    description: Collection of Party.
    type: object
    properties:
      PartyList:
        type: array
        items:
          $ref: '#/definitions/PartyModel'
