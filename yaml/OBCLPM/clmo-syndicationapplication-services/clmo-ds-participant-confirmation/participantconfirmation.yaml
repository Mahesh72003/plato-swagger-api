      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - ParticipantConfirmation
      summary: Adds a new ParticipantConfirmation.
      description: Adds a new ParticipantConfirmation. Add additional information here for this endpoint.
      operationId: addParticipantConfirmation
      parameters:
      - name: ParticipantConfirmation
        in: body
        description: Request Body that contains data required for creating a new ParticipantConfirmation
        required: true
        schema:
          $ref: '#/definitions/ParticipantConfirmationModel'
      responses:
        201:
          description: Returns the Id of the newly created ParticipantConfirmation
          headers:
            Location:
              description: URL of newly created ParticipantConfirmation
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ParticipantConfirmation
      summary: Retrieves the list of existing ParticipantConfirmation.
      description: Retrieves the list of existing ParticipantConfirmation. Add additional information here for the this endpoint.
      operationId: getAllParticipantConfirmation
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/participantconfirmation/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ParticipantConfirmation
      summary: Retrieves the ParticipantConfirmation by id.
      description: Retrieves the ParticipantConfirmation by id. Add additional information here for the this endpoint.
      operationId: getParticipantConfirmationById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the ParticipantConfirmation based on given applicationNumber.
          schema:
            $ref: '#/definitions/ParticipantConfirmationModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - ParticipantConfirmation
      summary: Update an existing ParticipantConfirmation.
      description: Update an existing ParticipantConfirmation. Add additional information here for the this endpoint.
      operationId: updateParticipantConfirmation
      parameters:
      - name: id
        in: path
        description: id of the ParticipantConfirmation that need to be updated
        required: true
        type: string
      - name: ParticipantConfirmation
        in: body
        description: Request Body that contains data required for updating an existing ParticipantConfirmation
        required: true
        schema:
          $ref: '#/definitions/ParticipantConfirmationModel'
      responses:
        200:
          description: Returns updated ParticipantConfirmation
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - ParticipantConfirmation
      summary: Deletes the ParticipantConfirmation identified by given ID.
      description: Deletes the ParticipantConfirmation identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteParticipantConfirmation
      parameters:
      - name: id
        in: path
        description: Id of the ParticipantConfirmation that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
