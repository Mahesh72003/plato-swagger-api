swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Syndication Application Service
host: 10.184.157.121:9000
basePath: /syndicationapplication-services
tags:
- name: SyndicationApplication
  description: API for SyndicationApplication Operations
schemes:
- http
paths:
  /web/v1/participantinvitation:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - participantinvitation
      summary: Adds a new participantinvitation.
      description: Adds a new participantinvitation. Add additional information here for this endpoint.
      operationId: addParticipantInvitation
      parameters:
      - name: participantinvitation
        in: body
        description: Request Body that contains data required for creating a new participantinvitation
        required: true
        schema:
          $ref: '#/definitions/ParticipantInvitationModel'
      responses:
        201:
          description: Returns the Id of the newly created participantinvitation
          headers:
            Location:
              description: URL of newly created participantinvitation
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - participantinvitation
      summary: Retrieves the list of existing participantinvitation.
      description: Retrieves the list of existing participantinvitation. Add additional information here for the this endpoint.
      operationId: getAllParticipantInvitation
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/participantinvitation/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - participantinvitation
      summary: Retrieves the participantinvitation by id.
      description: Retrieves the participantinvitation by id. Add additional information here for the this endpoint.
      operationId: getParticipantInvitationById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the participantinvitation based on given applicationNumber.
          schema:
            $ref: '#/definitions/ParticipantInvitationModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - participantinvitation
      summary: Update an existing participantinvitation.
      description: Update an existing participantinvitation. Add additional information here for the this endpoint.
      operationId: updateParticipantInvitation
      parameters:
      - name: id
        in: path
        description: id of the participantinvitation that need to be updated
        required: true
        type: string
      - name: participantinvitation
        in: body
        description: Request Body that contains data required for updating an existing participantinvitation
        required: true
        schema:
          $ref: '#/definitions/ParticipantInvitationModel'
      responses:
        202:
          description: Returns updated participantinvitation
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - participantinvitation
      summary: Deletes the participantinvitation identified by given ID.
      description: Deletes the participantinvitation identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteParticipantInvitation
      parameters:
      - name: id
        in: path
        description: Id of the participantinvitation that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/participantinvitation/summary/{applicationNumber}:  
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - participantinvitation
      summary: Retrieves the participantinvitation Summary.
      description: Retrieves the participantinvitation Summary.
      operationId: getParticipantInvitationSummary
      parameters:
      - name: applicationNumber
        in: path
        description: applicationNumber of the participantinvitation that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the participantinvitation based on given applicationNumber.
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error      
