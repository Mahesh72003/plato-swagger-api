      - BookValue
      summary: Adds a new BookValue.
      description: Adds a new BookValue. Add additional information here for this endpoint.
      operationId: addbookvalue
      parameters:
      - name: BookValue
        in: body
        description: Request Body that contains data required for creating a new BookValue
        required: true
        schema:
          $ref: '#/definitions/BookValueModel'
      responses:
        201:
          description: Returns the Id of the newly created BookValue
          headers:
            Location:
              description: URL of newly created BookValue
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - BookValue
      summary: Retrieves the list of existing BookValue.
      description: Retrieves the list of existing BookValue. Add additional information here for the this endpoint.
      operationId: getAllBookValue
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/bookvalue/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - BookValue
      summary: Retrieves the BookValue by id.
      description: Retrieves the BookValue by id. Add additional information here for the this endpoint.
      operationId: getById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the BookValue based on given applicationNumber.
          schema:
            $ref: '#/definitions/BookValueModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - BookValue
      summary: Update an existing BookValue.
      description: Update an existing BookValue. Add additional information here for the this endpoint.
      operationId: updateBookValue
      parameters:
      - name: id
        in: path
        description: id of the BookValue that need to be updated
        required: true
        type: string
      - name: BookValue
        in: body
        description: Request Body that contains data required for updating an existing BookValue
        required: true
        schema:
          $ref: '#/definitions/BookValueModel'
      responses:
        200:
          description: Returns updated BookValue
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - BookValue
      summary: Deletes the BookValue identified by given ID.
      description: Deletes the BookValue identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteBookValue
      parameters:
      - name: id
        in: path
        description: Id of the BookValue that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
