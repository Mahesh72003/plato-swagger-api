      summary: Retrieves the SettlementOverwrite by id.
      description: Retrieves the SettlementOverwrite by id. Add additional information here for the this endpoint.
      operationId: getSettlementOverwriteById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the SettlementOverwrite based on given applicationNumber.
          schema:
            $ref: '#/definitions/SettlementOverwriteModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
