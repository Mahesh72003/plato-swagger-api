      - application/xml
      tags:
      - SettlementOverwrite
      summary: Update an existing SettlementOverwrite.
      description: Update an existing SettlementOverwrite. Add additional information here for the this endpoint.
      operationId: updateSettlementOverwrite
      parameters:
      - name: id
        in: path
        description: id of the SettlementOverwrite that need to be updated
        required: true
        type: string
      - name: SettlementOverwrite
        in: body
        description: Request Body that contains data required for updating an existing SettlementOverwrite
        required: true
        schema:
          $ref: '#/definitions/SettlementOverwriteModel'
      responses:
        200:
          description: Returns updated SettlementOverwrite
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - SettlementOverwrite
      summary: Deletes the SettlementOverwrite identified by given ID.
      description: Deletes the SettlementOverwrite identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteSettlementOverwrite
      parameters:
      - name: id
        in: path
        description: Id of the SettlementOverwrite that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
