swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: RPM Batch Process Data Services
host: 10.184.157.121:9000
tags:
  - name: BatchProcessData
    description: API for fetching data for Batch Process
schemes:
  - http
paths:
  /batchProcessData/applicationsForExpiry:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - BatchProcessData
      summary: get the process details for expiry
      description: get the process details for expiry
      operationId: getApplicationsForExpiry
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: '#/definitions/DashboardCollectionModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /batchProcessData/applicationsForOfferExpiry:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - BatchProcessData
      summary: get the process details for expiry
      description: get the process details for expiry
      operationId: getApplicationsForOfferExpiry
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: '#/definitions/DashboardCollectionModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /batchProcessData/ipaApplicationsOfferExpiry:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - BatchProcessData
      summary: Get the In-Principle Approval Application details for Offer Expiry
      description: Get the In-Principle Approval Application details for Offer Expiry
      operationId: getIpaApplicationsForOfferExpiry
      responses:
        201:
          description: Returns the data of applications which are about to expire
          schema:
            $ref: '#/definitions/IpaDashboardCollectionModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
definitions:
  DashboardCollectionModel:
    description: DashboardCollectionModel
    type: object
    properties:
      data:
        description: data
        type: array
        items:
          $ref: '#/definitions/DashboardModel'
  IpaDashboardCollectionModel:
    description: In-Principle Approval Dashboard Collection Model
    type: object
    properties:
      data:
        description: data
        type: array
        items:
          $ref: '#/definitions/IPASearchModel'