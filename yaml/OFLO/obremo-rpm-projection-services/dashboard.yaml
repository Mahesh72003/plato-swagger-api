        - DashBoards
      summary: get the applications details
      description: get the applications details
      operationId: getMyApplicationsSummary
      parameters:
        - name: rmId
          in: query
          description: Relationship manager's user login ID
          required: true
          type: string
        - name: frequency
          in: query
          description: Frequency Filter
          required: true
          type: string
        - name: unit
          in: query
          description: Unit Filter
          required: true
          type: string
        - name: team
          in: query
          description: My Team applications
          type: boolean
          default: false
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: '#/definitions/String'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
