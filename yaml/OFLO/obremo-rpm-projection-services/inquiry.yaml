swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: RPM Inquiry Services
host: 10.184.157.121:9000
basePath: /obremo-rpm-projection-services
tags:
  - name: inquiry
    description: API for Inquiry screen & all filters
schemes:
  - http
paths:
  /web/v1/inquiry/applicationsList:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - inquiry
      summary: get list of all applications as per the filter
      description: get list of all applications as per the filter
      operationId: getListOfApplications
      parameters:
        - name: rmId
          in: query
          description: Relationship manager's user login ID
          required: false
          type: string
        - name: fromDate
          in: query
          description: Application date From Filter
          required: false
          type: string
        - name: toDate
          in: query
          description: Application date To Filter
          required: false
          type: string
        - name: applicationNo
          in: query
          description: Application number
          required: false
          type: string
        - name: processRefNo
          in: query
          description: Process reference number
          type: string
          required: false
        - name: productType
          in: query
          description: Product Type
          required: false
          type: string
        - name: productSubType
          in: query
          description: Product sub type
          required: false
          type: string
        - name: productName
          in: query
          description: Business Product name
          type: string
          required: false
        - name: custName
          in: query
          description: Customer Name
          required: false
          type: string
        - name: custMobile
          in: query
          description: Customer mobile number
          required: false
          type: string
        - name: custEmail
          in: query
          description: Customer email id
          required: false
          type: string
        - name: branchCode
          in: query
          description: branch code
          required: false
          type: string
        - name: channel
          in: query
          description: channel
          required: false
          type: string
        - name: offset
          in: query
          description: offset is starting no of records to be fetched
          required: false
          type: integer
        - name: limit
          in: query
          description: limit is maximum no of records to be fetched
          required: false
          type: integer 
        - name: primaryMobileISD
          in: query
          description: primaryMobileISD
          required: false
          type: string
        - name: status
          in: query
          description: status
          required: false
          type: string 
        - name: ipaReference
          in: query
          description: In-Principle Approval Reference No
          required: false
          type: string 
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: "#/definitions/ApplicationsList"
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/inquiry/applicationSearch:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - inquiry
      summary: get application Details
      description: get application Details
      operationId: getApplicationsDetails
      parameters:
        - name: rmId
          in: query
          description: Relationship manager's user login ID
          required: true
          type: string
        - name: searchValue
          in: query
          description: Search Value
          required: false
          type: string
        - name: priority
          in: query
          description: priority
          required: false
          type: string 
        - name: period
          in: query
          description: period
          required: false
          type: string 
        - name: offset
          in: query
          description: offset
          required: false
          type: integer 
        - name: limit   
          in: query
          description: limit
          required: false
          type: integer                  
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: "#/definitions/ApplicationsSearchList"
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/inquiry/productDetails:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - inquiry
      summary: get product details of a particular customer
      description: get product details of a particular customer
      operationId: getProductDetails
      parameters:
        - name: searchValue
          in: query
          description: Search Value
          required: false
          type: string                  
        - name: rmId
          in: query
          description: Relationship manager's user login ID
          required: true
          type: string
        - name: priority
          in: query
          description: priority
          required: false
          type: string 
        - name: period
          in: query
          description: period
          required: false
          type: string
        - name: offset
          in: query
          description: offset
          required: false
          type: integer 
        - name: limit   
          in: query
          description: limit
          required: false
          type: integer                                     
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: "#/definitions/ApplicationsDetailsList"
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/inquiry/getStageLists:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - inquiry
      summary: get stage list for a processRefNo
      description: get stage list for a processRefNo
      operationId: getStageList
      parameters:
        - name: processRefNo
          in: query
          description: Process Ref No.
          required: true
          type: string
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: "#/definitions/StageDetails"
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error  
  /web/v1/inquiry/ipaApplicationSearch:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - inquiry
      summary: get In-Principle Approval application Details
      description: get In-Principle Approval application Details
      operationId: getIpaApplicationsDetails
      parameters:       
        - name: searchValue
          in: query
          description: Search Value
          required: false
          type: string       
        - name: offset
          in: query
          description: offset
          required: false
          type: integer 
        - name: limit   
          in: query
          description: limit
          required: false
          type: integer                  
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: "#/definitions/IPAApplicationsSearchList"
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  IPAApplicationsSearchList:
    description: In-Principle Approval Details of all applications
    type: object
    properties:
      data:
        type: "array"
        items:
          $ref: "#/definitions/IPASearchModel"
      paging:
        $ref: "#/definitions/PagingDto"
  IPASearchModel:
    description: In-Principle Approval Search Model
    type: object    
    properties:
      ipaRefNo:
        description: In-Principle Approval Ref Number
        type: string
        maxLength: 36
      ipaReqDate:
        description: In-Principle Approval Request Date        
        type: string
        maxLength: 36
      ipaOfferedDate:
        description: In-Principle Approval Offered Date       
        type: string
        maxLength: 36
      ipaExpiryDate:
        description: In-Principle Approval Expiry Date     
        type: string
        maxLength: 36        
      status:
        description: status
        type: string
        maxLength: 36
      initiatedBy:
        description: Initiated By
        type: string
        maxLength: 36       
      amount:
        description: Amount
        type: string
        maxLength: 36
      currency:
        description: Currency
        type: string
        maxLength: 36
      tenure:
        description: Tenure
        type: string
        maxLength: 36
      branchCode:
        description: Branch Code
        type: string
        maxLength: 36
      lastUpdatedDate:
        description: last upadted date
        type: string
        maxLength: 36
      primaryCustName:
        description: primary cust name
        type: string
        maxLength: 36
      primaryCustEmail:
        description: amount
        type: string
        maxLength: 36
      primaryCustMobileNo:
        description: primary cust mobile no.
        type: string
        maxLength: 36
      primaryCustCIF:
        description: primary cust cif
        type: string
        maxLength: 36
      secCustName:
        description: seconday cust name
        type: string
        maxLength: 36
      secCustEmail:
        description: secondary cust email
        type: string
        maxLength: 36
      secCustMobileNo:
        description: secondary cust Mobile No.
        type: string
        maxLength: 36
      primaryCustCIF:
        description: primary cust cif
        type: string
        maxLength: 36
      secCustCIF:
        description: secondary cust cif
        type: string
        maxLength: 36
      channel:
        description: channel
        type: string
        maxLength: 36
      businessProductCode:
        description: primary cust cif
        type: string
        maxLength: 36
      prodType:
        description: product type
        type: string
        maxLength: 36
      subProdType:
        description: sub product type
        type: string
        maxLength: 36
      primaryUniqueId:
        description: primary Unique Id
        type: string
        maxLength: 36
      secUniqueId:
        description: secondary Unique Id
        type: string
        maxLength: 36
      primaryCustDOB:
        description: primary cust DOB
        type: string
        maxLength: 36
      secCustDOB:
        description: secondary cust DOB
        type: string
        maxLength: 36 
      businessProductName:
        description: business prod name
        type: string
        maxLength: 36