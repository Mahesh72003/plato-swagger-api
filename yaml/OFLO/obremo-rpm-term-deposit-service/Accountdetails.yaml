info:
   description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data
      Types](https://swagger.io/docs/specification/data-models/data-types/)
   version: 1.0.0
   title: Term Deposit Service
host: localhost:7001
basePath: /accountdetails
tags:
-  name: Term Deposit Application
   description: API for Accound Details Data segment Operations
schemes:
- http
paths:
   /web/v1/accountdetails:
      post:
         consumes:
         - application/json
         produces:
         - application/json
         tags:
         - AccountDetails
         summary: Adds a new AccountDetails.
         description: Adds a new AccountDetails. Add additional information here for this endpoint.
         operationId: addAccountDetails
         parameters:
         -  name: accountDetails
            in: body
            description: Request Body that contains data required for creating a new AccountDetails
            required: true
            schema:
               $ref: '#/definitions/AccountDetailsModel'
         responses:
            201:
               description: Returns the Id of the newly created AccountDetails
               headers:
                  Location:
                     description: URL of newly created AccountDetails
                     type: string
               schema:
                  $ref: '#/definitions/ResponseDtoWrapper'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            405:
               description: Invalid input
            500:
               description: Internal error
      get:
         produces:
         - application/json
         tags:
         - AccountDetails
         summary: Retrieves the list of existing AccountDetails.
         description: Retrieves the list of existing AccountDetails. Add additional information here for the this endpoint.
         operationId: getAllAccountDetails
         parameters:
         -  name: processRefNo
            in: query
            description: process reference number of the AccountDetails that needs to be fetched
            required: true
            type: string
         -  name: applicationNumber
            in: query
            description: application number of the AccountDetails that needs to be fetched
            required: true
            type: string
         -  name: businessProductCode
            in: query
            description: Business product code of the AccountDetails that needs to be fetched
            required: false
            type: string
         responses:
            200:
               description: Successful performs the operation
               schema:
                  $ref: '#/definitions/ResponseModel'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            500:
               description: Internal error
   /web/v1/accountdetails/{id}:
      get:
         produces:
         - application/json
         tags:
         - AccountDetails
         summary: Get By ID
         description: Retrieves the AccountDetails by Id Add additional information here for the this endpoint.
         operationId: getAccountDetailsById
         parameters:
         -  name: id
            in: path
            description: ID of the Account details that needs to be fetched
            required: true
            type: string
         responses:
            200:
               description: Returns the AccountDetails based on given ID.
               schema:
                  $ref: '#/definitions/AccountDetailsModel'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            500:
               description: Internal error
      put:
         consumes:
         - application/json
         produces:
         - application/json
         tags:
         - AccountDetails
         summary: Update an existing AccountDetails.
         description: Update an existing AccountDetails. Add additional information here for the this endpoint.
         operationId: updateAccountDetails
         parameters:
         -  name: id
            in: path
            description: id of the AccountDetails that need to be updated
            required: true
            type: string
         -  name: AccountDetails
            in: body
            description: Request Body that contains data required for updating an existing AccountDetails
            required: true
            schema:
               $ref: '#/definitions/AccountDetailsModel'
         responses:
            200:
               description: Returns updated AccountDetails
               schema:
                  $ref: '#/definitions/ResponseDtoWrapper'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            405:
               description: Invalid input
            500:
               description: Internal error
      delete:
         produces:
         - application/json
         tags:
         - AccountDetails
         summary: Deletes the AccountDetails identified by given ID.
         description: Deletes the AccountDetails identified by given ID. Add additional information here for the this endpoint.
         operationId: deleteAccountDetails
         parameters:
         -  name: id
            in: path
            description: Id of the AccountDetails that needs to be deleted
            required: true
            type: string
         responses:
            200:
               description: Successful operation.
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            500:
               description: Internal error
   /web/v1/validcurrency/{businessProductName}:
      get:
         produces:
         - application/json
         tags:
         - AccountDetails
         summary: Get list of valid currencies
         description: Retrieves the List of currencies based on business product code
         operationId: getCurrencyByProductName
         parameters:
         -  name: businessProductName
            in: path
            description: Business product name
            required: true
            type: string
         responses:
            200:
               description: Returns the List of Currencies
               schema:
                  $ref: '#/definitions/ResponseModel'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            500:
               description: Internal error
   /web/v1/validbranches/{businessProductCode}:
      get:
         produces:
         - application/json
         tags:
         - AccountDetails
         summary: Get list of valid branches
         description: Retrieves the List of branches based on business product code
         operationId: getBranchByProductCode
         parameters:
         -  name: businessProductCode
            in: path
            description: Business product code
            required: true
            type: string
         responses:
            200:
               description: Returns the List of Branches
               schema:
                  $ref: '#/definitions/ResponseModel'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            500:
               description: Internal error
   /web/v1/simulate:
      post:
         produces:
         - application/json
         tags:
         - AccountDetails
         summary: Get Computed values for Term Deposit
         description: Retrieves the Computed value based on Application and refernce number
         operationId: tdSimulate
         parameters:
         -  name: termDepositRequest
            in: body
            description: Request Body that contains data required for creating a new Term Deposit
            required: true
            schema:
               $ref: '#/definitions/termDepositRequest'
         responses:
            200:
               description: Returns the List of Currencies
               schema:
                  $ref: '#/definitions/TDResponseModel'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            500:
               description: Internal error
   /web/v1/stageskipping:
# API for skipping the Initial Funding Stage based on selection
# GET
      get:
         produces:
         - application/json
         tags:
         - AccountDetails
         summary: Get Details if Initial funding is required
         description: Retrieves the flag if Initial funding is required
         operationId: stageSkipping
         parameters:
         -  name: processRefNo
            in: query
            description: Process Reference Number
            required: true
            type: string
         responses:
            200:
               description: Returns if Initial Funding is required for given Process Reference Number
               schema:
                  $ref: '#/definitions/StageSkippingDetalModel'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            500:
               description: Internal error
definitions:
   AccountDetailsModel:
      description: AccountDetails model
      type: object
      allOf:
      -  $ref: '#/definitions/GenericDatasegmentModel'
      -  type: object
         properties:
            action:
               type: string
               description: action
            processRefNo:
               description: Process Reference Number
               type: string
               maxLength: 20
            accountType:
               description: Type of the account , will be defualted from application initiation.
               type: string
               maxLength: 35
            productCode:
               description: Code of the product, which will be defaulted from the initiation.
               type: string
               maxLength: 30
            productName:
               description: Name of the product, which will be defaulted from the initiation.
               type: string
               maxLength: 100
            accountBranch:
               description: Branch of the account.
               type: string
               maxLength: 4
            bankName:
               description: Bank Name
               type: string
            bankCode:
               description: Bank Code
               type: string
            tdAccountCurrency:
               description: Currency of the Term Deposit account.
               type: string
               maxLength: 3
            tdAmount:
               description: Amount to be funded.
               type: number
            tdTenureYears:
               description: Term Deposit Tenure in Years.
               type: number
            tdTenureMonths:
               description: Term Deposit Tenure in Months.
               type: number
            tdTenureDays:
               description: Term Deposit Tenure in Months.
               type: number
            maturityDate:
               description: Maturity Date for Term Deposit.
               type: string
            compute:
               description: Compute.
               type: boolean
            interestRate:
               description: Interest rate to be compute.
               type: number
            interestAmount:
               description: Interest amount
               type: number
            maturityAmount:
               description: Interest amount
               type: number
            fundTheAccount:
               description: Initial funding mode to the while account creation.
               type: boolean
            fundBy:
               description: Funded by.
               type: string
               maxLength: 35
            fundByCurrency:
               description: Fund By Currency of the account.
               type: string
               maxLength: 3
            fundByAccNumber:
               description: Fund By account number.
               type: string
               maxLength: 30
            fundByAccountName:
               description: Fund By Account Name
               type: string
               maxLength: 100
            chequeNumber:
               description: Cheque Number.
               type: string
               maxLength: 50
            chequeDate:
               description: Cheque date.
               type: string
            chequeBankName:
               description: Bank name on the cheque.
               type: string
            chequeBranchName:
               description: Branch name on the cheque.
               type: string
            depositType:
               description: Deposit Type.
               type: string
            interestPayout:
               description: Interest Payout.
               type: string
            interestPayoutMode:
               description: Interest Payout Mode.
               type: string
            interestPayoutAccNumber:
               description: Interest Payout Account Number.
               type: string
            interestPayoutAccName:
               description: Interest Payout Account Name.
               type: string
            principalPayoutMode:
               description: Principal Payout Mode.
               type: string
            principalPayoutAccNumber:
               description: Principal Payout Account Number.
               type: string
            principalPayoutAccName:
               description: Principal Payout Account Name.
               type: string
            maturityInstruction:
               description: Maturity Instruction.
               type: string
            maturityPayoutMode:
               description: Maturity Payout Mode.
               type: string
            maturityPayoutAccNumber:
               description: Maturity Payout Account Number.
               type: string
            maturityPayoutAccName:
               description: Maturity Payout Account Name.
               type: string
            enableSweepIn:
               description: Enable swwep in.
               type: boolean
            enableCollateralLinkage:
               description: Enable Collateral Linkage.
               type: boolean
            applicationDate:
               description: Date of the application, Default to Current Date.
               type: string
            accountName:
               description: Name of the account.
               type: string
               maxLength: 100
            existingCustomer:
               description: Is Existing Customer
               type: boolean
            valueDate:
               description: Value Date for Term Deposit.
               type: string
            channel:
               description: Channel of application initiation (Default RPM)
               type: string
            sourceEmpCode:
               description: Source by employee Code
               type: string
            sourceEmpName:
               description: Source by employee name
               type: string
            stageChanged:
               description: Is stage Changed?
               type: boolean
            intPayoutBicCode:
               description: BIC code for interest Payout
               type: string
            sourceSystemAccBrn:
               description: Source System Account Branch
               type: string
#External Account Interest Payout details
            intPayoutBankCode:
               description: Bank code for interest Payout
               type: string
            intPayoutBankName:
               description: Bank name for interest Payout
               type: string
            intPayoutBranchCode:
               description: Branch Code for interest Payout
               type: string
            intPayoutBranchName:
               description: Branch Name for interest Payout
               type: string
            intPayoutAccHolderName:
               description: Account Holder Name for interest Payout
               type: string
            intPayoutExtAccNumber:
               description: Account Holder Name for interest Payout
               type: string
            maturityPayoutBicCode:
               description: BIC code for maturity Payout
               type: string
#External Account maturity Payout details
            maturityPayoutBankCode:
               description: Bank code for maturity Payout
               type: string
            maturityPayoutBankName:
               description: Bank name for maturity Payout
               type: string
            maturityPayoutBranchCode:
               description: Branch Code for maturity Payout
               type: string
            maturityPayoutBranchName:
               description: Branch Name for maturity Payout
               type: string
            maturityPayoutAccHolderName:
               description: Account Holder Name for maturity Payout
               type: string
            maturityPayoutExtAccNumber:
               description: Account Holder Name for maturity Payout
               type: string
            glCode:
               type: string
               description: General Ledger Code.
#General Ledger
            glDesc:
               type: string
               description: General Ledger Description.
            fundByCash:
               type: string
               description: fundByCash.
            fundByAcc:
               type: string
               description: fundByAcc.
            fundByCheque:
               type: string
               description: fundByCheque.
            chequeRoutingNumber:
               type: string
               description: rounting number for cheque.
            txnRefNumber:
               type: string
               description: transaction reference number.
            businessProductDtls:
               $ref: '#/definitions/BusinessProductDtls'
   BusinessProductDtls:
      type: object
      properties:
         businessProductCode:
            type: string
            description: businessProductCode
         businessProductImage:
            type: string
            description: businessProductImage
         businessProductSummary:
            type: string
            description: businessProductSummary
         productType:
            type: string
            description: productType
         productBrochure:
            type: string
            description: productBrochure
         termsandcondition:
            type: string
            description: termsandcondition
   AccountDetailsCollection:
      description: Collection of AccountDetails.
      type: object
      properties:
         AccountDetailsList:
            type: array
            items:
               $ref: '#/definitions/AccountDetailsModel'
   GenericDatasegmentModel:
      allOf:
      -  type: object
         discriminator: resource_type
   StageSkippingDetalModel:
      type: object
      properties:
         processRefNo:
            description: Process Reference Number
            type: string
         initFundRqrd:
            description: Initial Funding Required
            type: string
         applicationNumber:
            description: Initial Funding Required
            type: string