swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: mandateDetails Service
host: "api-plato.us.oracle.com:8080"
basePath: /mandatedetails
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
- name: SavingApplication
  description: API for Mandate Details Data segment Operations
schemes:  
- http
paths:
  /web/v1/mandatedetails:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - mandateDetails
      summary: Adds a new mandatedetails.
      description: Adds a new Mandatedetails. Add additional information here for this endpoint.
      operationId: addMandateDetails
      parameters:
      - name: Mandatedetails
        in: body
        description: Request Body that contains data required for creating a new Mandatedetails
        required: true
        schema:
          $ref: '#/definitions/MandateDetailsMasterModel'
      responses:
        201:
          description: Returns the Id of the newly created MandateDetails.
          headers:
            Location:
              description: URL of newly created MandateDetails.
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      tags:
      - MandateDetails
      summary: Retrieves the list of existing MandateDetails.
      description: Retrieves the list of existing MandateDetails. Add additional information here for the this endpoint.
      operationId: getAllMandateDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the MandateDetails that needs to be fetched
        required: false
        type: string
      - name: processRefNo
        in: query
        description: processRefNo of the user MandateDetails needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/mandatedetails/{id}:
    get:
      produces:
      - application/json
      tags:
      - MandateDetails
      summary: Get By ID
      description: Retrieves the Mandatedetails by Id Add additional information here for the this endpoint.
      operationId: getMandateDetailsById
      parameters:
      - name: id
        in: path
        description: ID of the MandateDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the MandateDetails based on given ID.
          schema:
            $ref: '#/definitions/MandateDetailsMasterModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - MandateDetails
      summary: Update an existing MandateDetails.
      description: Update an existing MandateDetails. Add additional information here for the this endpoint.
      operationId: updateMandateDetails
      parameters:
      - name: id
        in: path
        description: id of the MandateDetails that need to be updated
        required: true
        type: string
      - name: MandateDetails
        in: body
        description: Request Body that contains data required for updating an existing MandateDetails
        required: true
        schema:
          $ref: '#/definitions/MandateDetailsMasterModel'
      responses:
        200:
          description: Returns updated MandateDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      tags:
      - MandateDetails
      summary: Deletes the MandateDetails identified by given ID.
      description: Deletes the MandateDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteMandateDetails
      parameters:
      - name: id
        in: path
        description: Id of the MandateDetails that needs to be deleted
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
 MandateDetailsMasterModel:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDatasegmentModel'
  - type: object
    properties:
     processRefNo:
      description: "Process reference number of Mandate details master model"
      type: string
      maxLength: 20
     applicationDate:
      type: string
      description: "Date of application"
     modeOfOperation:
      type: string
      description: Mode of operation
     ownership:
      type: string
      description: ownership
     customerType:
      type: string
      description: customerType
     channel:
      type: string
      description: Channel
     action:
      type: string
      description: action   
     mandateDetailsModel:
      type: array
      items:
       $ref: '#/definitions/MandateDetailsModel'
 MandateDetailsModel:
   description: "MandateDetails Model"
   type: object
   properties:
    id:
     description: Id of the MandateDetailsModel
     type: string
     maxLength: 36
    processRefNo:
     description: "Process reference number of Mandate details"
     type: string
     maxLength: 20
    mandateDetailsMasterId:
     description: Id of master table
     type: string
     maxLength: 36
    amountCcy:
     type: string
     maxLength: 4
     description: Amount Currency
    amountFrom:
     type: number
     description: From Amount
     minimum: 0
     exclusiveMinimum: false
    amountTo:
     type: number
     description: To Amount
     minimum: 0
     exclusiveMinimum: false
    reqNoOfSignatory:
     type: number
     description: Required number of signatory
     minimum: 0
     exclusiveMinimum: true
    remarks:
     type: string
     description: Remarks
 MandateDetailsMasterCollection:
    description: Collection of MandateDetailsMasterModel.
    type: object
    properties:
     mandateDetailsMasterModelList:
      type: array
      items:
       $ref: '#/definitions/MandateDetailsMasterModel'
 GenericDatasegmentModel:
   allOf:
    - type: object
      discriminator: resource_type