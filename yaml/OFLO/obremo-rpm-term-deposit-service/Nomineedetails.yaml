swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: nomineedetails Service
host: "api-plato.us.oracle.com:8080"
basePath: /nomineedetails
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
- name: Term Deposit Application
  description: API for Nominee Details Data segment Operations
schemes:  
- http
paths:
  /web/v1/nomineedetails:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - nomineeDetails
      summary: Adds a new nomineedetails.
      description: Adds a new Nomineedetails. Add additional information here for this endpoint.
      operationId: addNomineeDetails
      parameters:
      - name: Nomineedetails
        in: body
        description: Request Body that contains data required for creating a new Nomineedetails
        required: true
        schema:
          $ref: '#/definitions/NomineeDetailsMasterModel'
      responses:
        201:
          description: Returns the Id of the newly created NomineeDetails.
          headers:
            Location:
              description: URL of newly created NomineeDetails.
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      tags:
      - NomineeDetails
      summary: Retrieves the list of existing NomineeDetails.
      description: Retrieves the list of existing NomineeDetails. Add additional information here for the this endpoint.
      operationId: getAllNomineeDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the Nomineedetails that needs to be fetched
        required: false
        type: string
      - name: processRefNo
        in: query
        description: Process Reference Number of the Nomineedetails that needs to be fetched
        required: true
        type: string        
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/nomineedetails/{id}:
    get:
      produces:
      - application/json
      tags:
      - NomineeDetails
      summary: Get By ID
      description: Retrieves the Nomineedetails by Id Add additional information here for the this endpoint.
      operationId: getNomineeDetailsById
      parameters:
      - name: id
        in: path
        description: ID of the Nomineedetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the NomineeDetails based on given ID.
          schema:
            $ref: '#/definitions/NomineeDetailsMasterModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - NomineeDetails
      summary: Update an existing NomineeDetails.
      description: Update an existing NomineeDetails. Add additional information here for the this endpoint.
      operationId: updateNomineeDetails
      parameters:
      - name: id
        in: path
        description: id of the Nomineedetails that need to be updated
        required: true
        type: string
      - name: NomineeDetails
        in: body
        description: Request Body that contains data required for updating an existing NomineeDetails
        required: true
        schema:
          $ref: '#/definitions/NomineeDetailsMasterModel'
      responses:
        200:
          description: Returns updated NomineeDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      tags:
      - NomineeDetails
      summary: Deletes the NomineeDetails identified by given ID.
      description: Deletes the NomineeDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteNomineeDetails
      parameters:
      - name: id
        in: path
        description: Id of the NomineeDetails that needs to be deleted
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'          
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
