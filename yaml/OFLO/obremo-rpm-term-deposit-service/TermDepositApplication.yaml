     type: array
     items:
      $ref: '#/definitions/TermDepositAggregateModel'           
  TermDepositInitializeModel:
   description: "TermDepositInitializeModel"
   type: object
   properties:
    applicationNumber:
     description: Application Number to Initialize TermDepositApplication
     type: string
     maxLength: 20
    processRefNo:
     description: "processRefNo for which TermDeposit account application data needs to be fetched"
     type: string  
     maxLength: 20     
    initializationId:
     description: initialization id to Initialize TermDepositApplication
     type: string
     maxLength: 20
    channel:
     description: source channel from where request came to Initialize SavingApplication
     type: string
     maxLength: 30
   required:
    - processRefNo
    - initializationId     
  InitiationDetailsModel:
   description: "InitiationDetailsModel"
   type: object
   properties:
    accountDetailsID:
     description: id for account-Details
     type: string
     maxLength: 36
    applicantDetailsID:
     description: id for applicant-Details
     type: string
     maxLength: 36
  DomainData:
   description: "Domain Data from workflow"
   type: object
   properties:
    sendToHost:
     type: boolean
     description: "Need to send to host?"
    initiateFunding:
     type: boolean
     description: "Does it support Initial funding?"
    initFundingStatus:
     type: boolean
     description: "Status of Initial Funding?"
  AccountNumberModel:
   description: "AccountNumberModel for account opening details"
   type: object
   properties:
    customerId:
     type: string
     description: "Cif Number"
    customerName:
