    processRefNo:
     type: string
     description: "processRefNo"
    applicationNumber:
     type: string
     description: "applicationNumber"        
  TermDepositMasterModel:
    description: Term Deposit Application Master Model
    type: object
    properties:
      data: 
        type: array
        items:
         $ref: '#/definitions/TermDepositModel'
  TermDepositModel: 
    description: Term Deposit Application Model
    type: object
    properties:
      accountDetailsModel:
        $ref: "#/definitions/AccountDetailsModel"       
      nomineeDetailsMasterModel:
        $ref: "#/definitions/NomineeDetailsMasterModel"
      mandateDetailsMasterModel:
        $ref: "#/definitions/MandateDetailsMasterModel"
      accServicesPrefMasterModel:
        $ref: "#/definitions/AccServicesPrefMasterModel"
        
        
  BackOfficeRequestModel:
    description: Back Office Request model
    type: object
