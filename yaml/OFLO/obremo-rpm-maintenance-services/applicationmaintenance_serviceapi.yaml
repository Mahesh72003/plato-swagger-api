swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Application Maintenance Service
host: 10.184.157.121:9000
basePath: /applicationmaintenance-services
tags:
- name: ApplicationMaintenance
  description: API for Loan application Maintenance
schemes:
- http
paths:
  /service-api/v1/applicationmaintenance/{type}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ApplicationMaintenanceService
      summary: Returns the list of lifecycle codes
      description: Returns the list of lifecycle codes
      operationId: getLifeCycleCodes
      parameters:
      - name: type
        in: path
        description: Type for which the maintenance details to be fetched
        required: true
        type: string
      - name: code
        in: query
        description: Code for which the maintenance details to be fetched
        required: false
        type: string
      responses:
        200:
          description: Returns the list of lifecycle codes
          schema:
            $ref: '#/definitions/ApplicationMaintenanceModelCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
          
          
  /service-api/v1/applicationmaintenance/biccodes:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ApplicationMaintenanceService
      summary: Retrieves the list of BIC Codes
      description: Retrieves the list of BIC Codes. Add additional information here for the this endpoint.
      operationId: getBicCodes
      parameters:
      - name: bicCode
        in: query
        description: BIC Code
        type: string
        required: false
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/BankCodeMasterModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error 
  