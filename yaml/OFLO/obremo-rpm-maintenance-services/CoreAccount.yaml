 CoreCustomerDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     country:
      type: string
      description: "Country code of the customer?s address"
      pattern: '([a-zA-Z0-9]+)?'
     language:
      type: string
      description: "Customer's preferred language of communication"
     nationality:
      type: string
      description: "Nationality of the customer"
     locale:
      type: string
      description: "Locale of the customer"     
     deceased:
      type: string
      description: "Identifies that customer is deceased"
     frozen:
      type: string
      description: "Identifies that the customer's account is frozen"
      pattern: '[Y,N]'
     whereaboutsUnknown:
      type: string
      description: "Identifies that the customer's whareabouts not known"
      pattern: '[Y,N]'
     rmId:
      type: string
      description: "Relational Manager's Id"
      minLength: 0
      maxLength: 12
      pattern: '([a-zA-Z0-9]+)?'
     sanctionsChecksRequired:
      type: string
      description: "Indicates that the sanction check should be done or not"
      pattern: '[Y,N]'
     staff:
      type: string
     walkinCustomer:
      type: string
      description: "Walkin Customer"
     sourceSystem:
      type: string
      description: "Name of the source system"
     sourceSystemCustNo:
      type: string
      description: "Customer identification details as per the source system."
      minLength: 1
      maxLength: 35
      pattern: '[a-zA-Z0-9]+'
     customerNo:
      type: string
      description: "Customer Number of the external customer"
      minLength: 1
      maxLength: 20
      pattern: '[a-zA-Z0-9]+'
     hostCode:
      type: string
      description: "Displays the host code that is linked to the transaction branch of the customer"
     customerType:
      type: string
      description: "Customer type can be Individual,Corporate or Bank"
      pattern: '[I,C,B]'
     customerCategory:
      type: string
      description: "Category to which the customer belongs to"
     customerName1:
      type: string
      description: "Name of the external customer"
      minLength: 0
      maxLength: 105
      #pattern: '([a-zA-Z0-9_\s]+)?'
     shortName:
      type: string
      description: "Short name of the custome"
      minLength: 0
      maxLength: 20
      #pattern: '([a-zA-Z0-9\s]+)?'
     addressLine1:
      type: string
      description: "First line of the customer?s address"
      minLength: 0
      maxLength: 35
     addressLine2:
      type: string
      description: "Second line of the customer?s address"
      minLength: 0
      maxLength: 35
     addressLine3:
      type: string
      description: "Third line of the customer?s address"
      minLength: 0
      maxLength: 35
     addressLine4:
      type: string
      description: "Fourth line of the customer?s address"
      minLength: 0
      maxLength: 35          
     pincode:
      type: string
      description: "Pincode of the customer?s address"
      minLength: 0
      maxLength: 15
      pattern: '([a-zA-Z0-9]+)?'
    required:
     - sourceSystem
     - sourceSystemCustNo
     - customerNo
     - customerType
     - customerName1
