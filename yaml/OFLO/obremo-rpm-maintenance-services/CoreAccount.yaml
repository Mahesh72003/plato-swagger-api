swagger: "2.0"
info:
 description: "This is a sample server coreaccounts server." 
 version: "1.0.0"
 title: "coreaccounts Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "coreaccounts"
   description: "This service is used to maintain external accounts for customers and maps the source system account number to external account maintained.It give us options to specify various parameters of the account like account is active or not credit or debit is allowed or not etc."
 
schemes:
- "https"
 
paths:
 
# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../coreaccounts
 
 /coreaccounts:
  get:
   tags:
    - "coreaccounts"
   summary: "Get all valid coreaccounts."
   description:  "Get all valid coreaccounts. This endpoints will be used to Get all valid coreaccounts maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: countryCode
     required: false
     type: string
   - in: query
     name: address1
     required: false
     type: string
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   - in: query
     name: onceAuth
     required: false
     type: string
   - in: query
     name: modNo
     required: false
     type: integer
   - in: query
     name: checkerId
     required: false
     type: string
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: accountClass
     required: false
     type: string
   - in: query
     name: acStatDormant
     required: false
     type: string
   - in: query
     name: acStatFrozen
     required: false
     type: string
   - in: query
     name: glStatBlocked
     required: false
     type: string
   - in: query
     name: acStatNoDr
     required: false
     type: string
   - in: query
     name: acStatNoCr
     required: false
     type: string
   - in: query
     name: custAcName
     required: false
     type: string
   - in: query
     name: custAcCcy
     required: false
     type: string
   - in: query
     name: customerNo
     required: false
     type: string
   - in: query
     name: sourceSystemAccBrn
     required: false
     type: string
   - in: query
     name: sourceSystemAccNo
     required: false
     type: string
   - in: query
     name: sourceSystem
     required: false
     type: string
   - in: query
     name: custAcIban
     required: false
     type: string
   - in: query
     name: hostCode
     required: false
     type: string
   - in: query
     name: custAccountNo
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CoreAccountCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"




definitions:
 CoreAccountDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     countryCode:
      type: string
      description: "Country Code"
      minLength: 0
      maxLength: 4
     address4:
      type: string
      description: "Fourth line of the customer?s address"
      minLength: 0
      maxLength: 105
     address3:
      type: string
      description: "Third line of the customer?s address"
      minLength: 0
      maxLength: 105
     address2:
      type: string
      description: "Second line of the customer?s address"
      minLength: 0
      maxLength: 105
     address1:
      type: string
      description: "First line of the customer?s address"
      minLength: 0
      maxLength: 105
     ecaCheckReq:
      type: string
      description: "Indicates that ECA check is required for the external customer account"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     accountClass:
      type: string
      description: "Account class of the external customer account. It can be Normal account or Nostro account"
     acStatDormant:
      type: string
      description: "Indicates that the account status is dormant"
      minLength: 1
      maxLength: 1
      pattern: '[Y,N]'
     acStatFrozen:
      type: string
      description: "Indicate that the account status is frozen"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     glStatBlocked:
      type: string
      description: "Indicates that the account status is blocked"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     acStatNoDr:
      type: string
      description: "Indicates that the account does not have any debit facility"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     acStatNoCr:
      type: string
      description: "Indicates that the account does not have any credit facility"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     acOpenDate:
      type: string
      pattern: "[0-9]{4}[-][0-9]{2}[-][0-9]{2}"
      description: "The date on which account is being opened"
     custAcName:
      type: string
      description: "Name of the account holder"
      minLength: 0
      maxLength: 105
      #pattern: '[a-zA-Z0-9\s]+'
     custAcCcy:
      type: string
      description: "Currency in which the account is being created"
     customerNo:
      type: string
      description: "Customer number to which the account number is being linked"
     sourceSystemAccBrn:
      type: string
      description: "Branch to which the account belongs to"
     sourceSystemAccNo:
      type: string
      description: "Account number as in the source system"
      minLength: 0
      maxLength: 35
      pattern: '[a-zA-Z0-9]+'
     sourceSystem:
      type: string
      description: "Name of the source system"
     custAcIban:
      type: string
      description: "IBAN that is linked to the customer"
      minLength: 0
      maxLength: 35
      pattern: '[a-zA-Z0-9]+'
     hostCode:
      type: string
      description: "The host code that is linked to the logged in user of the branch."
     custAccountNo:
      type: string
      description: "Account number of the External customer"
      minLength: 1
      maxLength: 20
      pattern: '[a-zA-Z0-9]+'
    required:
     - custAcName
     - customerNo
     - sourceSystemAccBrn
     - sourceSystemAccNo
     - hostCode
     - custAccountNo
