  version: 1.0.0
  title: Applicant Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-cmn-applicantservices
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
- name: ApplicantDetailsService
  description: API for ApplicantService Operations
schemes:
- http
paths:
  /service/v1/processStatus/{partyId}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ApplicantDetailsService
      summary: Retrieves the list of Process for given Party.
      description: Retrieves the list of existing ApplicantDetails by id. Add additional information here for the this endpoint.
      operationId: getProcessStatus
      parameters:
      - name: partyId
        in: path
        description: partyId of the Application for which Process need to be fetched
        required: true
        type: string        
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ProcessStatServiceModelCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
