            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/stakeholderdetails/{id}:
    get:
      produces:
      - application/json
      tags:
      - StakeHolderDetails
      summary: Get By ID
      description: Retrieves the StakeHolderDetails by Id Add additional information here for the this endpoint.
      operationId: getStakeHolderDetailsById
      parameters:
      - name: id
        in: path
        description: Id for which StakeHolderDetails details needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the StakeHolderDetails based on given id.
          schema:
            $ref: '#/definitions/ResponseModel'
