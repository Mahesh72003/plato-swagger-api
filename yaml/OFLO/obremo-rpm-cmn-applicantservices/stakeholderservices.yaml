      operationId: addStakeHolderDetails
      parameters:
      - name: StakeHolderDetails
        in: body
        description: Request Body that contains data required for creating a new StakeHolderDetails
        required: true
        schema:
          $ref: '#/definitions/StakeHolderDetailsMasterModel'
      responses:
        201:
          description: Returns the Id of the newly created StakeHolderDetails
          headers:
            Location:
              description: URL of newly created StakeHolderDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - StakeHolderDetails
      summary: Retrieves the list of existing StakeHolderDetails by id.
      description: Retrieves the list of existing StakeHolderDetails by id. Add additional information here for the this endpoint.
      operationId: getAllStakeHolderDetails
      parameters:
      - name: applicationNumber
        in: query
        description: applicationNumber of the StakeHolderDetails that needs to be fetched
        required: true
