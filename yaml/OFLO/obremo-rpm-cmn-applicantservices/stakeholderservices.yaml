    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - StakeHolderDetails
      summary: Update an existing StakeHolderDetails.
      description: Update an existing StakeHolderDetails. Add additional information here for the this endpoint.
      operationId: updateStakeHolderDetails
      parameters:
      - name: id
        in: path
        description: id of the StakeHolderDetails that need to be updated
        required: true
        type: string
      - name: StakeHolderDetails
        in: body
        description: Request Body that contains data required for updating an existing StakeHolderDetails
        required: true
        schema:
          $ref: '#/definitions/StakeHolderDetailsMasterModel'
      responses:
        200:
          description: Returns updated StakeHolderDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
