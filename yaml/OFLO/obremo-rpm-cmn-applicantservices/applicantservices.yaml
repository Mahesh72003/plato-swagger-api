      produces:
        - application/json
      tags:
        - ApplicantDetails
      summary: Get By ID
      description: Retrieves the Applicantdetails by Id Add additional information here for the this endpoint.
      operationId: getApplicantDetailsById
      parameters:
        - name: id
          in: path
          description: Id for which applicant details needs to be fetched
          required: true
          type: string
      responses:
        200:
          description: Returns the ApplicantDetails based on given id.
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
        - application/json
        - application/xml
      produces:
        - application/json
        - application/xml
      tags:
        - ApplicantDetails
      summary: Update an existing ApplicantDetails.
      description: Update an existing ApplicantDetails. Add additional information here for the this endpoint.
      operationId: updateApplicantDetails
      parameters:
        - name: id
          in: path
          description: id of the ApplicantDetails that need to be updated
          required: true
          type: string
        - name: ApplicantDetails
          in: body
          description: Request Body that contains data required for updating an existing ApplicantDetails
          required: true
          schema:
            $ref: '#/definitions/ApplicantDetailsMasterModel'
      responses:
        200:
          description: Returns updated ApplicantDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
