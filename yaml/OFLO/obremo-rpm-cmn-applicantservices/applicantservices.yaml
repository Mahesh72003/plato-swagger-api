        - application/xml
      tags:
        - ApplicantDetails
      summary: Adds a new ApplicantDetails.
      description: Adds a new ApplicantDetails. Add additional information here for this endpoint.
      operationId: addApplicantDetails
      parameters:
        - name: ApplicantDetails
          in: body
          description: Request Body that contains data required for creating a new ApplicantDetails
          required: true
          schema:
            $ref: '#/definitions/ApplicantDetailsMasterModel'
      responses:
        201:
          description: Returns the Id of the newly created ApplicantDetails
          headers:
            Location:
              description: URL of newly created ApplicantDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - ApplicantDetails
      summary: Retrieves the list of existing ApplicantDetails by id.
      description: Retrieves the list of existing ApplicantDetails by id. Add additional information here for the this endpoint.
      operationId: getAllApplicantsDetails
      parameters:
        - name: applicationNumber
          in: query
          description: applicationNumber of the Applicantdetails that needs to be fetched
          required: true
          type: string
