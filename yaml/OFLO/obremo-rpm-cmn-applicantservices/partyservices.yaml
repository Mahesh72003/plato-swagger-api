swagger: "2.0"
info:
  description: "This is a sample server Legal Opinion server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "OBPY-Party-Services"
host: "whf00bdm:7801"
basePath: "/obpy-party-services"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "PartyAPI"
    description: "API for Party  Operations"

schemes:
  - "http"

paths:
  /service/v1/retail/amendParty/{partyId}:
    post:
      tags:
        - "partyDemographicsService"
      summary: "Amend an existing Party."
      description: "Amend an existing Party."
      operationId: "amendParty"
      parameters:
        - name: "partyDemographics"
          in: "body"
          description: "Request Body that contains data required for amending an existing Party Demographics"
          required: true
          schema:
            $ref: "#/definitions/PartyDemographicServiceModel"
        - name: "appId"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystem"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystemReferenceNo"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: false
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "partyId"
          in: "path"
          type: "string"
          required: true 
      responses:
        201:
          description: "Successfully amended an existing Party Demographic Details"
          headers:
            Location:
              description: "URL of newly created Party Demographics"
              type: "string"
          schema:
            $ref: "#/definitions/AmendPartyResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  
  /service/v1/initiatePartyOnboarding:
    post:
      tags:
        - "partyDemographicsService"
      summary: "Adds a new Party Demographic."
      description: "Adds a new Party Demographic."
      operationId: "initiatePartyOnboarding"
      parameters:
        - name: "partyDemographics"
          in: "body"
          description: "Request Body that contains data required for creating a new Party Demographics"
          required: true
          schema:
            $ref: "#/definitions/PartyDemographicServiceCollectionModel"
        - name: "appId"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystem"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystemReferenceNo"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: false
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
      responses:
        201:
          description: "Successfully created a new Party Demographic Details"
          headers:
            Location:
              description: "URL of newly created Party Demographics"
              type: "string"
          schema:
            $ref: "#/definitions/PartyResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"        
          
  /service/v1/getParty/{partyId}:
    get:
      tags:
        - "partyDemographicsService"
      summary: "Retrieves the existing Party Demographics for the given partyId."
      description:  "Retrieves the existing Party Demographics for the given partyId."
      operationId: "getPartyDetails"
      parameters:
        - name: "partyId"
          in: "path"
          description: "partyId of the details that needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystem"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystemReferenceNo"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: false
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
          
  /service/v1/retail/customerDetails/{partyId}:
    get:
      tags:
        - "retailCustomerSummaryService"
      summary: "Retrieves the existing retail customer Details."
      description:  "Retrieves the existing retail customer Details."
      operationId: "getRetailCustomerDetails"
      parameters:
        - name: "partyId"
          in: "path"
          description: "partyId of the details that needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "limit"
          in: "query"
          required: false
          description: "limit to be fetched"
          type: "integer"
        - name: "offset"
          in: "query"
          required: false
          description: "offset of the limit"
          type: "integer"
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
