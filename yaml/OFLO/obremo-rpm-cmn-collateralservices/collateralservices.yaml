  /web/v1/collateralservices/save:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralAggregate
      summary: Save and Submit for the collateral domain.
      description: Save and Submit for the collateral domain
      operationId: submitCollateralServices
      parameters:
      - name: CollateralServicesAggregateModel
        in: body
        description: Request Body that contains data required for saving collateralApplication
        required: true
        schema:
          $ref: '#/definitions/CollateralServicesAggregateModel'
      responses:
        201:
          description: Returns the Id of the newly created Collateral
          headers:
            Location:
              description: URL of newly created Collateral
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
 
  /web/v1/collateralservices/{applicationNumber}/datasegment-details: 
    get: 
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralAggregate
      summary: Get the Details of Collateral Work Table.
      description: Get the Work Table Details.
      operationId: getCollateralServices
      parameters:
      - name: applicationNumber
        in: path
        description: Application number for which Collateral data needs to be fetched
        required: true
        type: string
      - name: processRefNos
        in: query
        description: Process Reference number for which Collateral data needs to be fetched
        required: true
        type: array
        items:
         type: string
      responses:
        200:
          description: Returns CollateralApplicationMasterModel for the application number
          schema: 
           $ref: '#/definitions/CollateralApplicationMasterModel'
