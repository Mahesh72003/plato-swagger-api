swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Collateral Application Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-cmn-collateralservices
tags:
- name: CollateralDetailsServices
  description: API for Collateral Operations
schemes:
- http
paths:
  /web/v1/collateralservices/submit:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralAggregate
      summary: Submit for the Collateral Aggregate.
      description: Populate Collateral Aggregate and moves the latest data from all worktables to main tables or onboard collateral details
      operationId: saveCollateralServices
      parameters:
      - name: CollateralServicesAggregateModel
        in: body
        description: Request Body that contains data required for creating a new CollateralAggregate
        required: true
        schema:
          $ref: '#/definitions/CollateralServicesAggregateModel'
      responses:
        201:
          description: Returns the Id of the newly created CollateralAggregate
          headers:
            Location:
              description: URL of newly created CollateralAggregate
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
 
  /web/v1/collateralservices/{applicationNumber}/{processRefNo}/datasegment-history/{datasegmentCode}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralAggregate
      summary: Get data segment History Details.
      description: Get data segment History Details.
      operationId: getHistory
      parameters:
      - name: applicationNumber
        in: path
        description: Application Number for which Collateral data needs to be fetched
        required: true
        type: string
      - name: processRefNo
        in: path
        description: Process Ref number for which Collateral data needs to be fetched
        required: true
        type: string
      - name: datasegmentCode
        in: path
        description: datasegmentCode for History need to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns History details for the proccess number and datasegment code
          schema:
            $ref: '#/definitions/ResponseCollectionModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error 
 
  /web/v1/collateralservices/{applicationNumber}/{processRefNo}/stagesummary:
    get:
      produces:
      - application/json
      - application/xml
