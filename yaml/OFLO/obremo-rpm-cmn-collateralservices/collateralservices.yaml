definitions:
  CollateralServicesAggregateModel:
    description: CollateralServicesAggregateModel
    type: object
    properties:
      id:
        description: Collateral Application Id
        type: string
      processRefNo:
        description: Process Ref No
        type: string
      applicationNumber:
        description: ApplicationNumber
        type: string
#      collateralRefNo:
#        description: Collateral Ref No
#        type: string
#      collateralId:
#        description: Collateral Id
#        type: string
      action:
        description: Save or Submit
        type: string
      dataSegmentCode:
        description: dataSegmentCode
        type: string
      stageCode:
        description: Stage Code
        type: string
      processCode:
        description: Process Code
        type: string
      channel: 
        description: Channel
        type: string
      collateralDetails:
        $ref: '#/definitions/CollateralDetailsMasterModel'
      valuationDetails:
        $ref: '#/definitions/ValuationDetailsMasterModel'
      legalOpinionDetails:
        $ref: '#/definitions/LegalOpinionDetailsMasterModel'
      perfectionDetails:
        $ref: '#/definitions/PerfectionDetailsMasterModel'
    required:
    - processRefNo
    - applicationNumber
 
  CreateCollateralModel:
    description: Collateral Creation model
    type: object
    properties:
      processRefNo:
        description: Process Ref No
        type: string
      applicationNumber:
        description: Application Number
        type: string
      userId:
        description: User Id
        type: string
      branchCode:
        description: Branch Code
        type: string
      handOffStatus:
        description: Hand Off Status
        type: string
    required:
    - processRefNo
    - applicationNumber
    - userId
    - branchCode
 
  CollateralApplicationMasterModel:
    description: Collateral Application Master Model
    type: object
    properties:
      data: 
        type: array
        items:
         $ref: '#/definitions/CollateralApplicationModel' 
  CollateralApplicationModel: 
    description: Collateral Application Model
    type: object
    properties:
      collateralDetails:
        $ref: '#/definitions/CollateralDetailsMasterModel'