      - CollateralAggregate
      summary: Get Stagesummary Details.
      description: Get stagesummary Details.
      operationId: getStageSummary
      parameters:
      - name: applicationNumber
        in: path
        description: applicationNumber for which Collateral data needs to be fetched
        required: true
        type: string
      - name: processRefNo
        in: path
        description: Process Reference number for which Collateral data needs to be fetched
        required: true
        type: string
      - name: datasegments
        in: query
        description: comma seperated datasegments for the stage
        required: false
        type: string
      responses:
        200:
          description: Returns summary details for the process ref no for the stage
          schema:
            $ref: '#/definitions/ResponseModel'
