swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Collateral Application Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-cmn-collateralservices
tags:
- name: CollateralServices
  description: API for Collateral Operations
schemes:
- http
paths:
  /web/v1/collateraldetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralDetails
      summary: Adds a new CollateralDetails.
      description: Adds a new CollateralDetails. Add additional information here for this endpoint.
      operationId: addCollateralDetails
      parameters:
      - name: CollateralDetails
        in: body
        description: Request Body that contains data required for creating a new CollateralDetails
        required: true
        schema:
          $ref: '#/definitions/CollateralDetailsMasterModel'
      responses:
        201:
          description: Returns the Id of the newly created CollateralDetails
          headers:
            Location:
              description: URL of newly created CollateralDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralDetails
      summary: Retrieves the list of existing CollateralDetails.
      description: Retrieves the list of existing CollateralDetails. Add additional information here for the this endpoint.
      operationId: getAllCollateralDetails
      parameters:
      - name: processRefNo
        in: query
        description: processRefNo of the user that needs to be fetched
        required: true
        type: string
        items:
         type: string
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string      
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/collateraldetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralDetails
      summary: Retrieves the CollateralDetails by id.
      description: Retrieves the CollateralDetails by id. Add additional information here for the this endpoint.
      operationId: getCollateralDetailsById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the CollateralDetails based on given processRefNo.
          schema:
            $ref: '#/definitions/CollateralDetailsMasterModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralDetails
      summary: Update an existing CollateralDetails.
      description: Update an existing CollateralDetails. Add additional information here for the this endpoint.
      operationId: updateCollateralDetails
      parameters:
      - name: id
        in: path
        description: id of the CollateralDetails that need to be updated
        required: true
        type: string
      - name: CollateralDetails
        in: body
        description: Request Body that contains data required for updating an existing CollateralDetails
        required: true
        schema:
          $ref: '#/definitions/CollateralDetailsMasterModel'
      responses:
        200:
          description: Returns updated CollateralDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralDetails
      summary: Deletes the CollateralDetails identified by given ID.
      description: Deletes the CollateralDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteCollateralDetails
      parameters:
      - name: id
        in: path
        description: Id of the CollateralDetails that needs to be deleted
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/collateralSkipping:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - CollateralDetails
      summary: Collateral Skipping Condition
      description: Retrieves Yes/No if any of the collateral is TD and primary
      operationId: getCollateralSkipping
      parameters:
      - name: processRefNo
        in: query
        description: processRefNo of the user that needs to be fetched
        required: true
        type: string
        items:
          type: string
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the CollateralDetails based on given processRefNo.
          schema:
            $ref: '#/definitions/StageSkippingModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
