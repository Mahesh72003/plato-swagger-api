swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-lo-loanapplications
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/backofficedetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - BackOfficeDetails
      summary: Adds a new BackOfficeDetails.
      description: Adds a new BackOfficeDetails. Add additional information here for this endpoint.
      operationId: addBackOfficeDetails
      parameters:
      - name: BackOfficeDetails
        in: body
        description: Request Body that contains data required for creating a new BackOfficeDetails
        required: true
        schema:
          $ref: '#/definitions/BackOfficeDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created BackOfficeDetails
          headers:
            Location:
              description: URL of newly created BackOfficeDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - BackOfficeDetails
      summary: Retrieves the list of existing BackOfficeDetails.
      description: Retrieves the list of existing BackOfficeDetails. Add additional information here for the this endpoint.
      operationId: getAllBackOfficeDetails
      parameters:
      - name: processRefNo
        in: query
        description: processRefNo of the user that needs to be fetched
        required: true
        type: string
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/backofficedetails/{id}:
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - BackOfficeDetails
      summary: Update an existing BackOfficeDetails.
      description: Update an existing BackOfficeDetails. Add additional information here for the this endpoint.
      operationId: updateBackOfficeDetails
      parameters:
      - name: id
        in: path
        description: id of the BackOfficeDetails that need to be updated
        required: true
        type: string
      - name: BackOfficeDetails
        in: body
        description: Request Body that contains data required for updating an existing BackOfficeDetails
        required: true
        schema:
          $ref: '#/definitions/BackOfficeDetailsModel'
      responses:
        200:
          description: Returns updated BackOfficeDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
