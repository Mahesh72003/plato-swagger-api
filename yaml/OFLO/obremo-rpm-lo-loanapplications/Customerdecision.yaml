swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-lo-loanapplications
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/customerdecision:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerDecision
      summary: Adds a new CustomerDecision.
      description: Adds a new CustomerDecision. Add additional information here for this endpoint.
      operationId: addCustomerDecision
      parameters:
      - name: CustomerDecision
        in: body
        description: Request Body that contains data required for creating a new CustomerDecision
        required: true
        schema:
          $ref: '#/definitions/CustomerDecisionModel'
      responses:
        201:
          description: Returns the Id of the newly created CustomerDecision
          headers:
            Location:
              description: URL of newly created CustomerDecision
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerDecision
      summary: Retrieves the list of existing CustomerDecision.
      description: Retrieves the list of existing CustomerDecision. Add additional information here for the this endpoint.
      operationId: getAllCustomerDecision
      parameters:
      - name: processRefNo
        in: query
        description: processRefNo of the user that needs to be fetched
        required: true
        type: string
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/customerdecision/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerDecision
      summary: Retrieves the CustomerDecision by id.
      description: Retrieves the CustomerDecision by id. Add additional information here for the this endpoint.
      operationId: getCustomerDecisionById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the CustomerDecision based on given processRefNo.
          schema:
            $ref: '#/definitions/CustomerDecisionModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerDecision
      summary: Update an existing CustomerDecision.
      description: Update an existing CustomerDecision. Add additional information here for the this endpoint.
      operationId: updateCustomerDecision
      parameters:
      - name: id
        in: path
        description: id of the CustomerDecision that need to be updated
        required: true
        type: string
      - name: CustomerDecision
        in: body
        description: Request Body that contains data required for updating an existing CustomerDecision
        required: true
        schema:
          $ref: '#/definitions/CustomerDecisionModel'
      responses:
        200:
          description: Returns updated CustomerDecision
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - CustomerDecision
      summary: Deletes the CustomerDecision identified by given ID.
      description: Deletes the CustomerDecision identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteCustomerDecision
      parameters:
      - name: id
        in: path
        description: Id of the CustomerDecision that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
