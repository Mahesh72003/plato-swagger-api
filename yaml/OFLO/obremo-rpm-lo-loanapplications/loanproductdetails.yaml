swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-lo-loanapplications
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /service/v1/loanproductdetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - LoanProductDetails
      summary: Adds a new LoanProductDetails.
      description: Adds a new LoanProductDetails. Add additional information here for this endpoint.
      operationId: addLoanProductDetails
      parameters:
      - name: LoanProductDetails
        in: body
        description: Request Body that contains data required for creating a new LoanProductDetails
        required: true
        schema:
          $ref: '#/definitions/LoanProductDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created LoanProductDetails
          headers:
            Location:
              description: URL of newly created LoanProductDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error

  /web/v1/loanproductdetails/currencies:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - LoanProductDetails
      summary: Retrieves the list of Currency codes
      description: Retrieves the list of Currency Codes. Add additional information here for the this endpoint.
      operationId: getCurrencyCodes
      parameters:
      - name: processRefNo
        in: query
        description: Process Reference Number
        type: string
        required: true
      - name: applicationNumber
        in: query
        description: Application Number
        type: string
        required: false
      - name: businessProductCode
        in: query
        description: Business Product Code
        type: string
        required: false
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
          
  /web/v1/loanproductdetails/repaymentmethods:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - LoanProductDetails
      summary: Retrieves the list of Repayment Methods
      description: Retrieves the list of Repayment Methods. Add additional information here for the this endpoint.
      operationId: getRepaymentMethods
      parameters:
      - name: processRefNo
        in: query
        description: Process Reference Number
        type: string
        required: true
      - name: applicationNumber
        in: query
        description: Application Number
        type: string
        required: false
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error

definitions:
  LoanProductDetailsModel:
    description: LoanProductDetails model
    type: object
    properties:
      processRefNo:
        description: Process Reference Number
        type: string
      applicationNumber:
        description: Application Number
        type: string
      businessProductCode:
        description: Business Product Code
        type: string
    required:
      - processRefNo
      - applicationNumber
      - businessProductCode
  LoanProductDetailsCollection:
    description: Collection of LoanProductDetails.
    type: object
    properties:
      LoanProductDetailsList:
        type: array
        items:
          $ref: '#/definitions/LoanProductDetailsModel'
