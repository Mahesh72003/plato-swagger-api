            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/issueofferdetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - IssueOfferDetails
      summary: Retrieves the IssueOfferDetails by id.
      description: Retrieves the IssueOfferDetails by id. Add additional information here for the this endpoint.
      operationId: getIssueOfferDetailsById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the IssueOfferDetails based on given processRefNo.
          schema:
            $ref: '#/definitions/IssueOfferDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - IssueOfferDetails
      summary: Update an existing IssueOfferDetails.
      description: Update an existing IssueOfferDetails. Add additional information here for the this endpoint.
      operationId: updateIssueOfferDetails
      parameters:
      - name: id
        in: path
        description: id of the IssueOfferDetails that need to be updated
        required: true
        type: string
      - name: IssueOfferDetails
        in: body
        description: Request Body that contains data required for updating an existing IssueOfferDetails
        required: true
        schema:
          $ref: '#/definitions/IssueOfferDetailsModel'
      responses:
        200:
          description: Returns updated IssueOfferDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - IssueOfferDetails
      summary: Deletes the IssueOfferDetails identified by given ID.
      description: Deletes the IssueOfferDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteIssueOfferDetails
      parameters:
      - name: id
        in: path
        description: Id of the IssueOfferDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
