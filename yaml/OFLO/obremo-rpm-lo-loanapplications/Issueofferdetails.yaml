      produces:
      - application/json
      - application/xml
      tags:
      - IssueOfferDetails
      summary: Retrieves the list of existing IssueOfferDetails.
      description: Retrieves the list of existing IssueOfferDetails. Add additional information here for the this endpoint.
      operationId: getAllIssueOfferDetails
      parameters:
      - name: processRefNo
        in: query
