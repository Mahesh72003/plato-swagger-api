swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-lo-loanapplications
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/guarantordetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - GuarantorDetails
      summary: Adds a new GuarantorDetails.
      description: Adds a new GuarantorDetails. Add additional information here for this endpoint.
      operationId: addGuarantorDetails
      parameters:
      - name: GuarantorDetails
        in: body
        description: Request Body that contains data required for creating a new GuarantorDetails
        required: true
        schema:
          $ref: '#/definitions/GuarantorDetailsMasterModel'
      responses:
        201:
          description: Returns the Id of the newly created GuarantorDetails
          headers:
            Location:
              description: URL of newly created GuarantorDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - GuarantorDetails
      summary: Retrieves the list of existing GuarantorDetails.
      description: Retrieves the list of existing GuarantorDetails. Add additional information here for the this endpoint.
      operationId: getAllGuarantorDetails
      parameters:
      - name: processRefNo
        in: query
        description: processRefNo of the user that needs to be fetched
        required: true
        type: string
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/guarantordetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - GuarantorDetails
      summary: Retrieves the GuarantorDetails by id.
      description: Retrieves the GuarantorDetails by id. Add additional information here for the this endpoint.
      operationId: getGuarantorDetailsById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the GuarantorDetails based on given processRefNo.
          schema:
            $ref: '#/definitions/GuarantorDetailsMasterModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - GuarantorDetails
      summary: Update an existing GuarantorDetails.
      description: Update an existing GuarantorDetails. Add additional information here for the this endpoint.
      operationId: updateGuarantorDetails
      parameters:
      - name: id
        in: path
        description: id of the GuarantorDetails that need to be updated
        required: true
        type: string
      - name: GuarantorDetails
        in: body
        description: Request Body that contains data required for updating an existing GuarantorDetails
        required: true
        schema:
          $ref: '#/definitions/GuarantorDetailsMasterModel'
      responses:
        200:
          description: Returns updated GuarantorDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - GuarantorDetails
      summary: Deletes the GuarantorDetails identified by given ID.
      description: Deletes the GuarantorDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteGuarantorDetails
      parameters:
      - name: id
        in: path
        description: Id of the GuarantorDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
 
