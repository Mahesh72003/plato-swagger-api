      - AccountCreation
      summary: Adds a new AccountCreation.
      description: Adds a new AccountCreation. Add additional information here for this endpoint.
      operationId: addAccountCreation
      parameters:
      - name: AccountCreation
        in: body
        description: Request Body that contains data required for creating a new AccountCreation
        required: true
        schema:
          $ref: '#/definitions/AccountCreationModel'
      responses:
        201:
          description: Returns the Id of the newly created AccountCreation
          headers:
            Location:
              description: URL of newly created AccountCreation
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - AccountCreation
      summary: Retrieves the list of existing AccountCreation.
      description: Retrieves the list of existing AccountCreation. Add additional information here for the this endpoint.
      operationId: getAllAccountCreation
      parameters:
      - name: processRefNo
        in: query
