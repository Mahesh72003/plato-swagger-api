      produces:
      - application/json
      - application/xml
      tags:
      - AccountCreation
      summary: Retrieves the AccountCreation by id.
      description: Retrieves the AccountCreation by id. Add additional information here for the this endpoint.
      operationId: getAccountCreationById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the AccountCreation based on given processRefNo.
          schema:
            $ref: '#/definitions/AccountCreationModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - AccountCreation
      summary: Update an existing AccountCreation.
      description: Update an existing AccountCreation. Add additional information here for the this endpoint.
      operationId: updateAccountCreation
      parameters:
      - name: id
        in: path
        description: id of the AccountCreation that need to be updated
        required: true
        type: string
      - name: AccountCreation
        in: body
        description: Request Body that contains data required for updating an existing AccountCreation
        required: true
        schema:
          $ref: '#/definitions/AccountCreationModel'
      responses:
        200:
          description: Returns updated AccountCreation
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - AccountCreation
      summary: Deletes the AccountCreation identified by given ID.
      description: Deletes the AccountCreation identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteAccountCreation
      parameters:
      - name: id
        in: path
        description: Id of the AccountCreation that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
