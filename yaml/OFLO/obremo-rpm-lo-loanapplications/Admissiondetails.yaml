swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-lo-loanapplications
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/admissiondetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - AdmissionDetails
      summary: Adds a new AdmissionDetails.
      description: Adds a new AdmissionDetails. Add additional information here for this endpoint.
      operationId: addAdmissionDetails
      parameters:
      - name: AdmissionDetails
        in: body
        description: Request Body that contains data required for creating a new AdmissionDetails
        required: true
        schema:
          $ref: '#/definitions/AdmissionDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created AdmissionDetails
          headers:
            Location:
              description: URL of newly created AdmissionDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - AdmissionDetails
      summary: Retrieves the list of existing AdmissionDetails.
      description: Retrieves the list of existing AdmissionDetails. Add additional information here for the this endpoint.
      operationId: getAllAdmissionDetails
      parameters:
      - name: processRefNo
        in: query
        description: processRefNo of the user that needs to be fetched
        required: true
        type: string
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/admissiondetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - AdmissionDetails
      summary: Retrieves the AdmissionDetails by id.
      description: Retrieves the AdmissionDetails by id. Add additional information here for the this endpoint.
      operationId: getAdmissionDetailsById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the AdmissionDetails based on given processRefNo.
          schema:
            $ref: '#/definitions/AdmissionDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - AdmissionDetails
      summary: Update an existing AdmissionDetails.
      description: Update an existing AdmissionDetails. Add additional information here for the this endpoint.
      operationId: updateAdmissionDetails
      parameters:
      - name: id
        in: path
        description: id of the AdmissionDetails that need to be updated
        required: true
        type: string
      - name: AdmissionDetails
        in: body
        description: Request Body that contains data required for updating an existing AdmissionDetails
        required: true
        schema:
          $ref: '#/definitions/AdmissionDetailsModel'
      responses:
        200:
          description: Returns updated AdmissionDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - AdmissionDetails
      summary: Deletes the AdmissionDetails identified by given ID.
      description: Deletes the AdmissionDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteAdmissionDetails
      parameters:
      - name: id
        in: path
        description: Id of the AdmissionDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
