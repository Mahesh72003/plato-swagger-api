swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Application Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-lo-loanapplications
tags:
- name: LoanApplication
  description: API for LoanApplication Operations
schemes:
- http
paths:
  /web/v1/interestdetails:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Adds a new InterestDetails.
      description: Adds a new InterestDetails. Add additional information here for this endpoint.
      operationId: addInterestDetails
      parameters:
      - name: InterestDetails
        in: body
        description: Request Body that contains data required for creating a new InterestDetails
        required: true
        schema:
          $ref: '#/definitions/InterestDetailsMasterModel'
      responses:
        201:
          description: Returns the Id of the newly created InterestDetails
          headers:
            Location:
              description: URL of newly created InterestDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Retrieves the list of existing InterestDetails.
      description: Retrieves the list of existing InterestDetails. Add additional information here for the this endpoint.
      operationId: getAllInterestDetails
      parameters:
      - name: processRefNo
        in: query
        description: processRefNo of the user that needs to be fetched
        required: true
        type: string
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/interestdetails/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Retrieves the InterestDetails by id.
      description: Retrieves the InterestDetails by id. Add additional information here for the this endpoint.
      operationId: getInterestDetailsById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the InterestDetails based on given processRefNo.
          schema:
            $ref: '#/definitions/InterestDetailsMasterModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Update an existing InterestDetails.
      description: Update an existing InterestDetails. Add additional information here for the this endpoint.
      operationId: updateInterestDetails
      parameters:
      - name: id
        in: path
        description: id of the InterestDetails that need to be updated
        required: true
        type: string
      - name: InterestDetails
        in: body
        description: Request Body that contains data required for updating an existing InterestDetails
        required: true
        schema:
          $ref: '#/definitions/InterestDetailsMasterModel'
      responses:
        200:
          description: Returns updated InterestDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
      - application/json
      - application/xml
      tags:
      - InterestDetails
      summary: Deletes the InterestDetails identified by given ID.
      description: Deletes the InterestDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteInterestDetails
      parameters:
      - name: id
        in: path
        description: Id of the InterestDetails that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Successful operation.
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
definitions:
  InterestDetailsMasterModel:
    description: InterestDetailsMaster model
    type: object
    allOf:
    - $ref: '#/definitions/GenericDatasegmentModel'
    - type: object
      properties:
        id:
          description: Id of the InterestDetails
          type: string
          maxLength: 36
        processRefNo:
          description: processRefNo
          type: string
        applicationNumber:
          description: applicationNumber
          type: string
        productName:
          description: Product Name
          type: string
        hostCode:
          description: Host Code
          type: string 
        customerId:
          description: Customer Id
          type: string
        interestTolerance:
          description: Interest Tolerance
          type: number
        remarks:
          description: remarks
          type: string
        interestDetailsModel: 
          type: array
          items: 
            $ref: '#/definitions/InterestDetailsModel'
      required:
        - processRefNo
        - applicationNumber
        - stageCode
  InterestDetailsModel:
    description: InterestDetails Model
    type: object
    properties:
      id:
        description: Id
        type: string
        maxLength : 36
      processRefNo:
        description: processRefNo
        type: string
      applicationNumber:
        description: ApplicationNumber
        type: string
      interestDetailsMasterId:
        description: InterestDetailsMasterId
        type: string 
      componentCode:
        description: componentCode
        type: string
      mainComponent:
        description: mainComponent
        type: boolean 
      udeId:
        description: udeId
        type: string 
      interestType: 
        description: Interest Rate Type
        type: string
      interestRate: 
        description: Interest Rate
        type: number
        format: double
      effectiveRate:
        description: Effective Rate
        type: number
        format: double
      customerMargin:
        description: Margin
        type: number
        format: double
      marginAllowed:
        description: margin Allowed
        type: boolean
      udeMin:
        description: Min Ude Value
        type: number
      udeMax:     
        description: Max Ude Value
        type: number
      seqNo:
        description: Seq No
        type: integer 
    required:
      - processRefNo
      - applicationNumber
      - interestType
      - interestRate
      - effectiveRate
      - mainComponent
      - marginAllowed
      - seqNo
  InterestDetailsMasterCollection:
    description: Collection of InterestDetailsMasterModel.
    type: object
    properties:
     interestDetailsMasterModelList:
      type: array
      items:
       $ref: '#/definitions/InterestDetailsMasterModel'
  GenericDatasegmentModel:
    allOf:
      - type: object
        discriminator: resource_type 
