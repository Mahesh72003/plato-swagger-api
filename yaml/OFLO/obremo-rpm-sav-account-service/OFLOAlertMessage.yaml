          namespace: oracle.fsgbu.oflo.acknowledgement
          fields:
            - name: txnRefNo
              type:
                - "null"
                - string
            - name: status
              type:
                - "null"
                - string
            - name: userId
              type:
                - "null"
                - string
            - name: branch
              type:
                - "null"
                - string
        schemaFormat: application/vnd.aai.asyncapi;version=2.0.0
        x-parser-message-parsed: true
x-parser-spec-parsed: true
