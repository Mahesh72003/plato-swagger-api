      summary: Update an existing odAccountLimitDetails.
      description: Update an existing odAccountLimitDetails. Add additional information here for the this endpoint.
      operationId: updateODAccountLimitDetails
      parameters:
        - name: id
          in: path
          description: id of the odAccountLimitDetails that need to be updated
          required: true
          type: string
        - name: odAccountLimitDetails
          in: body
          description: Request Body that contains data required for updating an existing odAccountLimitDetails
          required: true
          schema:
            $ref: '#/definitions/odAccountLimitDetailsMasterModel'
      responses:
        200:
          description: Returns updated odAccountLimitDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    delete:
      produces:
        - application/json
      tags:
