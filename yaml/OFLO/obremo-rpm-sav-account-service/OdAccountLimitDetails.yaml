        - odAccountLimitDetails
      summary: Get By ID
      description: Retrieves the odAccountLimitDetails by Id Add additional information here for the this endpoint.
      operationId: getODAccountLimitDetailsById
      parameters:
        - name: id
          in: path
          description: ID of the odAccountLimitDetails that needs to be fetched
          required: true
          type: string
      responses:
