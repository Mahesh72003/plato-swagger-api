      summary: Deletes the odAccountLimitDetails identified by given ID.
      description: Deletes the odAccountLimitDetails identified by given ID. Add additional information here for the this endpoint.
      operationId: deleteODAccountLimitDetails
      parameters:
        - name: id
          in: path
          description: Id of the odAccountLimitDetails that needs to be deleted
          required: true
          type: string
      responses:
        200:
          description: Successful operation.
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/underwritingstageskipping:
