      produces:
        - application/json
      tags:
        - odAccountLimitDetails
      summary: Get Details if Underwriting is required
      description: Retrieves the flag if Underwriting stage is required
      operationId: underWritingStageSkipping
      parameters:
        - name: processRefNo
          in: query
          description: Process Reference Number
          required: true
          type: string
      responses:
        200:
          description: Returns if Underwriting is required for given Process Reference Number
          schema:
            $ref: '#/definitions/StageSkippingDetalModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
