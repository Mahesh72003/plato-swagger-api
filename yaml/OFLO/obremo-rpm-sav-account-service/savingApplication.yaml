swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Saving Application Service
host: localhost:7001
basePath: /saving-application-services
tags:
- name: SavingApplication
  description: API for SavingApplication Operations
schemes:
- http
paths:
  /web/v1/saving-aplication/submit:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - SavingApplication
      summary: Submit for the Saving application domain.
      description: Populates Saving application aggregate.
      operationId: saveSavingApplication
      parameters:
      - name: savingApplicationAggregateModel
        in: body
        description: Request Body that contains data required for creating a new SavingApplicationAggregateModel
        required: true
        schema:
          $ref: '#/definitions/SavingApplicationAggregateModel'
      responses:
        201:
          description: Returns the Id of the newly created BankingInfo
          headers:
            Location:
              description: URL of newly created BankingInfo
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/saving-aplication/{applicationNumber}/{processRefNo}/stagesummary:
     get:
      produces:
      - application/json
      tags:
      - SavingApplication
      summary: Get the Work Table Details.
      description: Get the Work Table Details.
      operationId: getWorkDetails
      parameters:
      - name: applicationNumber
        in: path
        description: Application number for which saving account application data needs to be fetched
        required: true
        type: string
      - name: processRefNo
        in: path
        description: "processRefNo for which saving account application data needs to be fetched"
        required: true
        type: string      
      - name: datasegments
        in: query
        description: List of data segment codes
        required: false
        type: string
      responses:
        200:
          description: Returns SavingApplicationAggregateModel for the application number
          schema:
            $ref: "#/definitions/ResponseSummaryModel"
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error  
          
  /web/v1/saving-aplication/initialize:
    post:
      produces:
      - application/json
      - application/xml
      tags:
      - SavingApplication
      summary: initialize the Saving account application.
      description: initialize the Saving account application.
      operationId: InitaiteSavingApplication
      parameters:
      - name: SavingApplicationInitializeModel
        in: body
        description: Request Body that contains data required for initialize saving Application
        required: true
        schema:
          $ref: '#/definitions/SavingApplicationInitializeModel'
      responses:
        201:
          description: Returns the Id of the newly created Saving Application for the initiation stage
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error           
  /web/v1/saving-aplication/{applicationNumber}/{processRefNo}/datasegment-history/{datasegmentCode}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - SavingApplication
      summary: Get Saving application details
      description: Get Saving application details. Add additional information here for the this endpoint.
      operationId: getHistory
      parameters:
      - name: applicationNumber
        in: path
        description: Application number for which Loan application data needs to be fetched
        required: true
        type: string
      - name: processRefNo
        in: path
        description: "processRefNo for which saving account application data needs to be fetched"
        required: true
        type: string         
      - name: datasegmentCode
        in: path
        description: datasegmentCode of the datasegment that need to be retrieved
        required: true
        type: string
      responses:
        200:
          description: Returns Datasegment history for the application number
          schema:
            $ref: '#/definitions/ResponseCollectionModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/saving-aplication/save:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - SavingApplication
      summary: Submit for the casa application domain.
      description: Populates casa application aggregate and moves the latest data from all worktables to main tables.
      operationId: saveOnlyCasaApplication
      parameters:
      - name: savingApplicationAggregateModel
        in: body
        description: Request Body that contains data required for saving Casa application
        required: true
        schema:
          $ref: '#/definitions/SavingApplicationAggregateModel'
      responses:
        201:
          description: Returns the Id of the newly created BankingInfo
          headers:
            Location:
              description: URL of newly created BankingInfo
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/saving-aplication/{applicationNumber}/datasegment-details: 
    get: 
      produces:
      - application/json
      - application/xml
      tags:
      - SavingApplication
      summary: Get the Work Table Details.
      description: Get the Work Table Details.
      operationId: getApplicationDetails
      parameters:
      - name: applicationNumber
        in: path
        description: Application number for which Casa application data needs to be fetched
        required: true
        type: string
      - name: processRefNos
        in: query
        description: Process Reference number for which Casa application data needs to be fetched
        required: true
        type: array
        items:
         type: string
      responses:
        200:
          description: Returns CasaApplicationMasterModel for the application number
          schema: 
           $ref: '#/definitions/CasaApplicationMasterModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/saving-aplication/accountNumberInfo: 
    get: 
      produces:
      - application/json
      - application/xml
      tags:
      - SavingApplication
      summary: Get the info related to applicationNo and account type.
      description: Get the info related to applicationNo and account type.
      operationId: getAccountNumberInfo
      parameters:
      - name: applicationNumber
        in: query
        description: Application number for which Casa application data needs to be fetched
        required: true
        type: string
      - name: accountType
        in: query
        description: account type for which Casa application data needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Returns CasaApplicationMasterModel for the application number
          schema: 
           $ref: '#/definitions/ResponseCollectionModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error 
  /saving-application/orchestrate/backoffice:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - SavingApplication
      summary: Call Back Office.
      description: Hand-Off Process called from the workflow
      operationId: callBackOffice
      parameters:
      - name: BackOfficeRequest
        in: body
        description: Request Body that contains data required for Back Office
        required: true
        schema:
          $ref: '#/definitions/BackOfficeRequestModel'
      responses:
        201:
          description: Returns response object for BackOfficeRequest
          schema:
            $ref: '#/definitions/BackOfficeResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/aggregatedetails:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - SavingApplication
      summary: Get the aggregate response for saving application.
      description: Get the aggregate response for saving application.
      operationId: getAggregateResponse
      parameters:
        - name: applicationNumber
          in: query
          description: Application number for which Casa application data needs to be fetched
          required: true
          type: string
        - name: processRefNo
          in: query
          description: Process Reference number for which Casa application data needs to be fetched
          required: true
          type: string
      responses:
        200:
          description: Returns SavingApplicationAggregateModel for the application and process reference number
          schema:
            $ref: '#/definitions/SavingApplicationAggregateMasterModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /saving-aplication/customerresponse:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - SavingApplication
      summary: Retrieves the existing CustomerResponse.
      description: Retrieves the existing CustomerResponseDetails. Add additional information here for the this endpoint.
      operationId: getCustomerResponse
      parameters:
        - name: processRefNo
          in: query
          description: processRefNo of the user that needs to be fetched
          required: true
          type: string
        - name: applicationNumber
          in: query
          description: applicationNumber of the user that needs to be fetched
          required: true
          type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/CustomerResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/saving-aplication/{applicationNumber}/{processRefNo}/adviceData:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - SavingApplication
      summary: Get the Work Table Details.
      description: Get the Work Table Details.
      operationId: getAdviceDetails
      parameters:
        - name: applicationNumber
          in: path
          description: Application number for which Saving application data needs to be fetched
          required: true
          type: string
        - name: processRefNo
          in: path
          description: Process Reference number for which Saving application data needs to be fetched
          required: true
          type: string
      responses:
        200:
          description: Returns SavingApplicationAggregateModel for the application number
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error    
