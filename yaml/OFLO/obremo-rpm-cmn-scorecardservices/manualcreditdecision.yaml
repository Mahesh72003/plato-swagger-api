swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: ManualCreditDecision services
host: 10.184.157.121:9000
basePath: /obremo-rpm-cmn-manualcreditdecision
tags:
- name: Manual Credit Decision
  description: API for Manual Credit Decision
schemes:
- http
paths:
  /web/v1/manualcreditdecision:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - ManualCreditDecision
      summary: Adds a new ManualCreditDecision.
      description: Adds a new ManualCreditDecision. 
      operationId: addManualCreditDecisionDetails
      parameters:
      - name: ManualCreditDecisionDetails
        in: body
        description: Request Body that contains data required for creating a new ManualCreditDecisionDetails
        required: true
        schema:
          $ref: '#/definitions/ManualCrdDecisionDetailsMasterModel'
      responses:
        201:
          description: Returns the Id of the newly created ManualCreditDecisionDetails
          headers:
            Location:
              description: URL of newly created ManualCreditDecisionDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ManualCreditDecision
      summary: Retrieves the list of existing ManualCreditDecisionDetails.
      description: Retrieves the list of existing ManualCreditDecisionDetails. 
      operationId: getAllManualCreditDecisionDetails
      parameters:
      - name: processRefNo
        in: query
        description: processRefNo of the user that needs to be fetched
        required: true
        type: string
      - name: applicationNumber
        in: query
        description: applicationNumber of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Successful performs the operation
          schema:
            $ref: '#/definitions/ResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/manualcreditdecision/{id}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ManualCreditDecision
      summary: Retrieves the ManualCreditDecisionDetails by id.
      description: Retrieves the ManualCreditDecisionDetails by id. Add additional information here for the this endpoint.
      operationId: getManualCreditDecisionDetailsById
      parameters:
      - name: id
        in: path
        description: Id that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the ManualCreditDecisionDetails based on id.
          schema:
            $ref: '#/definitions/ManualCrdDecisionDetailsMasterModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    put:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - ManualCreditDecision
      summary: Update an existing ManualCreditDecisionDetails.
      description: Update an existing ManualCreditDecisionDetails. Add additional information here for the this endpoint.
      operationId: updateManualCreditDecisionDetails
      parameters:
      - name: id
        in: path
        description: id of the ManualCreditDecisionDetails that need to be updated
        required: true
        type: string
      - name: ManualCreditDecisionDetails
        in: body
        description: Request Body that contains data required for updating an existing ManualCreditDecisionDetails
        required: true
        schema:
          $ref: '#/definitions/ManualCrdDecisionDetailsMasterModel'
      responses:
        200:
          description: Returns updated ManualCreditDecisionDetails
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error

