swagger: "2.0"
info:
 description: "This is a sample server prodpreferences server." 
 version: "1.0.0"
 title: "prodpreferences Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "prodpreferences"
   description: "This Service is responsible to maintain Business product preferences for Liability and Asset business products, one can configure different aspects of Asset, Liability and term deposit business products. This maintenance service provides different endpoints to create, modify, delete and authorize the records."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../prodpreferences

 /prodpreferences:
  post:
   tags:
    - "prodpreferences"
   summary: "Adds a new prodpreferences."
   description: "Adds a new prodpreferences. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "prodpreferences" 
      in: "body" 
      description: "Request Body that contains data required for creating a new prodpreferences" 
      required: true
      schema:
       $ref: "#/definitions/RpmTmProdPrefMasterDTO"
    #- name: "bindingResult" 
    #  in: "body" 
    #  description: "Request Body that contains data required for creating a new prodpreferences" 
    #  required: false
    #  schema:
    #   $ref: "#/definitions/BindingResult"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created prodpreferences" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "prodpreferences"
   summary: "Get all valid prodpreferences."
   description:  "Get all valid prodpreferences. This endpoints will be used to Get all valid prodpreferences maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: businessProductCode
     required: false
     type: string
   - in: query
     name: checkerId
     required: false
     type: string
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: modNo
     required: false
     type: integer
   - in: query
     name: onceAuth
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/RpmTmProdPrefMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../prodpreferences/xxx
#   DELETE    .../prodpreferences/xxx
#   GET       .../prodpreferences/xxx
#   GET       .../prodpreferences/xxx?version=latestrecord
#   GET       .../prodpreferences/xxx?version=1

 /prodpreferences/{id}:
  put:
   tags:
    - "prodpreferences"
   summary: "Update an existing prodpreferences."
   description:  "Update an existing prodpreferences."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the prodpreferences Maintenance"
      required: true
      type: "string"
    - name: "prodpreferences"
      in: "body"
      description: "Request Body that contains data required for updating an existing prodpreferences"
      required: true
      schema:
       $ref: "#/definitions/RpmTmProdPrefMasterDTO"
    #- name: "bindingResult" 
    #  in: "body" 
    #  description: "Request Body that contains data required for modify an existing record prodpreferences" 
    #  required: false
    #  schema:
    #   $ref: "#/definitions/BindingResult"
   responses:
    200:
     description: "Returns updated prodpreferences"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "prodpreferences"
   summary: "Retrieves the prodpreferences by ID."
   description:  "Retrieves the prodpreferences by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the prodpreferences based on given id."
     schema:
      $ref: "#/definitions/RpmTmProdPrefMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 /prodpreferences/getbusinessProducts:
  get:
   consumes:
   - application/json
   - application/xml
   produces:
   - application/json
   - application/xml  
   tags:
    - "prodpreferences"
   summary: "Retrieves the prodpreferences by businessProductCode."
   description:  "Retrieves the prodpreferences by businessProductCode."
   operationId: "getByBusinessProductCodes"
   parameters:
    - name: "businessProductCodes"
      in: query
      description: "businessProductCodes of the record that needs to be fetched"
      required: true
      type: array
      items:
       type: string
   responses:
    200:
     description: "Returns the prodpreferences based on given businessProductCodes."
     schema:
      $ref: "#/definitions/RpmTmProdPrefMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"     
 /prodpreferences/{id}/delete:
  patch:
   tags:
    - "prodpreferences"
   summary: "Deletes the prodpreferences identified by given ID."
   description:  "Deletes the prodpreferences identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the prodpreferences maintenance"
      required: true
      type: "string"
    - name: "prodpreferences"
      in: "body"
      description: Request body contain prodpreferences and Modification no of prodpreferences maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../prodpreferences/xxx/approve

 /prodpreferences/{id}/approve:
  patch:
   tags:
    - "prodpreferences"
   summary: "Authorize the prodpreferences by given ID."
   description:  "Authorize the prodpreferences identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the prodpreferences maintenance"
      required: true
      type: "string"
    - name: "prodpreferences"
      in: "body"
      description: Request body contain prodpreferences and Modification no of prodpreferences maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../prodpreferences/xxx/close
 /prodpreferences/{id}/close:
  patch:
   tags:
    - "prodpreferences"
   summary: "Close the prodpreferences by given ID."
   description:  "Close the prodpreferences identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the prodpreferences maintenance"
      required: true
      type: "string"
    - name: "prodpreferences"
      in: "body"
      description: Request body contain prodpreferences and Modification no of prodpreferences maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../prodpreferences/xxx/reopen

 /prodpreferences/{id}/reopen:
  patch:
   tags:
    - "prodpreferences"
   summary: "reopen the prodpreferences by given ID."
   description:  "reopen the prodpreferences identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the prodpreferences maintenance"
      required: true
      type: "string"
    - name: "prodpreferences"
      in: "body"
      description: Request body contain prodpreferences and Modification no of prodpreferences maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supprorted http methods GET
#
# path examples----
#   GET       .../prodpreferences/xxx/unauthorized

 /prodpreferences/{id}/unauthorized:
  get:
   tags:
    - "prodpreferences"
   summary: "Retrives the prodpreferences by given ID."
   description:  "Retrives the prodpreferences identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the prodpreferences based on given id."
     schema:
       $ref: "#/definitions/RpmTmProdPrefMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to  history record for remitterid
