swagger: "2.0"
info:
 description: "This is a sample server obremo-ds-rpm-businessproducts-details server." 
 version: "1.0.0"
 title: "businessproducts"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "businessproducts"
   description: "Service API for Business Product"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../obremo-ds-rpm-businessproducts-details

 /service/businessproducts:
  get:
   tags:
    - "businessproduct"
   summary: "Get all valid businessproducts for a given product type"
   description:  "Get all valid businessproducts for a given product type. This endpoints will be used to Get all valid businessproduct maintenance records for a given product type."
   operationId: "getByProductType"
   parameters:
   - name: "productType"
     in: query
     description: "product type of the Business Products"
     required: false
     type: string
   - name: "productSubType"
     in: query
     description: "product sub type of the Business Products"
     required: false
     type: string
   - name: "channel"
     in: query
     description: "Channel"
     required: false
     type: string
   - name: "businessProductCode"
     in: query
     description: "Business Product Code"
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/BusProdAggregateServiceModelCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

