definitions:
 RpmTmBusinessProductDetailsDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     txnControllerRefNo:
      type: string
      description: "Transaction Reference ID that is generated for every operation performed"
     channel:
      type: array
      items:
       type: object
     businessProductCode:
      type: string
      description: ""
      maxLength: 6
     businessProductDesc:
      type: string
      description: ""
     businessProductName:
      type: string
      description: ""
     expiryDate:
      type: string
      #format: date
      description: ""
     productSubType:
      type: string
      description: ""
     productType:
      type: string
      description: ""
     reviewDate:
      type: string
      #format: date
      description: ""
     startDate:
      type: string
      #format: date
      description: ""
     fintech:
      type: array
      items:
       type: object 
     fintechAllowed:
      type: string
      description: ""
      pattern: '[Y,N]' 
     ipaAllowed:
      type: string
      description: Ipa Allowed or Not 
     mandateApplication:
      type: string
      description: ""
      pattern: '[Y,N]' 
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
  
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 
 RpmTmBusinessProductDetailsCollection: 
  description: "Collection of businessproductdetails."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/RpmTmBusinessProductDetailsDTO"
   paging:
    $ref: "#/definitions/PagingDto"     
 RpmTmBusinessProductDetailsWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/RpmTmBusinessProductDetailsDTO"    
