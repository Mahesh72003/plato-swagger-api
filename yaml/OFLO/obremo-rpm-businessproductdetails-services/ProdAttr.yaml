definitions:
 RpmTmProdAttrMasterDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     businessProductCode:
      type: string
      description: ""
     txnControllerRefNo:
      type: string
      description: "Transaction Reference ID that is generated for every operation performed"  
     productSubType:
      type: string
      description: ""
     productType:
      type: string
      description: ""     
     businessProductImage:
      type: string
      description: ""
     businessProductSummary:
      type: string
      description: ""
      maxLength: 200
     comments:
      type: string
      description: ""
     productBrochure:
      type: string
      description: ""
     termsandcondition:
      type: string
      description: ""
     RpmTmProdAttrFeatureDTO:
      type: array
      items:
       $ref: '#/definitions/RpmTmProdAttrFeatureDTO'
     RpmTmProdAttrElgbDTO:
      type: array
      items:
       $ref: '#/definitions/RpmTmProdAttrElgbDTO'
     RpmTmProdAttrFeeChargesDTO:
      type: array
      items:
       $ref: '#/definitions/RpmTmProdAttrFeeChargesDTO'  
    required:
     - businessProductCode
 RpmTmProdAttrFeatureDTO:
  type: object
  properties:
     businessProductCode:
      type: string
      description: ""
     dispOnCat:
      type: string
      description: ""
     featureDesc:
      type: string
      description: ""
     featureName:
      type: string
      description: ""
     id:
      type: string
      description: ""
     prodAttrMasterId:
      type: string
      description: ""
     serialNo:
      description: Sequence number for Attribute Feature
      type: integer  
  #required:
   #- businessProductCode
 RpmTmProdAttrElgbDTO:
  type: object
  properties:
     businessProductCode:
      type: string
      description: ""
     dispOnCat:
      type: string
      description: ""
     eligDesc:
      type: string
      description: ""
     eligName:
      type: string
      description: ""
     id:
      type: string
      description: ""
     prodAttrMasterId:
      type: string
      description: ""
     serialNo:
      description: Sequence number for Attribute Eligibility
      type: integer  
  #required:
   #- businessProductCode
 RpmTmProdAttrFeeChargesDTO:
  type: object
  properties:
     businessProductCode:
      type: string
      description: ""
      maxLength: 6
     dispOnCat:
      type: string
      description: ""
     feeChargesDesc:
      type: string
      description: ""
      maxLength: 400
     feeChargesName:
      type: string
      description: ""
      maxLength: 100
     id:
      type: string
      description: ""
     prodAttrMasterId:
      type: string
      description: ""
     serialNo:
      description: Sequence number for Fee and Charges
      type: integer 
  #required:
   #- businessProductCode



 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 RpmTmProdAttrMasterCollection: 
  description: "Collection of prodattr."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/RpmTmProdAttrMasterDTO"
   paging:
    $ref: "#/definitions/PagingDto"     
 RpmTmProdAttrMasterWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/RpmTmProdAttrMasterDTO"
     
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 OrchestratorDTO:    
  type: object