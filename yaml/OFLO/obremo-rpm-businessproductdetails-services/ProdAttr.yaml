# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../productattributes/xxx/reopen

 /productattributes/{id}/reopen:
  patch:
   tags:
    - "productattributes"
   summary: "reopen the productattributes by given ID."
   description:  "reopen the productattributes identified by given ID."
   operationId: "reopenRecord"
   parameters:
