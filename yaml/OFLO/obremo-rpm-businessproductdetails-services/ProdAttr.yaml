swagger: "2.0"
info:
 description: "This is a sample server productattributes server." 
 version: "1.0.0"
 title: "productattributes Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "productattributes"
   description: "As a BANK USER,Administrator,Supervisor,Marketing Head,Product Manager I want a Product Attribute Data Segment So that, product related attributes can be updated for Business Product Maintenance which will further use to provide detail description of the business product."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../productattributes

 /productattributes:
  post:
   tags:
    - "productattributes"
   summary: "Adds a new productattributes."
   description: "Adds a new productattributes. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "productattributes" 
      in: "body" 
      description: "Request Body that contains data required for creating a new productattributes" 
      required: true
      schema:
       $ref: "#/definitions/RpmTmProdAttrMasterDTO"
    #- name: "bindingResult" 
    #  in: "body" 
    #  description: "Request Body that contains data required for creating a new productattributes" 
    #  required: false
    #  schema:
    #   $ref: "#/definitions/BindingResult"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created productattributes" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "productattributes"
   summary: "Get all valid productattributes."
   description:  "Get all valid productattributes. This endpoints will be used to Get all valid productattributes maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: businessProductCode
     required: false
     type: string
   - in: query
     name: checkerId
     required: false
     type: string
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: modNo
     required: false
     type: integer
   - in: query
     name: onceAuth
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/RpmTmProdAttrMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../productattributes/xxx
#   DELETE    .../productattributes/xxx
#   GET       .../productattributes/xxx
#   GET       .../productattributes/xxx?version=latestrecord
#   GET       .../productattributes/xxx?version=1

 /productattributes/{id}:
  put:
   tags:
    - "productattributes"
   summary: "Update an existing productattributes."
   description:  "Update an existing productattributes."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the productattributes Maintenance"
      required: true
      type: "string"
    - name: "productattributes"
      in: "body"
      description: "Request Body that contains data required for updating an existing productattributes"
      required: true
      schema:
       $ref: "#/definitions/RpmTmProdAttrMasterDTO"
    #- name: "bindingResult" 
    #  in: "body" 
    #  description: "Request Body that contains data required for modify an existing record productattributes" 
    #  required: false
    #  schema:
    #   $ref: "#/definitions/BindingResult"
   responses:
    200:
     description: "Returns updated productattributes"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "productattributes"
   summary: "Retrieves the productattributes by ID."
   description:  "Retrieves the productattributes by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the productattributes based on given id."
     schema:
      $ref: "#/definitions/RpmTmProdAttrMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
     
 /productattributes/getbyBusinessproduct:
  get:
   consumes:
   - application/json
   - application/xml
   produces:
   - application/json
   - application/xml  
   tags:
    - "productattributes"
   summary: "Retrieves the productattributes Details by businessProductCode."
   description:  "Retrieves the productattributes Details by businessProductCode."
   operationId: "getByBusinessProductCode"
   parameters:
    - name: "businessProductCode"
      in: query
      description: "businessProductCode of the record that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the productattributes based on given businessProductCodes."
     schema:
      $ref: "#/definitions/RpmTmProdAttrMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"        
     
 /productattributes/{id}/delete:      
  patch:
   tags:
    - "productattributes"
   summary: "Deletes the productattributes identified by given ID."
   description:  "Deletes the productattributes identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the productattributes maintenance"
      required: true
      type: "string"
    - name: "productattributes"
      in: "body"
      description: Request body contain productattributes and Modification no of productattributes maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

