swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Liability Product Services
host: localhost:7001
basePath: /liability-product-services
tags:
- name: Liability Product Services
  description: API for Liability Product Services Operations
schemes:
- http
paths:
   /web/v1/liabilityproducts/{productcode}:
    get:
      produces:
      - application/json
      tags:
      - liabilityproducts
      summary: get the productDetails from Host.
      description: getliabilityProductDetails.
      operationId: getLiabilityProduct
      parameters:
      - description: "productCode"
        in: path
        name: productcode
        required: true
        type: string
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string
        
      
      responses:
        200:
          description: Returns the product Details based on given productCode.
          schema:
            $ref: '#/definitions/LiabilityProductDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
   /web/v1/liabilityproducts/interest/{productcode}/{currencycode}:
    get:
      produces:
      - application/json
      tags:
      - liabilityproducts
      summary: get the productDetails from Host.
      description: getLiabilityProductInterest.
      operationId: getLiabilityProductInterest
      parameters:
      - description: "productCode"
        in: path
        name: productcode
        required: true
        type: string
      - description: "currencyCode"
        in: path
        name: currencycode
        required: true
        type: string
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string
      
      responses:
        200:
          description: Returns the interest  Details based on given productCode.
          schema:
            $ref: '#/definitions/LiabilityProductInterestDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error

   /web/v1/liabilityproducts:
    get:
      produces:
      - application/json
      tags:
      - liabilityproducts
      summary: get the list of Loan product from Host.
      description: getLiabilityProductList.
      operationId: getLiabilityProductList
      parameters:
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string
      - description: productType
        in: query
        name: productType
        required: false
        type: string  
       
      responses:
        200:
          description: Returns the list of Liabilities product from host.
          schema:
            $ref: '#/definitions/LiabilityProductLovCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
          
   /web/v1/liability/customerLiability:
    post:
      produces:
      - application/json
      - application/xml
      tags:
      - liabilityproducts
      summary: Create Liability 
      description: Create Liability 
      operationId: createLiability
      parameters:
      - name: liabilityDetails
        in: body
        description: Request Body that contains data required for creating new liability
        required: true
        schema:
          $ref: '#/definitions/LiabilityDetailsModel'
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string      
      responses:
        201:
          description: Returns the Id of the newly created Liability
          headers:
            Location:
              description: URL of newly created Liability
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error  
          
   /web/v1/liability/customerLiability/{liabilityId}:
    post:
      produces:
      - application/json
      - application/xml
      tags:
      - liabilityproducts
      summary: Link Liability with Customer
      description: Link Liability with Customer
      operationId: linkCustomerWithLiability
      parameters:
      - description: "Liability Id"
        in: path
        name: liabilityId
        required: true
        type: string
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string      
      responses:
        201:
          description: Returns the Id of the Linked Liability
          headers:
            Location:
              description: URL of newly Linked Liability
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error  

   /web/v1/liability/customerLiability/{customerId}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - liabilityproducts
      summary: Get Customer Liability Details
      description: Get Customer liability Details
      operationId: getCustomerLiability
      parameters:
      - description: "Customer Id"
        in: path
        name: customerId
        required: true
        type: string
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string      
      responses:
        200:
          description: Returns the liability details 
          schema:
            $ref: '#/definitions/LiabilityDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
definitions:
 LiabProductLovModel:
   description: "Liabilities Product LOV Model"
