     type: string
    atmfacilty:
     description: atm facility
     type: string
    chqbkfacility:
     description: cheque book facility
     type: string
    overdraftfacility:
     description: over draft facility
     type: string
    passbookfacility:
     description: passbook facility
     type: string
    accstatementtype:
     description: account statement type 
     type: string
     
 LiabilityProductLovCollection:  
   description: "Collection of Liability Products LOV Model"
   type: object
   properties:
    liabProductLovList:
     description: list of liab products lov 
     type: array
     items:
      $ref: '#/definitions/LiabProductLovModel'
   

