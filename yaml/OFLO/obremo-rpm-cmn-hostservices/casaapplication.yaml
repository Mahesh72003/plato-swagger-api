 AccServicesPrefMasterModel:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDatasegmentModel'
  - type: object
    properties:
     action:
      type: string
      description: action
     channel:
      type: string
      description: Channel 
     processRefNo:
      description: "Process reference number of Account Services Prefrences"
      type: string
      maxLength: 20
     applicationDate:
      type: string
      description: "Application initition date of Account Service Prefrences"
     passbook:
      type: string
      description: "Passbook facility applicable or not (Y/N)"          
      pattern: '[Y,N]'
     passBookAllowed:
      type: boolean
      description: "Passbook facility Allowed?"
     chequeBook:
      type: string
      description: "Cheque book facility applicable or not (Y/N)"
      pattern: '[Y,N]'
     chequeBookAllowed:
      type: boolean
      description: "Cheque book facility Allowed?" 
     accStatement:
      type: string
      description: "Account statement facility applicable or not (Y/N)"
      pattern: '[Y,N]'
     accStatementAllowed:
      type: boolean
      description: "Account Statement facility Allowed?" 
     subscriptionModeEmail:
      type: string
      description: "Account Statement Mode Email (Y/N)?"
      pattern: '[Y,N]'
     subscriptionModePost:
      type: string
      pattern: '[Y,N]'
      description: "Account Statement Mode Post (Y/N)?"
     subscriptionFrequency:
      type: string
      description: "Account Statement Subscription Frequency"    
     accServicesPrefDetailsModel:
      type: array
      items:
       $ref: '#/definitions/AccServicesPrefDetailsModel'   
 AccServicesPrefDetailsModel:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDatasegmentModel'
  - type: object
    properties:
     processRefNo:
      description: "Process reference number of Account Services Prefrences"
      type: string
      maxLength: 20
     applicationDate:
      type: string
      description: "Application initition date of Account Service Prefrences" 
     subscriptionMode:
      type: string
      description: "Subscription mode of Account statement" 
     subscriptionFrequency:
      type: string
      description: "Subscription Frequency of Account statement"
     facilities:
      $ref: '#/definitions/Facilities'
     bankingChnlSubscription:
      $ref: '#/definitions/BankingChnlSubscription'
     communicationChnlSubscription:
      $ref: '#/definitions/CommunicationChnlSubscription'            
    
 Facilities:
   description: "Facility details of account"
   type: object
   properties:
    card:
     type: string
     description: "Card facility applicable or not (Y/N)"
     pattern: '[Y,N]'
    chequeBook:
     type: string
     description: "Cheque book facility applicable or not (Y/N)"
     pattern: '[Y,N]'
    dnd:
     type: string
     description: "Do not disturb facility applicable or not (Y/N)"
     pattern: '[Y,N]'
    passBook:
     type: string
     description: "Passbook facility applicable or not (Y/N)"          
     pattern: '[Y,N]'         
 BankingChnlSubscription:
   description: "Banking channel subscription details of account"
   type: object
   properties:
     internet:
      type: string
      description: "Internet banking channel subscription applicable or not (Y/N)"     
      pattern: '[Y,N]'     
     mobile:
      type: string
      description: "Mobile Banking Channel Subscription applicable or not (Y/N)"
      pattern: '[Y,N]'
     kiosk:
      type: string
      description: "KIOSK banking channel subscription applicable or not (Y/N)"
      pattern: '[Y,N]'
     telephone:
      type: string
      description: "Telephone banking channel subscription applicable or not (Y/N)"
      pattern: '[Y,N]'
 CommunicationChnlSubscription:
   description: "Communication Channel Details of account"
   type: object
   properties:
     email:
      type: string
      description: "E-Mail communication channel subscription applicable or not (Y/N)"
      pattern: '[Y,N]'
     post:
      type: string
      description: "Post communication channel subscription applicable or not (Y/N)"                        
      pattern: '[Y,N]'                       
     sms:
      type: string
      description: "SMS communication channel subscription applicable or not (Y/N)"
      pattern: '[Y,N]'
      
 AccountDetailsModel:
   description: AccountDetails model
   type: object
   allOf:
   - $ref: '#/definitions/GenericDatasegmentModel'
   - type: object
     properties:
      processRefNo:
        description: Process Reference Number
        type: string
        maxLength: 20       
      accountType:
        description: Type of the account , will be defualted from application initiation. 
        type: string
        maxLength: 35
      accountBranch:
        description: Branch of the account.
        type: string
        maxLength: 4
      productCode:
        description: Code of the product, which will be defaulted from the initiation.
        type: string
        maxLength: 30  
      productName:
        description: Name of the product, which will be defaulted from the initiation. 
        type: string
        maxLength: 100
      accountCurrency:
        description: Currency of the account. 
        type: string
        maxLength: 3
      applicationDate:
        description: Date of the application, Default to Current Date. 
        type: string
      accountName:
        description: Name of the account.
        type: string
        maxLength: 100
      holdingPattern:
        description: Holding Pattern
        type: string
        maxLength: 30
      otherHoldingPattern:
        description: Holding pattern when existing values are not sufficient
        type: string
        maxLength: 30
      ownership:
        description: Ownership
        type: string
        maxLength: 30        
      existingCustomer:
        description: Is Existing Customer
        type: boolean
      modeOfOperation:
        description: Mode of operation, Single (default value)/Jointly/Either or Survivor/Former or Survivor/As per mandan
        type: string
        maxLength: 35    
      fundTheAccount:
        description: Initial funding mode to the while account creation.
        type: string
        maxLength: 1
      fundBy:
        description: Funded by.
        type: string
        maxLength: 35
      amount:
        description: Amount to be funded.
        type: number
      accountNumber:
        description: Account Number
        type: string
        maxLength: 105
      overdraft:
        description: Is over draft?
        type: string
        pattern: '[Y,N]'
      chequeNumber:
        description: Cheque Number.
        type: string
        maxLength: 50
      chequeDate:
        description: Cheque date.
        type: string      
      chequeBankName:
        description: Bank name on the cheque.
        type: string
      chequeBranchName:
        description: Branch name on the cheque.
        type: string
      chequeRoutingNumber:
        description: Routing Number on the cheque
        type: string
        pattern: '^\d{0,9}$'
      channel:
        description: Channel of application initiation (Default RPM)
        type: string
      bankName:
        type: string
        description: Bank Name
      bankCode:
        type: string
        description: Bank Code  
      sourceSystemAccBrn:
        type: string
        description: Source System Account Branch                   
      sourceEmpCode:
        description: Source by employee Code
        type: string
      sourceEmpName:
        description: Source by employee name
        type: string           
     required:
      - stageCode
      - processRefNo
      - applicationNumber   
      - accountName

