swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: CaSA Application Service
host: localhost:7001
basePath: /casa-application-services
tags:
- name: CaSaAggregate
  description: API for CaSaApplication Operations
schemes:
- http
paths:
   /web/v1/saving-aplication/createaccount:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - CasaAggregate
      summary: Send the Saving application to host.
      description: Submit Saving application aggregate.
      operationId: createSavingAccount
      parameters:
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string
        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string
      - name: casaAggregateModel
        in: body
        description: Request Body that contains data required for creating a new SavingApplicationAggregateModel
        required: true
        schema:
          $ref: '#/definitions/CasaAggregateModel'
      responses:
        201:
          description: Returns the Id of the newly created BankingInfo
          headers:
            Location:
              description: URL of newly created BankingInfo
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error              
definitions:
 CasaAggregateModel:
    description: CasaAggregateModel
    type: object
    properties:
     applicationNo:
       description: "Application reference number"
       type: string
       maxLength: 20 
     processRefNo:
       description: "Process reference number"
       type: string
       maxLength: 20
     userId:
       description: userId
       type: string
     accountClass:
       description: "accountClass"
       type: string
       maxLength: 20 
     custNo:
       description: "custNo"
       type: string
       maxLength: 20
     fundByMode:
       description: "fundByMode"
       type: string
     mandateDetailsMasterModel:
       $ref: '#/definitions/MandateDetailsMasterModel'
     accServicesPrefDetailsModel:
       $ref: '#/definitions/AccServicesPrefDetailsModel'
     accServicesPrefMasterModel:
       $ref: '#/definitions/AccServicesPrefMasterModel'
     accountDetailsModel:
       $ref: '#/definitions/AccountDetailsModel'
     chargeDetailsMasterModel:
       $ref: '#/definitions/ChargeDetailsMasterModel'
     interestDetailsMasterModel:
       $ref: '#/definitions/InterestDetailsMasterModel'
     nomineeDetailsMasterModel:
       $ref: '#/definitions/NomineeDetailsMasterModel' 
     casaPayInDetails:       
       $ref: '#/definitions/CasaPayInDetails'  
     applicantDetailsMasterModel :
       $ref: '#/definitions/ApplicantDetailsMasterModel'     
     odAdvanceDetailsMasterModel:
       $ref: "#/definitions/OdAdvanceDetailsMasterModel"
     odUnsecuredDetailsMasterModel:
       $ref: "#/definitions/OdUnsecuredDetailsMasterModel"
     odUnsecuredTempDetailsMasterModel:
       $ref: "#/definitions/OdUnsecuredTempDetailsMasterModel"
     odSecuredDetailsMasterModel:
       $ref: "#/definitions/OdSecuredDetailsMasterModel"
     odAccountLimitDetailsMasterModel:
       $ref: "#/definitions/OdAccountLimitDetailsMasterModel"
     customObject:
       type: object
     additionalAttributes:
       type: array
       items:
         type: object
     documentsModel:
       type: "array"
       items:
         $ref: '#/definitions/DocumentsModel'

 DocumentsModel:
   type: "object"
   properties:
     id:
       type: string
     documentId:
       type: string
     documentRefId:
       type: string
     documentName:
       type: string
     documentTypeId:
       type: string
     documentCatId:
       type: string
     documentDescription:
