swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Collateral Enquiry Services
host: localhost:7001
basePath: /collateral-enquiry-services
tags:
- name: CollateralEnquiryServices
  description: API for Collateral Enquiry Operations
schemes:
- http
paths:
  /web/v1/collateralsummary/{customerId}:
    get:
      produces:
      - application/json
      tags:
      - CollateralEnquiry
      summary: get list of collateral for a customer
      description: getCollateralSummary
      operationId: getCollateralSummary
      parameters:
      - description: "Customer Id"
        in: path
        name: customerId
        required: true
        type: string
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string        
      - description: "Source Code"
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string      
      responses:
        200:
          description: Returns the list of collateral for a given customer code.
          schema:
            $ref: '#/definitions/ResponseCollectionModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/collateral/onboarding:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - CollateralEnquiry
      summary: onboard Collatteral .
      description: onboard Collatteral.
      operationId: onBoardCollateral
      parameters:
        - description: "User Id"
          in: header
          name: userId
          required: true
          type: string
        - description: "Branch Code"
          in: header
          name: branchCode
          required: true
          type: string
        - description: Source
          in: header
          name: sourceCode
          required: false
          type: string
          default: "OBREMO"
        - description: appId
          in: header
          name: appId
          required: true
          type: string
        - name: CollateralDetailsModel
          in: body
          description: Request Body that contains data required for creating a new CollateralAggregateModel
          required: true
          schema:
            $ref: '#/definitions/CollateralDetailsModel'
      responses:
        201:
          description: Returns the Id of the newly created collateral
          headers:
            Location:
              description: URL of newly created collateral
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/collateralCatagory:
    get:
      produces:
        - application/json
      tags:
        - CollateralEnquiry
      summary: get collateral Catagory
      description: get collateral Catagory
      operationId: getCollateralCatagory
      parameters:
        - description: "User Id"
          in: header
          name: userId
          required: true
          type: string
        - description: "Branch Code"
          in: header
          name: branchCode
          required: true
          type: string
        - description: appId
          in: header
          name: appId
          required: true
          type: string
      responses:
        200:
          description: Returns the list of collateral Catagory.
          schema:
            $ref: '#/definitions/KeyValueCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/collateralSubCatagory/{catagory}:
    get:
      produces:
        - application/json
      tags:
        - CollateralEnquiry
      summary: get Collateral Sub Catagory
      description: get Collateral Sub Catagory
      operationId: getCollateralSubCatagory
      parameters:
        - description: "catagory"
          in: path
          name: catagory
          required: true
          type: string
        - description: "User Id"
          in: header
          name: userId
          required: true
          type: string
        - description: "Branch Code"
          in: header
          name: branchCode
          required: true
          type: string
        - description: appId
          in: header
          name: appId
          required: true
          type: string
      responses:
        200:
          description: Returns the list of subcatatogory  for a given Collataral  Catagory.
          schema:
            $ref: '#/definitions/KeyValueCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /web/v1/collateralLov/{type}:
    get:
      produces:
        - application/json
      tags:
        - CollateralEnquiry
      summary: get lov values
      description: get lov values
      operationId: getCollateralLov
      parameters:
        - description: "Type"
          in: path
          name: type
          required: true
          type: string
        - description: "User Id"
          in: header
          name: userId
          required: true
          type: string
        - description: "Branch Code"
          in: header
          name: branchCode
          required: true
          type: string
        - description: appId
          in: header
          name: appId
          required: true
          type: string
      responses:
        200:
          description: Returns the list of values for a type.
          schema:
            $ref: '#/definitions/KeyValueCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error 
  /web/v1/collateraldetails:
    get:
      produces:
      - application/json
      tags:
      - CollateralEnquiry
      summary: get details of a collateral
      description: getCollateralDetails
      operationId: getCollateralDetails
      parameters:
      - description: "Collateral Type"
        in: query
        name: collateralType
        required: true
        type: string
      - description: "Collateral Category"
        in: query
        name: collateralCtg
        type: string
      - description: "Collateral Code"
        in: query
        name: collateralCode
        required: true
        type: string
      - description: "Liability Id"
        in: query
        name: liabilityId
        required: true
        type: string
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string	
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string        
      - description: "Source Code"
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string      
      responses:
        200:
          description: Returns the collateral details based on given collateral code.
          schema: 
           $ref: '#/definitions/CollateralDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
                    
