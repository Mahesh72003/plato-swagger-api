swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Loan Product Services
host: localhost:7001
basePath: /loan-product-services
tags:
- name: LoanProductServices
  description: API for loan product Operations
schemes:
- http
paths:
  /web/v1/loanproducts/{productcode}:
    get:
      produces:
      - application/json
      tags:
      - LoanProduct
      summary: get the productDetails from Host.
      description: getLoanProductDetails.
      operationId: getLoanProduct
      parameters:
      - description: "productCode"
        in: path
        name: productcode
        required: true
        type: string
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string
        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string
      
      responses:
        200:
          description: Returns the product Details based on given productCode.
          schema:
            $ref: '#/definitions/ProductDetailsModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error

  /web/v1/loanproducts:
    get:
      produces:
      - application/json
      tags:
      - LoanProduct
      summary: get the list of Loan product from Host.
      description: getLoanProductsList.
      operationId: getLoanProductList
      parameters:
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string
      - description: productType
        in: query
        name: productType
        required: false
        type: string  
      
      responses:
        200:
          description: Returns the list of loan product from host.
          schema:
            $ref: '#/definitions/LoanProductLovCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
          
          
  /web/v1/loanproducts/create:
    post:
      produces:
      - application/json
      tags:
      - LoanProduct
      summary: create loan form  from Host.
      description: get created loan.
      operationId: loanCreate
      parameters:
      - name: loanDetails
        in: body
        description: Request Body that contains data required for creating a new LoanDetails
        required: true
        schema:
          $ref: '#/definitions/loanRequestModel'
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string
        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string
      
      responses:
        201:
          description: Returns the Id of the newly created BankingInfo
          headers:
            Location:
              description: URL of newly created BankingInfo
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
                    
  /web/v1/loanproducts/simulate:
    post:
      produces:
      - application/json
      tags:
      - LoanProduct
      summary: simulate loan form  from Host.
      description: get simulated loan details.
      operationId: loanSimulate
      parameters:
      - name: loanDetails
        in: body
        description: Request Body that contains data required for creating a new LoanDetails
        required: true
        schema:
          $ref: '#/definitions/loanRequestModel'
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string
        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "OBREMO"
      - description: appId
        in: header
        name: appId
        required: true
        type: string
      
      responses:
        200:
          description: Returns the product Details based on given productCode.
          schema:
            $ref: '#/definitions/LoanResponseModel'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error          
