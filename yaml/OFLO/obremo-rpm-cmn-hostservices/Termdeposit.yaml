swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Termdeposit  Service
host: localhost:7001
basePath: /termdeposit-services
tags:
- name: TermDeposite
  description: API for TermDeposite Operations
schemes:
- http
paths:
   /web/v1/termdeposit-aplication/createaccount:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - termDeposit
      summary: Send the term deposit application to host.
      description: Submit term deposit aggregate.
      operationId: createTermDepositAccount
      parameters:
      - description: "User Id"
        in: header
        name: userId
        required: true
        type: string
      - description: "Branch Code"
        in: header
        name: branchCode
        required: true
        type: string
        
      - description: Source
        in: header
        name: sourceCode
        required: false
        type: string
        default: "RPM"
      - description: appId
        in: header
        name: appId
        required: true
        type: string
      - name: termDepositRequest
        in: body
        description: Request Body that contains data required for creating a new termDepositAggregateModel
        required: true
        schema:
          $ref: '#/definitions/termDepositRequest'
      responses:
        201:
          description: Returns the Id of the newly created BankingInfo
          headers:
            Location:
              description: URL of newly created BankingInfo
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
   /web/v1/termdeposit/simulate:
     post:
       produces:
         - application/json
       tags:
         - termDeposit
       summary: simulate TD form  from Host.
       description: get simulated TD details.
       operationId: termDepositSimulate
       parameters:
         - name: termDepositRequest
           in: body
           description: Request Body that contains data required for creating a new TDDetails
           required: true
           schema:
             $ref: '#/definitions/termDepositRequest'
         - description: "User Id"
           in: header
           name: userId
           required: true
           type: string
         - description: "Branch Code"
           in: header
           name: branchCode
           required: true
           type: string
         - description: Source
           in: header
           name: sourceCode
           required: false
           type: string
           default: "RPM"
         - description: appId
           in: header
           name: appId
           required: true
           type: string

       responses:
         200:
           description: Returns the product Details based on given productCode.
           schema:
             $ref: '#/definitions/TDResponseModel'
         400:
           description: Malformed syntax.
         401:
           description: Request does not have sufficient credentials.
         403:
           description: Request is not authorized.
         500:
           description: Internal error
