swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Process Driver Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-process-driver-services
tags:
- name: ProcessDriverService
  description: Service API for Orchestration of RPM Operations
schemes:
- http
paths:
  /service/initiate:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - ProcessDriverService
      summary: Initiate process, generates application number, updates Task controller & starts a workflow.
      description: Initiate process, generates application number, updates Task controller & starts a workflow.
      operationId: initiate
      parameters:
      - name: initiateModel
        in: body
        description: Request Body that contains data required for creating a new BasicApplicationDetails
        required: true
        schema:
          $ref: '#/definitions/BasicApplicationDetailsModel'
      responses:
        201:
          description: Returns the Application number of the newly created BasicApplicationDetails
          headers:
            Location:
              description: URL of newly created BasicApplicationDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /service/submit:
    post:
      produces:
      - application/json
      - application/xml
      tags:
      - ProcessDriverService
      summary: Save or Submit application from External System
      description: Save or Submit application from External System
      operationId: submitExtSystem
      parameters:
        - name: "data"
          in: "body"
          description: "Request Body that contains data required for creating a new Process Definition"
          required: true
          schema:
            $ref: "#/definitions/SubmitExtSystem"
      responses:
        201:
         description: "Returns the Id of the newly created  Process Definition"
         headers:
          Location:
           description: "URL of newly created  Process Definition"
           type: "string"
         schema:
           $ref: "#/definitions/ResponseDtoWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /service/getData/{applicationNo}:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ProcessDriverService
      summary: Get data for External System
      description: Get data for External System
      operationId: getDataExtSystem
      parameters:
        - name: "applicationNo"
          in: "path"
          description: "Application Number"
          required: true
          type: string
      responses:
        200:
          description: Returns Applicationtransaction flows data for the given query parameters
          schema:
            $ref: '#/definitions/SubmitExtSystem'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /service/getDocumentList:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ProcessDriverService
      summary: Get Document List data for a Business Product
      description: Get Document List data for a Business Product
      operationId: getDocumentList
      parameters:
        - name: "applicationNo"
          in: "query"
          description: "Application Number"
          required: false
          type: string
        - name: "businessProductCode"
          in: "query"
          description: "Business Product Code"
          required: false
          type: string
        - name: "productType"
          in: "query"
          description: "Product Type"
          required: false
          type: string
      responses:
        200:
          description: Returns list of documents required for a Business Product or Application Number
          schema:
            $ref: '#/definitions/DocumentCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /service/loanOfferDecision:
    post:
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      tags:
      - ProcessDriverService
      summary: Loan offer decision from customer
      description: Loan offer decision from customer
      operationId: loanOfferDecision
      parameters:
      - name: loanOfferDecisionModel
        in: body
        description: Request Body that contains data required for loan offer decision
        required: true
        schema:
          $ref: '#/definitions/CustDecisionModel'
      responses:
        201:
          description: Returns the Application number of the newly created BasicApplicationDetails
          headers:
            Location:
              description: URL of newly created BasicApplicationDetails
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /service/loanOfferDetails:
    get:
      produces:
      - application/json
      - application/xml
      tags:
      - ProcessDriverService
      summary: Get Loan Offer Details
      description: Get Loan Offer Details
      operationId: getLoanOfferDetails
      parameters:
        - name: "applicationNo"
          in: "query"
          description: "Application Number"
          required: true
          type: string
        - name: "processRefNo"
          in: "query"
          description: "Process Reference Number"
          required: true
          type: string
      responses:
        200:
          description: Returns list of documents required for a Business Product or Application Number
          schema:
            type: 'object'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
definitions:
  ResponseDtoWrapper:
    type: object
    properties:
      messages:
        $ref: '#/definitions/ResponseDto'
      data:
        $ref: '#/definitions/ResponseResourceSupport'
  ResponseDto:
    type: object
    properties:
      keyId:
        description: Key ID
        type: string
      status:
        description: Status
        type: string
      codes:
        description: Code
        type: array
        items:
          $ref: '#/definitions/ResponseCode'
      requestId:
        description: request id
        type: string
      httpStatusCode:
        description: httpStatusCode
        type: string
  ResponseCode:
    type: object
    properties:
      Code:
        description: Code
        type: string
      Desc:
        description: Desc
        type: string
      Type:
        description: Type
        type: string
      Language:
        description: Language
        type: string
      arg:
        description: arg
        type: string
  ResponseResourceSupport:
    allOf:
      - type: object
        discriminator: resouce_type
  SubmitExtSystem:
    description: Application Submit from External System
    type: object
    allOf:
    - $ref: '#/definitions/ResponseResourceSupport'
    properties:
      channel:
        description: External System where application is originating
        type: string
      action:
        description: Save or Submit Flag
        type: string
      applicationNumber:
        description: Application Number
        type: string
      remarks:
        description: Remarks during termination
        type: string
      products:
        description: Product list
        type: array
        items:
          $ref: object
      domainData:
        $ref: '#/definitions/DomainData'
  DomainData:
    description: Domain specific data
    type: object
    properties:
      CmnApplicant:
        description: Common Applicant domain
        type: object
      LoanAccOpenProcess:
        description: Loan Account Domain
        type: array
        items:
          $ref: object
      SavingAccOpenProcess:
        description: Savings Account Domain
        type: array
        items:
          $ref: object
      CurrentAccOpenProcess:
        description: Current Account domain
        type: array
        items:
          $ref: object
      TDAccOpenProcess:
        description: Term Deposit Account domain
        type: array
        items:
          $ref: object
      CollateralOrigProcess:
        description: Collateral domain
        type: array
        items:
          $ref: object
      IpaProcess:
        description: In-Principle Approval domain
        type: array
        items: 
          $ref: object
      CCAccOpenProcess:
        description: Credit Card Account domain
        type: array
        items:
          $ref: object
  ChannelResponse:
    description: Response to channel
    type: object
    properties:
      status:
        description: status
        type: string
      errorCodes:
        description: Error codes
        type: array
        items:
          $ref: object
      data:
        $ref: '#/definitions/SubmitExtSystem'
  DocumentCollection:
    description: "Collection of Documents."
    type: "object"
    properties:
     data:
      type: "array"
      items: 
       $ref: "#/definitions/DocumentModel"
  BasicApplicationDetailsModel:
    description: "BasicApplicationDetails model"
    type: "object"
    properties:
      channel:
        description: Channel
        type: string
      appPriority:
        description: Application Priority
        type: string
      products:
        description: Application Priority
        type: array
        items:
          $ref: '#/definitions/ProductDetailsModel'
  ProductDetailsModel:
    description: "Product Details model"
    type: "object"
    properties:
      processRefNumber:
        description: Process Reference Number
        type: string
      businessProductCode:
        description: Business Product Code
        type: string
      lifeCycleCode:
        description: Lifecycle Code
        type: string
      productType:
        description: Product Type
        type: string
      subProductType:
        description: Product Sub-type
        type: string
      taskId:
        description: Task ID
        type: string
      workflowId:
        description: Workflow ID
        type: string
      documentList:
        description: Document List
        type: array
        items:
          $ref: '#/definitions/DocumentModel'
  DocumentModel:
    description: "Document model"
    type: "object"
    properties:
      mandatory:
        description: Mandatory
        type: string
      documentTypeDesc:
        description: Document Type Description
        type: string
      documentTypeName:
        description: Document Type Name
        type: string
      originalRequired:
        description: Original Required
        type: string
      versioning:
        description: Versioning
        type: string
      uploadType:
        description: Upload Type
        type: string
      eventId:
        description: Event id
        type: string
      status:
        description: Status
        type: string