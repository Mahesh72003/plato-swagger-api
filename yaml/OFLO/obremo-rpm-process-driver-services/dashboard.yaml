swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: RPM Dashboard Services
host: 10.184.157.121:9000
basePath: /dashboard-services
tags:
  - name: Dashboard
    description: API for Widgets in the application Dashboard
schemes:
  - http
paths:
  /web/v1/dashboards/myapplications:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - DashBoards
      summary: get the applications details
      description: get the applications details
      operationId: getMyApplicationsSummary
      parameters:
        - name: rmId
          in: query
          description: Relationship manager's user login ID
          required: true
          type: string
        - name: frequency
          in: query
          description: Frequency Filter
          required: true
          type: string
        - name: unit
          in: query
          description: Unit Filter
          required: true
          type: string
        - name: team
          in: query
          description: My Team applications
          type: boolean
          default: false
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: '#/definitions/String'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/dashboards/newmyapplications:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - DashBoards
      summary: get the applications details
      description: get the applications details
      operationId: getNewMyApplicationsSummary
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: '#/definitions/MyApplicationsData'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error        
  /web/v1/dashboards/accountopentrend:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - DashBoards
      summary: gets the accont open trend details
      description: get the applications details
      operationId: getAccountOpenTrend
      parameters:
        - name: rmId
          in: query
          description: Relationship manager's user login ID
          required: true
          type: string
        - name: domain
          in: query
          description: domain name
          required: false
          type: string
        - name: filterCriteria
          in: query
          description: filter criteria
          required: false
          type: string
      responses:
        201:
          description: Returns the count of application open month wise for a given domain
          schema:
            $ref: '#/definitions/String'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/dashboards/save:
    post:
      produces:
        - application/json
        - application/xml
      tags:
        - DashBoards
      summary: save the dashboard data
      description: save the dashboard data
      operationId: saveDashboard
      parameters:
        - name: dashboardModel
          in: body
          description: Request Body that contains data required for creating Dashboard data
          required: true
          schema:
            $ref: '#/definitions/DashboardModel'
      responses:
        201:
          description: Returns success message
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/dashboards/loanOfferStatus:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - DashBoards
      summary: get the loan offer status
      description: get the loan offer status
      operationId: getLoanOfferStatus
      parameters:
        - name: branchCode
          in: query
          description: Branch Code
          required: true
          type: string
        - name: frequency
          in: query
          description: Frequency Filter
          required: true
          type: string
        - name: unit
          in: query
          description: Unit Filter
          required: false
          type: string        
        - name: subDomain
          in: query
          description: Sub Domain
          required: true
          type: string
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: '#/definitions/String'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/dashboards/conversionAnalysis:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - DashBoards
      summary: get the conversion Analysis Report
      description: get the conversion Analysis Report
      operationId: getConversionAnalysisReport
      parameters:
        - name: rmId
          in: query
          description: Relationship manager's user login ID
          required: true
          type: string
        - name: frequency
          in: query
          description: Frequency Filter
          required: true
          type: string
        - name: unit
          in: query
          description: Unit Filter
          required: false
          type: string
        - name: team
          in: query
          description: My Team applications
          required: true
          type: boolean
          default: false
        - name: domain
          in: query
          description: Domain
          required: true
          type: string          
        - name: subDomain
          in: query
          description: Sub Domain
          required: true
          type: string          
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: '#/definitions/String'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/dashboards/loanExposureToCollateral:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - DashBoards
      summary: get loan collateral details
      description: get loan collateral details
      operationId: getLoanExposureToCollateral
      parameters:
        - name: branchCode
          in: query
          description: Branch Code
          required: true
          type: string 
        - name: frequency
          in: query
          description: Frequency Filter
          required: true
          type: string   
        - name: unit
          in: query
          description: Unit Filter
          required: false
          type: string
        - name: subDomain
          in: query
          description: Sub Domain
          required: true
          type: string       
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: '#/definitions/String'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/dashboards/applications:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - DashBoards
      summary: gets the details of all applications
      description: gets the details of all applications
      operationId: getAllApplications
      parameters:
        - name: rmId
          in: query
          description: Relationship manager's user login ID
          required: true
          type: string
        - name: frequency
          in: query
          description: Frequency Filter
          required: true
          type: string
        - name: unit
          in: query
          description: Unit Filter
          required: true
          type: string
        - name: team
          in: query
          description: My Team applications
          type: boolean
          default: false
        - name: domain
          in: query
          description: Domain
          type: string
        - name: subDomain
          in: query
          description: Subdomain
          type: string
        - name: offset
          in: query
          description: offset is starting no of records to be fetched
          required: false
          type: integer
        - name: limit
          in: query
          description: limit is maximum no of records to be fetched
          required: false
          type: integer  
        - name: currency
          in: query
          description: Currency Filter
          required: false
          type: string      
      responses:
        201:
          description: Returns drill down of all applications
          schema:
            $ref: "#/definitions/ApplicationsList"
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /web/v1/dashboards/inProgressLoansStatus:
    get:
      produces:
        - application/json
        - application/xml
      tags:
        - DashBoards
      summary: get loans in progress status
      description: get loans in progress status
      operationId: getInProgressLoansStatus
      parameters:
        - name: branchCode
          in: query
          description: Branch Code
          required: true
          type: string 
        - name: frequency
          in: query
          description: Frequency Filter
          required: true
          type: string   
        - name: unit
          in: query
          description: Unit Filter
          required: false
          type: string 
        - name: subDomain
          in: query
          description: Sub Domain
          required: true
          type: string      
      responses:
        201:
          description: Returns the domain with the count of applications initiated by the RM
          schema:
            $ref: '#/definitions/String'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
definitions:
  DashboardModel:
    description: ApplicationTransactionMasterModel
    type: object
    required:
      - applicationNumber
      - processRefNo
    properties:
      applicationNumber:
        description: Application Number
        type: string
        maxLength: 36
      processRefNo:
        description: Process Reference Number
        type: string
        maxLength: 36
      currentStageCode:
        description: Current Stage Code
        type: string
        maxLength: 20
      currentStageName:
        description: Current Stage Name
        type: string
        maxLength: 40
      domain:
        description: Domain
        type: string
        maxLength: 40
      businessProductCode:
        description: Business Product Code
        type: string
      businessProductName:
        description: Business Product Name
        type: string
        maxLength: 60
      initiatedBy:
        description: Initiated By
        type: string
        maxLength: 60
      status:
        description: Status
        type: string
        maxLength: 20
      primaryCustName:
        description: Customer Name
        type: string
        maxLength: 36
      amount:
        description: Amount
        type: string
      currency:
        description: Currency
        type: string
        maxLength: 6
      tenure:
        description: Tenure
        type: string
      initiatedDtStamp:
        description: Initiated Date Stamp
        type: string
      lastUpdatedDate:
        description: Last Updated Date
        type: string
      accountOpenDate:
        description: Account Open Date
        type: string
      branchCode:
        description: Branch code
        type: string
      primaryCustEmail:
        description: primary Cust Email
        type: string
      primaryCustMobileNo:
        description: primary Customer Mobile No
        type: string
      channel:
        description: channel
        type: string
      primaryCustDOB:
        description: primary customer name
        type: string
      primaryCustCIF:
        description: primary Customer CIF
        type: string
      secCustName:
        description: secondary Customer Name
        type: string
      secCustEmail:
        description: secondary Customer Email
        type: string
      secCustMobileNo:
        description: secondary Customer Mobile No
        type: string
      secCustDOB:
        description: secondary Customer DOB
        type: string
      secCustCIF:
        description: secondary Customer CIF
        type: string
      totalCollateralValue:
        description: toatal Collateral value
        type: string
      collateralCurrency:
        description: toatal Collateral value
        type: string
      subDomain:
        description: sub domain value
        type: string
      priority:
        description: priority
        type: string
      stageList:
        description: Stage List
        type: array
        items:
          $ref: object
      accountNumber:
        description: Generated Account Number
        type: string
      businessProductCode:
        description: business product code
        type: string
      currentStageCode:
        description: current stage code
        type: string
      allowedChannel:
        description: allowed channel
        type: string
      appPriority:
        description: Application Priority
        type: string
      phaseList:
        description: Phase List
        type: array
        items:
          $ref: object
      mobileISD:
        description: mobile ISD
        type: string
      sourcedById:
        description: Sourced By ID
        type: string
      processExpPeriodInDays:
        description: Process Expiry Period in Days
        type: number
      offerExpPeriodInDays:
        description: Offer Expiry Period in Days
        type: number
  ApplicationsList:
    description: List of all apllications
    type: object
    properties:
      data:
        type: "array"
        items:
          $ref: "#/definitions/DashboardModel"
      paging:
        $ref: "#/definitions/PagingDto"
  MyApplicationsData:
    description: DomainModel
    type: object
    properties:
      totalApplicationCount:
        type: number
      domainModels:
        type: "array"
        items:
          $ref: "#/definitions/DomainModel"
      chartModel:
        $ref: "#/definitions/ChartModel" 
      priorityModel:
        $ref: "#/definitions/PriorityModel"      
  DomainModel:
    description: DomainModel
    type: object
    properties:
      domain:
        description: Domain
        type: string
        maxLength: 36
      applicationCount:
        description: Application count for domain
        type: number
  ChartModel:
    description: ChartModel
    type: object
    properties:
      belowFive:
        description: 0-4 days
        type: number
      fiveToTen:
        description: 5-10 days
        type: number
      elevenToTwenty:
        description: 11-20 days
        type: number
      aboveTwentyone:
        description: 21+ days
        type: number  
  PriorityModel:   
    description: priorityModel
    type: object
    properties:
      low:
        description: Low Priority
        type: number
      medium:
        description: medium priority
        type: number 
      high:
        description: high priority
        type: number                      
  PagingDto:
    type: object
    properties:
      totalResults:
        type: integer
  ProductModel:
    description: ProductModel
    type: object    
    properties:
      customerInfo:
        description: Customer Info
        type: object
      businessProductName:
        description: Product Name
        type: string
        maxLength: 36
      amount:
        description: Amount
        type: string
        maxLength: 36
      tenure:
        description: tenure
        type: string
        maxLength: 20
      totalTimeSpent:
        description: total time spent
        type: number        
      timeSpent:
        description: time spent
        type: number       
      userId:
        description: User Id
        type: string
        maxLength: 20
      phaseStartDate:
        description: phase start date
        type: string
        maxLength: 20
      currency:
        description: currency
        type: string
        maxLength: 20
      businessProductCode:
        description: Business Product Code
        type: string
        maxLength: 20
      subProductType:
        description: sub product type
        type: string
        maxLength: 20
      stageList:
        description: stage list
        type: object
      processRefNo:
        description: process Ref No.
        type: object 
      lifeCycleCode:
        description: life cycle code
        type: string
        maxLength: 20 
      sourceByUserId:
        description: source by userId
        type: string      
  SearchModel:
    description: SearchModel
    type: object    
    properties:
      applicationNo:
        description: application Number
        type: string
        maxLength: 36
      primaryCustName:
        description: Customer Name        
        type: string
        maxLength: 36
      applicationDate:
        description: Application Date      
        type: string
        maxLength: 36
      primaryCustMobileNo:
        description: Customer Mobile No        
        type: string
        maxLength: 36        
      primaryCustEmail:
        description: Customer EmailId
        type: string
        maxLength: 36
      cifNO:
        description: Customer No.
        type: string
        maxLength: 36       
      appProcess:
        description: Application Process
        type: object                      
  ApplicationsDetailsList:
    description: Details of all applications
    type: object
    properties:
      data:
        type: "array"
        items:
          $ref: "#/definitions/ProductModel"
      paging:
        $ref: "#/definitions/PagingDto"
  PagingDto:
    type: object
    properties:
      totalResults:
        type: integer
  ApplicationsSearchList:
    description: Details of all applications
    type: object
    properties:
      data:
        type: "array"
        items:
          $ref: "#/definitions/SearchModel"
      paging:
        $ref: "#/definitions/PagingDto"
  PagingDto:
    type: object
    properties:
      totalResults:
        type: integer 
  StageDetails:
    description: StageDetails
    type: object    
    properties:
      stageDetail:
        description: Stage Details
        type: object       
      totalTimeSpent:
        description: total time spent       
        type: number        
      currentPhase:
        description: current phase      
        type: string
        maxLength: 36
      phaseStartDate:
        description: phase start date        
        type: string
        maxLength: 36        
      timeSpent:
        description: Customer EmailId
        type: number       
      userIdAssigned:
        description: user Assigned
        type: string
        maxLength: 36   
    