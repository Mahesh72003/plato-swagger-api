        maxLength: 10
      currentStage:
        description: Current Stage
        type: string
        maxLength: 20  
      lastCompletedStage:
        description: Last Completed Stage
        type: string
        maxLength: 20  
      initiatedDtStamp:
        description: Initiated Date Stamp
        type: string
      lifeCycleCode:
        description: Life Cycle Code
        type: string
        maxLength: 20 
      status:
        description: Status of the Application
        type: string
      domain:
        description: Domain
        type: string
      productType:
        description: Product Type
        type: string
      subProductType:
        description: Sub Product Type
        type: string
      businessProductCode:
        description: businessProductCode
        type: string
      businessProductName:
        description: businessProcessName
        type: string
      allowedChannel:
        description: allowed channels
        type: string
  AppTransactionMasterModelCollection:
    description: AppTransactionMasterModelCollection
