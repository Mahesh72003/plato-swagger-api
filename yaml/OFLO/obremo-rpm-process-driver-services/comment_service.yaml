swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Comment Service
host: 10.184.157.121:9000
basePath: /obremo-rpm-process-driver-services
tags:
- name: Comment
  description: API for comment service
schemes:
- http
paths:
  /web/v1/comment:
    get:      
      produces:
      - application/json
      - application/xml
      tags:
      - Comment
      summary: get comments
      description: get comments for the products
      operationId: getComments
      parameters:
      - name: applicationNo
        in: query
        description: Application Number
        required: true
        type: string
      - name: processRefNo
        in: query
        description: Process Reference Number
        required: true
        type: string      
      responses:
        201:
          description: Returns the count of Products added to cart
          schema:
            $ref: '#/definitions/String'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  