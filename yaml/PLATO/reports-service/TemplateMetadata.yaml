swagger: "2.0"
info:
 description: "This is a sample server templates server." 
 version: "1.0.0"
 title: "templates Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "templates"
   description: "This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description.This is description."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../templates

 /templates:
  post:
   tags:
    - "templates"
   summary: "Adds a new templates."
   description: "Adds a new templates. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "templates" 
      in: "body" 
      description: "Request Body that contains data required for creating a new templates" 
      required: true
      schema:
       $ref: "#/definitions/ObmaTmTemplateMetadataDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created templates" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "templates"
   summary: "Get all valid templates."
   description:  "Get all valid templates. This endpoints will be used to Get all valid templates maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: name
     in: query
     description: Template Name
     required: false
     type: string
   - name: description
     in: query
     description: Template Description
     required: false
     type: string
   - name: authStatus
     in: query
     description: Auth status of the record
     required: false
     type: string
   - name: recordStatus
     in: query
     description: Indicates whether record is marked open or close
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/ObmaTmTemplateMetadataCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../templates/xxx
#   DELETE    .../templates/xxx
#   GET       .../templates/xxx
#   GET       .../templates/xxx?version=latestrecord
#   GET       .../templates/xxx?version=1

 /templates/{id}:
  put:
   tags:
    - "templates"
   summary: "Update an existing templates."
   description:  "Update an existing templates."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the templates Maintenance"
      required: true
      type: "string"
    - name: "templates"
      in: "body"
      description: "Request Body that contains data required for updating an existing templates"
      required: true
      schema:
       $ref: "#/definitions/ObmaTmTemplateMetadataDTO"
   responses:
    200:
     description: "Returns updated templates"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "templates"
   summary: "Retrieves the templates by ID."
   description:  "Retrieves the templates by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the templates based on given id."
     schema:
      $ref: "#/definitions/ObmaTmTemplateMetadataWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "templates"
   summary: "Deletes the templates identified by given ID."
   description:  "Deletes the templates identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the templates maintenance"
      required: true
      type: "string"
    - name: "templates"
      in: "body"
      description: Request body contain templates and Modification no of templates maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../templates/xxx/approve

 /templates/{id}/approve:
  patch:
   tags:
    - "templates"
   summary: "Authorize the templates by given ID."
   description:  "Authorize the templates identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the templates maintenance"
      required: true
      type: "string"
    - name: "templates"
      in: "body"
      description: Request body contain templates and Modification no of templates maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../templates/xxx/close
 /templates/{id}/close:
  patch:
   tags:
    - "templates"
   summary: "Close the templates by given ID."
   description:  "Close the templates identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the templates maintenance"
      required: true
      type: "string"
    - name: "templates"
      in: "body"
      description: Request body contain templates and Modification no of templates maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../templates/xxx/reopen

 /templates/{id}/reopen:
  patch:
   tags:
    - "templates"
   summary: "reopen the templates by given ID."
   description:  "reopen the templates identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the templates maintenance"
      required: true
      type: "string"
    - name: "templates"
      in: "body"
      description: Request body contain templates and Modification no of templates maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supprorted http methods GET
#
# path examples----
#   GET       .../templates/xxx/unauthorized

 /templates/{id}/unauthorized:
  get:
   tags:
    - "templates"
   summary: "Retrives the templates by given ID."
   description:  "Retrives the templates identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the templates based on given id."
     schema:
       $ref: "#/definitions/ObmaTmTemplateMetadataCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to  history record for remitterid
#
#  supprorted http methods GETS
#
# path examples----
#   GET       .../templates/xxx/history

 /templates/{id}/history:
  get:
   tags:
    - "templates"
   summary: "Retrives the templates by given ID."
   description:  "Retrives the templates by ID."
   operationId: "getHistory"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the templates based on given id."
     schema:
       $ref: "#/definitions/ObmaTmTemplateMetadataCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
definitions:
 ObmaTmTemplateMetadataDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     description:
      type: string
      description: ""
      maxLength: 120
     name:
      type: string
      description: ""
      maxLength: 120
     documentStoreUri:
      type: string
      description: ""
      maxLength: 120
     templateFileName:
      type: string
      description: ""
      maxLength: 120
     templateData:
      type: string
      format: byte 
      description: ""
     transformerType:
      $ref: '#/definitions/TransformerType'
     ObmaTmTemplateImageDTO:
      type: array
      items:
       $ref: '#/definitions/ObmaTmTemplateImageDTO'
    required:
     - name
     - transformerType
 ObmaTmTemplateImageDTO:
  type: object
  properties:
     documentStoreUri:
      type: string
      description: ""
      maxLength: 36
     id:
      type: string
      description: ""
      maxLength: 36
     name:
      type: string
      description: ""
      maxLength: 120
     relativeFilePath:
      type: string
      description: ""
      maxLength: 36
     templateMetadataId:
      type: string
      description: ""
      maxLength: 36
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 ObmaTmTemplateMetadataCollection: 
  description: "Collection of templatemetadata."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/ObmaTmTemplateMetadataDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 ObmaTmTemplateMetadataWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/ObmaTmTemplateMetadataDTO"
