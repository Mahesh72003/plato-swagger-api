  TbFeedUiDto:
    description: ""
    type: "object"
    properties:
     id:
      type: "string"
      description: ""
     platoTmFeedId:
      type: "string"
      description: ""
     feedStatusIn:
      type: "string"
      description: ""
     inputFileName:
      type: "string"
      description: ""
     makerId:
      type: "string"
      description: ""
  PlatoTbFeedDetail:
    description: ""
    type: "object"
    properties:
     id:
      type: "string"
      description: ""
     platoTmFeedHandlerId:
      type: "string"
      description: ""
     tbFeedRecordData:
      type: "string"
      description: ""
     recordStatus:
      type: "string"
      description: ""
     statusDescription:
      type: "string"
      description: ""
     inputFileName:
      type: "string"
      description: ""