swagger: "2.0"
info:
  description: "This service provides the centralized PLATO Batch Server features."
  version: "1.0.0"
  title: "PLATO Batch Server"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "PLATO Batch Server"
    description: "This is the PLATO Batch Server."
schemes:
- "http"

paths:
  /jobExplorer/jobStatus/:
    get:
      tags:
        - "PLATO Batch Server"
      summary: "Retrieves the Job Status."
      description: "Retrieves the Job Status."
      operationId: "jobNames"
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/JobCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
definitions:
  JobModel:
    description: "Job model"
    type: "object"
    properties:
      jobName:
        description: "Name of Job"
        type: "string"
      jobStatus:
        description: "Status of Job"
        type: "string"
      instanceId:
        description: "InstanceId"
        type: "integer"
        format: "int64"
      startTime:
        description: "Start time"
        type: "string"
      endTime:
        description: "End time"
        type: "string"
  JobCollection:
    description: "Collection of customers."
    type: "object"
    properties:
      jobs:
        type: "array"
        items:
          $ref: "#/definitions/JobModel"