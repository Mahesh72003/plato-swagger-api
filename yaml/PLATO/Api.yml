          description: "" 
          required: true
          type: "string"
        - name: "appId" 
          in: "header" 
          description: "" 
          required: true
          type: "string"
      responses:
        200:
          description: "Returns token and other parameters of the given username"
          schema:
            type: "object"
            properties:
              token:
                type: "string"
              token_type:
                type: "string"
              expires_in:
                type: "string"
              scope:
                type: "string"
              entity_id:
                type: "string"
              super_user:
                type: "string"
              super_user_locale:
                type: "string"
        400:
          description: "Malformed syntax."
        401:
          description: "Bad Credentials/Bad Token"
        403:
