swagger: "2.0"
info:
  description: ""
  version: "1.0.0"
  title: "Plato API Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
  - "application/json"
produces:
  - "application/json"
tags:
  - name: "PlatoAPI"
    description: ""
    
schemes:
- "https"

paths:
  /platojwtauth:
    post:
      tags:
        - "PlatoAPI"
      summary: "Creates Plato Jwt Token"
      description: "Creates Plato Jwt Token"
      operationId: "createAuthenticationToken"
      parameters:
        - name: "authenticationRequest"
          in: "body"
          description: "Request Body that contains data required for creating Jwt Token"
          required: false
          schema:
            $ref: "#/definitions/JwtAuthenticationRequest"
        - name: "tenantId" 
          in: "header" 
          description: "" 
          required: false
          type: "string"
        - name: "sourceCode" 
          in: "header" 
          description: "" 
          required: false
          type: "string"
        - name: "appId" 
          in: "header" 
          description: "" 
          required: true
          type: "string"
      responses:
        200:
          description: "Returns token and other parameters"
          schema:
            type: "object"
            properties:
              token:
                type: "string"
              token_type:
                type: "string"
              expires_in:
                type: "string"
              scope:
                type: "string"
              entity_id:
                type: "string"
              super_user:
                type: "string"
              super_user_locale:
                type: "string"
        400:
          description: "Malformed syntax."
        401:
          description: "Bad Credentials/Bad Token"
        403:
          description: "Request is not authorized."
        405:
          description: "Method Not Allowed"
        500:
          description: "Internal server error"
  /oauthtokenrefresh:
    post:
      tags:
