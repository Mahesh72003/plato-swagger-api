  /createOauthUsers:
    post:
      tags:
        - "PlatoAPI"
      summary: ""
      description: ""
      operationId: "createOauthUser"
      parameters:
        - name: "x" 
          in: "body" 
          description: "" 
          required: true
          schema:
            type: "object"
            description: ""
            properties:
              UserList:
                type: "object"
                properties:
