definitions:
  JwtAuthenticationRequest:
    type: "object"
    description: "username and password of the user"
    properties:
      username:
        type: "string"
      password:
        type: "string"
  JwtAuthenticationResponse:
    type: "object"
    description: "JwtAuthenticationResponse"
    properties:
      token:
        type: "string"
      userAlreadyLoggedIn:
        type: "string"
      expires_in:
        type: "integer"
        description: "Signed 64-bit integers (long type)"
      home_entity_id:
        type: "string"
      multi_entity_admin:
        type: "string"
      multi_entity_admin_locale:
        type: "string"
  JwtSimpleResponse:
    type: "object"
    description: "JwtSimpleResponse"
    properties:
      message:
        type: "string"
  ChangePasswordAuthenticationRequest:
    type: "object"
    description: ""
    properties:
      currentPassword:
        type: "string"
      newPassword:
        type: "string"