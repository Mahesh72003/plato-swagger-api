      summary: ""
      description: ""
      operationId: "modifyValidity"
      parameters:
        - name: "modifyRequest"
          in: "body"
          description: ""
          required: true
          schema:
            properties:
              client_id:
                type: "string"
              validity:
                type: "string"
        - name: "sourceCode" 
          in: "header" 
          description: "" 
          required: false
          type: "string"
        - name: "appId" 
          in: "header" 
          description: "" 
          required: true
          type: "string"
      responses:
        200:
          description: "Returns Success/Failure response"
          schema:
            $ref: '#/definitions/JwtSimpleResponse'
        400:
          description: "Malformed syntax."
        401:
          description: "Bad Credentials/Bad Token"
        403:
          description: "Request is not authorized."
        405:
          description: "Method Not Allowed"
        500:
