swagger: "2.0"
info:
 description: "This is a sample server screenclassmaintenance server." 
 version: "1.0.0"
 title: "ScreenClass Maintenance Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "screenclassmaintenance"
   description: "this is a new maintenance service for data segment mapping which contains the details related to the screens to be loaded for each stage corresponding to the each stage. screen class which maintains the cca's for each of the stage id. stage mapped for the particular domain, process and stage class."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../screenclassmaintenance

 /screenclassmaintenance:
  post:
   tags:
    - "screenclassmaintenance"
   summary: "Adds a new screenclassmaintenance."
   description: "Adds a new screenclassmaintenance. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "screenclassmaintenance" 
      in: "body" 
      description: "Request Body that contains data required for creating a new screenclassmaintenance" 
      required: true
      schema:
       $ref: "#/definitions/CmcTmScreenClassDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created screenclassmaintenance" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "screenclassmaintenance"
   summary: "Get all valid screenclassmaintenance."
   description:  "Get all valid screenclassmaintenance. This endpoints will be used to Get all valid screenclassmaintenance maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmScreenClassCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /screenclassmaintenance/screenClassCode/{screenClassCode}:
  get:
   tags:
    - "screenclassmaintenance"
   summary: "Get all valid screenclassmaintenance by screenClassCode."
   description:  "Get all valid screenclassmaintenance. This endpoints will be used to Get all valid screenclassmaintenance maintenance records by screenClassCode."
   operationId: "getDsListByClassCode"
   parameters:
    - name: "screenClassCode"
      in: "path"
      description: "screenClassCode of the screenclassmaintenance that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the screenclassmaintenance that needs to be fetched"
      required: false
      type: "string"
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmScreenClassWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /screenclassmaintenance/domain/{domain}:
  get:
   tags:
    - "screenclassmaintenance"
   summary: "Get all valid screenclassmaintenance by domain."
   description:  "Get all valid screenclassmaintenance. This endpoints will be used to Get all valid screenclassmaintenance maintenance records by domain."
   operationId: "getDSListByScreenClassDomain"
   parameters:
    - name: "domain"
      in: "path"
      description: "domain of the screenclassmaintenance that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the screenclassmaintenance that needs to be fetched"
      required: false
      type: "string"
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmScreenClassCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
