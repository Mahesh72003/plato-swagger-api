definitions:
 CmcTmScreenClassDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     bundleTags:
      type: string
      description: "Bundle Tags"
     domain:
      type: string
      description: "Domain"
     screenClassCode:
      type: string
      description: "Screen Class Code"
     screenClassDesc:
      type: string
      description: "Screen Class Description"
     trainOrientation:
      type: string
      description: "Train Orientation"
     rsoFlag:
      type: boolean
      description: "Rso Flag"
     resourceFlag:
      type: boolean
      description: "Resource Flag"
     resourceClassCode:
      type: string
      description: "Resource Class Code"
     CmcTmScreenDsMappingDTO:
      type: array
      items:
       $ref: '#/definitions/CmcTmScreenDsMappingDTO'
     CmcTmScreenCompareLabelsDTO:
      type: array
      items:
       $ref: '#/definitions/CmcTmScreenCompareLabelsDTO'
 CmcTmScreenDsMappingDTO:
  type: object
  properties:
     dsCode:
      type: string
      description: "Ds Code"
     dsDescription:
      type: string
      description: "Ds Description"
     editFlag:
      type: boolean
      description: "Edit Flag"
     id:
      type: string
      description: "Id"
     mandatory:
      type: boolean
      description: "Mandatory"
     screenClassId:
      type: string
      description: "Screen Class Id"
     sequence:
      type: number
      description: "Sequence"
     endpoint:
      type: string
      description: "End Point"
     subdomain:
      type: string
      description: "Subdomain"
     groupName:
      type: string
      description: "Group Name"
     groupDescription:
      type: string
      description: "Group Description"
     groupViewType:
      type: string
      description: "Group View Type"
     groupSequence:
      type: number
      description: "Group Sequence"
 CmcTmScreenCompareLabelsDTO:
  type: object
  properties:
     bundleAttribute:
      type: string
      description: "Bundle Attribute"
     id:
      type: string
      description: "Id"
     jsonAttribute  :
      type: string
      description: "Json Attribute"
     screenClassId:
      type: string
      description: "Screen class Id"
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CmcTmScreenClassCollection: 
  description: "Collection of screenclass."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CmcTmScreenClassDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CmcTmScreenClassWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CmcTmScreenClassDTO"
