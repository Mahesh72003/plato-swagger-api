#   GET       .../screenclassmaintenance/xxx?version=1

 /screenclassmaintenance/{id}:
  put:
   tags:
    - "screenclassmaintenance"
   summary: "Update an existing screenclassmaintenance."
   description:  "Update an existing screenclassmaintenance."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the screenclassmaintenance Maintenance"
      required: true
      type: "string"
    - name: "screenclassmaintenance"
      in: "body"
      description: "Request Body that contains data required for updating an existing screenclassmaintenance"
      required: true
      schema:
       $ref: "#/definitions/CmcTmScreenClassDTO"
   responses:
    200:
     description: "Returns updated screenclassmaintenance"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "screenclassmaintenance"
   summary: "Retrieves the screenclassmaintenance by ID."
   description:  "Retrieves the screenclassmaintenance by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the screenclassmaintenance based on given id."
     schema:
      $ref: "#/definitions/CmcTmScreenClassWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "screenclassmaintenance"
   summary: "Deletes the screenclassmaintenance identified by given ID."
   description:  "Deletes the screenclassmaintenance identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the screenclassmaintenance maintenance"
      required: true
      type: "string"
    - name: "screenclassmaintenance"
      in: "body"
      description: Request body contain screenclassmaintenance and Modification no of screenclassmaintenance maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

