paths:
  /topcustomersweeps:
    get:
      tags:
      - "TopCustomerSweepsAPI"
      summary: "Retrieves the list of existing Customer Sweeps."
      description:  "Retrieves the list of existing Customer Sweeps. Add additional information here for the this endpoint."
      operationId: "getData"
      parameters:
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/LmdTbTopCustomerSweepsCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
