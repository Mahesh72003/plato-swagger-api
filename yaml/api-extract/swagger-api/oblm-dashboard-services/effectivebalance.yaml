swagger: "2.0"
info:
  description: "This is a sample  server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Dashboard Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
- "application/json"
- "application/xml"
produces:
- "application/json"
- "application/xml"
tags:
- name: "EffectiveBalanceAPI"
  description: "API for Effective Balances Operations"

schemes:
- "https"

paths:
  /effectivebalance:
    get:
      tags:
      - "EffectiveBalanceAPI"
      summary: "Retrieves the list of total effective balances."
      description:  "Retrieves the list of total effective balances. Add additional information here for the this endpoint."
      operationId: "getData"
      parameters:
      - name: customerId
        in: query
        description: fetch record according to customerId
        required: false
        type: string
      - name: structureId
        in: query
        description: fetch record according to structureId
        required: false
        type: string
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/LmdTbEffectiveBalanceCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
definitions:
  LmdTbEffectiveBalanceDTO:
    description: "EffectiveBalance DTO"
    type: "object"
    allOf:
    - $ref: '#/definitions/GenericDto'
    - type: object
      properties:
        structureId:
          description: "structure id in Effective Balance"
          type: string
        valueDate:
          description: "value date in Effective Balance"
          type: string
          format: date
        accountNumber:
          description: "account number in Effective Balance"
          type: string
        branchCode:
          description: "branch Code in Effective Balance"
          type: string
        availableBalance:
          description: "Available Balance in Effective Balance"
          type: integer
        currencyCode:
          description: "Currency code in Effective Balance"
          type: string
        customerId:
          description: "Customer Id for Effective Balance"
          type: string
        userId:
          description: "User Id  of the Effective Balance"
          type: string
      required:
      - id
  ResponseDto:
    type: object
    properties:
      id:
        type: string
      status:
        type: string
      codes:
        type: array
        items:
          $ref: '#/definitions/ResponseCode'
      requestId:
        type: string
  ResponseCode:
    type: object
    properties:
      Code:
        type: string
      Desc:
        type: string
      Type:
        type: string
      Language:
        type: string
      args:
        type: array
        items:
          type: object
      arg:
        type: string
  GenericDto:
    allOf:
    - type: object
      discriminator: resource_type
  LmdTbEffectiveBalanceCollection:
    description: Collection of Effective Balances
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/LmdTbEffectiveBalanceDTO'
      paging:
        $ref: '#/definitions/PagingDto'
  PagingDto:
    type: object
    properties:
      totalResults:
        type: integer
  ResponseDtoWrapper:
    type: object
    properties:
      messages:
        $ref: '#/definitions/ResponseDto'
      data:
        $ref: '#/definitions/ResponseResourceSupport'
  ResponseResourceSupport:
    type: object
  LmdTbEffectiveBalanceWrapperDTO:
    type: object
    properties:
      data:
        $ref: '#/definitions/LmdTbEffectiveBalanceDTO'
 