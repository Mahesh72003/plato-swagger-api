swagger: "2.0"
info:
  description: "This is a sample  server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Dashboard Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
- "application/json"
- "application/xml"
produces:
- "application/json"
- "application/xml"
tags:
- name: "CustomerAccountBalanceAPI"
  description: "API for Account Balance Operations"

schemes:
- "https"

paths:
  /accountbalance:
    post:
      tags:
      - "CustomerAccountBalanceAPI"
      summary: "Persists Balance of Accounts"
      description:  "Persists the balance of the account. Add additional information here for the this endpoint."
      operationId: "save"
      parameters:
      - name: "account"
        in: "body"
        description: "Request Body that contains data required for creating a new account"
        required: true
        schema:
          $ref: "#/definitions/LmdTbCustomerAccountBalanceDTO"
      responses:
        201:
          description: "Returns message of success or failure "
          headers:
            Location:
              description: "URL of newly created account"
              type: "string"
          schema:
            $ref: "#/definitions/ResponseDtoWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
definitions:
  LmdTbCustomerAccountBalanceDTO:
    description: "AccountBalance DTO"
    type: "object"
    allOf:
    - $ref: '#/definitions/GenericDto'
    - type: object
      properties:
        accountNumber:
          type: string
        availableBalance:
          type: number
        branchCode:
          type: string
        currencyCode:
          type: string
        customerId:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        cityName:
          type: string
        countryName:
          type: string
        region:
          type: string
        structureId:
          type: string
        valueDate:
          type: string
          format: date
  ResponseDto:
    type: object
    properties:
      id:
        type: string
      status:
        type: string
      codes:
        type: array
        items:
          $ref: '#/definitions/ResponseCode'
      requestId:
        type: string
  ResponseCode:
    type: object
    properties:
      Code:
        type: string
      Desc:
        type: string
      Type:
        type: string
      Language:
        type: string
      args:
        type: array
        items:
          type: object
      arg:
        type: string
  GenericDto:
    allOf:
    - type: object
      discriminator: resource_type
  LmdTbCustomerAccountBalanceDTOCollection:
    description: Collection of Account Balance
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/LmdTbCustomerAccountBalanceDTO'
      paging:
        $ref: '#/definitions/PagingDto'
  PagingDto:
    type: object
    properties:
      totalResults:
        type: integer
  ResponseDtoWrapper:
    type: object
    properties:
      messages:
        $ref: '#/definitions/ResponseDto'
      data:
        $ref: '#/definitions/ResponseResourceSupport'
  ResponseResourceSupport:
    type: object
  LmdTbCustomerAccountBalanceWrapperDTO:
    type: object
    properties:
      data:
        $ref: '#/definitions/LmdTbCustomerAccountBalanceDTO'
