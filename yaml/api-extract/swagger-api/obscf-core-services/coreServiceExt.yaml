 /service/v2/product/{productCode}/{branchCode}:
  get:
   tags:
    - "productService"
   summary: "Retrieves the product by ID."
   description:  "Retrieves the product by ID."
   operationId: "getById"
   parameters:
    - name: "userId"
      in: "header"
      description: "User Id"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "Branch Code"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      description: "Application Id"
      type: "string"
      required: true
    - name: "productCode"
      in: "path"
      description: "ProductCode of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "branchCode"
      in: "path"
      description: "BranchCode of the user that needs to be fetched"
      required: true
      type: "string"
    - in: query
      name: recordStat
      description: "Record Status"
      required: false
      type: string
   responses:
    200:
     description: "Returns the program based on given id."
     schema:
      $ref: "./coreDef.yaml#/definitions/ScfTmProductMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 /service/v2/program:
  post:
   tags:
    - "programService"
   summary: "Adds a new program."
   description: "Create a new program."
   operationId: "saveRecord"
   parameters:
    - name: "userId"
      in: "header"
      description: "User Id"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "Branch Code"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      description: "Application Id"
      type: "string"
      required: true
    - name: "program" 
      in: "body" 
      description: "Request Body that contains data required for creating a new program" 
      required: true
      schema:
       $ref: "./coreDef.yaml#/definitions/ScfTmProgramRequestV2DTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created program" 
       type: "string"
     schema:
       $ref: "./coreDef.yaml#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
