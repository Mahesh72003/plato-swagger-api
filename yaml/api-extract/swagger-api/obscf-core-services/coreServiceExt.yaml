swagger: "2.0"
info:
 description: "Provides v2 APIs to perform operations on product and program"
 version: "1.0.0"
 title: "Core Service APIs"
host: "api-plato.us.oracle.com:8080"
basePath: "/obscf-core-services"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "productService"
   description: "v2 APIs for product related operations"
 - name: "programService"
   description: "v2 APIs for program related operations"
 - name: "ExpiryCheckController"
   description: "APIs for check expiry of each program and product & mark inactive if expired"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../product

 /service/v2/product:
  get:
   tags:
    - "productService"
   summary: "Get all valid product."
   description:  "Get all valid product."
   operationId: "getAll"
   parameters:
   - name: "userId"
     in: "header"
     description: "User Id"
     required: true
     type: "string"
   - name: "branchCode"
     in: "header"
     description: "Branch Code"
     required: true
     type: "string"
   - name: "appId"
     in: "header"
     description: "Application Id"
     type: "string"
     required: true     
   - name: includecloseandunauth
     in: query
     description: "Include close and unauth need to be set to fetch summary record, defult value is false"
     required: false
     type: boolean
   - name: offset
     in: query
     description: "Offset is starting no of records to be fetched"
     required: false
     type: integer
   - name: limit
     in: query
     description: "Limit is maximum no of records to be fetched"
     required: false
     type: integer
   - in: query
     name: recordStat
     description: "Record Status"
     required: false
     type: string
   - in: query
     name: debtor
     description: "Debtor"
     required: false
     type: string
   - in: query
     name: productCategory
     description: "Product Category"
     required: false
     type: string
   - in: query
     name: branchCode
     description: "Branch Code"
     required: false
     type: string
   - in: query
     name: productCode
     description: "Product Code"
     required: false
     type: string
   - in: query
     name: productDescription
     description: "Product Description"
     required: false
     type: string
   - in: query
     name: productType
     description: "Product Type"
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: "Location"
       type: "string"
     schema:
       $ref: "./coreDef.yaml#/definitions/ScfTmProductMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
