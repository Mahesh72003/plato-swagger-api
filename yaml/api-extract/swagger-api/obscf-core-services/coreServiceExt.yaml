 /service/v2/program/{id}:
  put:
   tags:
    - "programService"
   summary: "Update an existing program."
   description:  "Update an existing program."
   operationId: "modifyRecord"
   parameters:
    - name: "userId"
      in: "header"
      description: "User Id"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "Branch Code"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      description: "Application Id"
      type: "string"
      required: true
    - name: "id"
      in: "path"
      description: "key of the program Maintenance"
      required: true
      type: "string"
    - name: "program"
      in: "body"
      description: "Request Body that contains data required for updating an existing program"
      required: true
      schema:
       $ref: "./coreDef.yaml#/definitions/ScfTmProgramRequestV2DTO"
   responses:
