      type: string
      description: "Preferred Settlement Mode"
     programCode:
      type: string
      description: "Program Code"
     programMasterId:
      type: string
      description: "Program Master Id"
     spokeId:
      type: string
      description: "Spoke Id"
     spokeName:
      type: string
      description: "Spoke Name"
     withRecourse:
      type: string
      description: "With Recourse"
     graceDays:
      type: number
     interestBearingParty:
      type: string
      description: "Interest Bearing Party"
     ScfTmProgramSpokeCodeMasterDTO:
      type: array
      items:
       $ref: "#/definitions/ScfTmProgramSpokeCodeMasterDTOV1"
 ScfTmProgramMasterCollectionV1: 
  description: "Collection of program."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/ScfTmProgramMasterDTOV1"
   paging:
    $ref: "./coreDef.yaml#/definitions/PagingDto"
 ScfTmProgramSpokeCodeMasterDTOV1:
  type: object
  required:
     - programCode
