      type: string
      description: "Auto Debit Applicable"
     autoFinanceApplicable:
      type: string
      description: "Auto Finance Applicable"
     autoSettlementApplicable:
      type: string
      description: "Auto Settlement Applicable"
     branchCode:
      type: string
      description: "Branch Code"
     creditLimitUtilization:
      type: string
      description: "Credit Limit Utilization"
     debitAcctTypeAfterDueDate:
      type: string
      description: "Debit Account Type After Due Date"
     debitAcctTypeOnDueDate:
      type: string
      description: "Debit Account Type On Due Date"
     debitPartyAfterDueDate:
      type: string
      description: "Debit Party After Due Date"
     debitPartyOnDueDate:
      type: string
      description: "Debit Party On Due Date"
     debtor:
      type: string
      description: "Debtor"
     effectiveFrom:
      type: string
      format: date
      description: "Effective From"
     expiresOn:
      type: string
      format: date
      description: "Expires On"
     holidayTreatment:
      type: string
      description: "Holiday Treatment"
     maturityDateCalculation:
      type: string
      description: "Maturity Date Calculation"
     maxFinancePercentage:
      type: number
      description: "Maximum Finance Percentage"
     maxTenorAllowed:
      type: number
      description: "Maximum Tenor Allowed"
     minFinancePercentage:
      type: number
      description: "Minimum Finance Percentage"
     minTenorAllowed:
      type: number
      description: "Minimum Tenor Allowed"
     minWaitingPeriod:
      type: number
      description: "Minimum Waiting Period"
     multipleDisbursementAllowed:
      type: string
      description: "Multiple Disbursement Allowed"
     npaAppropriationSeq:
      type: string
      description: "Npa Appropriation Sequence"
     partRepaymentAllowed:
      type: string
      description: "Part Repayment Allowed"
     preferredDisbursementMode:
      type: string
      description: "Preferred Disbursement Mode"
     preferredSettlementMode:
      type: string
      description: "Preferred Settlement Mode"
