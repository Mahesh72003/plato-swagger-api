      type: string
      description: "Pre Payment Allowed"
     productCategory:
      type: string
      description: "Product Category"
     productCode:
      type: string
      description: "Product Code"
     productDescription:
      type: string
      description: "Product Description"
     productType:
      type: string
      description: "Product Type"
     reconciliationTowards:
      type: string
      description: "Reconciliation Towards"     
     txnControllerRefNo:
      type: string
      description: "Transaction Controller Reference Number"    
     stalePeriod:
      type: number
      description: "Stale Period"
     withRecourse:
      type: string
      description: "With Recourse"
     graceDays:
      type: number
      description: "Grace Days"
 ScfTmProductMasterWrapperDTOV1:
  type: object
  properties:
   data:
    $ref: "#/definitions/ScfTmProductMasterDTOV1"
 ScfTmProgramRequestDTOV1:
  type: object
  properties:
    data:
     $ref: "#/definitions/ScfTmProgramMasterDTOV1"
