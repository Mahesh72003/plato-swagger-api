      type: string
      description: "Anchor Division Code"
     anchorDivisionName:
      type: string
      description: "Anchor Division Name"
 ProductProgramDTO: 
    type: object
    properties:
      productDTO:
        $ref: './coreDef.yaml#/definitions/ScfTmProductMasterDTO'
      programDTO: 
        $ref: "./coreDef.yaml#/definitions/ScfTmProgramMasterDTO"
 ProductProgramDTOCollection: 
    description: "Collection of product and program DTO."
    type: "object"
    properties:
     data:
      type: "array"
      items: 
       $ref: "#/definitions/ProductProgramDTO"
