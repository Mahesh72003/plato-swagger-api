        description: operation type
        type: string
      makerId:
        description: maker id
        type: string
      makerDateStamp:
        description: make date stamp
        type: string
        format: date-time
      checkerId:
        description: check id
        type: string
      checkerDateStamp:
        description: checker date stamp
        type: string
        format: date-time
      modNo:
        description: mod no
        type: integer
      recordStatus:
        description: record status flag
        type: string
      authStatus:
        description: auth status flag
        type: string
      onceAuth:
        description: once auth flag
        type: string
      doerRemarks:
        description: doer remarks
        type: string
      approverRemarks:
        description: approver  remarks
        type: string        
      scfTmProgramMaster:
        $ref: './coreDef.yaml#/definitions/ScfTmProgramMasterDTO'
      extendedDatasegments:
        description: data for the extended datasegment operation
        type: array
        items:
