swagger: "2.0"
info:
 description: "This service is list of Inquiry APIs for Location master, Correspondent Bank and Outside Network Bank"
 version: "1.0.0"
 title: "Location Service APIs"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "locationService"
   description: "This service is list of Inquiry APIs for Location master, Correspondent Bank and Outside Network Bank"


paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../location

 /service/v1/location:
  get:
   tags:
    - "locationService"
   summary: "Get all valid location."
   description:  "Get all valid location. This endpoints will be used to Get all valid location maintenance records."
   operationId: "getAll"
   parameters:
   - name: "userId"
     in: "header"
     description: "userId"
     required: true
     type: "string"
   - name: "branchCode"
     in: "header"
     description: "branchCode"
     required: true
     type: "string"
   - name: "appId"
     in: "header"
     type: "string"
     description: "App ID"
     required: true
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: locationCode
     required: false
     type: string
   - in: query
     name: locationDescription
     required: false
     type: string
   - in: query
     name: locationClusterCode
     required: false
     type: string
   - name: authStat
     in: query
     description: authStatus need to be set to fetch summary record
     required: false
     type: string
   - name: recordStat
     in: query
     description: recordStatus need to be set to fetch summary record
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: "Response 201"
       type: "string"
     schema:
       $ref: "#/definitions/CmTmLocationLinkCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../location/xxx
#   DELETE    .../location/xxx
#   GET       .../location/xxx
#   GET       .../location/xxx?version=latestrecord
#   GET       .../location/xxx?version=1

 /service/v1/location/{locationCode}:
  get:
   tags:
    - "locationService"
   summary: "Retrieves the location by locationCode."
   description:  "Retrieves the location by locationCode."
   operationId: "getByLocationCode"
   parameters:
    - name: "userId"
      in: "header"
      description: "userId"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "branchCode"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      type: "string"
      description: "App ID"
      required: true
    - name: "locationCode"
      in: "path"
      description: "locationCode of the location that needs to be fetched"
      required: true
      type: "string"
    - name: "recordStat"
      in: "query"
      description: "recordStat of the location that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the location based on given id."
     schema:
      $ref: "#/definitions/CmTmLocationLinkWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 /service/v1/location/corrbanks/{locationCode}:
  get:
   tags:
    - "locationService"
   summary: "Retrieves the location by locationCode."
   description:  "Retrieves the location by locationCode."
   operationId: "getCorrBanksByLocationCode"
   parameters:
    - name: "userId"
      in: "header"
      description: "userId"
      required: true
