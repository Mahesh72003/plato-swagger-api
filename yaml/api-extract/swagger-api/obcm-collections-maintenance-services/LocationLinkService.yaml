    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 /service/v1/locationmaster/{locationCode}:
  get:
   tags:
    - "locationService"
   summary: "Retrieves the location by locationCode."
   description:  "Retrieves the location by locationCode."
   operationId: "getLoactionMasterByLocationCode"
   parameters:
    - name: "userId"
      in: "header"
      description: "userId"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "branchCode"
      required: true
      type: "string"
    - name: "appId"
