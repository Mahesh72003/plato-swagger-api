      required: true
    - name: "locationCode"
      in: "path"
      description: "locationCode of the location that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the location based on given id."
     schema:
      $ref: "#/definitions/CmTmLocOsNwCollection"
    400:
