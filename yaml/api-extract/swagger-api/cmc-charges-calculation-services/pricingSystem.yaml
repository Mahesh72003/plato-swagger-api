definitions:
 CmcTmPricingSystemDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     action:
      type: string
      description: "Action"
     checkerRemarks:
      type: string
      description: "CHecker Remarks"
     keyId:
      type: string
      description: "Key Id"
     makerRemarks:
      type: string
      description: "Maker Remarks"
     pricingSrcCode:
      type: string
      description: "Pricing Source Code"
     pricingSrcDesc:
      type: string
      description: "Pricing Source Description"
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CmcTmPricingSystemCollection: 
  description: "Collection of pricingsystem."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CmcTmPricingSystemDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CmcTmPricingSystemWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CmcTmPricingSystemDTO"