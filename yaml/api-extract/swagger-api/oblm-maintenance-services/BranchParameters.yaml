      description: reopen the branch identified by given ID.
      operationId: reopenRecord
      parameters:
      - name: id
        in: path
        description: Key of the branch maintenance
        required: true
        type: string
      - name: branch
        in: body
        description: Request body contain branch and Modification no of branch maintenance which need to be reopen"
        required: true
        schema:
          $ref: '#/definitions/KeyDto'
      responses:
        200:
          description: Successful operation.
