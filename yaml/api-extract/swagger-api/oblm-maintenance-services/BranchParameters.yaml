      - name: id
        in: path
        description: key of the branch Maintenance
        required: true
        type: string
      - name: branch
        in: body
        description: Request Body that contains data required for updating an existing branch
        required: true
        schema:
          $ref: '#/definitions/LmmTmBranchParametersDTO'
      responses:
        200:
          description: Returns updated branch
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      tags:
      - branch
      summary: Retrieves the branch by ID.
      description: Retrieves the branch by ID.
      operationId: getById
      parameters:
      - name: id
        in: path
        description: Id of the user that needs to be fetched
        required: true
        type: string
      - name: version
        in: query
        description: Id of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Returns the branch based on given id.
          schema:
            $ref: '#/definitions/LmmTmBranchParametersWrapperDTO'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
    delete:
      tags:
      - branch
      summary: Deletes the branch identified by given ID.
      description: Deletes the branch identified by given ID. Add additional information here for the this endpoint.
      operationId: delete
      parameters:
      - name: id
        in: path
        description: Key of the branch maintenance
        required: true
        type: string
      - name: branch
        in: body
        description: Request body contain branch and Modification no of branch maintenance which need to be deleted"
        required: true
        schema:
          $ref: '#/definitions/ModListKeyDto'
      responses:
        200:
          description: Successful operation.
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
