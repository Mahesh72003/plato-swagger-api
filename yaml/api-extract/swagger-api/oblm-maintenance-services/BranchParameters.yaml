swagger: '2.0'
info:
  description: This is a sample server branch server.
  version: 1.0.0
  title: branch Service
host: api-plato.us.oracle.com:8080
basePath: /api/1.0
consumes:
- application/json
produces:
- application/json
tags:
- name: branch
  description: for creating branch module in oblm project of oracle.this will help user to create bank for the project.there no of bank you can create in the following project of oblm.this will in all ways for creating new project of oblm in new architecture
schemes:
- https
paths:
  /branch:
    post:
      tags:
      - branch
      summary: Adds a new branch.
      description: Adds a new branch. Add additional information here for this endpoint.
      operationId: saveRecord
      parameters:
      - name: branch
        in: body
        description: Request Body that contains data required for creating a new branch
        required: true
        schema:
          $ref: '#/definitions/LmmTmBranchParametersDTO'
      responses:
        201:
          description: 'Returns message of succes or failure '
          headers:
            Location:
              description: URL of newly created branch
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      tags:
      - branch
      summary: Get all valid branch.
      description: Get all valid branch. This endpoints will be used to Get all valid branch maintenance records.
      operationId: getAll
      parameters:
      - name: includecloseandunauth
        in: query
        description: includecloseandunauth need to be set to fetch summary record, defult value is false
        required: false
        type: boolean
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      - in: query
        name: bankCode
        required: false
        type: string
      - in: query
        name: branchCode
        required: false
        type: string
      - in: query
        name: recordStat
        required: false
        type: string
      - in: query
        name: authStat
        required: false
        type: string
      - in: query      
        name: branchName
        required: false
        type: string
      - in: query
        name: isExternal
        required: false
        type: string
      - in: query
        name: externalSystemId
        required: false
        type: string
      - in: query
        name: isBalanceOnline
        required: false
        type: string
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/LmmTmBranchParametersCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
