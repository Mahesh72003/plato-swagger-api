swagger: "2.0"
info:
 description: "This is a sample server defaultPaymentInstruction server." 
 version: "1.0.0"
 title: "defaultPaymentInstruction Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "defaultPaymentInstruction"
   description: "Adds a new payment instruction. Add additional information here for this endpoint."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../defaultPaymentInstruction

 /defaultPaymentInstruction:
  post:
   tags:
    - "defaultPaymentInstruction"
   summary: "Adds a new defaultPaymentInstruction."
   description: "Adds a new defaultPaymentInstruction. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "defaultPaymentInstruction" 
      in: "body" 
      description: "Request Body that contains data required for creating a new defaultPaymentInstruction" 
      required: true
      schema:
       $ref: "#/definitions/LmmTmDefaultPaymentInstructionDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created defaultPaymentInstruction" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "defaultPaymentInstruction"
   summary: "Get all valid defaultPaymentInstruction."
   description:  "Get all valid defaultPaymentInstruction. This endpoints will be used to Get all valid defaultPaymentInstruction maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: hostCode
     in: query
     description: exact hostCode records to be fetched
     required: false
     type: string
   - name: description
     in: query
     description: exact description records to be fetched
     required: false
     type: string
   - name: recordStat
     required: false
     type: string
     in: query
   - name: authStat
     required: false
     type: string
     in: query     
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/LmmTmDefaultPaymentInstructionCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../defaultPaymentInstruction/xxx
#   DELETE    .../defaultPaymentInstruction/xxx
#   GET       .../defaultPaymentInstruction/xxx
#   GET       .../defaultPaymentInstruction/xxx?version=latestrecord
#   GET       .../defaultPaymentInstruction/xxx?version=1

 /defaultPaymentInstruction/{id}:
  put:
   tags:
    - "defaultPaymentInstruction"
   summary: "Update an existing defaultPaymentInstruction."
   description:  "Update an existing defaultPaymentInstruction."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the defaultPaymentInstruction Maintenance"
      required: true
      type: "string"
    - name: "defaultPaymentInstruction"
      in: "body"
      description: "Request Body that contains data required for updating an existing defaultPaymentInstruction"
      required: true
      schema:
       $ref: "#/definitions/LmmTmDefaultPaymentInstructionDTO"
   responses:
    200:
     description: "Returns updated defaultPaymentInstruction"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "defaultPaymentInstruction"
   summary: "Retrieves the defaultPaymentInstruction by ID."
   description:  "Retrieves the defaultPaymentInstruction by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the defaultPaymentInstruction based on given id."
     schema:
      $ref: "#/definitions/LmmTmDefaultPaymentInstructionWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "defaultPaymentInstruction"
   summary: "Deletes the defaultPaymentInstruction identified by given ID."
   description:  "Deletes the defaultPaymentInstruction identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the defaultPaymentInstruction maintenance"
      required: true
      type: "string"
    - name: "defaultPaymentInstruction"
      in: "body"
      description: Request body contain defaultPaymentInstruction and Modification no of defaultPaymentInstruction maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

