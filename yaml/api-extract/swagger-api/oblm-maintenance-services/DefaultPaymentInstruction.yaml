definitions:
 LmmTmDefaultPaymentInstructionDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     hostCode:
      type: string
      description: ""
     description:
      type: string
      description: ""
     customerId:
      type: string
      description: ""      
     customerName:
      type: string
      description: ""                  
     LmmTmDefaultPaymentInstructionTemplateDTO:
      type: array
      items:
       $ref: '#/definitions/LmmTmDefaultPaymentInstructionTemplateDTO'
 LmmTmDefaultPaymentInstructionTemplateDTO:
  type: object
  properties:
     id:
      type: string
      description: ""
      maxLength: 36
     defaultPaymentInstructionId:
      type: string
      description: ""
      maxLength: 36  
     ddaFromToAccount:
      type: string
      description: ""
      maxLength: 36      
     ddaEntity:
      type: string
      description: ""
      maxLength: 36      
     transferType:
      type: string
      description: ""
      maxLength: 36      
     templateName:
      type: string
      description: ""
      maxLength: 36            
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 LmmTmDefaultPaymentInstructionCollection: 
  description: "Collection of payment instructions."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/LmmTmDefaultPaymentInstructionDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 LmmTmDefaultPaymentInstructionWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/LmmTmDefaultPaymentInstructionDTO"
 LmmTmSweepAccountPairCollection:
   type: object
   properties:
     customerId:
       type: string
       description: ''
     data:
       type: array
       items:
         $ref: '#/definitions/LmmTmSweepAccountPairDTO'
 LmmTmSweepAccountPairDTO:
   type: object
   properties:
     accountNumber:
       type: string
       description: ''
     branchCode:
       type: string
       description: ''
     parentAccountNumber:
       type: string
       description: ''
     parentAccountBranch:
       type: string
       description: ''
     isTwoWay:
       type: string
       description: ''
     oneWaytemplateName:
      type: string
      description: ""
     twoWaytemplateName:
      type: string
      description: "" 
     isExternal:
      type: string
      description: "" 
     countryId:
      type: string
      description: "" 
     isparentAccountExternal:
      type: string
      description: "" 
     parentAccountCountryId:
      type: string
      description: "" 