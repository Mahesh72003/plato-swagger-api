      description: Request body contain defaultPaymentInstruction and Modification no of defaultPaymentInstruction maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../defaultPaymentInstruction/xxx/close
 /defaultPaymentInstruction/{id}/close:
  patch:
   tags:
    - "defaultPaymentInstruction"
   summary: "Close the defaultPaymentInstruction by given ID."
   description:  "Close the defaultPaymentInstruction identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the defaultPaymentInstruction maintenance"
