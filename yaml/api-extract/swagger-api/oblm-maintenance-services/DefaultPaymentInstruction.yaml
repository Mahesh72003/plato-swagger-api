 /defaultPaymentInstruction/{id}/reopen:
  patch:
   tags:
    - "defaultPaymentInstruction"
   summary: "reopen the defaultPaymentInstruction by given ID."
   description:  "reopen the defaultPaymentInstruction identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
