definitions:
 MbccDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     childCCY:
      type: string
      description: ""
     parentCCy:
      type: string
      description: ""
     pBranchCode:
      type: string
      description: ""
     cBranchCode:
      type: string
      description: ""             
 LmmTmCurrencyCutoffDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     bicCode:
      type: string
      description: ""
     LmmTmCurrencyCutoffDetailsDTO:
      type: array
      items:
       $ref: '#/definitions/LmmTmCurrencyCutoffDetailsDTO'
    required:
     - bicCode
 LmmTmCurrencyCutoffDetailsDTO:
  type: object
  properties:
     currencyCode:
      type: string
      description: ""
     currencyCutoffId:
      type: string
      description: ""
     id:
      type: string
      description: ""
     incomingCutoffHr:
      type: number
      description: ""
     incomingCutoffMin:
      type: number
      description: ""
     messageType:
      type: string
      description: ""
     outgoingCutoffHr:
      type: number
      description: ""
     outgoingCutoffMin:
      type: number
      description: ""
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 LmmTmCurrencyCutoffCollection: 
  description: "Collection of currencycutoff."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/LmmTmCurrencyCutoffDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 LmmTmCurrencyCutoffWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/LmmTmCurrencyCutoffDTO"
