swagger: "2.0"
info:
 description: "This is a sample server ccycutoff server." 
 version: "1.0.0"
 title: "ccycutoff Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "ccycutoff"
   description: ""

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../ccycutoff

 /ccycutoff:
  post:
   tags:
    - "ccycutoff"
   summary: "Adds a new ccycutoff."
   description: "Adds a new ccycutoff. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "ccycutoff" 
      in: "body" 
      description: "Request Body that contains data required for creating a new ccycutoff" 
      required: true
      schema:
       $ref: "#/definitions/LmmTmCurrencyCutoffDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created ccycutoff" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "ccycutoff"
   summary: "Get all valid ccycutoff."
   description:  "Get all valid ccycutoff. This endpoints will be used to Get all valid ccycutoff maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: recordStat
     required: false
     type: string
   - in: query
     name: authStat
     required: false
     type: string
   - in: query   
     name: bicCode
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/LmmTmCurrencyCutoffCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../ccycutoff/xxx
#   DELETE    .../ccycutoff/xxx
#   GET       .../ccycutoff/xxx
#   GET       .../ccycutoff/xxx?version=latestrecord
#   GET       .../ccycutoff/xxx?version=1

 /ccycutoff/{id}:
  put:
   tags:
    - "ccycutoff"
   summary: "Update an existing ccycutoff."
   description:  "Update an existing ccycutoff."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the ccycutoff Maintenance"
      required: true
      type: "string"
    - name: "ccycutoff"
      in: "body"
      description: "Request Body that contains data required for updating an existing ccycutoff"
      required: true
      schema:
       $ref: "#/definitions/LmmTmCurrencyCutoffDTO"
   responses:
    200:
     description: "Returns updated ccycutoff"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "ccycutoff"
   summary: "Retrieves the ccycutoff by ID."
   description:  "Retrieves the ccycutoff by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the ccycutoff based on given id."
     schema:
      $ref: "#/definitions/LmmTmCurrencyCutoffWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "ccycutoff"
   summary: "Deletes the ccycutoff identified by given ID."
   description:  "Deletes the ccycutoff identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the ccycutoff maintenance"
      required: true
      type: "string"
    - name: "ccycutoff"
      in: "body"
      description: Request body contain ccycutoff and Modification no of ccycutoff maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

