swagger: "2.0"
info:
  description: "This is a service which provides APIs for maintaining relationships between corporates and their buyers and sellers"
  version: "1.0.0"
  title: "Relationship Service APIs"
host: "api-plato.us.oracle.com:8080"
basePath: "/obscfcm-report-services"
consumes:
  - "application/json"
produces:
  - "application/json"
tags:
  - name: "relationshipmaster"
    description: "Service APIs for maintaining relationships between corporates and their buyers and sellers"

paths:

  /service/v1/saveRelationshipData:
    post:
      tags:
        - "relationshipmaster"
      summary: "Saves a new relationshipmaster."
      description: "Saves a new relationshipmaster"
      operationId: "saveRelationshipData"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: Application id
        - name: "userId"
          in: "header"
          description: "userId"
          required: true
          type: "string"
        - name: "branchCode"
          in: "header"
          description: "branchCode"
          required: true
          type: "string"
        - name: "relationshipmaster"
          in: "body"
          description: "Request Body that contains data required for creating a new relationshipmaster"
          required: true
          schema:
            $ref: "#/definitions/ObcmTmRelationshipMasterDTO"
      responses:
        201:
          description: "Returns message of succes or failure "
          schema:
            type: boolean
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
