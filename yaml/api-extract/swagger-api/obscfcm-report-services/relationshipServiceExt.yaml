        description: "Mod Number"
      id:
        type: string
        description: "Id"
      autoAcceptance:
        type: string
        description: "Auto Acceptance"
      corporateId:
        type: string
        description: "Corporate Id"
      corporateName:
        type: string
        description: "Corporate Name"
      effFromDate:
        type: string
        description: "Effective From Date"
      relationshipCode:
        type: string
        description: "Relationship Code"
      relationshipName:
        type: string
