definitions:       
  AutoDebitDtoWrapper:
    description: "CmcCurrency Utility Dto Wrapper"
    type: "object"
    properties:
      messages:
        $ref: "#/definitions/ResponseDto"
      data:
        $ref: "#/definitions/ConductorWorkflowModel"
  AutoDebitTxnDetailsDto:
    type: object
    properties:
      id:
        type: string
      autoDebitGrpType:
        type: string
      txnRefNo:
        type: string
      autoDebitPartyRole:
        type: string
      autoDebitCounterPartyRole:
        type: string
      autoDebitPartyId:
        type: string
      autoDebitCounterPartyId:
        type: string
      autoDebitPartyName:
        type: string
      autoDebitCounterPartyName:
        type: string
      autoDebitPartyDivCode:
        type: string
      autoDebitCounterPartyDivCode:
        type: string
      autoDebitAccType:
        type: string
      autoDebitAmtType:
        type: string
      autoDebitCcy:
        type: string
      autoDebitAmt:
        type: string
      groupId:
        type: string
      productCode:
        type: string
      accountRefNo:
        type: string
      executionId:
        type: string
      status:
        type: string
      allocatedAutoDebitAmt:
        type: string
      settlementReqId:
        type: string
  AutoDebitTxnDto:
    type: object
    properties:
      batchJobExecId:
        type: string
      timestamp:
        type: string
      branchCode:
        type: string
      userId:
        type: string
      businessDate:
        type: string
      status:
        type: string
      autoDebitTxnDetails:
       type: array
       items:
        $ref: '#/definitions/AutoDebitTxnDetailsDto'
  AutoDebitTxnCollection:
    type: "object"
    description: "Collection of Auto Debit Txns"
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/AutoDebitTxnDto'                           