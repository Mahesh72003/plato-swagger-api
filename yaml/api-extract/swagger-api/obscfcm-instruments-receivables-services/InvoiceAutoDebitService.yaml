            type: string
            required: true
         -  name: userId
            in: header
            description: "User Id"
            type: string
            required: true
         -  name: branchCode
            in: header
            description: "Branch Code"
            type: string
            required: true
         -  name: branchDate
            in: query
            description: "Branch Date"
            required: true
            type: string
         responses:
            200:
               description: "Returns true for Successful update"
               schema:
                  $ref: "#/definitions/AutoDebitDtoWrapper"
            400:
               description: Bad Request
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            405:
               description: Invalid input
            500:
               description: Internal error 
               
