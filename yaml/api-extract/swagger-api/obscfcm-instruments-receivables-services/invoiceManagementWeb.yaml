definitions:
  InvoiceManagementPostModel:
    description: "Invoice Post model"
    type: "object"
    properties:
      action:
        type: string
        description: "Action for which invoices are getting saved"
      processingDate:
        type: string
        description: "Processing Date"
      branchCode:
        type: string
        description: "Branch Code"
      srcAppCd:
        type: string
        description: "Reference Number of Calling System"
      srcAppRefNo:
        type: string
        description: "Reference Number of Calling System"
      makerId:
        type: string
        description: "Maker Id from Portal"
      checkerId:
        type: string
        description: "Checker Id from Portal"
      invoices:
        type: array
        items:
          $ref: "#/definitions/InvoiceModel"
  InvoiceManagementDTO:
    description: "InvoiceManagementDTO"
    properties:
      errorList:
        type: object
        additionalProperties:
          type: object
      refList:
        type: object
        additionalProperties:
          type: object
      responseDtoWrapper:
        $ref: "#/definitions/ResponseDtoWrapper"
