    description: "API for Invoice V2 Operations"

paths:
  /service/v2/finances/{invoiceRefNo}:
    get:
      tags:
        - "InvoicingServicev2"
      summary: "Retrieves the Invoice Finance Info for a particular Invoice."
      description:  "Retrieves the Invoice Finance Info for a particular Invoice."
      operationId: "getInvFinByInvoiceRefNo"
      parameters:
        - name: "invoiceRefNo"
          in: "path"
          description: "ReferenceNumber for which data needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "requestId"
          in: "query"
          description: "Request Id"
          type: "string"
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "./RecInstrumentInvoiceDef.yaml#/definitions/InvoiceFinanceModelCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /service/v2/invoiceFinance/{financeRefNo}:
    get:
      tags:
        - "InvoicingServicev2"
      summary: "Retrieves the Invoice Finance Info for a particular Invoice."
      description:  "Retrieves the Invoice Finance Info for a particular Invoice."
      operationId: "getInvFinByFinanceRefNo"
      parameters:
        - name: "financeRefNo"
          in: "path"
          description: "Finance Reference Number for which data needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "./RecInstrumentInvoiceDef.yaml#/definitions/InvoiceFinanceModelCollection"
