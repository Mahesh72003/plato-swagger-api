          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "invoiceCollection"
          in: "body"
          description: "Request Body that contains data required for creating a new Invoices."
          required: true
          schema:
            $ref: "./invoicingService.yaml#/definitions/InvoiceCollection"
      responses:
        200:
          description: "Returns the collection of the newly created invoices"
          schema:
              $ref: "#/definitions/CreateInvoiceResponseV2Collection"
        400:
          description: "Bad Request"
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"               
