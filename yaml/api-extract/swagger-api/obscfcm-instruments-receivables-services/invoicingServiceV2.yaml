swagger: "2.0"
info:
  description: "Provides APIs to perform operations on Invoices"
  version: "1.0.0"
  title: "Invoicing Service V2 APIs"
host: "api-plato.us.oracle.com:8080"
basePath: "/obscfcm-instruments-receivables-services"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
