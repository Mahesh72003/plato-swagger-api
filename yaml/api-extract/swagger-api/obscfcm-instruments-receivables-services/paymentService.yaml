  /service/v1/allocationStatus:
    post:
      tags:
        - "PaymentService"
      summary: "Update allocation status"
      description: "Update allocation status"
      operationId: "updateAllocationStatus"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "allocationStatus"
          in: "body"
