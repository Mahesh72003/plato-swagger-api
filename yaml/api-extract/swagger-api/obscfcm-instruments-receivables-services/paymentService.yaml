swagger: "2.0"
info:
  description: "Provides APIs to perform operations on Payments"
  version: "1.0.0"
  title: "Payment Service APIs"
host: "api-plato.us.oracle.com:8080"
basePath: "/obscfcm-instruments-receivables-services"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "PaymentService"
    description: "APIs for Payment Operations"

paths:
  /service/v1/stagePayment:
    post:
      tags:
        - "PaymentService"
      summary: "Create new Payment in stage table."
      description: "Create new Payment in stage table. "
      operationId: "createStagePayment"
      parameters:
        - name: "payment"
          in: "body"
          description: "Request Body that contains data required for creating a new Payment."
          required: true
          schema:
            $ref: "#/definitions/ScfPaymentDTO"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
      responses:
        201:
          description: "Returns the the newly created payment."
          schema:
              $ref: "#/definitions/ScfPaymentDTO"
        400:
          description: "Bad Request"
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"  
  /service/v1/mainPayment:
    post:
      tags:
        - "PaymentService"
      summary: "Adds all the main payments from the stage to the main table after validation."
      description: "Adds all the main payments from the stage to the main table after validation."
      operationId: "createMainPayments"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "fileNames"
          in: "body"
          description: "Request Body that contains data required for creating new Payments."
          required: true
          schema:
            type: array
            items: 
              type: string
      responses:
        201:
          description: "Returns the Id of the newly created payment"
          schema:
              $ref: "#/definitions/ResponseDtoWrapper"
        400:
          description: "Bad Request"
          schema:
              $ref: "#/definitions/ResponseDtoWrapper"
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"   
  /service/v1/invPayRecon:
    patch:
      tags:
        - "PaymentService"
      summary: "Update API for Invoice Payment Recon"
      description: "Updates Invoices and Payment after Auto Recon "
      operationId: "invoicePaymentAutoRecon"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "reconType"
          in: "query"
          type: "string"
          required: false
        - name: "ScfInvPayReconCollection"
          in: "body"
          description: "Request Body that contains data required for updating Invoices and Payment."
          required: true
          schema:
            $ref: "#/definitions/ScfInvPayReconCollection"
      responses:
        201:
          description: "Returns collection of invoices,payments and credit notes"
          schema:
              $ref: "#/definitions/ScfInvPayReconCollection"
        400:
          description: "Bad Request"
          schema:
              $ref: "#/definitions/ScfInvPayReconCollection"
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"     
