swagger: "2.0"
info:
 description: "This is a sample server bicdirectorys server." 
 version: "1.0.0"
 title: "bicdirectorys Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "bicdirectorys"
   description: "Bank Codes can be defined using this service so that the bank is identified by SWIFT. BICs are used when it is necessary to identify exactly a party of a transaction and are frequently used to help route payments."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../bicdirectorys

 /bicdirectorys:
  post:
   tags:
    - "bicdirectorys"
   summary: "Adds a new bicdirectorys."
   description: "Adds a new bicdirectorys. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "bicdirectorys" 
      in: "body" 
      description: "Request Body that contains data required for creating a new bicdirectorys" 
      required: true
      schema:
       $ref: "#/definitions/BICDirectoryDTO"
   responses:
    201: 
     description: "Returns message of success or failure "
     headers:
      Location:
       description: "URL of newly created bicdirectorys" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "bicdirectorys"
   summary: "Get all valid bicdirectorys."
   description:  "Get all valid bicdirectorys. This endpoints will be used to Get all valid bicdirectorys maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: bicCode
     required: false
     type: string
   - in: query
     name: bankName
     required: false
     type: string
   - in: query
     name: customerNo
     required: false
     type: string
   - in: query
     name: skArrangement
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: checkerId
     required: false
     type: string
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: bankAddress1
     required: false
     type: string
   - in: query
     name: relationship
     required: false
     type: string
   - in: query
     name: beIndicator
     required: false
     type: string
   responses:
    201:
     description: "Returns message of success or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/BICDirectoryCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../bicdirectorys/xxx
#   DELETE    .../bicdirectorys/xxx
#   GET       .../bicdirectorys/xxx
#   GET       .../bicdirectorys/xxx?version=latestrecord
#   GET       .../bicdirectorys/xxx?version=1

 /bicdirectorys/{id}:
  put:
   tags:
    - "bicdirectorys"
   summary: "Update an existing bicdirectorys."
   description:  "Update an existing bicdirectorys."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the bicdirectorys Maintenance"
      required: true
      type: "string"
    - name: "bicdirectorys"
      in: "body"
      description: "Request Body that contains data required for updating an existing bicdirectorys"
      required: true
      schema:
       $ref: "#/definitions/BICDirectoryDTO"
   responses:
    200:
     description: "Returns updated bicdirectorys"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "bicdirectorys"
   summary: "Retrieves the bicdirectorys by ID."
   description:  "Retrieves the bicdirectorys by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the bicdirectorys based on given id."
     schema:
      $ref: "#/definitions/BICDirectoryWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "bicdirectorys"
   summary: "Deletes the bicdirectorys identified by given ID."
   description:  "Deletes the bicdirectorys identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the bicdirectorys maintenance"
      required: true
      type: "string"
    - name: "bicdirectorys"
      in: "body"
      description: Request body contain bicdirectorys and Modification no of bicdirectorys maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

