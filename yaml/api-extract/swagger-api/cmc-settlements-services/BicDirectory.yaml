       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../bicdirectorys/xxx/close
 /bicdirectorys/{id}/close:
  patch:
   tags:
    - "bicdirectorys"
   summary: "Close the bicdirectorys by given ID."
   description:  "Close the bicdirectorys identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the bicdirectorys maintenance"
      required: true
      type: "string"
    - name: "bicdirectorys"
      in: "body"
      description: Request body contain bicdirectorys and Modification no of bicdirectorys maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../bicdirectorys/xxx/reopen

 /bicdirectorys/{id}/reopen:
  patch:
   tags:
    - "bicdirectorys"
   summary: "reopen the bicdirectorys by given ID."
   description:  "reopen the bicdirectorys identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the bicdirectorys maintenance"
      required: true
      type: "string"
    - name: "bicdirectorys"
      in: "body"
      description: Request body contain bicdirectorys and Modification no of bicdirectorys maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

