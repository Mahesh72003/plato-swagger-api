swagger: '2.0'
info:
  description: This is a sample external message log server.
  version: 1.0.0
  title: External Message Service
host: api-plato.us.oracle.com:8080
basePath: /api/1.0
consumes:
- application/json
produces:
- application/json
tags:
- name: externalMessage
  description: API for external message Operations
schemes:
- https
paths:
  /externalMessage/getExternalMessageLog:
    get:
      tags:
      - externalMessage
      summary: Get all MT message log.
      description: Get external message log based on input criteria.
      operationId: getExternalMsgLog
      parameters:
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      - name: accountNumber
        in: query
        description: accountNumber
        required: false
        type: string
      - name: messageDate
        in: query
        description: messageDate
        required: false
        type: string
      - name: bicCode
        in: query
        description: bicCode
        required: false
        type: string
      - name: transRefNum
        in: query
        description: transRefNum
        required: false
        type: string
      - name: swiftMsgType
        in: query
        description: swiftMsgType
        required: false
        type: string
      - name: status
        in: query
        description: status
        required: false
        type: string
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/ExternalMsgLogCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /externalMessage/processPendingMessage:
    get:
      tags:
      - externalMessage
      summary: process pending message.
      description: process pending message.
      operationId: processPendingMessage
      parameters:
      - name: messageId
        in: query
        description: Id of the message to be processed
        required: true
        type: string
      - name: remark
        in: query
        description: Remark of the message to be processed
        required: false
        type: string
      responses:
        201:
          description: 'Returns message of succes or failure '
          headers:
            Location:
              description: URL of processPendingMessage
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /externalMessage/supressMessage:
    get:
      tags:
      - externalMessage
      summary: supressMessage.
      description: supressMessage.
      operationId: supressMessage
      parameters:
      - name: messageId
        in: query
        description: Id of the message to be processed
        required: true
        type: string
      - name: remark
        in: query
        description: Remark of the message to be processed
        required: false
        type: string
      responses:
        200:
          description: Returns the balance based on given id.
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error  
  /externalMessage/processHoldMessagesInBatch:
    get:
      tags:
      - externalMessage
      summary: processHoldMessagesInBatch.
      description: processHoldMessagesInBatch.
      operationId: processHoldMessagesInBatch
      responses:
        200:
          description: Returns the balance based on given id.
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error          
definitions:
  ExternalMsgDetailsDTO:
