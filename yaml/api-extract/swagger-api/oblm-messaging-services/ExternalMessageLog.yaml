      logTimeInUserBranchTimeZone:
        type: string
        description: ''
      logTimeInUTCTimeZone:
        type: string
        description: ''
      processedTimeInUserBranchTimeZone:
        type: string
        description: ''
      processedTimeInUTCTimeZone:
        type: string
        description: ''        
      valueDate:
        type: string
        description: ''
      bicCode:
        type: string
        description: ''
      transRefNum:
        type: string
        description: ''
      accountNumber:
        type: string
        description: ''
      currencyCode:
        type: string
        description: ''
      statementNo:
        type: integer
        description: ''
      sequenceNo:
        type: integer
        description: ''
      openingBalance:
        type: number
        description: ''
      availableBalance:
        type: number
        description: ''
      bookDatedBalance:
        type: number
        description: ''
      dateTimeIndicator:
        type: string
        description: ''
      messageStatus:
        type: string
        description: ''
      errorCode:
        type: string
        description: ''
      errorDesc:
        type: string
        description: ''
      messageType:
        type: string
        description: ''
      message:
        type: string
        description: ''
      messageAuditList:
        type: array
        items:
          $ref: '#/definitions/ExternalMsgLogAuditDTO'
  ExternalMsgLogAuditDTO:
    type: object
    properties:
      id:
        type: string
        description: ''
      messageId:
        type: string
        description: ''
      messageAction:
        type: string
        description: ''
      actionSource:
        type: string
