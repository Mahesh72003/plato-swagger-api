      makerId:
        type: string
        description: ''
      makerDtStamp:
        type: string
        description: ""
      checkerId:
        type: string
        description: ""
      checkerDtStamp:
        type: string
        description: ""
      authStat:
        type: string
        description: ""
      errorDesc:
        type: string
        description: ""
      makerRemarks:
        type: string
        description: ""
      checkerRemarks:
        type: string
        description: ""
  ModListKeyDto:
    type: object
    properties:
      modNos:
        type: array
        items:
          type: integer
      remarks:
        type: string
  KeyDto:
    type: object
    properties:
      modNo:
        type: integer
      remarks:
        type: string
  ResponseDto:
    type: object
    properties:
      id:
        type: string
      status:
        type: string
      codes:
        type: array
        items:
          $ref: '#/definitions/ResponseCode'
      requestId:
        type: string
  ResponseCode:
    type: object
    properties:
      Code:
        type: string
      Desc:
        type: string
      Type:
        type: string
      Language:
        type: string
      args:
        type: array
        items:
          type: object
      arg:
        type: string
  BindingResult:
    type: object
  GenericDto:
    allOf:
    - type: object
      discriminator: resource_type
  ExternalMsgLogCollection:
    description: Collection of MT messages.
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/ExternalMsgDetailsDTO'
      paging:
        $ref: '#/definitions/PagingDto'
  PagingDto:
    type: object
    properties:
      totalResults:
        type: integer
  ResponseDtoWrapper:
    type: object
    properties:
      messages:
        $ref: '#/definitions/ResponseDto'
      data:
        $ref: '#/definitions/ResponseResourceSupport'
  ResponseResourceSupport:
    type: object
  