    - name: "system-parameters"
      in: "body"
      description: Request body contain system-parameters and Modification no of system-parameters maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../system-parameters/xxx/close
 /system-parameters/{id}/close:
  patch:
   tags:
    - "system-parameters"
   summary: "Close the system-parameters by given ID."
   description:  "Close the system-parameters identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the system-parameters maintenance"
      required: true
      type: "string"
    - name: "system-parameters"
      in: "body"
      description: Request body contain system-parameters and Modification no of system-parameters maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../system-parameters/xxx/reopen

 /system-parameters/{id}/reopen:
  patch:
   tags:
    - "system-parameters"
   summary: "reopen the system-parameters by given ID."
   description:  "reopen the system-parameters identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the system-parameters maintenance"
      required: true
      type: "string"
    - name: "system-parameters"
      in: "body"
      description: Request body contain system-parameters and Modification no of system-parameters maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supprorted http methods GET
#
# path examples----
#   GET       .../system-parameters/xxx/unauthorized

 /system-parameters/{id}/unauthorized:
  get:
   tags:
    - "system-parameters"
   summary: "Retrives the system-parameters by given ID."
   description:  "Retrives the system-parameters identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the system-parameters based on given id."
     schema:
       $ref: "#/definitions/CbsTmParametersCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to  history record for remitterid
#
#  supprorted http methods GETS
#
