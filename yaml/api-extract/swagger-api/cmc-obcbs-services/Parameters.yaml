swagger: "2.0"
info:
 description: "This is a sample server system-parameters server." 
 version: "1.0.0"
 title: "system-parameters Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "system-parameters"
   description: "system-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameterssystem-parameters"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../system-parameters

 /system-parameters:
  post:
   tags:
    - "system-parameters"
   summary: "Adds a new system-parameters."
   description: "Adds a new system-parameters. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "system-parameters" 
      in: "body" 
      description: "Request Body that contains data required for creating a new system-parameters" 
      required: true
      schema:
       $ref: "#/definitions/CbsTmParametersDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created system-parameters" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "system-parameters"
   summary: "Get all valid system-parameters."
   description:  "Get all valid system-parameters. This endpoints will be used to Get all valid system-parameters maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: parameterCode
     in: query
     description: parameterCode type  to be fetched
     required: false
     type: "string"
   - name: authStatus
     in: query
     description: Authorization Status
     required: false
     type: string
   - name: recordStatus
     in: query
     description: Record Status
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CbsTmParametersCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../system-parameters/xxx
#   DELETE    .../system-parameters/xxx
#   GET       .../system-parameters/xxx
#   GET       .../system-parameters/xxx?version=latestrecord
#   GET       .../system-parameters/xxx?version=1

 /system-parameters/{id}:
  put:
   tags:
    - "system-parameters"
   summary: "Update an existing system-parameters."
   description:  "Update an existing system-parameters."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the system-parameters Maintenance"
      required: true
      type: "string"
    - name: "system-parameters"
      in: "body"
      description: "Request Body that contains data required for updating an existing system-parameters"
      required: true
      schema:
       $ref: "#/definitions/CbsTmParametersDTO"
   responses:
    200:
     description: "Returns updated system-parameters"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "system-parameters"
   summary: "Retrieves the system-parameters by ID."
   description:  "Retrieves the system-parameters by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the system-parameters based on given id."
     schema:
      $ref: "#/definitions/CbsTmParametersWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "system-parameters"
   summary: "Deletes the system-parameters identified by given ID."
   description:  "Deletes the system-parameters identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the system-parameters maintenance"
      required: true
      type: "string"
    - name: "system-parameters"
      in: "body"
      description: Request body contain system-parameters and Modification no of system-parameters maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supprorted http methods PATCH
