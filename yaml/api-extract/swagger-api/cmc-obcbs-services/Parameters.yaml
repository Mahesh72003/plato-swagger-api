 /system-parameters/{id}/history:
  get:
   tags:
    - "system-parameters"
   summary: "Retrives the system-parameters by given ID."
   description:  "Retrives the system-parameters by ID."
   operationId: "getHistory"
   parameters:
    - name: "id"
      in: "path"
