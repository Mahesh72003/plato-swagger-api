swagger: "2.0"
info:
  description: "This is a sample server Maintenance server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Master Maintenance Definitions"
    
paths:
  /:
    get:
      responses:
        201:
          description: ""

definitions:
  ScfApplicationParamResponse:
    description: "Application param response"
    type: "object"
    properties:
      options:
        type: "array"
        items:
          $ref: "#/definitions/ApplicationParamModel"
  ApplicationParamModel:
    description: "Application param model"
    type: "object"
    properties:
      value:
        type: "string"
      label:
        type: "string"
  ScfCmcScreenClassResponse:
    description: "Response from CMC screen service stating the screen class details"
    type: "object"
    properties:
      data:
        type: "object"
        $ref: "#/definitions/ScfScreenClassDetails"
      isRetry:
        type: "string"
      isReject:
        type: "string"
      isApprove:
        type: "string"
      isSaveClose:
        type: "string"
  ScfScreenClassDetails:
    description: "Screen class details for given screen class code"
    type: "object"
    properties:
      keyId:
        type: "string"
      makerId:
        type: "string"  
      checkerId:
        type: "string"
      modNo:
        type: "number"
      recordStatus:
        type: "string"
      authStatus:
        type: "string"
      onceAuth:
        type: "string"
      doerRemarks:
        type: "string"
      approverRemarks:
        type: "string"
      domain:
        type: "string"
      screenClassCode:
        type: "string"
      screenClassDesc:
        type: "string"
      CmcTmScreenDsMappingDTO:
        type: "array"
        items:
          $ref: "#/definitions/CmcTmScreenDsMappingDTO"
  CmcTmScreenDsMappingDTO:
    description: "Data Segment Details"
    type: "object"
    properties:
      dsCode:
        type: "string"
      dsDescription:
        type: "string"
      editFlag:
        type: "boolean"
      id:
        type: "string"
      mandatory:
        type: "boolean"
      screenClassId:
        type: "string"
      sequence:
        type: "number"
          
  ScfTransFilterParamModel:
    description: "Scf Filter Parameters model for transaction API"
    type: "object"
    properties:
      attributeName:
        description: "Name of the parameter"
        type: "string"
      attributeValue:
        description: "Value of the parameter"
        type: "string"
                                       
  ScfSystemParamModel:
    description: "Scf System Param model"
    type: "object"
    properties:
      id:
        description: "Id of the Parameter"
        type: "integer"
        format: "int64"
      key:
        description: "Key for the parameter.This is a unique constraint"
        type: "string"
      value:
        description: "Configured value which will be used in rest of application."
        type: "string"
  ScfSystemParamCollection:
    description: "Collection of list of Parameters."
    type: "object"
    properties:
      ScfSystemParamModel:
        type: "array"
        items:
          $ref: "#/definitions/ScfSystemParamModel"
  ScfMasterPartyModel:
    description: "Scf Master Party model"
    type: "object"
    properties:
      id:
        description: "Id of the Party"
        type: "integer"
        format: "int64"
      partyCode:
        description: "Code for the Party.This is a unique constraint"
        type: "string"
      partyDescription:
        description: "Configured value for the disbursement mode which will be used in rest of application."
        type: "string"
      partyCategory:
        description: "Will differentiate weather it is customer/bank (C/B)"
        type: "string"
  ScfMasterPartyModelCollection:
    description: "Collection of list of Parties."
    type: "object"
    properties:
      ScfMasterPartyModel:
        type: "array"
        items:
          $ref: "#/definitions/ScfMasterPartyModel"
  ScfApplicationParamModel:
    description: "Scf Application Param model"
    type: "object"
    properties:
      key:
        description: "key of the Param"
        type: "string"
      code:
        description: "Code for the Param.This is a unique constraint"
        type: "string"
      description:
        description: "Configured value for the disbursement mode which will be used in rest of application."
        type: "string"
  ScfApplicationParamKeyModel:
    description: "Scf Application Param model"
    type: "object"
    properties:
      code:
        description: "Code for the Param.This is a unique constraint"
        type: "string"
      description:
        description: "Configured value for the disbursement mode which will be used in rest of application."
        type: "string"
  ScfApplicationParamModelKeyCollection:
    description: "Collection of list of Parameters."
    type: "object"
    properties:
      key:
        description: "key of the Param"
        type: "string"
      ScfApplicationParamKeyModel:
        type: "array"
        items:
          $ref: "#/definitions/ScfApplicationParamKeyModel"
  ScfApplicationParamModelCollection:
    description: "Collection of ScfApplicationParamModelKeyCollection."
    type: "object"
    properties:
      ScfApplicationParamModelKeyCollection:
        type: "array"
        items:
          $ref: "#/definitions/ScfApplicationParamModelKeyCollection"
  ScfTmProgramMasterDTO:
   type: object
   allOf:
   - $ref: '#/definitions/GenericDto'
   - type: object
     properties:
      anchorId:
       type: string
       description: "Anchor Id"
      anchorName:
       type: string
       description: "Anchor Name"
      authorizationRequired:
       type: string
       description: "Authorization Required"
      autoAcceptanceApplicable:
       type: string
       description: "Auto Acceptance Applicable"
      autoAcceptanceDays:
       type: number
       description: "Auto Acceptance Days"
      autoFinanceApplicable:
       type: string
       description: "Auto Finance Applicable"
      autoSettlementApplicable:
       type: string
       description: "Auto Settlement Applicable"
      disbursementCcy:
       type: string
       description: "Disbursement Currency"
      effectiveFrom:
       type: string
       format: date
       description: "Effective From"
      expiresOn:
       type: string
       format: date
       description: "Expires On"
      maxFinancePercentage:
       type: number
       description: "Maximum Finance Percentage"
      maxTenorAllowed:
       type: number
       description: "Maximum Tenor Allowed"
      minFinancePercentage:
       type: number
       description: "Minimum Finance Percentage"
      minTenorAllowed:
       type: number
       description: "Minimum Tenor Allowed"
      preferredDisbursementMode:
       type: string
       description: "Preferred Disbursement Mode"
      preferredSettlementMode:
       type: string
       description: "Preferred Settlement Mode"
      productCode:
       type: string
       description: "Product Code"
      productDescription:
       type: string
       description: "Product Description"
      programCode:
       type: string
       description: "Program Code"
      programName:
       type: string
       description: "Program Name"
      withRecourse:
       type: string
       description: "With Recourse"
      ScfTmProgramSpokeMasterDTO:
       type: array
       items:
        $ref: '#/definitions/ScfTmProgramSpokeMasterDTO'
  ScfTmProgramSpokeMasterDTO:
   type: object
   required:
      - programCode
      - spokeId
   properties:
      authorizationRequired:
       type: string
       description: "Authorization Required"
      autoFinanceApplicable:
       type: string
       description: "Auto Finance Applicable"
      autoSettlementApplicable:
       type: string
       description: "Auto Settlement Applicable"
      disbursementCcy:
       type: string
       description: "Disbursement Currency"
      id:
       type: string
       description: "Id"
      maxFinancePercentage:
       type: number
       description: "Maximum Finance Percentage"
      maxTenorAllowed:
       type: number
       description: "Maximum Tenor Allowed"
      minFinancePercentage:
       type: number
       description: "Minimum Finance Percentage"
      minTenorAllowed:
       type: number
       description: "Minimum Tenor Allowed"
      preferredDisbursementMode:
       type: string
       description: "Preferred Disbursement Mode"
      preferredSettlementMode:
       type: string
       description: "Preferred Settlement Mode"
      programCode:
       type: string
       description: "Program Code"
      programMasterId:
       type: string
       description: "Program Master Id"
      spokeId:
       type: string
       description: "Spoke Id"
      spokeName:
       type: string
       description: "Spoke Name"
      withRecourse:
       type: string
       description: "With Recourse"
  ScfTmProgramMasterCollection: 
   description: "Collection of program."
   type: "object"
   properties:
    data:
     type: "array"
     items: 
      $ref: "#/definitions/ScfTmProgramMasterDTO"
    paging:
     $ref: "#/definitions/PagingDto"
  ScfTmProgramSpokeMasterCollection: 
   description: "Collection of Spokes."
   type: "object"
   properties:
    data:
     type: "array"
     items: 
      $ref: "#/definitions/ScfTmProgramSpokeMasterDTO"
    paging:
     $ref: "#/definitions/PagingDto"
  CoreCustomerDTO:
   type: object
   allOf:
   - $ref: '#/definitions/GenericDto'
   - type: object
     properties:
      country:
       type: string
       description: "Country code of the customer?s address"
       pattern: '([a-zA-Z0-9]+)?'
      language:
       type: string
       description: "Customer's preferred language of communication"
      nationality:
       type: string
       description: "Nationality of the customer"
      deceased:
       type: string
       description: "Identifies that customer is deceased"
      frozen:
       type: string
       description: "Identifies that the customer's account is frozen"
       pattern: '[Y,N]'
      whereaboutsUnknown:
       type: string
       description: "Identifies that the customer's whareabouts not known"
       pattern: '[Y,N]'
      rmId:
       type: string
       description: "Relational Manager's Id"
       minLength: 0
       maxLength: 12
       pattern: '([a-zA-Z0-9]+)?'
      sanctionsChecksRequired:
       type: string
       description: "Indicates that the sanction check should be done or not"
       pattern: '[Y,N]'
      walkinCustomer:
       type: string
       description: "Walkin Customer"
      sourceSystem:
       type: string
       description: "Name of the source system"
      sourceSystemCustNo:
       type: string
       description: "Customer identification details as per the source system."
       minLength: 1
       maxLength: 35
       pattern: '[a-zA-Z0-9]+'
      customerNo:
       type: string
       description: "Customer Number of the external customer"
       minLength: 1
       maxLength: 20
       pattern: '[a-zA-Z0-9]+'
      hostCode:
       type: string
       description: "Displays the host code that is linked to the transaction branch of the customer"
      customerType:
       type: string
       description: "Customer type can be Individual,Corporate or Bank"
       pattern: '[I,C,B]'
      customerCategory:
       type: string
       description: "Category to which the customer belongs to"
      customerName1:
       type: string
       description: "Name of the external customer"
       minLength: 0
       maxLength: 35
       pattern: '([a-zA-Z0-9\s]+)?'
      shortName:
       type: string
       description: "Short name of the custome"
       minLength: 0
       maxLength: 20
       pattern: '([a-zA-Z0-9\s]+)?'
      addressLine1:
       type: string
       description: "First line of the customer?s address"
       minLength: 0
       maxLength: 35
      addressLine2:
       type: string
       description: "Second line of the customer?s address"
       minLength: 0
       maxLength: 35
      addressLine3:
       type: string
       description: "Third line of the customer?s address"
       minLength: 0
       maxLength: 35
      addressLine4:
       type: string
       description: "Fourth line of the customer?s address"
       minLength: 0
       maxLength: 35          
      pincode:
       type: string
       description: "Pincode of the customer?s address"
       minLength: 0
       maxLength: 15
       pattern: '([a-zA-Z0-9]+)?'
     required:
      - sourceSystem
      - sourceSystemCustNo
      - customerNo
      - customerType
      - customerName1
  CoreCustomerCollection: 
   description: "Collection of corecustomer."
   type: "object"
   properties:
    data:
     type: "array"
     items: 
      $ref: "#/definitions/CoreCustomerDTO"
    paging:
     $ref: "#/definitions/PagingDto"
  ScfTmCustDivisionMasterDTO:
   type: object
   allOf:
   - $ref: '#/definitions/GenericDto'
   - type: object
     properties:
      partyId:
       type: string
       description: "Party Id"
      partyName:
       type: string
       description: "Party Name"
      ScfTmCustDivisionCodeDTO:
       type: array
       items:
        $ref: '#/definitions/ScfTmCustDivisionCodeDTO'
  ScfTmCustDivisionCodeDTO:
   type: object
   properties:
      countryCode:
       type: string
       description: "Country Code"
      countryName:
       type: string
       description: "Country Name"
      custDivisionMasterId:
       type: string
       description: "Customer Division Master Id"
      divisionAddressLine1:
       type: string
       description: "Division Address Line1"
      divisionAddressLine2:
       type: string
       description: "Division Address Line2"
      divisionAddressLine3:
       type: string
       description: "Division Address Line3"
      divisionAddressLine4:
       type: string
       description: "Division Address Line4"
      divisionCode:
       type: string
       description: "Division Code"
      divisionName:
       type: string
       description: "Division Name"
      email:
       type: string
       description: "Email"
      id:
       type: string
       description: "Id"
      partyId:
       type: string
       description: "Party Id"
      partyName:
       type: string
       description: "Party Name"
      telNo:
       type: string
       description: "Telephone Number"
  ScfTmCustDivisionMasterCollection: 
   description: "Collection of custdivision."
   type: "object"
   properties:
    data:
     type: "array"
     items: 
      $ref: "#/definitions/ScfTmCustDivisionMasterDTO"
    paging:
     $ref: "#/definitions/PagingDto"
  ScfTmNonCustomerMasterCollection: 
   description: "Collection of noncustomer."
   type: "object"
   properties:
    data:
     type: "array"
     items: 
      $ref: "#/definitions/ScfTmNonCustomerMasterDTO"
    paging:
     $ref: "#/definitions/PagingDto"
  ScfTmNonCustomerMasterDTO:
   type: object
   allOf:
   - $ref: '#/definitions/GenericDto'
   - type: object
     properties:
      category:
       type: string
       description: "Category"
      cif:
       type: string
       description: "Cif"
      countryCode:
       type: string
       description: "Country Code"
      email:
       type: string
       description: "Email"
      faxNumber:
       type: string
       description: "Fax Number"
      giin:
       type: string
       description: "Giin"
      industry:
       type: string
       description: "Industry"
      mobileNumber:
       type: string
       description: "Mobile Number"
      name:
       type: string
       description: "Name"
      nonCustomerId:
       type: string
       description: "Non Customer Id"
      phoneNumber:
       type: string
       description: "Phone Number"
      prefferedCommMode:
       type: string
       description: "Preffered Comm Mode"
      registrationNumber:
       type: string
       description: "Registration Number"
      shortName:
       type: string
       description: "Short Name"
      taxRefNo1:
       type: string
       description: "Tax Reference No1"
      taxRefNo2:
       type: string
       description: "Tax Reference No2"
      fatca:
       type: string
       description: "Fatca"
      ScfTmNcAddressMasterDTO:
       type: array
       items:
        $ref: '#/definitions/ScfTmNcAddressMasterDTO'
      ScfTmNcRequestMasterDTO:
       type: array
       items:
        $ref: '#/definitions/ScfTmNcRequestMasterDTO'
  ScfTmNcAddressMasterDTO:
   type: object
   properties:
      addressLine1:
       type: string
       description: "Address Line1"
      addressLine2:
       type: string
       description: "Address Line2"
      addressLine3:
       type: string
       description: "Address Line3"
      addressLine4:
       type: string
       description: "Address Line4"
      addressType:
       type: string
       description: "Address Type"
      country:
       type: string
       description: "Country"
      id:
       type: string
       description: "Id"
      nonCustMasterId:
       type: string
       description: "Non Customer Master Id"
      pin:
       type: string
       description: "Pin"
      street:
       type: string
       description: "Street"
      nonCustomerId:
       type: string
       description: "Non Customer Id"
  ScfTmNcRequestMasterDTO:
   type: object
   properties:
      anchorId:
       type: string
       description: "Anchor Id"
      anchorName:
       type: string
       description: "Anchor Name"
      id:
       type: string
       description: "Id"
      nonCustomerCode:
       type: string
       description: "Non Customer Code"
      nonCustMasterId:
       type: string
       description: "Non Customer Master Id"
      status:
       type: string
       description: "Status"
      nonCustomerId:
       type: string
       description: "Non Customer Id"
   required:
    - anchorId
  PagingDto:
   type: object
   properties:
    totalResults:
     type: integer
  ModListKeyDto:
   type: object
   properties:
    modNos:
     type: array
     items:
      type: integer
    remarks:
     type: string
  KeyDto:
   type: object
   properties:
    modNo:
     type: integer
    remarks:
     type: string
  ResponseDto:
   type: object
   properties:
    id:
     type: string
    status:
     type: string
    codes:
     type: array
     items:
      $ref: "#/definitions/ResponseCode"
    requestId:
     type: string
  ResponseCode:
   type: object
   properties:
    Code:
     type: string
    Desc:
     type: string
    Type:
     type: string
    Language:
     type: string
    args:
     type: array
     items:
      type: object
    arg:
     type: string
  GenericDto:
   allOf:
    - type: object
      discriminator: resource_type
  ScfTmDelinquencyStatusCollection:
    description: Collection of DelinquencyStatusCollection.
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/ScfTmDelinquencyStatusModel'
  ScfTmDelinquencyStatusModel:
    description: "Delinquency Status model"
    type: "object"
    properties:
      delinquencyStatus:
        description: "Delinquency Status field.This is a unique constraint"
        type: "string"
      statusDescription:
        description: "Delinquency Status Description."
        type: "string"
      priority:
        description: "Delinquency Status priority."
        type: "integer"
      active:
        description: "Customer active or not."
        type: "string"
      system:
        description: "External system."
        type: "string"  
  ObcmApplicationParamKeyModel:
    description: "Obcm Application Param model"
    type: "object"
    properties:
      code:
        description: "Code for the Param.This is a unique constraint"
        type: "string"
      description:
        description: "Configured value for the disbursement mode which will be used in rest of application."
        type: "string"
  ObcmApplicationParamModelKeyCollection:
    description: "Collection of list of Parameters."
    type: "object"
    properties:
      key:
        description: "key of the Param"
        type: "string"
      ObcmApplicationParamKeyModel:
        type: "array"
        items:
          $ref: "#/definitions/ObcmApplicationParamKeyModel"
  ObcmApplicationParamModelCollection:
    description: "Collection of ObcmApplicationParamModelKeyCollection."
    type: "object"
    properties:
      ObcmApplicationParamModelKeyCollection:
        type: "array"
        items:
          $ref: "#/definitions/ObcmApplicationParamModelKeyCollection"      
  TransactionControllerCollection:
    description: Collection of TransactionController.
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/TransactionControllerModel'
  TransactionControllerModel:
    type: object
    properties:
      referenceNumber:
        description: Reference Number
        type: string
      tasks:
        description: "tasks"
        type: "array"
        items: 
          $ref: "#/definitions/EventModel"
  TransactionControllerRequestModel:
    type: object
    properties:
      referenceNumber:
        description: Reference Number
        type: string
      tasks:
        description: "tasks"
        type: "array"
        items: 
          $ref: "#/definitions/EventRequestModel"
  TransactionControllerStatus:
    description: TransactionControllerModel
    type: string
    enum:
    - INCOMPLETE
    - COMPLETE
    - WIP
  AdviceGenType:
    description: AdviceGenType
    type: string
    enum:
    - INTRA
    - EOS
  EventModel:
    description: "Event model"
    type: "object"
    required:
    - eventCode
    properties:
      eventCode:
        description: "eventCode"
        type: "string"
      phaseCode:
        description: "phaseCode"
        type: "string"
      datasegment:
        description: "datasegment list"
        type: "array"
        items:
          $ref: "#/definitions/DataSegmentModel"
      documentList:
        description: "document list"
        type: "array"
        items:
          $ref: "#/definitions/DocumentModel"
      clausesList:
        description: "clauses list"
        type: "array"
        items:
          $ref: "#/definitions/ClauseModel"
      advicesList:
        description: "advices list"
        type: "array"
        items:
          $ref: "#/definitions/AdviceModel"
      checkList:
        description: "check list"
        type: "array"
        items:
          $ref: "#/definitions/CheckListModel"
  EventRequestModel:
    description: "Event model"
    type: "object"
    properties:
      data:
        type: "object"
        $ref: "#/definitions/ScfScreenClassDetails"
      documentList:
        description: "document list"
        type: "array"
        items:
          $ref: "#/definitions/DocumentModel"
      clausesList:
        description: "clauses list"
        type: "array"
        items:
          $ref: "#/definitions/ClauseModel"
      advicesList:
        description: "advices list"
        type: "array"
        items:
          $ref: "#/definitions/AdviceModel"
      checkList:
        description: "check list"
        type: "array"
        items:
          $ref: "#/definitions/CheckListModel"
  DataSegmentModel:
    description: "data segment model"
    type: "object"
    required:
    - dataSegmentCode
    - sequence
    - editFlag
    properties:
      mandatory:
        description: "mandatory"
        type: boolean
        default: false
      dataSegmentCode:
        description: "data segment code name"
        type: "string"
      dataSegmentName:
        description: "dataSegmentName"
        type: "string"
      sequence:
        description: "sequence"
        type: "integer"
        format: "int64"
      editFlag:
        description: "mandatory"
        type: boolean
        default: false
      domain:                           
        description: "Domain Name"
        type: "string"
        minLength: 0
        maxLength: 36
      classCode:
        description: "classCode"
        type: "string"
        minLength: 0
        maxLength: 60
      eventId:
        description: "eventId"
        type: "string"
        minLength: 0
        maxLength: 36 
      groupCode:
        description: "groupCode"
        type: "string"
        minLength: 0
        maxLength: 60
      status:
        $ref: '#/definitions/TransactionControllerStatus'
  DocumentModel:
    description: "Document model"
    type: "object"
    required:
    - documentTypeName
    properties:
      mandatory:
        description: "mandatory"
        type: boolean
        default: false
      documentTypeDesc:
        description: "documentTypeDesc"
        type: "string"
        minLength: 0
        maxLength: 255
      documentTypeName:
        description: "documentTypeName"
        type: "string" 
      documentTypeCategory:
        description: "documentTypeCategory"
        type: "string"
      originalRequired:
        description: "originalRequired"
        type: "string"
        minLength: 0
        maxLength: 1
      versioning: 
        description: "versioning"
        type: "string"
        maxLength: 1
      uploadType:
        description: "uploadType"
        type: "string"
      eventId:
        description: "eventId"
        type: "string"
        minLength: 0
        maxLength: 36 
      status:
        $ref: '#/definitions/TransactionControllerStatus'
  AdviceModel:
    description: "Advice model"
    type: "object"
    required:
    - adviceTypeName
    properties:
      adviceTypeDesc:
        description: "adviceTypeDesc"
