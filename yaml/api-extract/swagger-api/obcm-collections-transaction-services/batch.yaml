      description:  "Retrieves the list of existing batches. Add additional information here for the this endpoint."
      operationId: "getAllBatch"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: false
          description: "branch code for SMS"
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "limit"
          in: "query"
          required: false
          description: "limit to be fetched"
          type: "integer"
        - name: "offset"
          in: "query"
          required: false
          description: "offset of the limit"
          type: "integer"
        - name: "processingDateString"
          in: "query"
          type: "string"
          required: false
        - name: "referenceNum"
          in: "query"
          description: "Ref of the batch that needs to be fetched"
          required: false
          type: "string"
        - name: "includeAll"
          in: "query"
          description: "include all the records without validation"
          required: false
          type: "boolean"
        - name: "includeCompleted"
          in: "query"
          description: "includeCompleted - to send only records for which stage is completed"
          required: false
          type: "boolean"
        - name: "txnStatus"
          in: "query"
          description: "txnStatus - to send only records for which workflow is inprogress or approved"
          required: false
          type: "string"
        - name: "screenFlag"
          in: "query"
          description: "Screen Flag Identifier"
          required: false
          type: "string"
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
    delete:
      tags:
        - "batch"
      summary: "Deletes the batch by referenceNum."
      description:  "deletes the batch by referenceNum. Add additional information here for the this endpoint."
      operationId: "deleteBatch"
      parameters:
        - name: "referenceNum"
          in: "query"
          description: "Ref of the batch that needs to be deleted"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: false
          description: "branch code for SMS"
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
      responses:
        200:
          description: "Returns the DepositSlip based on given id."
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
          
