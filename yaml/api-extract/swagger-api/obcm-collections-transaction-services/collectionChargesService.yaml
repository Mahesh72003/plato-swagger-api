          required: true
          description: "App Id for SMS"
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
          description: "Tenant Id for SMS"
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "User Id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
          description: "Branch Code for SMS"
        - name: "applicationCode"
          in: "header"
          type: "string"
          required: true
          description: "Application Code for SMS"
        - name: "event"
          in: "header"
          type: "string"
          required: true
