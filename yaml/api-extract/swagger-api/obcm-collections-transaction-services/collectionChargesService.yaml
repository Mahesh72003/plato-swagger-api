swagger: "2.0"
info:
  description: "Provides APIs for Cash Deposit and Cheque Deposit related charges "
  version: "1.0.0"
  title: "Charges - Cash and Cheque Deposit API's"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "CollectionChargesService"
    description: "Provides APIs for Cash Deposit and Cheque Deposit related charges "

paths:
  /service/v1/collectionCharges:
    get:
      tags:
        - "CollectionChargesService"
      summary: "Calculate the online charges for Cash Collection"
      description:  "Calculate the online charges for Cash Collection."
      operationId: "getCollectionChargeDetails"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: "App Id for SMS"
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
          description: "Tenant Id for SMS"
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "User Id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
          description: "Branch Code for SMS"
        - name: "applicationCode"
          in: "header"
          type: "string"
          required: true
          description: "Application Code for SMS"
        - name: "event"
          in: "header"
          type: "string"
          required: true
          description: "Event"
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/ObChargesTxnDTOCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not auhorized."
        500:
          description: "Internal error"
  /service/v1/collectionChequeCharges:
    get:
      tags:
        - "CollectionChargesService"
      summary: "Calculate the online charges for Cheque Collection"
      description:  "Calculate the online charges for Cheque Collection."
