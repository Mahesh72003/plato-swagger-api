      parentNodeLineId:
        type: "string"
        description: "Parent Node Line Id"
      externalLineId:
        type: "string"
        description: "External Line Id"
      status:
        type: "string"
        description: "Status"
      errorCode:
        type: "string"
        description: "Error Code"
      errorDesc:
        type: "string"
