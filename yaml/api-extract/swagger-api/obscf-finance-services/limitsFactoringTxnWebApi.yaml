        description: "Total Blocked Amount"
      totalUtilizedAmount:
        type: "number"
        description: "Total Utilized Amount"
      adhocSanctionedLmtAmt:
        type: "number"
        description: "Adhoc Sanctioned Limit Amount"
      adhocAvailableLmtAmt:
        type: "number"
        description: "Adhoc Available Limit Amount"
      adhocTotalBlockedAmt:
