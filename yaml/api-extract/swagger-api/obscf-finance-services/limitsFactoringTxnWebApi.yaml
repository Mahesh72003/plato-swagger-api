swagger: "2.0"
info:
  description: "This is a sample server ManualFinance server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Limits Factoring Transaction Web"
host: "api-plato.us.oracle.com:8080"
basePath: "/obscf-finance-services"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "limitsFactorTxnWeb"
    description: "API for Limits Factor Transaction Operations"
    
schemes:
- "https"

paths:
  /web/v1/limitsFactorTransaction:
    post:
      tags:
        - "limitsFactorTxnWeb"
      summary: "Adds a new limits Transaction."
      description: "Adds a new limits Transaction. Add additional information here for this endpoint."
      operationId: "createLimitsFactorTransaction"
      parameters:
        - name: "limitsTransactionCollection"
          in: "body"
          description: "Request Body that contains data required for creating a new limits Transaction"
          required: true
          schema:
            $ref: "#/definitions/LimitsFactorTransactionCollection"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: "Application Id"
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
          description: "Tenant Id"
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
          description: "Branch Code"
        - name: "authToken"
          in: "header"
          type: "string"
          required: false
          description: "Authorized Token"
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
          description: "Content Type"
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
          description: "Branch Date"
      responses:
        201:
          description: "Successfully created a new limits Transaction"
          headers:
            Location:
              description: "URL of newly created limits Transaction"
              type: "string"
          schema:
              $ref: "./financeTxnWebDef.yaml#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /web/v1/limitsFactorTransaction/{financeRefNo}:
    get:
      tags:
        - "limitsFactorTxnWeb"
      summary: "Retrieves the limits Transaction by ID."
      description:  "Retrieves the limits Transaction by ID. Add additional information here for the this endpoint."
      operationId: "getLimitsFactorTransactionByRefNo"
      parameters:
        - name: "financeRefNo"
          in: "path"
          description: "ReferenceNumber for which data needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: "Application Id"
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
          description: "Tenant Id"
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
          description: "Branch Code"
        - name: "authToken"
          in: "header"
          type: "string"
          required: false
          description: "Authorized Token"
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
          description: "Content Type"
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
          description: "Branch Date"
        - name: authorizationStatus
          in: query
          description: authorization Status
          required: false
          type: string
      responses:
        200:
          description: "Returns the limits Transaction based on given ReferenceNumber."
          schema:
            $ref: "./financeTxnWebDef.yaml#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
          
  /web/v1/limitsFactorTransaction/createTxn/{financeRefNo}:
    get:
      tags:
        - "limitsFactorTxnWeb"
      summary: "Retrieves the limits Transaction by ID."
      description:  "Retrieves the limits Transaction by ID. Add additional information here for the this endpoint."
      operationId: "createLimitsFactorTxnForFinance"
      parameters:
        - name: "financeRefNo"
          in: "path"
          description: "ReferenceNumber for which data needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: "Application Id"
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
          description: "Tenant Id"
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
          description: "Branch Code"
        - name: "authToken"
          in: "header"
          type: "string"
          required: false
          description: "Authorized Token"
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
          description: "Content Type"
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
          description: "Branch Date"
        - name: authorizationStatus
          in: query
          description: authorization Status
          required: false
          type: string
      responses:
        200:
          description: "Creates limits factor transaction records for given finance reference number"
          schema:
            $ref: "./financeTxnWebDef.yaml#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
          
  /web/v1/limitsFactorTransaction/getTxn/{financeRefNo}:
    get:
      tags:
        - "limitsFactorTxnWeb"
      summary: "Retrieves the limits Transaction by ID."
      description:  "Retrieves the limits Transaction by ID. Add additional information here for the this endpoint."
      operationId: "getLimitsTxnFactorTransactionByRefNo"
      parameters:
        - name: "financeRefNo"
          in: "path"
          description: "ReferenceNumber for which data needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: "Application Id"
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
          description: "Tenant Id"
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          description: "Branch Code"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: false
          description: "Authorized Token"
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
          description: "Content Type"
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
          description: "Branch Date"
      responses:
        200:
          description: "Returns the limits Transaction based on given ReferenceNumber."
          schema:
            $ref: "./financeTxnWebDef.yaml#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /web/v1/limitsFactorTransaction/{id}:         
    delete:
      tags:
        - "limitsFactorTxnWeb"
      summary: "Deletes the limits Transaction identified by given ID"
      description:  "Deletes the limits Transaction identified by given ID"
      operationId: "deleteLimitsFactorTransaction"
      parameters:
        - name: "id"
          in: "path"
          description: "Id of the limits Transaction that needs to be deleted"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: "Application Id"
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
          description: "Tenant Id"
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "user id for SMS"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
          description: "Branch Code"
        - name: "authToken"
          in: "header"
          type: "string"
          required: false
          description: "Authorized Token"
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
          description: "Content Type"
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
          description: "Branch Date"
      responses:
        200:
          description: "Successful operation."
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error" 
definitions:
  LimitsFactorTransactionCollection:
    description: "Collection of Limits Transaction Models."
    type: "object"
    properties:
      LimitsTransactionList:
        type: "array"
        items:
          $ref: "#/definitions/LimitsFactorTransactionModel"
      paging:
        type: "object"
  LimitsFactorTransactionModel:
    description: "Limits Transaction Model"
    type: "object"
    properties:
      id:
        type: "string"
        description: "Id"
      financeRefNo:
        type: "string" 
        description: "Finance Reference Number"
      limitEvent:
        type: string 
        description: "Limit Event"
      txnEvent:
        type: string  
        description: "Transaction event"       
      seqNo:
        type: "integer"
        format: "int64"
        description: "Sequence Number"
      limitsAction:
        type: "string"
        description: "Limits Action"
      limitType:
        type: "string"
        description: "Limit Type"
      limitTypeDesc:
        type: "string"
