        type: "string"
        required: true
        description: Branch Code
      - name: "branchDate" 
        in: "query" 
        type: "string" 
        description: Branch Date
      - name: "nextWorkingDate" 
        in: "query" 
        type: "string"
        description: Next Working Date
      responses:
        201:   
          description: "EOD Activity for Outstanding Transactions completed"
          schema:
            $ref: "./financeTxnWebDef.yaml#/definitions/EODResponseDetails"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"        
  /service/v1/overdueTxns:   
