        description: "Account Entry Code"
        type: "string"
      - name: "divisionCode"
        in: "query"
        description: "Division Code"
        type: "array"
        items:
         type: string
     responses:
        200:
         description: "Returns true if there are in progress txns"
         schema:
           type: boolean
        400:
         description: "Malformed syntax."
        401:
         description: "Request does not have sufficient credentials."
        403:
         description: "Request is not authorized."
        500:
         description: "Internal error"
         
  /service/v1/getLinkedFinancesToInvoice/{invoiceRefNo}:
