        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
          
  /service/v1/limitsEnquiry:
    get:
     tags:
      - "limitsTransactionService"
     summary: "Retrives the limits details for the given input request"
     description:  "Retrives the limits details for the given input request"
     operationId: "getLimits"
     parameters:
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      - name: "appId"
        description: "Application Id"
        in: "header"
        type: "string"
        required: true
      - name: "debtorId" 
        in: "query" 
        description: "Debtor Id"
        type: "string"
      - name: "debtorName"
        in: "query"
        description: "Debtor Name"
        type: "string"
      - name: "lineId"
        in: "query"
        description: "Line Id"
        type: "string"
      - name: "financeRefNo"
        in: "query"
        description: "Finance Reference Number"
        type: "string"
      - name: "processingDate" 
        in: "query" 
        description: "Processing Date"
        type: "string"
      - name: "productCode"
        in: "query"
        description: "Product Code"
        type: "string"
      - name: "programCode"
        in: "query"
        description: "Program Code"
        type: "string"
      - name: offset
        in: query
        description: Offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: Limit is maximum no of records to be fetched
        required: false
        type: integer
     responses:
        200:
         description: "Returns the anchorlimits based on given id."
         schema:
           $ref: "./financeTxnWebDef.yaml#/definitions/LimitsDetailsResponse"
        400:
         description: "Malformed syntax."
        401:
         description: "Request does not have sufficient credentials."
        403:
         description: "Request is not authorized."
        500:
         description: "Internal error"
         
  /service/v1/getInprogressTxns:
    get:
     tags:
      - "financeTransactionService"
     summary: "Retrives the in progress txns for given productCode/programCode/nonCustomerId/limitLineId"
     description:  "Retrives the in progress txns for given productCode/programCode/nonCustomerId/limitLineId"
     operationId: "getInprogressTxns"
     parameters:
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        description: "Application Id"
        type: "string"
        required: true
      - name: "productCode" 
        in: "query" 
        description: "Product Code"
        type: "string"
      - name: "programCode"
        in: "query"
        description: "Program Code"
        type: "string"
      - name: "nonCustId"
        in: "query"
