swagger: "2.0"
info:
  description: "Provides APIs to perform operations on finances"
  version: "1.0.0"
  title: "Finance Loan Service APIs"
host: "api-plato.us.oracle.com:8080"
basePath: "/obscf-finance-services"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "eodFinanceService"
    description: "APIs for Eod Finance Operations"
  - name: "limitsTransactionService"  
    description: "API to retrive the limits details for the given input request"   
  - name: "financeTransactionService"
    description: "API for Finance Operations"      

paths:        
  /service/v1/unauthorizedTxns:   
    get:
      tags:
       - "eodFinanceService"
      summary: Check for the unauthorized transactions
      description: Check for the unauthorized transactions
      operationId: isUnauthorizedTxns
      parameters:
      - name: "appId"
        in: "header"
        type: "string"
        required: true
        description: Application id        
      - name: "userId"
        in: "header"
        type: "string"
        required: true
        description: User id
            
      responses:
        201:   
          description: "Successfully performs the action"
          schema:
            $ref: "./financeTxnWebDef.yaml#/definitions/EODResponseDetails"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
          
  /service/v1/processOutstandingTxns:   
    get:
      tags:
       - "eodFinanceService"
      summary: Get the Outstanding Txn for given branch
      description: Get the Outstanding Txn for given branch
      operationId: processOutstandingTxn
      parameters:
      - name: "appId"
        in: "header"
        type: "string"
        required: true
        description: Application id        
      - name: "userId"
        in: "header"
        type: "string"
        required: true
        description: User id
      - name: "branchCode"
        in: "query"
        type: "string"
        required: true
        description: Branch Code
      - name: "branchDate" 
        in: "query" 
        type: "string" 
        description: Branch Date
      - name: "nextWorkingDate" 
        in: "query" 
        type: "string"
        description: Next Working Date
      responses:
        201:   
          description: "Processing of Outstanding Transactions completed"
          schema:
            $ref: "./financeTxnWebDef.yaml#/definitions/EODResponseDetails"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
          
  /service/v1/processNonPerformAssetTxns:   
    get:
      tags:
       - "eodFinanceService"
      summary: Get the NPA Txn for given branch
      description: Get the NPA Txn for given branch
      operationId: processNonPerformAssetTxn
      parameters:
      - name: "appId"
        in: "header"
        type: "string"
        required: true
        description: Application id        
      - name: "userId"
        in: "header"
        type: "string"
        required: true
        description: User id
      - name: "branchCode"
        in: "query"
        type: "string"
        required: true
        description: Branch Code
      - name: "branchDate" 
        in: "query" 
        type: "string" 
        description: Branch Date
      - name: "nextWorkingDate" 
        in: "query" 
        type: "string"
        description: Next Working Date
      responses:
        201:   
          description: "EOD Activity for Outstanding Transactions completed"
          schema:
            $ref: "./financeTxnWebDef.yaml#/definitions/EODResponseDetails"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"          
