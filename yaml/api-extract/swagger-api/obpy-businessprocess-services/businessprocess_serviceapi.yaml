swagger: '2.0'
info:
  description: You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Business Process Service
host: 10.184.157.121:9000
basePath: /business-process-service
tags:
  - name: BusinessProcessAPI
    description: API for business Process Operations
schemes:
  - http
paths:
  /service-api/v1/businessprocess/summary:
    get:
      tags:
        - "BusinessProcessServiceSummary"
      summary: "Get all valid business process with only id and name values."
      description:  " Get all valid business process with only id and name values..This endpoints will be used to Get all valid business process maintanence records."
      operationId: "getBusinessProcesses"
      produces:
        - "application/json"
        - "application/xml"
      responses:
        201:
          description: "Returns message of succes or failure"
          headers:
            Location:
              description: ""
              type: "string"
          schema:
            type: object
            $ref: "#/definitions/BusinessProcessServiceSummaryCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /service-api/v1/businessprocess/datasegments/{businessProductCode}/{lifeCycleCode}:
    get:
      tags:
        - "BusinessProcessServiceSummary"
      summary: "Returns all data segments of the process corresponding to given product  and life cycles codes as  json string "
      description:  "Returns all data segments of the process corresponding to given product  and life cycles codes "
      operationId: "getDataSegmentDetails"
      produces:
        - "application/json"
        - "application/xml"
      parameters:
        - name: "businessProductCode"
          in: "path"
          description: "businessProductCode of the process for which all  data segments to be fetched"
          required: true
          type: "string"
        - name: "lifeCycleCode"
          in: "path"
          description: "lifeCycleCode of the process for which all  data segments to be fetched"
          required: true
          type: "string"
        - name: "includeStageInfo"
          in: "query"
          description: "Flag to indicate if stage information is required in the response"
          required: false
          type: boolean
      responses:
        201:
          description: "Returns message of succes or failure"
          headers:
            Location:
              description: ""
              type: "string"
          schema:
            type: object
            $ref: "#/definitions/String"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /businessprocess/transactioncontroller/{businessProcessCode}:
    post:
      tags:
        - "BusinessProcessServiceSummary"
      summary: "Adds a new businessprocess to TCM."
      description: "Adds a new businessprocess. Add additional information here for this endpoint."
      operationId: "saveTransactionControllerRecord"
      parameters:
        - name: "businessProcessCode"
          in: "path"
          description: "Request Body that contains data required for creating a new businessprocess in TCM"
          required: true
          type: "string"
        - name: "productCode"
          in: "query"
          description: "Request Body that contains data required for creating a new businessprocess in TCM"
          required: false
          type: "string"
        - name: "lifecycleCode"
          in: "query"
          description: "Request Body that contains data required for creating a new businessprocess in TCM"
          required: false
          type: "string"                    
        - name: "BPCModel"
          in: "body"
          description: "Request Body that contains data required for creating a new processCode in TCM"
          required: true
          schema:
            $ref: "#/definitions/BPCModel"
      responses:
        201:
          description: "Returns message of succes or failure "
          headers:
            Location:
              description: "URL of newly created businessprocess"
              type: "string"
          schema:
            $ref: "#/definitions/ObpyTmBusinessProcessWrapperDTO"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
