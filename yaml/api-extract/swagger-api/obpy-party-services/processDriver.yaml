swagger: "2.0"
info:
  description: "This is a sample server Legal Opinion server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "OBPY-Party-Services"
host: "whf00bdm:7801"
basePath: "/obpy-party-services"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "PartyAPI"
    description: "API for Party  Operations"

schemes:
  - "http"

paths:
  /web/v1/party/processdriver:
    post:
      tags:
        - "processDriverWeb"
      summary: "Process driver"
      description: "Process driver"
      operationId: "partyProcessDriver"
      parameters:
        - name: "processDriverReq"
          in: "body"
          description: "Request Body that contains data required for creating a new Party Demographics"
          required: true
          schema:
            $ref: "#/definitions/PartyDemographicsModel"
        - name: "processCode"
          in: "query"
          type: "string"
          required: false
        - name: "lifecycleCode"
          in: "query"
          type: "string"
          required: false                      
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date"
          required: false
      responses:
        201:
          description: "Successfully created a new Party Demographic Details"
          headers:
            Location:
              description: "URL of newly created Party Demographics"
              type: "string"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
         
definitions:
  ProcessDriverResponseModel:
    properties:
      processCode:
        type: string
      productCode:
        type: string
      LifecycleCode:
        type: string            