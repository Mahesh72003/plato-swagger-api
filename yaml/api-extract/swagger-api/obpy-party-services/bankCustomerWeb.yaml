          partyId:
            type: "string"
          partyType:
            type: "string"
          partyCategory:
            type: "string"
          applicationNumber:
            type: "string"
          organizationName:
            type: "string"
          registrationNumber:
            type: "string"
          organizationType:
            type: "string"
          holdingPattern:
            type: "string"
          demographicType:
            type: "string"
          countryOfRisk:
            type: "string"            
          requestType:
            type: "string"
          incorporationDate:
            type: "string"
            format: "date"
          icrName:
            type: "string"
          fiCode:
            type: "string"
          bicCode:
            type: "string"
          fiOwnerShipType:
            type: "string"
          businessType:
            type: "string"
          micr:
            type: "string"            
          rtgs:
            type: "string"
          isEarMarkingMandated:
            type: "boolean"
          role:
