definitions:
  LmsTbContributionDTO:
    type: object
    allOf:
    - $ref: '#/definitions/GenericDto'
    - type: object
      properties:
        executionId:
          type: string
          description: ''
        structureId:
          type: string
          description: ''
        toAccountNumber:
          type: string
          description: ''
        toAccountBranch:
          type: string
          description: ''
        toAccountCurrency:
          type: string
          description: ''
        fromAccountNumber:
          type: string
          description: ''
        fromAccountBranch:
          type: string
          description: ''
        fromAccountCurrency:
          type: string
          description: ''
        contributionAmount:
          type: number
          description: ''
        fromCurrencyAmount:
          type: number
          description: ''
        valueDate:
          type: string
#          format: date
          description: ''
        fxrate:
          type: number
          description: ''
        status:
          type: string
          description: ''
  LmsTbStructureDetailsDTO:
    type: object
    properties:
      parentAccNo:
        type: string
        description: ''
      parentBranch:
        type: string
        description: ''
      parentCcy:
        type: string
        description: ''
      childAccNo:
        type: string
        description: ''
      childBranch:
        type: string
        description: ''
      childCcy:
        type: string
        description: ''
      valueDate:
        type: string
        description: ''
      dailyAccrDate:
        type: string
        description: ''        
      dailyContriAmnt:
        type: number
        description: ''
  LmsTbStructureDetailsCollection:
    description: Collection of Contribution.
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/LmsTbStructureDetailsDTO'
  ResponseDto:
    type: object
    properties:
      id:
        type: string
      status:
        type: string
      codes:
        type: array
        items:
          $ref: '#/definitions/ResponseCode'
      requestId:
        type: string
  ResponseCode:
    type: object
    properties:
      Code:
        type: string
      Desc:
        type: string
      Type:
        type: string
      Language:
        type: string
      args:
        type: array
        items:
          type: object
      arg:
        type: string
  GenericDto:
    allOf:
    - type: object
      discriminator: resource_type
  LmsTbContributionCollection:
    description: Collection of Contribution.
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/LmsTbContributionDTO'
      paging:
        $ref: '#/definitions/PagingDto'
  PagingDto:
    type: object
    properties:
      totalResults:
        type: integer
  ResponseDtoWrapper:
    type: object
    properties:
      messages:
        $ref: '#/definitions/ResponseDto'
      data:
        $ref: '#/definitions/ResponseResourceSupport'
  ResponseResourceSupport:
    type: object