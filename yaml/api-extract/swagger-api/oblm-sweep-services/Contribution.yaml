        required: true
        type: string
      - name: dailyAccDate
        in: query
        description: dailyAccDate
        required: true
        type: string        
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/LmsTbStructureDetailsDTO'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /contribution/parentContribution:
    get:
      tags:
      - contribution
      summary: Get all valid contribution.
      description: Get all valid contribution. This endpoints will be used to Get all valid contribution maintenance records.
      operationId: getParentContribution
      parameters:
      - name: parentAccountNumber
