        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /fileupload/fetchUploadDetails:     
    post:
      tags:
      - "FileUploadAPI"
      summary: "Get all valid upload details."
      description:  "Get all valid upload details. This endpoints will be used to Get all valid  upload records."
      operationId: "fetchUploadDetails"
      parameters:
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      - name: FileUploadInputDTO
        in: "body"
        description: "Request Body that contains data required for creating a new oblm-batch-services" 
        required: true
        schema:
         $ref: "#/definitions/FileUploadInputDTO"    
      responses:
        201:
          description: "Returns message of succes or failure"
          headers: 
            Location:
              description: ""
              type: "string"
          schema:
           $ref: "#/definitions/LmbTmUploadMasterCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error" 
