        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /fileupload/process:
    post:
      tags:
      - "FileUploadAPI"
      summary: "Adds a new file upload record."
      description: "Adds a new file upload record. Add additional information here for this endpoint."
      operationId: "process"
      parameters:
      - in: body
        description: "Request Body that contains data required for creating a new fileupload"
        required: true
        name: process
