swagger: "2.0"
info:
  description: "This is a sample  server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Fileupload Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
- "application/json"
- "application/xml"
produces:
- "application/json"
- "application/xml"
tags:
- name: "FileUploadAPI"
  description: "API for File Upload Operations"

schemes:
- "https"

paths:
  /fileupload:
    post:
      tags:
      - "FileUploadAPI"
      summary: "Adds a new file upload status record."
      description: "Adds a new file upload status record. Add additional information here for this endpoint."
      operationId: "save"
      parameters:
      - name: "fileupload"
        in: "body"
        description: "Request Body that contains data required for creating a new fileupload"
        required: true
        schema:
          $ref: "#/definitions/LmbTmUploadMasterDTO"
      responses:
        201:
          description: "Returns message of succes or failure "
          headers:
            Location:
              description: "URL of newly created fileupload"
              type: "string"
          schema:
            $ref: "#/definitions/ResponseDtoWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
    get:
      tags:
      - "FileUploadAPI"
      summary: "Retrieves the list of existing fileupload."
      description:  "Retrieves the list of existing fileupload. Add additional information here for the this endpoint."
      operationId: "getAll"
      parameters:
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      - in: query
        name: fileName
        required: false
        type: string
      - in: query
        name: functionId
        required: false
        type: string
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/LmbTmUploadMasterCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /fileupload/{id}:
    get:
      tags:
      - "FileUploadAPI"
      summary: "Retrieves the fileupload by ID."
      description:  "Retrieves the fileupload by ID. Add additional information here for the this endpoint."
      operationId: "getById"
      parameters:
      - name: "id"
        in: "path"
        description: "Id of the user that needs to be fetched"
        required: true
        type: "string"
      responses:
        200:
          description: "Returns the currencyliability based on given id."
          schema:
            $ref: "#/definitions/LmbTmUploadMasterWrapperDTO"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /fileupload/upload:
    post:
      tags:
      - "FileUploadAPI"
      summary: "Adds a new file upload status record."
      description: "Adds a new file upload status record. Add additional information here for this endpoint."
      operationId: "upload"
