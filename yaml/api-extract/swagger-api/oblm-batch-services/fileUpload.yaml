  BICDirectoryDTO:
    type: object
    allOf:
    - $ref: '#/definitions/GenericDto'
    - type: object
      properties:
       bicCode:
        type: string
        description: "BIC Code or Bank Code"
        pattern: '[A-Za-z0-9_*-]+'
       bankName:
        type: string
        description: "Name of the Bank"
        minLength: 1
        maxLength: 35
        pattern: '[a-zA-Z0-9\s]+'
       customerNo:
        type: string
        description: "If the bank is a customer of your bank, you can select the Customer No assigned to the bank"
       skArrangement:
        type: string
        description: "Indicate whether a SK arrangement exists between your bank and the BIC entity"
        pattern: '[Y,N]'
       bankAddress1:
        type: string
        description: "Bank Address Line 1"
        minLength: 0
        maxLength: 35
       bankAddress2:
        type: string
        description: "Bank Address Line 2"
        minLength: 0
        maxLength: 35
       bankAddress3:
        type: string
        description: "Bank Address Line 3"
        minLength: 0
        maxLength: 90
       relationship:
        type: string
        description: "the kind of relationship that exists between your bank and the BIC entity. Options are N - No, K - Keys, M - Mail"
        pattern: '[N,K,M]'
       swiftKey:
        type: string
        description: "If a SWIFT connectivity exists between your bank and the bank for which BIC details are maintained, relationship should be selected as Keys and SWIFT Key should be specified"
        minLength: 0
        maxLength: 50
       telexKey:
        type: string
        description: "If a Telex connectivity exists between your bank and the bank for which BIC details are maintained, relationship should be selected as Keys and Telex Key should be specified"
        minLength: 0
        maxLength: 50
       uploadFlag:
        type: string
        description: ""
       uploadUpdate:
        type: string
        description: "Indicates whether update is required during upload"
        pattern: '[Y,N]'
       genMt103:
        type: string
        description: ""
        pattern: '[Y,N]'
       blacklisted:
        type: string
        description: "Indicates that the BIC entity is also black listed"
        pattern: '[Y,N]'
       cugMember:
        type: string
        description: "Indicates that the BIC entity is a Closed User Group member"
        pattern: '[Y,N]'
       genMt103p:
        type: string
        description: ""
        pattern: '[Y,N]'
       multiCustTransfer:
        type: string
        description: "Indicate whether or not a Multi Credit Transfer Feature [MT102 support] exists between your bank and the BIC entity"
        pattern: '[Y,N]'
       maxSize:
        type: number
        description: "Indicate the maximum size in bytes, agreed upon between the two parties for transmitting a MT102 message. A null value in this field signifies that there is no limit set on the size of the message"
        pattern: '([0-9]+)?'
       remitMember:
        type: string
        description: "Indicates that the customer is registered with MT 103 Extended Remittance Information Multi User Group"
        pattern: '[Y,N]'
       subTypeCode:
        type: string
        description: "Select the appropriate sub-type code to be mapped to the BIC"
       genMt102p:
        type: string
        description: "Check this box to process MT102+ messages. Selecting this check box also required the ?Multi Customer Credit Transfer? checkbox to be selected"
        pattern: '[Y,N]'
       genMt101:
        type: string
        description: "Indicates whether an MT101 can be sent/received from this BIC. Select this option to generate MT101 message"
        pattern: '[Y,N]'
       transactionPerMsg:
        type: number
        description: "Indicate the no of transactions to be included in an MT101 message. If you do not specify a value it will be defaulted to 10"
        pattern: '([0-9]+)?'
       adbMember:
        type: string
        description: "Select a value to indicate membership of the specified BIC code in Asian Development Bank. Options are Y - Yes, N - No, X - Not Applicable"
        pattern: '[Y,N,X]'
       beIndicator:
        type: string
        description: "Identifies whether the BEI status for the chosen sub-type code is Yes or No"
        pattern: '[Y,N]'
       modificationFlag:
        type: string
        description: "This field indicates modification flag"
       recordKey:
        type: string
        description: "The unique key of the record in the file"
       officeType:
        type: string
        description: "This field indicates the type of the entity in the office hierarchy"
       parentOfficeKey:
        type: string
        description: "This field indicates the RECORD KEY of the closest entity upwards in the office hierarchy"
       headOfficeKey:
        type: string
        description: "This field indicates the RECORD KEY of the Head Office in the office hierarchy"
       legalType:
        type: string
        description: "This field indicates the status of the entity in the legal hierarchy"
       legalParentKey:
        type: string
        description: "This field indicates the RECORD KEY of the  Entity in the legal hierarchy"
       groupType:
        type: string
        description: "Type of entity that identifies the group"
       groupParentKey:
        type: string
        description: "The record key of the parent entity. This value identifies the set of entities (records) belonging to the group"
       institutionStatus:
        type: string
        description: "This field indicates the license status of the institution"
       cooperativeGroupKey:
        type: string
        description: "If record indicates a co-operative bank which belongs to a cooperative bank group, this field indicates the record key of the co-operative central bank for that group"
       isoLeiCode:
        type: string
        description: "This is the Legal Entity Identifier as defined by ISO 17442. For future use"
       bic8:
        type: string
        description: "This field indicates BIC (institution, country, and location code)"
       branchBic:
        type: string
        description: "The BIC branch code associated with the BIC8 code"
       chipsUid:
        type: string
        description: "This is the CHIPS Universal ID related to the institution"
       nationalId:
        type: string
        description: "This is the National identifier of the institution/branch"
       connectedBic:
        type: string
        description: "For a BIC code in the field BIC that is not connected to the SWIFT network. This is the connected BIC code of the same institution"
       branchInformation:
        type: string
        description: "Branch Information as provided by the Financial Institution to which it belongs"
       pobNumber:
        type: string
        description: "PO box number of the institution/branch"
       streetAddress4:
        type: string
        description: "This field indicates about area of the institution/branch"
       city:
        type: string
        description: "City name of the institution/branch"
       cps:
        type: string
        description: "County, province, state or other administrative region of the owner institution/branch"
       zipCode  :
        type: string
        description: "Zip code of the institution/branch"
       countryName:
        type: string
        description: "The country name of the institution/branch as indicated in the ISO 3166"
       isoCountryCode:
        type: string
        description: "The ISO 3166-1 alpha-2 code of the country of the institution/branch"  
       timeZone:
        type: string
        description: "This field indicates about time zone of the institution/branch"
       subTypeIndicator:
        type: string
        description: "The business type of the entity. Subtype Indicator is provided only for records with a BIC code"
       networkConnectivity:
        type: string
        description: "This field is to be provided only for records containing a BIC code"
       branchQualifiers:
        type: string
        description: "The operational type of the entity. Branch Qualifiers are provided only for records containing a BIC code"
       serviceCodes:
        type: string
        description: "SWIFT FIN-Copy service codes (also called value-added service codes). Service Codes are provided only for records containing a BIC code"
       ssiGroupKey:
        type: string
        description: "This field indicates which SSI Group the entity belongs to in the SSI Plus files"
       ibanKey:
        type: string
        description: "It identifies the RECORD KEY in the IBAN PLUS TXT file that contains the IBAN data for this entity"
       fieldA:
        type: string
        description: "This field is reserved for future use. In case values will be populated, the file structure and the field name will not change"
       fieldB:
        type: string
        description: "This field is reserved for future use. In case values will be populated, the file structure and the field name will not change"   
      required:
       - bicCode
       - bankName
