swagger: "2.0"
info:
 description: "This is a sample server account maintenance server." 
 version: "1.0.0"
 title: "Account Maintenance Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/v1"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "account"
   description: ""

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../accountList

 /account:
  get:
   tags:
    - "account"
   summary: "Get all valid account."
   description:  "Get all valid account. This endpoints will be used to Get all valid account maintenance records."
   operationId: "fetchAccountList"
   parameters:
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: accountNumber
     required: false
     type: string
   - in: query
     name: branchCode
     required: false
     type: string
   - in: query
     name: currency
     required: false
     type: string
   - in: query
     name: customerId
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/LmmTmAccountCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
