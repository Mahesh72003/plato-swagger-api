definitions:
 CmcTmUploadSourcePrefDto:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     sourceCode:
      type: string
      minLength: 0
      maxLength: 15
     uploadedStatus:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^(?:H|U|A)$
     onError:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^(E)$
     onOverride:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^(?:E|I|O)$
     proceedWithEod:
      type: string
      minLength: 0
      maxLength: 1
     deleteAllowed:
      type: string
      minLength: 0
      maxLength: 1
     reverseAllowed:
      type: string
      minLength: 0
      maxLength: 1
     amendAllowed:
      type: string
      minLength: 0
      maxLength: 1
     purgeDays:
      type: number
      minLength: 0
      maxLength: 4
     allowDeferredProcessing:
      type: string
      minLength: 0
      maxLength: 1
     allowEodWithDeferred:
      type: string
      minLength: 0
      maxLength: 1
     allowDelete:
      type: string
      minLength: 0
      maxLength: 1
     onQueueException:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^(?:E|I)$
     onRepairableException:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^(?:E|I)$
    required:
     - sourceCode
     - uploadedStatus
     - onError
     - onOverride
 CmcTmUploadSourceDto:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     sourceCode:
      type: string
      minLength: 0
      maxLength: 15
      pattern: ^[A-Z0-9*_]*$
     sourceDesc:
      type: string
      minLength: 0
      maxLength: 105
     baseDataFromFc:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^(?:Y|N)$
     sysAuthReq:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^(?:Y|N)$
    required:
     - sourceCode

