 /ecasystems/{id}/history:
  get:
   tags:
    - "ecasystems"
   summary: "Retrives the ecasystems by given ID."
   description:  "Retrives the ecasystems by ID."
   operationId: "getHistory"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the ecasystems based on given id."
     schema:
       $ref: "#/definitions/ECASystemCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
definitions:
 ECASystemDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     ecaSystem:
      type: string
      description: "Name of the ECA system"
      minLength: 1
      maxLength: 15
      pattern: '[a-zA-Z0-9\s]+'
     ecaSystemDescription:
      type: string
      description: "Description for ECA system"
      minLength: 0
      maxLength: 105
    required:
     - ecaSystem
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 ECASystemCollection: 
  description: "Collection of ecasystem."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/ECASystemDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 ECASystemWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/ECASystemDTO"
