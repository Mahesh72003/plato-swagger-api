swagger: "2.0"
info:
 description: "This is a sample server ecasystems server." 
 version: "1.0.0"
 title: "ecasystems Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "ecasystems"
   description: "External Credit Approval System (ECA System) can be maintained using this service. This field is also referred as Source System which identifies the source of the maintenance (Customer, Account, Branch, Bank, Transaction code etc)."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supported http methods POST and GET
#
# path example ../ecasystems

 /ecasystems:
  post:
   tags:
    - "ecasystems"
   summary: "Adds a new ecasystems."
   description: "Adds a new ecasystems. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "ecasystems" 
      in: "body" 
      description: "Request Body that contains data required for creating a new ecasystems" 
      required: true
      schema:
       $ref: "#/definitions/ECASystemDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created ecasystems" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "ecasystems"
   summary: "Get all valid ecasystems."
   description:  "Get all valid ecasystems. This endpoints will be used to Get all valid ecasystems maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: ecaSystem
     required: false
     type: string
   - in: query
     name: ecaSystemDescription
     required: false
     type: string
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: checkerId
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   - in: query
     name: authStat
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/ECASystemCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  suported http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../ecasystems/xxx
#   DELETE    .../ecasystems/xxx
#   GET       .../ecasystems/xxx
#   GET       .../ecasystems/xxx?version=latestrecord
#   GET       .../ecasystems/xxx?version=1

 /ecasystems/{id}:
  put:
   tags:
    - "ecasystems"
   summary: "Update an existing ecasystems."
   description:  "Update an existing ecasystems."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the ecasystems Maintenance"
      required: true
      type: "string"
    - name: "ecasystems"
      in: "body"
      description: "Request Body that contains data required for updating an existing ecasystems"
      required: true
      schema:
       $ref: "#/definitions/ECASystemDTO"
   responses:
    200:
     description: "Returns updated ecasystems"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "ecasystems"
   summary: "Retrieves the ecasystems by ID."
   description:  "Retrieves the ecasystems by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the ecasystems based on given id."
     schema:
      $ref: "#/definitions/ECASystemWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "ecasystems"
   summary: "Deletes the ecasystems identified by given ID."
   description:  "Deletes the ecasystems identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the ecasystems maintenance"
      required: true
      type: "string"
    - name: "ecasystems"
      in: "body"
      description: Request body contain ecasystems and Modification no of ecasystems maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supported http methods PATCH
#
# path examples----
#   PATCH       .../ecasystems/xxx/approve

 /ecasystems/{id}/approve:
  patch:
   tags:
    - "ecasystems"
   summary: "Authorize the ecasystems by given ID."
   description:  "Authorize the ecasystems identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the ecasystems maintenance"
      required: true
      type: "string"
    - name: "ecasystems"
      in: "body"
      description: Request body contain ecasystems and Modification no of ecasystems maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supported http methods PATCH
#
# path examples----
#   PATCH       .../ecasystems/xxx/close
 /ecasystems/{id}/close:
  patch:
   tags:
    - "ecasystems"
   summary: "Close the ecasystems by given ID."
   description:  "Close the ecasystems identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the ecasystems maintenance"
      required: true
      type: "string"
    - name: "ecasystems"
      in: "body"
      description: Request body contain ecasystems and Modification no of ecasystems maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supported http methods PATCH
#
# path examples----
#   PATCH       .../ecasystems/xxx/reopen

 /ecasystems/{id}/reopen:
  patch:
   tags:
    - "ecasystems"
   summary: "reopen the ecasystems by given ID."
   description:  "reopen the ecasystems identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the ecasystems maintenance"
      required: true
      type: "string"
    - name: "ecasystems"
      in: "body"
      description: Request body contain ecasystems and Modification no of ecasystems maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supported http methods GET
#
# path examples----
#   GET       .../ecasystems/xxx/unauthorized

 /ecasystems/{id}/unauthorized:
  get:
   tags:
    - "ecasystems"
   summary: "Retrives the ecasystems by given ID."
   description:  "Retrives the ecasystems identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the ecasystems based on given id."
     schema:
       $ref: "#/definitions/ECASystemCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to  history record for remitterid
#
#  supported http methods GETS
#
# path examples----
