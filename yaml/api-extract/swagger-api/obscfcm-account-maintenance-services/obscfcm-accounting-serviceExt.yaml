swagger: "2.0"
info:
 description: "Provides APIs to perform Operations on Accounting" 
 version: "1.0.0"
 title: "Accounting APIs"
host: "api-plato.us.oracle.com:8080"
basePath: "/obscfcm-account-maintenance-services"
consumes:
 - "application/json"
 - "application/xml"
produces:
 - "application/json"
 - "application/xml"
tags:
 - name: "accountingservices"
   description: "API for SCF Accounting's Operations"
 - name: "accountingpost"
   description: "API for SCF Accounting's Post Operations"

paths:
  /service/v1/accounting:     
    post:
      tags:
      - "accountingservices"
      summary: "Get all accounting entries with their details based on filter(query param) criterias."
      description: "Get all accounting entries."
      operationId: "getAllAccountingDetails"
      produces:
        - "application/json"
        - "application/xml"
      parameters:
      - name: "branchCode"
        in: "header"
        description: "Branch Code"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        description: "Application Id"
        required: true
        type: "string"
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      - name: offset
        in: query
        description: "offset is starting no of records to be fetched"
        required: false
        type: integer
      - name: limit
        in: query
        description: "limit is maximum no of records to be fetched"
        required: false
        type: integer     
      - name: "rquestDto" 
        in: "body" 
        description: "Request Body that contains data required for creating a new accentrycode" 
        required: true
        schema:
            $ref: "./obscfcm-accounting-def.yaml#/definitions/GenericObscfCmAccountDTO"
      responses:
        201:
          description: "Returns message of success or failure"
          schema:
            $ref: "#/definitions/AccountingCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /service/v1/accountDetails:     
    get:
      tags:
      - "accountingservices"
      summary: "Get all account details based on filter(query param) criteria."
      description: "Get all account details."
      operationId: "getByPartyId"
      produces:
        - "application/json"
        - "application/xml"
      parameters:
      - name: "partyId"
        in: "query"
        description: "Party Id"
        required: false
        type: "string"
      - name: "branchCode"
        in: "query"
        description: "Branch Code"
        required: false
        type: "string"
      - name: "eventCode"
        in: "query"
        description: "Event Code"
        required: false
        type: "string"
      - name: "productCode"
        in: "query"
        description: "Product Code"
        required: false
        type: "string"
      - name: "recordStat"
        in: "query"
        description: "Record Status"
        required: false
        type: "string"
      - name: "appId"
        in: "header"
        description: "Application Id"
        required: true
        type: "string"
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      responses:
        201:
          description: "Returns message of success or failure"
          schema:
            $ref: "#/definitions/ScfTmExtAccMapMasterModelCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /service/v1/partyId:     
    get:
      tags:
      - "accountingservices"
      summary: "Get Party Id  based on filter(query param) criteria."
      description: "Get Party Id."
      operationId: "getPartyId"      
      parameters: 
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"     
      - name: "branchCode"
        in: "header"
        description: "Branch Code"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        description: "Application Id"
        required: true
        type: "string"  
      - name: "bankCode"
        in: "query"
        description: "Bank Code"
        required: true
        type: "string"        
      - name: "extAcNo"
        in: "query"
        description: "External Account Number"
        required: true
        type: "string"          
      responses:
        201:
          description: "Returns message of success or failure"
          schema:
            type: "string"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /service/v1/internalAccount/party:     
    get:
      tags:
      - "accountingservices"
      summary: "Get Party based on the account number"
      description: "Get Party based on account number."
      operationId: "getPartyByIntAccNo"      
      parameters: 
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"     
      - name: "branchCode"
        in: "header"
        description: "Branch Code"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        description: "Application Id"
        required: true
        type: "string"  
      - name: "intAcNo"
        in: "query"
        description: "Internal Account Number"
        required: false
        type: "string"  
      - name: "applicationCode"
        in: "query"
        description: "Application Code"
        required: false
        type: "string"           
      responses:
        201:
          description: "Returns message of success or failure"
          schema:
            $ref: "#/definitions/InternalPartyDetails"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
          
  /service/v1/updateExternalSystemResponse:     
    post:
      tags:
      - "accountingservices"
      summary: "Update external system response status"
      description: "Update external system response status"
      operationId: "updateExternalSystemResponse"
      produces:
        - "application/json"
        - "application/xml"
      parameters:
      - name: "branchCode"
        in: "header"
        description: "Branch Code"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        description: "Application Id"
        required: true
        type: "string"
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      - name: "externalSystemResponse" 
        in: "body" 
        description: "Request Body that contains response status for external systems" 
        required: true
        schema:
            $ref: "#/definitions/ExternalSystemResponseStatus"
      responses:
        201:
          description: "Returns message of success or failure"
          schema:
            $ref: "#/definitions/ExternalSystemStatusUpdateResponse"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"        
          
  /service/v1/accountingpost:
     post:
       tags:
        - "accountingpost"
       summary: "Adds a new accentrycode."
       description: "Adds a new accounting entry code."
       operationId: "saveRecord"
       parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: "Application Id"        
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "User Id"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
          description: "Branch Code"
        - name: "accontingTransactionModelcollection" 
          in: "body" 
          description: "Request Body that contains data required for creating a new accounting" 
          required: true
          schema:
           $ref: "./obscfcm-accounting-def.yaml#/definitions/AccountingTransactionCollection"
       responses:
        201: 
         description: "Returns message of succes or failure " 
         headers:
          Location:
           description: "URL of newly created accentrycode" 
           type: "string"
         schema:
           $ref: "#/definitions/ResponseDtoWrapper"
        400:
         description: "Malformed syntax."
        401:
         description: "Request does not have sufficient credentials."
        403:
         description: "Request is not authorized."
        405:
         description: "Invalid input"
        500:
         description: "Internal error"
     get:
       tags:
        - "accountingpost"
       summary: "Get all valid accentrycode."
       description:  "Get all valid accounting entry code."
       operationId: "getAll"
       parameters:
       - name: id
         in: query
         description: "Id"
         required: false
         type: string       
       - name: includecloseandunauth
         in: query
         description: "includecloseandunauth need to be set to fetch summary record, defult value is false"
         required: false
         type: boolean
       - name: "appId"
         in: "header"
         type: "string"
         required: true
         description: "Application Id"        
       - name: "userId"
         in: "header"
         type: "string"
         required: true
         description: "User Id"
       - name: "branchCode"
         in: "header"
         type: "string"
         required: true
         description: "Branch Code"   
       - name: offset
         in: query
         description: "offset is starting no of records to be fetched"
         required: false
         type: integer
         
       - name: refNo
         in: query
         description: "Reference Number"
         required: false
         type: "string"
         
       - name: seqNo
         in: query
         description: "Sequence Number"
         required: false
         type: "integer"
         format: "int64"
         
       - name: drCrIndicator
         in: query
         description: "Debit Credit Indicator"
         required: false
         type: "string"
         
       - name: amountCcy
         in: query
         description: "Amount Currency"
         required: false
         type: "string"
         
       - name: amountType
         in: query
         description: "Amount Type"
         required: false
         type: "string"
         
       - name: accountNo
         in: query
         description: "Account Number"
         required: false
         type: "string"
         
       - name: status
         in: query
         description: "Status"
         required: false
         type: "string"
         
       - name: accRoleCode
         in: query
         description: "Accounting Role Code"
         required: false
         type: "string"
         
       - name: accPartyType
         in: query
         description: "Party Type"
         required: false
         type: "string"
         
       - name: accPartyId
         in: query
         description: "PartyId"
         required: false
         type: "string"
         
       - name: accSettMethod
         in: query
         description: "Settlement Method"
         required: false
         type: "string"
         
         
       - name: accRoleDesc
         in: query
         description: "Accounting Role Description"
         required: false
         type: "string"
         
       - name: accEntryDesc
         in: query
         description: "Accounting Entry Description"
         required: false
         type: "string"
         
       - name: accType
         in: query
         description: "Account Type"
         required: false
         type: "string"
         
       - name: eventSrNo
         in: query
         description: "Event Sr No."
         required: false
         type: "string"
         
       - name: ecaRefNo
         in: query
         description: "ECA Ref Number"
         required: false
         type: "string"
         
       - name: externalAccount
         in: query
         description: "External Account"
         required: false
         type: "string"
         
       - name: paymentMode
         in: query
         description: "Payment Mode"
         required: false
         type: "string"
         
       - name: externalAccountCcy
         in: query
         description: "External Account Currency"
         required: false
         type: "string"
         
       - name: externalBankId
         in: query
         description: "External Bank Id"
         required: false
         type: "string"
         
       - name: externalBankName
         in: query
         description: "External Bank Name"
         required: false
         type: "string"
         
       - name: externalBranchCode
         in: query
         description: "External Branch Code"
         required: false
         type: "string"
         
       - name: externalBranchName
         in: query
         description: "External Branch Name"
         required: false
         type: "string"
         
       - name: externalBranchRoutingCode
         in: query
         description: "External Branch Routing Code"
         required: false
         type: "integer"
         format: "int64"
     
       - name: accEntryDescription
         in: query
         description: "AccEntryDescription is the description of AccEntryCode."
         required: false
         type: "string"
         
       - name: limit
         in: query
         description: "limit is maximum no of records to be fetched"
         required: false
         type: integer
         
       - name: dateRefBasis         
         in: query
         description: "Date Type"
         required: false
         type: string
         
       - name: dateFrom
         in: query
         description: "Date From"
         required: false
         type: string
         pattern: '^\d{4}-\d{2}-\d{2}$'
         
       - name: dateTo
         in: query
         description: "Date to"
         required: false
         type: string
         pattern: '^\d{4}-\d{2}-\d{2}$'
         
       - name: postingStatus
         in: query
         description: "Posting Status"
         required: false
         type: string
         
       - name: eventCode
         in: query
         description: "Event Code"
         required: false
         type: string
         
       - name: applicationCode
         in: query
         description: "Application Code"
         required: false
         type: string
         
       - name: productCode
         in: query
         description: "Product Code"
         required: false
         type: string
         
       - name: authorizationStatus
         in: query
         description: "Authorization Status"
         required: false
         type: string
         
       responses:
        201:
         description: "Returns message of succes or failure"
         headers: 
          Location:
           description: "Location"
           type: "string"
         schema:
           $ref: "./obscfcm-accounting-def.yaml#/definitions/AccountingTransactionCollection"
        400:
         description: "Malformed syntax."
        401:
         description: "Request does not have sufficient credentials."
        403:
         description: "Request is not authorized."
        405:
         description: "Invalid input"
        500:
         description: "Internal error"
    
  /service/v1/accountingpost/{refNo}/purge:
    delete:
     tags:
      - "accountingpost"
     summary: "Delete the accentrycode by ID."
     description:  "Delete the accounting entry code by ID."
     operationId: "purgeRecord"
     parameters:    
      - name: "appId"
        in: "header"
        type: "string"
        required: true
        description: "Application Id"        
      - name: "userId"
        in: "header"
        type: "string"
        required: true
        description: "User Id"
      - name: "branchCode"
        in: "header"
        type: "string"
        required: true
        description: "Branch Code"
      - name: "refNo"
        in: "path"
        description: "refNo of the record that needs to be purged"
        required: true
        type: "string"
     responses:
      200:
       description: "Returns the accentrycode based on given id."
       schema:
        $ref: "#/definitions/ResponseDtoWrapper"
      400:
       description: "Malformed syntax."
      401:
       description: "Request does not have sufficient credentials."
      403:
       description: "Request is not authorized."
      500:
       description: "Internal error"
  
  /service/v1/accountingpost/{refNo}/approve:
    patch:
     tags:
      - "accountingpost"
     summary: "Authorize the accentrycode by given ID."
     description:  "Authorize the accounting entry code identified by given ID."
     operationId: "authorize"
     parameters:    
      - name: "appId"
        in: "header"
        type: "string"
        required: true
        description: "Application Id"        
      - name: "userId"
        in: "header"
        type: "string"
        required: true
        description: "User Id"
      - name: "branchCode"
        in: "header"
        type: "string"
        required: true
        description: "Branch Code"
      - name: "refNo"
        in: "path"
        description: "Key of the accentrycode maintenance"
        required: true
        type: "string"
      - name: "accountingTransactionCollection"
        in: "body"
        description: Request body contain accentrycode and Modification no of accentrycode maintenance which need to be deleted"
        required: true
        schema:
         $ref: "./obscfcm-accounting-def.yaml#/definitions/AccountingTransactionCollection"
     responses:
      200:
       description: "Successful operation."
       schema:
        $ref: "#/definitions/ResponseDtoWrapper"
      400:
       description: "Malformed syntax."
      401:
       description: "Request does not have sufficient credentials."
      403:
       description: "Request is not authorized."
      500:
       description: "Internal error"
       
       
  /service/v1/accountinggeneric:     
    post:
      tags:
      - "accountingservices"
      summary: "this method is same as getAllAccountingDetails only difference is the response"
      description: "Get all accounting details"
      operationId: "getAllGenericAccountingDetails"
      produces:
        - "application/json"
        - "application/xml"
      parameters:
      - name: "branchCode"
        in: "header"
        description: "Branch Code"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        description: "Application Id"
        required: true
        type: "string"
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      - name: offset
        in: query
        description: "offset is starting no of records to be fetched"
        required: false
        type: integer
      - name: limit
        in: query
        description: "limit is maximum no of records to be fetched"
        required: false
        type: integer     
      - name: "rquestDto" 
        in: "body" 
        description: "Request Body that contains data required for creating a new accentrycode" 
        required: true
        schema:
            $ref: "./obscfcm-accounting-def.yaml#/definitions/GenericObscfCmAccountDTO"
      responses:
        201:
          description: "Returns message of success or failure"
          schema:
             $ref: "./obscfcm-accounting-def.yaml#/definitions/AccountingTransactionCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
          
          
  /service/v1/poolingAccountNumber:     
    post:
      tags:
      - "accountingservices"
      summary: "Get all accounting entries with their details based on filter(query param) criterias."
      description: "Get all accounting numbers."
      operationId: "getAllAccountingNumbers"
      produces:
        - "application/json"
        - "application/xml"
      parameters:
      - name: "branchCode"
        in: "header"
        description: "Branch Code"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        description: "Application Id"
        required: true
        type: "string"
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      - name: offset
        in: query
        description: "offset is starting no of records to be fetched"
        required: false
        type: integer
      - name: limit
        in: query
        description: "limit is maximum no of records to be fetched"
        required: false
        type: integer
      - name: includecloseandunauth
        in: query
        description: "includecloseandunauth need to be set to fetch summary record, defult value is false"
        required: false
        type: boolean    
      - name: "rquestDto" 
        in: "body" 
        description: "Request Body that contains data required for creating a new accentrycode" 
        required: true
        schema:
            $ref: "./obscfcm-accounting-def.yaml#/definitions/GenericObscfCmAccountDTO"
      responses:
        201:
          description: "Returns message of success or failure"
          schema:
            $ref: "./obscfcm-accounting-def.yaml#/definitions/PoolingAccountCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
          
  /service/v1/fetchAccountingTxnDetails:
     post:
       tags:
        - "accountingpost"
       summary: "Fetch Accounting Transaction Details"
       description: "Fetches Accounting Details Corresponding to Transactions"
       operationId: "fetchAccountingTxnDetails"
       parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: "Application Id"        
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "User Id"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
          description: "Branch Code"
        - name: "accountingTxnDetailsFetchReqModel" 
          in: "body" 
          description: "Request Body that contains data required for fetching accounting Details" 
          required: true
          schema:
           $ref: "./obscfcm-accounting-def.yaml#/definitions/AccountingTxnDetailsFetchReqModel"
       responses:
        200: 
         description: "Returns message of success or failure " 
         schema:
           $ref: "./obscfcm-accounting-def.yaml#/definitions/AccountingTxnDetailsResponseCollection"
        400:
         description: "Malformed syntax."
        401:
         description: "Request does not have sufficient credentials."
        403:
         description: "Request is not authorized."
        405:
         description: "Invalid input"
        500:
         description: "Internal error"

definitions:
  AccountingModel:
    type: object
    properties:
      refNo:
        type: "string"    
        description: "Reference Number"  
      seqNo:
        type: "integer"
        format: "int64"
      accEntryCode:
       type: string
       description: "Account Entry Code"
      creditAmountType:
       type: string
       description: "Credit Amount Type"
      debitAmountType:
       type: string
       description: "Debit Amount Type"
      creditAccRoleCode:
       type: string
       description: "Credit Account Role Code"
      debitAccRoleCode:
       type: string
       description: "Debit Account Role Code"
      debitAccRoleDescription:
       type: string
       description: "Debit Account Role Description"
      creditAccRoleDescription:
       type: string
       description: "Credit Account Role Description"
      sequence:
       type: number
       description: "Sequence"
      eventCode:
       type: string
       description: "Event Code"
      accEntryDescription:
       type: string
       description: "Account Entry Description"
      creditAmount:
       type: number
       description: "Credit Amount"
      creditAmtCcy:
       type: string
       description: "Credit Amount Currency"
      debitAmount:
       type: number
       description: "Debit Amount"
      debitAmtCcy:
       type: string
       description: "Debit Amount Currency"
      creditPartyId:
       type: string
       description: "Credit Party Id"
      creditPartyName:
       type: string
       description: "Credit Party Name"
      debitPartyId:
       type: string
       description: "Debit Party Id"
      debitPartyName:
       type: string
       description: "Debit Party Name"
      creditPartyType:
       type: string
       description: "Credit Party Type"
      debitPartyType:
       type: string
       description: "Debit Party Type"
      creditAccountNumber:
       type: string
       description: "Credit Account Number"
      creditAccountCurrency:
       type: string
       description: "Credit Account Currency"
      debitAccountNumber:
       type: string
       description: "Debit Account Number"
      debitAccountCurrency:
       type: string
       description: "Debit Account Currency"
      debitAmountInAccCcy:
       type: number
       description: "Debit Amount In Account Currency"
      creditAmountInAccCcy:
       type: number
       description: "Credit Amount In Account Currency"
      creditSettlementMethod:
       type: string
       description: "Credit Settlement Method"
      debitSettlementMethod:
       type: string
       description: "Debit Settlement Method"
      creditDivisionCode:
       type: string
       description: "Credit Division Code"
      debitDivisionCode:
       type: string
       description: "Debit Division Code"
      creditExchangeRate:
       type: "number"
