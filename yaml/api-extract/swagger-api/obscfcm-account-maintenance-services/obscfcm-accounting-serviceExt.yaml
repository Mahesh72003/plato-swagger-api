      debitExchangeRate:
       type: "number"
       description: "Debit Exchange Rate"
      creditAccType:
        type: "string"
        description: "Credit Account Type"
      debitAccType:
        type: "string"
        description: "Debit Account Type"
      eventSrNo:
        type: "number"
        description: "Event Serial Number"
      valueDate:
        type: "string"
