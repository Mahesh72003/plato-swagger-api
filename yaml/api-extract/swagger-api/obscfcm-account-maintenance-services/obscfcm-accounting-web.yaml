         required: false
         type: string
         
       - name: applicationCode
         in: query
         description: "Application Code"
         required: false
         type: string
         
       - name: productCode
         in: query
         description: "Product Code"
         required: false
         type: string

       - name: authorizationStatus
         in: query
         description: "Authorization Status"
         required: false
         type: string
         
