       - name: ecaRefNo
         in: query
         description: "ECA Ref No."
         required: false
         type: "string"
         
       - name: externalAccount
         in: query
         description: "External Account"
         required: false
         type: "string"
         
       - name: paymentMode
         in: query
         description: "Payment Mode"
         required: false
         type: "string"
         
       - name: externalAccountCcy
         in: query
         description: "External Account Currency"
         required: false
         type: "string"
         
       - name: externalBankId
         in: query
         description: "External Bank Id"
         required: false
         type: "string"
         
       - name: externalBankName
         in: query
         description: "External Bank Name"
         required: false
         type: "string"
         
       - name: externalBranchCode
         in: query
         description: "External Branch Code"
         required: false
         type: "string"
         
       - name: externalBranchName
         in: query
         description: "External Branch Name"
         required: false
         type: "string"
         
       - name: externalBranchRoutingCode
         in: query
         description: "External Branch RoutingCode"
         required: false
         type: "integer"
         format: "int64"
     
       - name: accEntryDescription
         in: query
         description: "AccEntryDescription is the description of AccEntryCode."
         required: false
         type: "string"
         
       - name: limit
         in: query
         description: "limit is maximum no of records to be fetched"
         required: false
         type: integer
         
       - name: dateRefBasis
         in: query
         description: "Date Type"
         required: false
         type: string
         
       - name: dateFrom
         in: query
         description: "Date From"
         required: false
         type: string
         pattern: '^\d{4}-\d{2}-\d{2}$'
         
       - name: dateTo
         in: query
         description: "Date to"
         required: false
         type: string
         pattern: '^\d{4}-\d{2}-\d{2}$'
         
       - name: postingStatus
         in: query
         description: "Posting Status"
         required: false
         type: string
         
       - name: eventCode
