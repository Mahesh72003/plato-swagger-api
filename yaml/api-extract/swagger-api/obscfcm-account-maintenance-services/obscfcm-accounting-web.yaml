 /web/v1/accounting:     
    post:
      tags:
      - "accounting-web"
      summary: "Get all accounting entries with their details based on filter(query param) criterias."
      description: "Get all accounting entries."
      operationId: "getAllAccountingDetails"
      produces:
        - "application/json"
        - "application/xml"
      parameters:
      - name: "branchCode"
        in: "header"
        description: "Branch Code"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        description: "Application Id"
        required: true
        type: "string"
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      - name: offset
        in: query
        description: "offset is starting no of records to be fetched"
        required: false
        type: integer
      - name: limit
        in: query
        description: "limit is maximum no of records to be fetched"
        required: false
        type: integer     
      - name: "rquestDto" 
        in: "body" 
        description: "Request Body that contains data required for creating a new accentrycode" 
        required: true
        schema:
            $ref: "./obscfcm-accounting-def.yaml#/definitions/GenericObscfCmAccountDTO"
      responses:
        201:
          description: "Returns message of success or failure"
          schema:
             $ref: "./obscfcm-accounting-def.yaml#/definitions/AccountingTransactionCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
          
 /web/v1/accountingpost:
     post:
       tags:
        - "accounting-web"
       summary: "Adds a new accentrycode."
       description: "Adds a new accounting entry code."
       operationId: "saveRecord"
       parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
          description: "Application Id"        
        - name: "userId"
          in: "header"
          type: "string"
          required: true
          description: "User Id"
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
          description: "Branch Code"
        - name: "accontingTransactionModelcollection" 
          in: "body" 
          description: "Request Body that contains data required for creating a new accounting" 
          required: true
          schema:
           $ref: "./obscfcm-accounting-def.yaml#/definitions/AccountingTransactionCollection"
       responses:
        201: 
         description: "Returns message of succes or failure " 
         headers:
          Location:
           description: "URL of newly created accentrycode" 
           type: "string"
         schema:
           $ref: "./obscfcm-accounting-def.yaml#/definitions/ResponseDtoWrapper"
        400:
         description: "Malformed syntax."
        401:
         description: "Request does not have sufficient credentials."
        403:
         description: "Request is not authorized."
        405:
         description: "Invalid input"
        500:
         description: "Internal error"
          
 /web/v1/virtualAccounts:
  get:
   tags:
    - "virtual-account-web"
   summary: "Retrives the intaccmap by given ID."
   description:  "Retrives the internal account mapping by ID."
   operationId: "getVirtualAccountDetails"
   parameters:
    - name: "appId"
      in: "header"
      type: "string"
      required: true
      description: "Application Id"        
    - name: "userId"
      in: "header"
      type: "string"
      required: true
      description: "User Id"
    - name: "branchCode"
      in: "header"
      type: "string"
      required: true
      description: "Branch Code"
    - name: "limit"
      in: "query"
      description: "Limit"
      required: false
      type: "integer"
    - name: "offset"
      in: "query"
      description: "Offset"
      required: false
      type: "integer"
    - name: "virtualAccountNo"
      in: "query"
      description: "Virtual Account No"
      required: false
      type: "string"
    - name: "virtualAccountName"
      in: "query"
      description: "Virtual Account Name"
      required: false
      type: "string"
    - name: "realAccountNo"
      in: "query"
      description: "Real Account No"
      required: false
      type: "string"
    - name: "realCustomerNo"
      in: "query"
      description: "Real Customer No"
      required: false
      type: "string"
    - name: "virtualAccReqParams"
      in: "query"
      description: "Request parameters to get virtual account details"
      required: false
      type: "array"
      items:
        type: string
      collectionFormat: csv
   responses:
    200:
     description: "Returns the intaccmap based on given id."
     schema:
       $ref: "./obscfcm-accounting-def.yaml#/definitions/VirtualAccountDetailsResponse"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
          
 /web/v1/getAccountingWorkDet:
     get:
       tags:
        - "accounting-web"
       summary: "Get accounting work entry details"
       description:  "Get accounting work entry details"
       operationId: "getAccountingWorkDet"
       parameters:
       - name: "appId"
         in: "header"
         type: "string"
         required: true
         description: "Application Id"        
       - name: "userId"
         in: "header"
         type: "string"
         required: true
         description: "User Id"
       - name: "branchCode"
         in: "header"
         type: "string"
         required: true
         description: "Branch Code"
       - name: txnRefNo
         in: query
         description: "Transaction Reference No"
         required: false
         type: "string"  
       - name: refNo
         in: query
         description: "Reference No"
         required: false
         type: "string"
       - name: seqNo
         in: query
         description: "Sequence Number"
         required: false
         type: "integer"
         format: "int64"
       responses:
        201:
         description: "Returns message of succes or failure"
         headers: 
          Location:
           description: "Location"
           type: "string"
         schema:
           $ref: "./obscfcm-accounting-def.yaml#/definitions/AccountingTransactionCollection"
        400:
         description: "Malformed syntax."
        401:
         description: "Request does not have sufficient credentials."
        403:
         description: "Request is not authorized."
        405:
         description: "Invalid input"
        500:
         description: "Internal error"
         
 /web/v1/accountingenquiry:
     get:
       tags:
        - "accounting-web"
       summary: "Get all valid accentrycode."
       description:  "Get all valid accounting entry code details."
       operationId: "getAllAccountingEnquiry"
       parameters:
       - name: includecloseandunauth
         in: query
         description: includecloseandunauth need to be set to fetch summary record, defult value is false
         required: false
         type: boolean
       - name: "appId"
         in: "header"
         type: "string"
         required: true
         description: "Application Id"        
       - name: "userId"
         in: "header"
         type: "string"
         required: true
         description: "User Id"
       - name: "branchCode"
         in: "header"
         type: "string"
         required: true
         description: "Branch Code"  
       - name: offset
         in: query
         description: offset is starting no of records to be fetched
         required: false
         type: integer
       - name: id
         in: query
         description: "Id"
         required: false
         type: string
       - name: refNo
         in: query
         description: "Reference No"
         required: false
         type: "string"
         
       - name: seqNo
         in: query
         description: "Sequence Number"
         required: false
         type: "integer"
         format: "int64"
         
       - name: drCrIndicator
         in: query
