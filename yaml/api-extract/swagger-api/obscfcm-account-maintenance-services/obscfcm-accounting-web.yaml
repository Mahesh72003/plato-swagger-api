         type: "string"
         
       - name: status
         in: query
         description: "Status"
         required: false
         type: "string"
         
       - name: accRoleCode
         in: query
         description: "Accounting Role Code"
         required: false
         type: "string"
         
       - name: accPartyType
         in: query
         description: "Party Type"
         required: false
         type: "string"
         
       - name: accPartyId
         in: query
         description: "Party Id"
         required: false
         type: "string"
         
       - name: accSettMethod
         in: query
         description: "Settlement Method"
         required: false
         type: "string"
         
         
       - name: accRoleDesc
         in: query
         description: "Accounting Role Description"
         required: false
         type: "string"
         
       - name: accEntryDesc
         in: query
         description: "Accounting Entry Description"
         required: false
         type: "string"
         
       - name: accType
         in: query
         description: "Account Type"
         required: false
         type: "string"
         
       - name: eventSrNo
         in: query
         description: "Event Sr No."
         required: false
