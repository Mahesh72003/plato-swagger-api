info:
 description: "This provides APIs for channel request for cashflow transaction, Delete unauthorised transaction, KAFKA call back and fetching distinct cashflow transaction codes" 
 version: "1.0.0"
 title: "Cashflow Transaction APIs"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "cashflowTxnListUpload"
   description: "This provides APIs for channel request for cashflow transaction, Delete unauthorised transaction, KAFKA call back and fetching distinct cashflow transaction codes"

