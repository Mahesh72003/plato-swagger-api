 /service/v1/cashflowCodes:
    get:
      tags:
        - "cashflowTxnTWtoTM"
      summary: "Retrieves cashflowCodes"
      description:  "Retrieves the Cashflow codes for given set of parameters."
      operationId: "searchCashflowCode"
      parameters:
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      - name: "branchCode"
        in: "header"
        description: "Branch Code"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        type: "string"
        required: true
        description: "Application Id"
      - name: "corporateId"
        in: "query"
        description: "Id of the Corporate / Party for which Cashflow Codes are required"
        type: "string"
        required: true
      - name: "fromDate"
        in: "query"
        type: string
        required: true
        description: "Start Date for Cashflow Details in yyyy-MM-dd format"
      - name: "toDate"
        in: "query"
        type: string
        required: true
        description: "End Date for Cashflow Details in yyyy-MM-dd format"
      - name: "virtualAccount"
        in: "query"
        description: "Virtual Account"
        type: "string"
      - name: "realAccount"
        in: "query"
        description: "Real Account"
        type: "string"
      - name: "ccy"
        in: "query"
        description: "Currency"
        type: "string"    
                                                                                                                                                 
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/CashflowCodeResponseWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        406:
          description: "File is not configured."
        500:
          description: "Internal error"                    
