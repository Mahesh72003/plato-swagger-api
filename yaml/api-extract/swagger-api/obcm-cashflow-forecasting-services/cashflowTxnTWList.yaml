# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../decisioningmaster

 /service/v1/cashflowInflowTxns:
  post:
   tags:
    - "cashflowTxnTWtoTM"
   summary: "Adds a new cashflow Tm transaction."
   description: "Adds a new cashflow TM transaction. Additional information here for this endpoint."
   operationId: "saveCashflowTxns"
   parameters:
    - name: "userId"
      in: "header"
      description: "User Id"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "Branch Code"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      type: "string"
      required: true
      description: "Application Id"
    - name: "cashflowTWTxn" 
      in: "body" 
      description: "Request Body that contains data required for creating a new cashflow TM Txn" 
      required: true
      schema:
       $ref: "#/definitions/ObcmsCashflowTransactionCollection"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created fsgbu" 
       type: "string"
     schema:
       $ref: "#/definitions/ObcmsCashflowTransactionResponse"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /service/v1/authorizeCashflowTxn:
  post:
   tags:
    - "cashflowTxnAuthorize"
   summary: "Authorizes cashflow transaction."
   description: "Authorizes cashflow transaction. Additional information here for this endpoint."
