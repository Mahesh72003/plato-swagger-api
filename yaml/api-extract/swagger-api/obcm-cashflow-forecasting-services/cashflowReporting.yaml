swagger: "2.0"
info:
  description: "This API helps to perform Cashflow Inquiry function"
  version: "1.0.0"
  title: "Cashflow Inquiry API"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "Cashflow-Reporting-API"
    description: "This API helps to perform Cashflow Inquiry function"

paths:
  /service/v1/cashflow-maint/search:
    get:
      tags:
        - "Cashflow-Reporting-Service"
      summary: "Retrieves Cashflows"
      description:  "Retrieves the Cashflows for given set of parameters."
      operationId: "searchCashflows"
      parameters:
      - name: "userId"
        in: "header"
        description: "User Id"
        required: true
        type: "string"
      - name: "branchCode"
        in: "header"
        description: "Branch Code"
        required: true
        type: "string"
      - name: "appId"
        in: "header"
        type: "string"
        required: true
        description: "Application Id"
      - name: "partyId"
        in: "query"
        description: "Id of the Corporate / Party for which Cashflow Details are required"
        type: "string"
        required: true
      - name: "fromDate"
        in: "query"
        type: string
        description: "Start Date for Cashflow Details in yyyy-MM-dd format"
      - name: "toDate"
        in: "query"
        type: string
        description: "End Date for Cashflow Details in yyyy-MM-dd format"
      - name: "cashFlowType"
        in: "query"
        type: string
        description: "Inflow or Outflow"
      - name: "cashFlowCode"
        in: "query"
        type: string
        description: "CashFlow Code Required"
      - name: "ccy"
        in: "query"
        type: string
        description: "Settlement Curency"
      - name: "bankAccountNumber"
        in: "query"
        type: string
        description: "Bank Account No"
      - name: "virtualAcctNo"
        in: "query"
        type: string
        description: "Virtual Account No"
      - name: "fromAmount"
        in: "query"
        type: number
        description: "From Amount"
      - name: "toAmount"
        in: "query"
        type: number
        description: "To Amount"
      - name: "fromActualAmount"
        in: "query"
        type: number
        description: "From Actual Amount"
      - name: "toActualAmount"
        in: "query"
        type: number
        description: "To Actual Amount"
      - name: "reconStatus"
        in: "query"
        type: string
        description: "Recon Status"
      - name: "externalTransactionRefNo"
        in: "query"
        type: string
        description: "External Reference No"
      - name: "transactionId"
        in: "query"
        type: string
        description: "Transaction Id"
      - name: "udfTxt4"
        in: "query"
        type: string
        description: "User Defined Text 4"
      - name: "udfTxt1"
        in: "query"
        type: string
        description: "User Defined Text 1"
      - name: "udfTxt2"
        in: "query"
        type: string
        description: "User Defined Text 2"
      - name: "udfTxt3"
        in: "query"
        type: string
        description: "User Defined Text 3"
      - name: "udfTxt5"
        in: "query"
        type: string
        description: "User Defined Text 5"
      - name: "udfTxt6"
        in: "query"
        type: string
        description: "User Defined Text 6"
      - name: "udfTxt7"
        in: "query"
        type: string
        description: "User Defined Text 7"
      - name: "udfTxt8"
        in: "query"
        type: string
        description: "User Defined Text 8"
      - name: "udfTxt9"
        in: "query"
        type: string
        description: "User Defined Text 9"
      - name: "udfTxt10"
        in: "query"
        type: string
        description: "User Defined Text 10"
      - name: "action"
        in: "query"
        type: string
        description: "action"
      - name: "keyId"
        in: "query"
        type: string
        description: "keyId"
      - name: "checkerRemarks"
        in: "query"
        type: string
        description: "checkerRemarks"
      - name: "makerRemarks"
        in: "query"
        type: string
        description: "makerRemarks"
      - name: "checkerId"
        in: "query"
        type: string
        description: "checkerId"
      - name: "makerId"
        in: "query"
        type: string
        description: "makerId"
      - name: "description"
        in: "query"
        type: string
        description: "description"
      - name: "applicationName"
        in: "query"
        type: string
        description: "summaryProcessed"
      - name: "onceAuth"
        in: "query"
        type: string
        description: "onceAuth"
      - name: "recordStat"
        in: "query"
        type: string
        description: "recordStat"
      - name: "revisedExpectedDate"
        in: "query"
        type: string
        description: "revisedExpectedDate"
      - name: "parentId"
        in: "query"
        type: string
        description: "parentId"
      - name: "reconAmount"
        in: "query"
        type: integer
        description: "reconAmount"
      - name: "corporateName"
        in: "query"
        type: string
        description: "corporateName"
      - name: "varianceAmount"
        in: "query"
        type: integer
        description: "varianceAmount"
      - name: "checkerDtStamp"
        in: "query"
        type: string
        description: "checkerDtStamp"
      - name: "makerDtStamp"
        in: "query"
        type: string
        description: "makerDtStamp"
      - name: "id"
        in: "query"
        type: string
        description: "id"
      - name: "channel"
        in: "query"
        type: string
        description: "Channel"
      - name: "counterPartyId"
        in: "query"
        type: string
        description: "Counter Party Id"
      - name: "customerRefNo"
        in: "query"
        type: string
        description: "Customer Reference No"
      - name: "authStatus"
        in: "query"
        type: string
        description: "Authentication Status"
      - name: "forInquiry"
        in: "query"
        type: string        
        description: "For Inquiry Flag- Y/N "                                                                                                
      - name: offset
        in: query
        description: "Offset is starting no of records to be fetched"
        required: false
        type: integer
      - name: limit
        in: query
        description: "Limit is maximum no of records to be fetched"
        required: false
        type: integer
      - name: "excludeRecon"
        in: "query"
        type: string        
        description: "Exclude Recon" 
      - name: "transactionStatus"
        in: "query"
        type: string        
        description: "Transaction Status" 
      - name: "lastActionPerformed"
        in: "query"
        type: string        
        description: "Last Action Performed"                                         
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/CashflowResponseWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        406:
          description: "File is not configured."
        500:
          description: "Internal error"
definitions:          
  CashflowResponseWrapper:
    description: "Cashflow response model"
    type: "object"
    properties:
      status:
        description: "Status"
        type: string
      cashflows:
        type: array
        description: "List of Cashflow Reponse"
        items:
          $ref: "#/definitions/CashflowResponse"
      errorCodes:
        type: array
        description: "List of Error Model"
        items:
          $ref: "#/definitions/ErrorModel"
      paging:
          description: "Paging DTO Model"
          $ref: "#/definitions/PagingDto"
  PagingDto:
    description: "Paging DTO object"
    type: object
    properties:
     totalResults:
      description: "Total Results"
      type: integer              
  OpeningBalanceDto:
    description: "Cashflow Opening Balance Dto"
    type: "object"
    properties:
      cashFlowCode:
        description: "Cashflow Code"
        type: string
      ccy:
        description: "Settlement Curency"
        type: string
      openingBalance:
        description: "Opening Balance "
        type: number
      description:
        description: "Description"
        type: string
  CashflowResponse:
    description: "Cashflow Response Model"
    type: "object"
    properties:
      partyId:
        description: "Party Id / Corporate Id"
        type: string
      corporateName:
        description: "Corporate Name"
        type: string
      actualDate:
        description: "Actual Cashflow Date in yyyy-MM-dd format"
        type: string
      cashFlowType:
        description: "Cashflow Type - Inflow / Outflow"
        type: string
      cashFlowCode:
        description: "Cashflow Code"
        type: string
      ccy:
        description: "Settlement Curency"
        type: string
      amount:
        description: "Cashflow Amount"
        type: number
      expecDate:
        description: "Expected Cashflow Date in yyyy-MM-dd format"
        type: string
      revisedExpectedDate:
        description: "Revised Expected Cashflow Date in yyyy-MM-dd format"
        type: string         
      counterpartyId:
        description: "Counterparty Id"
        type: string
      cashflowDescription:
        description: "Cashflow Description"
        type: string
      counterpartyName:
        description: "Counterparty Name"
        type: string
      externalTransactionRefNo:
        description: "External Transaction Ref No"
        type: string
      bankAccountNumber:
        type: string
        description: "Bank Accont No"        
      virtualAcctNo:
        type: string
        description: "Virtual Account No"
      actualCashflowAmt:
        type: number
        description: "Actual Cashflow Amount"
      narration:
        type: string
        description: "Narration"
      reconStatus:
        type: string
        description: "Recon Status"
      applicationName:
        type: string
        description: "Application Name"
      channel:
        type: string
        description: "Channel"
      transactionId:
        type: string
        description: "Transaction Id"                        
      udfTxt1:
        type: string
        description: "User Defined Text 1"
      udfTxt2:
        type: string
        description: "User Defined Text 2"
      udfTxt3:
        type: string
        description: "User Defined Text 3"
      udfTxt4:
        type: string
        description: "User Defined Text 4"
      udfTxt5:
        type: string
        description: "User Defined Text 5"
      udfTxt6:
        type: string
        description: "User Defined Text 6"
      udfTxt7:
        type: string
        description: "User Defined Text 7"
      udfTxt8:
        type: string
        description: "User Defined Text 8"
      udfTxt9:
        type: string
        description: "User Defined Text 9"
      udfTxt10:
        type: string
        description: "User Defined Text 10"
      summaryProcessed:
        type: string
        description: "Summary Processed"
      parentId:
        type: string
        description: "Parent Id"
      fileReferenceNo:
        type: string
        description: "File Reference No"
      makerId:
        type: string
