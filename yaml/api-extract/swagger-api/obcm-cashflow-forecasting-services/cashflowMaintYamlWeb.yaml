swagger: "2.0"
info:
 description: "This is a Cashflow-maint Web Api service." 
 version: "1.0.0"
 title: "cashflow-maint Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "cashflowMaint"
   description: "Cashflow Maint web Api Service"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../web/v1/cashflow-maint

 /web/v1/cashflow-maint:
  post:
   tags:
    - "cashflow-maint"
   summary: "Adds a new cashflow-maint."
   description: "Adds a new cashflow-maint. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "cashflow-maint" 
      in: "body" 
      description: "Request Body that contains data required for creating a new cashflow-maint" 
      required: true
      schema:
       $ref: "#/definitions/ObcmsTmCashflowMaintMasterDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created cashflow-maint" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "cashflow-maint"
   summary: "Get all valid cashflow-maint."
   description:  "Get all valid cashflow-maint. This endpoints will be used to Get all valid cashflow-maint maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: Includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: Offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: Limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: corporateName
     in: query
     description: Corporate Name need to be set to fetch summary record
     required: false
     type: string
   - name: sourceApplication
     in: query
     description: Source Application need to be set to fetch summary record
     required: false
     type: string
   - name: channel
     in: query
     description: Channel need to be set to fetch summary record
     required: false
     type: string
   - name: cashflowCode
     in: query
     description: Code need to be set to fetch summary record
     required: false
     type: string
   - name: cashflowDescription
     in: query
     description: Description need to be set to fetch summary record
     required: false
     type: string
   - name: authStatus
     in: query
     description: Authorization Status need to be set to fetch summary record
     required: false
     type: string
   - name: recordStatus
     in: query
     description: Record Status need to be set to fetch summary record
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/ObcmsTmCashflowMaintMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../web/v1/cashflow-maint/xxx
#   DELETE    .../web/v1/cashflow-maint/xxx
#   GET       .../web/v1/cashflow-maint/xxx
#  /web/v1/cashflow-maint/xxx?version=latestrecord
#   GET       .../web/v1/cashflow-maint/xxx?version=1

 /web/v1/cashflow-maint/{id}:
  put:
   tags:
    - "cashflow-maint"
   summary: "Update an existing cashflow-maint."
   description:  "Update an existing cashflow-maint based on Id Value."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the cashflow-maint Maintenance"
      required: true
      type: "string"
    - name: "cashflow-maint"
      in: "body"
      description: "Request Body that contains data required for updating an existing cashflow-maint"
      required: true
      schema:
       $ref: "#/definitions/ObcmsTmCashflowMaintMasterDTO"
   responses:
    200:
     description: "Returns updated cashflow-maint"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "cashflow-maint"
   summary: "Retrieves the cashflow-maint by ID."
   description:  "Retrieves the cashflow-maint by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the cashflow-maint based on given id."
     schema:
      $ref: "#/definitions/ObcmsTmCashflowMaintMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

 /web/v1/cashflow-maint/{id}/actions:
  get:
   tags:
    - "cashflow-maint"
   summary: "Retrieves the cashflow-maint actions by ID."
   description:  "Retrieves the cashflow-maint actions by ID."
   operationId: "getAvailableUserActions"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the cashflow-maint actions based on given id."
     schema:
      type: string
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../web/v1/cashflow-maint/xxx/approve

 /web/v1/cashflow-maint/{id}/approve:
  patch:
   tags:
    - "cashflow-maint"
   summary: "Authorize the cashflow-maint by given ID."
   description:  "Authorize the cashflow-maint identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the cashflow-maint maintenance"
      required: true
      type: "string"
    - name: "cashflow-maint"
      in: "body"
      description: Request body contain cashflow-maint and Modification no of cashflow-maint maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../web/v1/cashflow-maint/xxx/close
 /web/v1/cashflow-maint/{id}/close:
  patch:
   tags:
    - "cashflow-maint"
   summary: "Close the cashflow-maint by given ID."
   description:  "Close the cashflow-maint identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the cashflow-maint maintenance"
      required: true
