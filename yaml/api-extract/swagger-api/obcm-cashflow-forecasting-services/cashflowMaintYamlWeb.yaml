    - name: "cashflow-maint"
      in: "body"
      description: Request body contain cashflow-maint and Modification no of cashflow-maint maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../web/v1/cashflow-maint/xxx/reopen

 /web/v1/cashflow-maint/{id}/reopen:
  patch:
   tags:
    - "cashflow-maint"
   summary: "reopen the cashflow-maint by given ID."
   description:  "reopen the cashflow-maint identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the cashflow-maint maintenance"
      required: true
      type: "string"
    - name: "cashflow-maint"
      in: "body"
      description: Request body contain cashflow-maint and Modification no of cashflow-maint maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

