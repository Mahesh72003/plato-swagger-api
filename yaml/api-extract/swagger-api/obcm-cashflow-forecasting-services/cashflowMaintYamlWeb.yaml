     corporateName:
      type: string
      description: "Corporate Name"
     sourceApplication:
      type: string
      description: "Source Application"
     txnControllerRefNo:
      type: string
      description: "Transaction Controller Reference No"
     channel:
      type: string
      description: "Channel"
     ObcmsTmCashflowMaintDetailsDTO:
      description: "List Of ObcmsTmCashflowMaintDetailsDTO Model"
      type: array
      items:
       $ref: '#/definitions/ObcmsTmCashflowMaintDetailsDTO'
