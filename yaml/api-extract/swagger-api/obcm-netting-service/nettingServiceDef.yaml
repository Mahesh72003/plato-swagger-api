swagger: "2.0"
info:
  version: "1.0.0"
  title: "Netting Tracsactions Definitions Yaml file"
 
paths:
  /:
    get:
      responses:
        201:
          description: ""
 
definitions:
  NettingTransactionCollection:
    description: "Collection of Netting Transactions."
    type: "object"
    properties:
      data:
        type: "array"
        items:
          $ref: "#/definitions/NettingTransactionModel"
      paging:
       description: "Paging DTO Model"
       $ref: "#/definitions/PagingDto"
      responseStatus:
       type: string
      message:
       type: string     
  NettingTransactionModel:
    description: "Service Get API Netting Transactions model"
    type: "object"
    properties:
      nettingTxnNo:
        type: "string"
        description: "Back office reference no of Netting Txn"
      corporateId:
        type: "string"
        description: "Logged in CIF id of source system"
      nettingCcy:
        type: "string"
        description: "Currency of netting transaction"
      counterpartyId:
        type: "string"
        description: "Associated party id/counterparty id linked to netted transactions" 
      nettingAgreement:
        type: "string"
        description: "Agreement id associated with netting transaction"
      creationDate:
        type: "string"
        description: "Creation date of netting transaction"
      acceptRejectDate:
        type: "string"
        description: "Acceptance/rejection date of netting transaction"
      settlementDate:
        type: "string"
        description: "Settlement date range of netting transaction"
      nettingAmount:
        type: "number"
        description: "Netting transaction Amount"
      relationshipCode:
        type: "string"
        description: "Relationship Code"
      totalReceivables:
        type: "number"
        description: "Total Receivables"
      totalPayables:
        type: "number"
        description: "Total Payables"
      netReceivablesDue:
        type: "number"
        description: "Net Receivables Due"
      netPayablesDue:
        type: "number"
        description: "Net Payables Due"
      nettingTxnStatus:
        type: "string"
        description: "Netting Transaction Status"
      counterpartyName:
        type: "string"
        description: "Counterparty Name"
      corporateName:
        type: "string"
        description: "Corporate Name"
      isSettlementFlag:
        type: "string"
        description: "Is Settlement Flag"
      remarks:   
        type: "string"
        description: "Remarks"     
      lastUpdatedDate:
         type: "string"
         description: "Last Updated Date"                            
  PagingDto:
   type: object
   description: "Paging Dto Model"
   properties:
    totalResults:
     description: "Total Results"
     type: integer
  EODResponseDetails:
   type: "object"
   description: "EOD Response Details"
   properties:
     status:
       type: "string"
       description: "EOD Event Status"
     errors:
       type: "array"
       description: "Error Codes"
       items:
         $ref: "#/definitions/Error"
  Error:
   type: "object"
   properties:
     ecode:
       type: "string"
     etype:
       type: "string"
     edesc:
       type: "string"
  NettingTransactionStatusModel:
    description: "Service Put API Netting Transactions Status Update"
    type: "object"
    properties:
      nettingTxnNo:
        type: "string"
        description: "Back office reference no of Netting Txn"
      nettingTxnStatus:
        type: "string"
        description: "Status of netting transaction"
      corporateId:
        type: "string"
        description: "Corporate id associated with netting transaction"
      acceptRejectDate:
        type: "string"
        description: "Accept/Reject Date"
      responseStatus:
        type: string
      error:
        type: "object"
        $ref: "#/definitions/ErrorDTO"                        
  NettingTransactionStatusRequestModel:
    description: "Service Put API Netting Transactions Status Update Request"
    type: "object"
    properties:
     list:
       type: "array"
       description: "List of Transaction with Status Details"
       items:
         $ref: "#/definitions/NettingTransactionStatusUpdateModel"
  NettingTransactionStatusUpdateModel:
    description: "Service Put API Netting Transactions Status Update Model"
    type: "object"
    properties:
      nettingTxnNo:
        type: "string"
        description: "Netting Transaction Number"
      nettingTxnStatus:
        type: "string"
        description: "Currency of netting transaction"
      corporateId:
        type: "string"
        description: "Corporate id associated with netting transaction"        
  ErrorDTO:
    description: "Put API Netting Transactions Status Update Errors"
    type: "object"
    properties:
      errorCode:
        type: "string"
        description: "Error Code"
      errorDesc:
        type: "string"
        description: "Error Description"        
  NettingTransactionStatusCollection:
    description: "Response of Netting Transaction Status Update"
    type: "object"
    properties:
      responseStatus:
        type: string
      message:
        type: string
      errDto:
        type: "array"
        items:
          $ref: "#/definitions/ErrorDTO" 
      data:
        type: "array"
        description: "List of Transaction with Updated Status Details"
        items:
          $ref: "#/definitions/NettingTransactionStatusModel"         
