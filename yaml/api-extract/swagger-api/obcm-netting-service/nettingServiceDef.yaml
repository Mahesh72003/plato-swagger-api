      sourceRefNo:
        type: "string"
        description: "Source Ref No"
      identifier:
        type: "string"
        description: "Identifier For Receivable or Payable"
      invoiceRefNo:
        type: "string"
        description: "Invoice Ref No"
      invoiceStatus:
        type: "string"
        description: "Invoice Status"
      paymentStatus:
        type: "string"
