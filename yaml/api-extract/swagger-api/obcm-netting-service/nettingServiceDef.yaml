      payableDto:
        type: "array"
        items:
          $ref: "#/definitions/NettingInvoicesModel"   
      paging:
       description: "Paging DTO Model"
       $ref: "#/definitions/PagingDto"
      responseStatus:
       type: string
      message:
       type: string
      errors:
        type: "array"
        items:
          $ref: "#/definitions/ErrorDTO"                             
  NettingInvoicesModel:
