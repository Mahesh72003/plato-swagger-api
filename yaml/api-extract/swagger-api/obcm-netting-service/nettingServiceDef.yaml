    description: "AcceptedInvoicesModel"
    properties:
      nettingTransactionNo:
        description: "Netting Transacation No"
        type: "string" 
      nettingAmount:
        type: "number"
        description: "Netted Amount for transaction"
      nettingCcy:
        description: "Netting Currency"
        type: "string"
      corporateId:
        description: "Corporate Id"
        type: "string" 
      counterPartyId:
        description: "CounterParty Id"
        type: "string"
      relationShipCode:
        description: "Relation Ship Code"
        type: "string"  
      paymentTransactionNo :
        type: "string"
        description: "Payment Transaction No"        
      invoiceTransactionNo :  
        description: "Transaction No for invoices"
        type: "string"     
      invoiceDetails:
        type: "array"
        items:
          $ref: "#/definitions/NettingInvoicesModel"
