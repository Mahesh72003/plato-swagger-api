      workflowType:
        description: "Work Flow Type"
        type: "string"    
      productCode:
        description: "Product Code"
        type: "string"    
      event:
        description: "Event or Operation"
        type: "string"
      priority:
        type: "string"
        description: "Priority"
      productCategory:
        type: "string"
        description: "Product Category"
      applicationNumber:
        description: "Reference number without seqno"
        type: "string" 
      server:
        type: "string"
