      type: string
      #format: date
      description: ""
     checkerDtStamp:
      type: string
      #format: date
      description: ""
     headerAccountCurrency:
      type: string
      description: ""
     headerBranchCode:
      type: string
      description: ""
     headerBranchName:
      type: string
      description: ""
     headerAccountDescription:
      type: string
      description: ""
     headerAccountNumber:
      type: string
      description: ""
     isCrossCurrency:
      type: string
      description: ""
     isMultiBank:
      type: string
      description: ""
     versionNo:
      type: number
      description: "" 
     reallocationMethod:
      type: string
      description: ""
     structureDescription:
      type: string
      description: ""
     structureId:
      type: string
      description: ""
     liquidityType:
      type: string
      description: ""
     amendedStructureDuringSelectedPeriod:
      type: string
      description: ""
     totalAmendedsOnStructure:
      type: string
      description: ""
     structureDomain:
      type: string
      description: ""
     structureStatus:
      type: string
      description: ""
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 StructureModifiedReportInputDTO:
  type: "object"
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     customerId:
      type: string
     structureId:
      type: string
     structureType:
      type: string
     liquidityType:
      type: string   
     fromDate:
      type: string
      format: date
     toDate:
      description: To Date of Exceptions
      type: string
      format: date
 UserInformationDTO:
   type: object
   properties: 
      userId:
       type: string
       description: Generated By user id
      dateAndTime:
       type: string
       description: Generated At time     
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 StructureMasterReportDTOCollection: 
  description: "Collection of structuredummy."
  type: "object"
  properties:
   data:
    $ref: "#/definitions/ReportResponse"
   messages:
    $ref: "#/definitions/ResponseDto"
 StructureMasterDTOCollection: 
  description: "Collection of entries."
  type: "object"
  properties:
   userInfo:
     type: object
     items:
      $ref: "#/definitions/UserInformationDTO"
   datahead:
    type: "array"
    items:
     $ref: "#/definitions/StructureMasterHeaderDTO"
   databody:
    type: "array"
    items:
     $ref: "#/definitions/StructureMasterbodyDTO" 
   messages:
    $ref: "#/definitions/ResponseDto"  
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 StructureMasterWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/StructureMasterbodyDTO"
