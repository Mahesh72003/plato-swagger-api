swagger: "2.0"
info:
 description: "This is a sample server structurereport server." 
 version: "1.0.0"
 title: "structure modified report Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "structure modified report"
   description: "Structure modified report creation and retrieving"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../structuremodifiedreport

 /structuremodifiedreport/generateReport:     
  post:
   tags:
    - "structuremodifiedreport"
   summary: "Get all valid structuremodifiedreport."
   description:  "Get all valid structuremodifiedreport. This endpoints will be used to Get all valid structuremodifiedreport maintenance records."
   operationId: "generateReport"
   parameters:
     - name: StructureModifiedReportInputDTO
       in: "body"
       description: "Request Body that contains data required for creating a new oblm-report-services" 
       required: true
       schema:
         $ref: "#/definitions/StructureModifiedReportInputDTO"   
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/StructureMasterReportDTOCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"




definitions:
 StructureMasterHeaderDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     amendedStructureDuringSelectedPeriodInNumbers:
      type: string
      description: ""
     liquidityType:
      type: string
      description: ""
