swagger: "2.0"
info:
 description: "Provides APIs to perform operations on non-customer." 
 version: "1.0.0"
 title: "Non-Customer Service APIs v2"
host: 10.184.157.121:9000
basePath: /obscfcm-core-services
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "NonCustService"
   description: "APIs for non-customer Operations. User will be able to on-board new counter party with its attributes."

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../product

 /service/v0/noncustomer:
  get:
   tags:
    - "NonCustService"
   summary: "Get all valid Non Customer."
   description:  "Get all valid Non Customer. This endpoints will be used to Get all valid Non Customer maintenance records."
   operationId: "getAll"
   parameters:
   - name: "userId"
     in: "header"
     description: "userId"
     required: true
     type: "string"
   - name: "branchCode"
     in: "header"
     description: "branchCode"
     required: true
     type: "string"
   - name: "appId"
     in: "header"
     type: "string"
     required: true
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: registrationNumber
     required: false
     type: string
     in: query
   - name: nonCustomerId
     required: false
     type: string
     in: query
   - name: name
     required: false
     type: string
     in: query
   - name: recordStat
     in: query     
     required: false
     type: string
   - name: taxReferenceNo1
     in: query     
     required: false
     type: string
   - name: taxReferenceNo2
     in: query     
     required: false
     type: string
   - name: GIIN
     in: query     
     required: false
     type: string
   - name: email
     in: query     
     required: false
     type: string
   - name: anchorId
     in: query     
     required: false
     type: string
   - name: shortName
     in: query     
     required: false
     type: string   
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "./nonCustomerDef.yaml#/definitions/ScfTmNonCustomerMasterOldCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  post:
   tags:
    - "NonCustService"
   summary: "Get all valid Non Customer."
   description:  "Get all valid Non Customer. This endpoints will be used to Get all valid Non Customer maintenance records."
   operationId: "saveRecord"
   parameters:
   - name: "userId"
     in: "header"
     description: "userId"
     required: true
     type: "string"
   - name: "branchCode"
     in: "header"
     description: "branchCode"
     required: true
     type: "string"
   - name: "appId"
     in: "header"
     type: "string"
     required: true
   - name: "nonCustomer" 
     in: "body" 
     description: "Request Body that contain data required for creating a new counter party" 
     required: true
     schema:
      $ref: "./nonCustomerDef.yaml#/definitions/ScfTmNonCustRequestDTO"   
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "./nonCustomerDef.yaml#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 
 /service/v0/noncustomer/{id}:
  put:
   tags:
    - "NonCustService"
   summary: "On boards Counter Party."
   description: "Adds a new Counter Party."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the noncustomer Maintenance"
      required: true
      type: "string"
    - name: "userId"
      in: "header"
      description: "userId"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "branchCode"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      type: "string"
      required: true
    - name: "nonCustomer" 
      in: "body" 
      description: "Request Body that contain data required for creating a new counter party" 
      required: true
      schema:
       $ref: "./nonCustomerDef.yaml#/definitions/ScfTmNonCustRequestDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created program" 
       type: "string"
     schema:
       $ref: "./nonCustomerDef.yaml#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"