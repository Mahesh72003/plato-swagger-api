        in: "query"
        type: "string"
        description: "Can be either C/CP. C- Corporate, CP-Counterparty." 
        required: false
      - name: "associatedPartyRole" 
        in: "query"
        type: "string"
        description: "Can be either B/S. B-Buyer, S- Supplier." 
        required: false
      - name: "relationshipCode" 
