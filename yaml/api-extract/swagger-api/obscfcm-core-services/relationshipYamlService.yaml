swagger: "2.0"
info:
 description: "Provides APIs to perform operations on relationship master." 
 version: "1.0.0"
 title: "Relationship Service APIs"
host: 10.184.157.121:9000
basePath: /obscfcm-core-services
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "relationshipmasterservice"
   description: "API's for maintaining relationships between corporate and its buyers and sellers. All parameter related to relationship will be configured through this service.
Service will have all operations for ADD/MODIFY/DELETE/AUTHORIZE"
 - name: "ExpiryCheckController"
   description: "APIs for check expiry of each relationship & mark inactive if expired"

paths:

# path fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../relationshipmaster

 /service/v1/relationshipmaster/noncustomer:
  post:
   tags:
    - "relationshipmasterservice"
   summary: "Adds a new relationshipmaster."
   description: "Onboards a new Customer/Non-Customer"
   operationId: "saveRecord"
   parameters:
    - name: "userId"
      in: "header"
      description: "userId"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "branchCode"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      description: "appId"
      type: "string"
      required: true
    - name: "relationshipmaster" 
      in: "body" 
      description: "Request Body that contains data required for creating a new relationshipmaster" 
      required: true
      schema:
       $ref: "#/definitions/ObcmTmRelationshipMasterNonCustDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created relationshipmaster" 
       type: "string"
     schema:
       $ref: "#/definitions/ObcmTmRelationshipMasterSaveResponseDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /service/v1/buyerseller/relationshipmaster:
  get:
   tags:
    - "relationshipmasterservice"
   summary: "Get all valid relationshipmaster."
   description:  "Get all valid relationshipmaster. This endpoints will be used to Get all valid relationshipmaster maintenance records."
   operationId: "getRelationshipMasterByBuyerSeller"
   parameters:
   - name: buyerId
     in: query
     description: buyerId need to be set to fetch summary record
     required: false
     type: string
   - name: sellerId
     in: query
     description: buyerId need to be set to fetch summary record
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "./obcmtmrelationshipmaster.yaml#/definitions/ObcmTmRelationshipMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error" 
 
 /service/v1/relationshipmaster/associatedPartiesList:
  get:
   tags:
    - "relationshipmasterservice"
   summary: "Fetch relationshipmaster for given associated party."
   description: "Fetch relationshipmaster for given associated party."
   operationId: "getAssociatedParties"
   parameters:
    - name: userId
      in: header
      description: userId
      required: true
      type: string
    - name: branchCode
      in: header
      description: branchCode
      required: true
      type: "string"
    - name: appId
      in: header
      type: string
      required: true
    - name: "partyId" 
      type: "string"
      in: "query" 
      description: "The party whose associated parties have to be identified. Either partyId or name is required. If party id and name both are sent, then system will use party id." 
      required: false
    - name: "name" 
      in: "query"
      type: "string"
      description: "Party Name whose associated parties have to be found."
      required: false
    - name: "authStatus" 
      in: "query"
      type: "string"
      description: "Corporate can check list of authorized, non-authorized counterparty. If value of this field is blank than all parties would be returned." 
      required: false
    - name: "associatedPartyType" 
      in: "query"
      type: "string"
      description: "Can be either C/CP. C- Corporate, CP-Counterparty." 
      required: false
    - name: "associatedPartyRole" 
      in: "query"
      type: "string"
      description: "Can be either B/S. B-Buyer, S- Supplier." 
      required: false
    - name: "relationshipCode" 
      in: "query"
      type: "string"
      description: "Relationship code for filter" 
      required: false
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created relationshipmaster" 
       type: "string"
     schema:
       $ref: "#/definitions/AssociatedPartiesResponseList"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /service/v1/relationshipmaster/externalCode:
  get:
   tags:
    - "relationshipmasterservice"
   summary: "Fetch external code for given associated party."
   description: "Fetch external code for given associated party."
   operationId: "getExternalCodes"
   parameters:
    - name: "relationshipCode" 
      type: "string"
      in: "query" 
      description: "relationship code for filter" 
      required: true
    - name: "buyerId" 
      in: "query"
      type: "string"
      description: "Buyer Id for filtration."
      required: false
    - name: "sellerId" 
      in: "query"
      type: "string"
      description: "Seller Role for filtration." 
      required: false
    - name: "offset"
      in: "query"
      description: "offset is starting no of records to be fetched"
      required: false
      type: "integer"
    - name: "limit"
      in: "query"
      description: "limit is maximum no of records to be fetched"
      required: false
      type: "integer"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created relationshipmaster" 
       type: "string"
     schema:
       $ref: "./obcmtmrelationshipmaster.yaml#/definitions/ObcmTmRelationshipDetailsExternalCodeCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /service/v1/relationshipmaster/nonCustomerDetails/{externalCode}:
  get:
   tags:
    - "relationshipmasterservice"
   summary: "Fetch CounterParty Details for given External Code."
   description: "Fetch CounterParty Details for given External Code."
   operationId: "getCounterPartyDetails"
   parameters:
    - name: "externalCode" 
      type: "string"
      in: "path" 
      description: "relationship code for filter" 
      required: true
    - name: "userId"
      in: header
      description: userId
      required: true
      type: string
    - name: "appId"
      in: header
      type: string
      required: true
   responses:
    200: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created relationshipmaster" 
       type: "string"
     schema:
       $ref: "#/definitions/NonCustomerDetailsCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"    
  
 
 /service/v1/checkRelationshipExpiry:  
  get:
   tags:
    - "ExpiryCheckController"
   summary: "Check expiry of each relationship at the end of the day"
   description:  "Check expiry of each relationship & mark inactive if expired"
   operationId: "checkRelationshipExpiry"
   parameters:
    - name: "userId"
      in: "header"
      description: "User Id"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      description: "Application Id"
      type: "string"
      required: true
    - name: "branchCode"
      in: "header"
      description: "Branch Code"
      type: "string"
      required: true
    - name: "branchDate" 
      in: "query" 
      description: "Branch Date"
      type: "string" 
    - name: "nextWorkingDate" 
      in: "query" 
      description: "Next Working Date"
      type: "string"
    - name: "holidayCheckReq" 
      in: "query" 
      description: "Holiday Check Required"
      type: "string"   
   responses:
    201:
     description: "Returns message of succes or failure"
     schema:
       type: boolean
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"    
        
