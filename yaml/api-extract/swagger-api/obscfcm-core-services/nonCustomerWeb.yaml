swagger: "2.0"
info:
 description: "This is a sample server noncustomer server." 
 version: "1.0.0"
 title: "NonCustomer Service"
host: 10.184.157.121:9000
basePath: /obscfcm-core-services
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "NonCustomerWeb"
   description: "With Non-Customer services , user will be able to create new Non-Customer with its basic information , address information , tax information and supporting documents . It allows the user to search Non-Customers , delete invalid Non-Customers and modify them"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../noncustomer

 /web/v1/noncustomer:
  post:
   tags:
    - "NonCustomerWeb"
   summary: "Adds a new noncustomer."
   description: "Adds a new noncustomer"
   operationId: "saveRecord"
   parameters:
    - name: userId
      in: header
      description: userId
      required: true
      type: string
    - name: branchCode
      in: header
      description: branchCode
      required: true
      type: "string"
    - name: appId
      in: header
      type: string
      required: true
    - name: "noncustomer" 
      in: "body" 
      description: "Request Body that contains data required for creating a new noncustomer" 
      required: true
      schema:
       $ref: "./nonCustomerDef.yaml#/definitions/ScfTmNonCustomerMasterDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created noncustomer" 
       type: "string"
     schema:
       $ref: "./nonCustomerDef.yaml#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "NonCustomerWeb"
   summary: "Get all valid noncustomer."
   description:  "Get all valid noncustomer. This endpoints will be used to Get all valid noncustomer maintenance records."
   operationId: "getAll"
   parameters:
   - name: userId
     in: header
     description: userId
     required: true
     type: string
   - name: branchCode
     in: header
     description: branchCode
     required: true
     type: "string"
   - name: appId
     in: header
     type: string
     required: true
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: viewcall
     in: query
     description: view need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: category
     required: false
     type: string
     description: Category
   - in: query
     name: nonCustomerId
     required: false
     type: string
     description: Non Customer Id
   - in: query
     name: shortName
     required: false
     type: string
     description: Short Name
   - in: query
     name: registrationNumber
     required: false
     type: string
     description: Registration Number
   - name: recordStat
     in: query     
     required: false
     type: string
     description: Record Stat
   - name: authStat
     in: query     
     required: false
     type: string
     description: Auth Stat
   - name: name
     in: query     
     required: false
     type: string
     description: Name
   - name: relationshipRefNo
     in: query     
     required: false
     type: string
     description: Relationship Reference No
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
      $ref: "./nonCustomerDef.yaml#/definitions/ScfTmNonCustomerMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../noncustomer/xxx
#   DELETE    .../noncustomer/xxx
#   GET       .../noncustomer/xxx
#   GET       .../noncustomer/xxx?version=latestrecord
#   GET       .../noncustomer/xxx?version=1

 /web/v1/noncustomer/{id}:
  put:
   tags:
    - "NonCustomerWeb"
   summary: "Update an existing noncustomer."
   description:  "Update an existing noncustomer."
   operationId: "modifyRecord"
   parameters:
    - name: userId
      in: header
      description: userId
      required: true
      type: string
    - name: branchCode
      in: header
      description: branchCode
      required: true
      type: "string"
    - name: appId
      in: header
      type: string
      required: true
    - name: "id"
      in: "path"
      description: "key of the noncustomer Maintenance"
      required: true
      type: "string"
    - name: "noncustomer"
      in: "body"
      description: "Request Body that contains data required for updating an existing noncustomer"
      required: true
      schema:
       $ref: "./nonCustomerDef.yaml#/definitions/ScfTmNonCustomerMasterDTO"
   responses:
    200:
     description: "Returns updated noncustomer"
     schema:
      $ref: "./nonCustomerDef.yaml#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "NonCustomerWeb"
   summary: "Retrieves the noncustomer by ID."
   description:  "Retrieves the noncustomer by ID."
   operationId: "getById"
   parameters:
    - name: userId
      in: header
      description: userId
      required: true
      type: string
    - name: branchCode
      in: header
      description: branchCode
      required: true
      type: "string"
    - name: appId
      in: header
      type: string
      required: true
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the noncustomer based on given id."
     schema:
      $ref: "./nonCustomerDef.yaml#/definitions/ScfTmNonCustomerMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "NonCustomerWeb"
   summary: "Deletes the noncustomer identified by given ID."
   description:  "Deletes the noncustomer identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: userId
      in: header
      description: userId
      required: true
      type: string
    - name: branchCode
      in: header
      description: branchCode
      required: true
      type: "string"
    - name: appId
      in: header
      type: string
      required: true
    - name: "id"
      in: "path"
      description: "Key of the noncustomer maintenance"
      required: true
      type: "string"
    - name: "noncustomer"
      in: "body"
      description: Request body contain noncustomer and Modification no of noncustomer maintenance which need to be deleted"
      required: true
      schema:
       $ref: "./nonCustomerDef.yaml#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "./nonCustomerDef.yaml#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

