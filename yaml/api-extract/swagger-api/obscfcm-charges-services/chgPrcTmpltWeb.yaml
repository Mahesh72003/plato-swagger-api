#   GET       .../web/v1/chgPrcTmpl/xxx?version=1

 /web/v1/chgPrcTmpl/{id}:
  put:
   tags:
    - "chgPrcTmplWeb"
   summary: "Update an existing charge pricing template."
   description:  "Update an existing charge pricing template."
   operationId: "modifyRecord"
   parameters:
    - name: "userId"
      in: "header"
      description: "userId"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "branchCode"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      type: "string"
      required: true
    - name: "id"
      in: "path"
      description: "key of the charge pricing template Maintenance"
      required: true
      type: "string"
    - name: "chgPrcTmplWebModel"
      in: "body"
      description: "Request Body that contains data required for creating a new charge pricing template."
      required: true
      schema:
        $ref: "./chgPrcTmpltDef.yaml#/definitions/ChgPrcTmplWebModel"
   responses:
    200:
     description: "Returns updated charge pricing template."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "chgPrcTmplWeb"
   summary: "Retrieves the charge pricing template by ID."
   description:  "Retrieves the charge pricing template by ID."
   operationId: "getById"
   parameters:
    - name: "userId"
      in: "header"
      description: "userId"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "branchCode"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      type: "string"
      required: true
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
    - name: latestAuthRecord
      in: query
      description: "provides only latest latest auth records if true"
      required: false
      default: false
      type: boolean
   responses:
    200:
     description: "Returns the charge pricing template based on given id."
     schema:
      $ref: "./chgPrcTmpltDef.yaml#/definitions/ChgPrcTmplWebModel"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 /web/v1/chgPrcTmpl/{id}/delete:
  put:
   tags:
    - "chgPrcTmplWeb"
   summary: "Deletes the charge pricing template identified by given ID."
