swagger: "2.0"
info:
 description: "This is a sample server charge pricing template server." 
 version: "1.0.0"
 title: "Charge Pricing Template Web"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "chgPrcTmplWeb"
   description: "Charge Pricing Template"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../web/v1/chgPrcTmpl

 /web/v1/chgPrcTmpl:
  post:
   tags:
    - "chgPrcTmplWeb"
   summary: "Adds a new charge pricing template."
   description: "Adds a new charge pricing template. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "userId"
      in: "header"
      description: "userId"
      required: true
      type: "string"
    - name: "branchCode"
      in: "header"
      description: "branchCode"
      required: true
      type: "string"
    - name: "appId"
      in: "header"
      type: "string"
      required: true
    - name: "chgPrcTmplWebModel"
      in: "body"
      description: "Request Body that contains data required for creating a new charge pricing template."
      required: true
      schema:
        $ref: "./chgPrcTmpltDef.yaml#/definitions/ChgPrcTmplWebModel"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created charge pricing template." 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "chgPrcTmplWeb"
   summary: "Get all valid charge pricing template."
   description:  "Get all valid charge pricing template. This endpoints will be used to Get all valid charge pricing template maintenance records."
   operationId: "getAll"
   parameters:
   - name: "userId"
     in: "header"
     description: "userId"
     required: true
     type: "string"
   - name: "branchCode"
     in: "header"
     description: "branchCode"
     required: true
     type: "string"
   - name: "appId"
     in: "header"
     type: "string"
     required: true
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: applicationCode
     required: false
     type: string
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: chgInTxnCcy
     required: false
     type: string
   - in: query
     name: chgPrcDesc
     required: false
     type: string
   - in: query
     name: chgPrcTemplateId
     required: false
     type: string
   - in: query
     name: fixedAmt
     required: false
     type: integer
   - in: query
     name: fixedPct
     required: false
     type: integer
   - in: query
     name: flatChg
     required: false
     type: string
   - in: query
     name: maxChgAmount
     required: false
     type: integer
   - in: query
     name: maxChgPct
     required: false
     type: integer
   - in: query
     name: minChgAmount
     required: false
     type: integer
   - in: query
     name: minChgPct
     required: false
     type: integer
   - in: query
     name: minMaxValidationCriteria
     required: false
     type: string
   - in: query
     name: prcCategory
     required: false
     type: string
   - in: query
     name: prcCategoryDesc
     required: false
     type: string
   - in: query
     name: prcCcy
     required: false
     type: string
   - in: query
     name: prcMethod
     required: false
     type: string
   - in: query
     name: prcMethodDesc
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   - in: query
     name: category
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: "Location"
       type: "string"
     schema:
       $ref: "./chgPrcTmpltDef.yaml#/definitions/CmcTmChgPrcTmpltCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../web/v1/chgPrcTmpl/xxx
#   DELETE    .../web/v1/chgPrcTmpl/xxx
#   GET       .../web/v1/chgPrcTmpl/xxx
