      financeSeqNo:
        type: "integer"
        format: "int64"
      taskName:
        type: "string"
      isAutoProcessing:
        type: "string"
        description: "isAutoProcessing flag"
      isLimitBlockReqd:
        type: "string"
        description: "isLimitBlockReqd flag"
      isAuthRequired:
        type: "string"
        description: "isAuthRequired flag"
      isAccEntriesPostRequired:
        type: "string"
        description: "isAccEntriesPostRequired flag"
      isExternalPaymentRequired:
        type: "string"
        description: "isExternalPaymentRequired flag"
      isLimitUtilReleaseRequired:
        type: "string"
        description: "isLimitUtilReleaseRequired flag"
      isUpdateFinanceMasterReqd:
        type: "string"
        description: "isUpdateFinanceMasterReqd flag"
      isInstrumentUpdateReqd:
        type: "string"
        description: "isInstrumentUpdateReqd flag"
      isObclTxnUpdateReqd:
        type: "string"
        description: "isObclTxnUpdateReqd flag"
      isAlertsAndNotificationReqd:
        type: "string"
        description: "isAlertsAndNotificationReqd flag"
      userAmount:
        type: "number"
      userCcy:
        type: "string"
      additionalDetails:
       type: object
       additionalProperties:
        type: object