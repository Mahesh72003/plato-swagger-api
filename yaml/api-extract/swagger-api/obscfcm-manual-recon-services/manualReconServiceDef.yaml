        $ref: "#/definitions/ResponseServiceCode"
      errorCodes:
       type: array
       items:
        $ref: "#/definitions/ErrorResponseServiceCode"
      
      
  ResponseServiceCode:
    type: object
    properties:
     extSysRefNumber:
       type: string
     status:
       type: string
     allocationTxnList:
       type: array
       items:
        $ref: "#/definitions/AllocationResponse"
     errorCodes:
       type: array
