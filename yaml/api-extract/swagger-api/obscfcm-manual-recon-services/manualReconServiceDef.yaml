      reconTxnRefNo:
        type: string
        description: "Transaction Ref No"
      extLhsRefNo:
        type: string
        description: "External LHS Ref No"
      intLhsRefNo:
        type: string
        description: "Internal LHS No"
      lhsCcy:
        type: string
        description: "currency of LHS entity"
      amtMatched:
        type: number
        description: "Amount to be dereconciled"
      corporateId:
        type: string 
        description: "Corporate Id"
      paymentRefNo:
        type: string
        description: "Internal Payment ref no"
      paymentCcy:
        type: string
        description: "Payment Currency"
      reconciledPmtAmt:
        type: number
        description: "Reconciled Amount in Payment Currency"
      extPmtRefNo:
        type: string
        description: "External Payment ref no"
  DeReconCnDto:
    description: lhs and payment detail
    type: object
    properties:
      id:
        type: number
      reconTxnRefNo:
        type: string
        description: "Transaction Ref No"
      extLhsRefNo:
        type: string
        description: "External LHS Ref No"
      intLhsRefNo:
        type: string
        description: "Internal LHS No"
      lhsCcy:
        type: string
        description: "currency of LHS entity"
      amtMatched:
        type: number
        description: "Amount to be dereconciled"
      corporateId:
        type: string
        description: "Corporate Id" 
      cnRefNo:
        type: string
        description: "internal Credit Note Ref No"
      cnCcy:
        type: string
        description: ""
      reconciledCnAmt:
        type: number
      externalCnRefNo:
        type: string
  ReconServiceTxnCollection:
    description: "Collection recon transactions"
    type: "object"
    properties:
      reconCategory:
        type: string
      autoAuth:
        type: string
      corporateId:
        type: string
      reconTxnRefNo:
        type: string
      reconTxnCollection:
       type: "array"
       items: 
        $ref: "#/definitions/ReconServiceTxnDto"
      paging:
       $ref: "./manualReconDef.yaml#/definitions/PagingDto"
  ReconServiceTxnDto:
    description: each recon txn deatail
    type: object
