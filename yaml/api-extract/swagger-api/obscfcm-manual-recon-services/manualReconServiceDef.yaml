    description: each recon txn deatail
    type: object
    properties:
      paymentRefNo:
        type: string
      externalPmtRefNo:
        type: string
      drCrIndicator:
        type: string
      lhsRefNumber:
        type: string
      lhsExtRefNo:
        type: string
      paymentCcy:
