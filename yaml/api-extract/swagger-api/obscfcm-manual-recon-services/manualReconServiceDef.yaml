swagger: "2.0"
info:
  version: "1.0.0"
  title: "Manual Reconciliation Service Definitions"

paths:
  /:
    get:
      responses:
        201:
          description: ""

definitions:
  ManualAllocCollection:
    description: "Collection of Allocation Transaction detail."
    type: "object"
    properties:
      errCode:
        type: string
        description: "Error Code"
      errDesc:
        type: string  
        description: "Error Description"  
      manualAllocList:
        type: "array"
        items:
          $ref: "#/definitions/ManualAllocModel"
        description: "Allocation Detail list"
  ManualAllocModel:
    description: search result for manual alloc
    type: object
    properties:
      reconTxnRefNo:
        type: string
        description: "Recon Transaction reference Number"
      drCrIndicator:
        type: string
        description: "Debit Credit indicator of payment"
      paymentRefNo:
        type: string
        description: "Internal Payment Reference number"
      extPaymentRefNo:
        type: string
        description: "External Payment Reference Number"
      paymentCcy:
        type: string
        description: "Payment Currency"
      paymentAmount:
        type: number
        description: "Actual Payment Amount"
      isAuth:
        type: string
        description: "flag for auto-authorization of transaction"
      allocAccount:
        type: string
        description: "Allocation Account Number"
      allocAmount:
        type: number
        description: "Amount to be allocated in the transaction"
      allocDate:
        type: string
        description: "date on which allocation happens"
      allocStatus:
        type: string
        description: "Allocation transaction status"
      allocType:
        type: string
        description: "Allocation type account/Attribute based"        
  ManualAllocSearchModel:
    description: search parameters for manual alloc
    type: object
    properties:
      reconCategory:
        type: string
        description: "Recon Category"
      reconType:
        type: string
        description: "Recon type Auto/manual"
      reconTxnRefNo:
        type: string
        description: "Transaction reference number"
      isAuth:
        type: string
        description: "flag for auth-authorization"
      corporateId:
        type: string
        description: "Corporate Id"
      counterpartyId:
        type: string
        description: "Counterparty Id"
      paymentRefNo:
        type: string
        description: "Internal Payment Ref No"
      extPaymentRefNo:
        type: string
        description: "External Payment Ref No"
      drCrIndicator:
        type: string
        description: "Debit credit indicator"
      paymentPartyId:
        type: string
        description: "Payment Party Id"
      beneId:
        type: string
        description: "Beneficiary id"
      allocDateFrom:
        type: string
        description: "Allocation date from"
      allocDateTo:
        type: string
        description: "Allocation date to"
      allocAccount:
        type: string
        description: "Account Number"
      allocStatus:
        type: string
        description: "Allocation Status"
  DeReconTxnDto:
    description: each recon txn deatail
    type: object
    properties:
      id:
        type: number
      reconTxnRefNo:
        type: string
        description: "Transaction Ref No"
      reconCategory:
        type: string
        description: "Recon category baesd on LHS & RHS"
      reconAction:
        type: string
        description: "Action Recon/Derecon"
      isAutoAuth:
        type: string
        description: "auto-auth flag"
      reconType:
        type: string
        description: "Recon category Auto/manual"
      deReconPmtTxnDtoList:
        type: array
        items:
          $ref: "#/definitions/DeReconPmtDto"
        description: "reconcilation detail list with RHS as Payment"
      deReconCnTxnDtoList:
        type: array
        items:
          $ref: "#/definitions/DeReconCnDto"
          description: "reconcilation detail list with RHS as Credit Note"
  DeReconPmtDto:
    description: lhs and payment detail
    type: object
    properties:
      id:
