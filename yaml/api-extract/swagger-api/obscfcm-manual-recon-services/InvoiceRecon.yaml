            required: true
         -  name: branchCode
            in: header
            type: string
            required: true
         -  name: workFlowModel
            in: body
            description: Request Body that contains data required for initiating a new txn
            required: true
            schema:
               $ref: './manualReconDef.yaml#/definitions/ConductorWorkFlowModel'
         responses:
            200:
               description: Success
               schema:
                  $ref: './manualReconDef.yaml#/definitions/ConductorWorkFlowModel'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            405:
               description: Invalid input
            500:
               description: Internal error
