            in: header
            type: string
            required: true         
         -  name: userId
            in: header
            type: string
            required: true
            description: user id for SMS
         -  name: branchCode
            in: header
            type: string
            required: true  
         -  name: invoiceRefNo
            in: query
            type: string
            description: Request parameter
            required: false                  
         -  name: cnNumber
            in: query
            type: string
            description: Request parameter
            required: false
         responses:
            200:
               description: Search performed successfully
               schema:
                  $ref: './manualReconDef.yaml#/definitions/ReconInvCnDtoCollection'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
            405:
               description: Invalid input
            500:
               description: Internal error            
   /web/v1/getTopInvoiceRecords:
      post:
         tags:
         - invoiceReconService
         summary: Get top matching invoices based on the payment remarks.
         description: Get top matching invoices based on the payment remarks.
         operationId: getTopInvoiceRecord
         parameters:
         -  name: appId
            in: header
            type: string
            required: true
            description: Application id
         -  name: userId
            in: header
            type: string
            required: true
            description: User id
         -  name: branchCode
            in: header
            type: string
            required: true
            description: Branch Code
         -  name: invoicePaymentCollection
            in: body
            description: Request Body
            required: true
            schema:
               $ref: './manualReconDef.yaml#/definitions/InvoicePaymentCollection'
         responses:
            200:
               description: Successfully received invoicesPayments details
               schema:
                  $ref: './manualReconDef.yaml#/definitions/InvoicePaymentCollection'
            400:
               description: Malformed syntax.
            401:
               description: Request does not have sufficient credentials.
            403:
               description: Request is not authorized.
