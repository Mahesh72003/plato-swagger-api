      summary: "Initiates the policy amendment process for the list of available policy to be amendment."
      description:  "Initiates the policy amendment process for the list of available policy to be amendment."
      operationId: "initiatePolicyAmendment"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /web/v1/policy/{policyId}/composite:
    get:
      tags:
        - "policyCompositeDetailsWeb"
      summary: "Retrieves policy details for the policy id"
      description: "Retrieves policy details for the policy id from current(work) and existing(replicated) records"
      operationId: "getPolicyCompositeDetails"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "policyId"
          in: "path"
          description: "Policy Id for which the policy details has to be fetched."
          required: true
          type: "string"
        - name: "dimensionName"
          in: "query"
          description: "If passed, will narrow down the particular dimension"
          required: false
          type: "string"
          enum:
            - SECTOR
            - HEADROOM
            - BENCHMARK
            - QUESTIONNAIRE_LINKAGE
            - LENDING_AUTHORITY
            - MIN_ELIG_CRITERIA
            - COLLATERAL
            - COVENANT
            - PRICING
            - PRODUCT
            - DOCUMENT
            - TERMS_AND_CONDITIONS
            - UNSECURED_LENDING
        - name: "status"
          in: "query"
          description: "If passed as MAIN, will retrieve only MAIN entries and skip work or replication entries"
          required: false
          type: "string"
          enum:
            - MAIN
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/CompositePolicyDetails"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
