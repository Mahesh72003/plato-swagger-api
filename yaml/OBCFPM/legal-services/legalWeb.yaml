definitions:
  TransactionHeaderModel:
    type: "object"
    properties:
      processRefNo:
        type: "string"
      taskOutcome:
        type: "string"
      currentUser:
        type: "string"
      branchCode:
        type: "string"
      processName:
        type: "string"
      taskId:
        type: "string"
      currentStage:
        type: "string"
      tab:
        type: "string"
      taskPriority:
        type: "string"
      instanceId:
        type: "string"
      moduleCode:
        type: "string"
      isFromCAM:
        type: "boolean"
      externalCheckReq:
        type: "boolean"
      fieldInvestigationReq:
        type: "boolean"
      externalValuationReq:
        type: "boolean"
      internalValuationReq:
        type: "boolean"
      legalOpinionReq:
        type: "boolean"
      riskEvaluationReq:
        type: "boolean"
      externalCheckAgencySelected:
        type: "boolean"
      externalValAgencySelected:
        type: "boolean"
      legalFirmSelected:
        type: "boolean"
      isCollatCreateSelected:
        type: "boolean"
      collateralValue:
        type: "number"
      oldCollateralValue:
        type: "number"
      isFromCollateralEvaluation:
        type: "boolean"
      isFromCollateralReview:
        type: "boolean"
      isSubmissionAndAwaitingReq:
        type: "boolean"
      serviceName:
        type: "string"
      ownerEstimatedValue:
        type: "number"
      marketValue:
        type: "number"
      bankValue:
        type: "number"
      customerId:
        type: "string"
      collateralType:
        type: "string"
      collateralCode:
        type: "string"
      collateralCurrency:
        type: "string"
      taskCreationDate:
        type: "string"
        format: "date-time"
      submitFlag:
        type: "boolean"
      source:
        type: "string"
      isKYCRequired:
        type: "boolean"
      isCreditRatingRequired:
        type: "boolean"
      stageUpdateFlag:
        type: "boolean"
      collateralSubmissionReq:
        type: "boolean"
      awaitForConfirmation:
        type: "boolean"
      documentSafeKeepingReq:
        type: "boolean"
      updateCategory:
        type: "string"
  InlineResponse:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      message:
        type: "string"
  RepresentationModel:
    allOf:
      - type: object
        discriminator: resource_type
  LegalMasterModel:
    description: "Legal Opinion Master model"
    allOf:
      - $ref: '#/definitions/RepresentationModel'
      - type: "object"
        required:
          - entityRefNo
          - legalOpinionType
        properties:
          recordId:
            type: "string"
          parentId:
            type: "string"
          entityRefNo:
            type: "string"
          entityRefType:
            type: "string"
          versionNo:
            type: "integer"
            format: "int64"
          createdBy:
            type: "string"
          createdDate:
            type: "string"
            format: "date-time"
          updatedBy:
            type: "string"
          updatedDate:
            type: "string"
            format: "date-time"
          recordStat:
            type: "string"
          legalOpinionType:
            type: "string"
          replicationFlag:
            type: "boolean"
          applicationNumber:
            type: "string"
          legalOpinion:
            type: "array"
            items:
              $ref: "#/definitions/LegalModel"
  LegalModel:
    description: "Legal Opinion model"
    type: "object"
    required:
      - legalOpinionType
    properties:
      id:
        type: "string"
      legalFirmId:
        type: "string"
      agencyName:
        type: "string"
      legalFirmOpinion:
        type: "string"
      internalOpinion:
        type: "string"
      internalOpinionDate:
        type: "string"
        format: "date-time"
      initialRecommendation:
        type: "string"
      externalOpinionDate:
        type: "string"
        format: "date-time"
      creditRemarks:
        type: "string"
      finalRecommendation:
        type: "string"
      disclaimer:
        type: "string"
      outcome:
        type: "string"
      legalOpinionType:
        type: "string"
      parentId:
        type: "string"
      # PatchSet -Dec delete changes
      softDeleteFlag:
        type: "string"
      deleteStat:
        type: "string"

  LegalCollection:
    description: "Collection of legal opinions."
    type: "object"
    properties:
      LegalList:
        type: "array"
        items:
          $ref: "#/definitions/LegalMasterModel"
  ErrorHandlerModel:
    description: "Error Handler model"
    type: "object"
    properties:
      errorCode:
        type: "string"
      language:
        type: "string"
      message:
        type: "string"
      type:
        type: "string"

  ErrorHandlerCollection:
    description: "Collection of Error Handler."
    type: "object"
    properties:
      ErrorHandlerList:
        type: "array"
        items:
          $ref: "#/definitions/ErrorHandlerModel"
          
  LegalEventModel:
    description: "Legal Event model"
    type: "object"
    properties:
      processRefNo:
        type: "string" 
      collateralId:
        type: "string"  
      appNumber:
        type: "string" 
      branchCode:
        type: "string" 
      userId:
        type: "string"  
      sourceCode:
        type: "string"
      eventName:
        type: "string"        
      legalMasterModelList:
        type: "array"
        items:
          $ref: "#/definitions/LegalMasterModel"  
  EventModelWrapper:
    description: "Publish Event Wrapper"
    type: "object"
    properties:
      legalEventModel:
        $ref: "#/definitions/LegalEventModel"                                                                   