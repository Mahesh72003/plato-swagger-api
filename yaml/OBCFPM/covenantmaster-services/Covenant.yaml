swagger: "2.0"
info:
 description: "This is a sample server covenantmaintenance server." 
 version: "1.0.0"
 title: "covenant Master Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "covenantmaintenance"
   description: "This is a covenant maintenance service meant for handling maintenance details for Covenants. This is an enhancement in terms of covenant tracking as more details are added up based on the initial scenario which is existing. The enhancement involves addition of new tables and combining the results of data from different children and giving back the response"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../covenantmaintenance

 /covenantmaster:
  post:
   tags:
    - "covenantmaster"
   summary: "Adds a new covenantmaintenance."
   description: "Adds a new covenantmaintenance. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "covenantmaintenance" 
      in: "body" 
      description: "Request Body that contains data required for creating a new covenantmaintenance" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmCovenantMasterDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created covenantmaintenance" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "covenantmaster"
   summary: "Get all valid covenantmaintenance."
   description:  "Get all valid covenantmaintenance. This endpoints will be used to Get all valid covenantmaintenance maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: covenantLinkageType
     in: query
     description: get records based on the Covenant Linkage Type
     required: false
     type: "string"
   - name: covenantCode
     in: query
     description: get records based on the Covenant Code
     required: false
     type: "string"
   - name: covenantName
     in: query
     description: get records based on the Covenant Code
     required: false
     type: "string"
   - name: recordStatus
     in: query
     description: get records based on the Record status
     required: false
     type: "string"
   - name: authStatus
     in: query
     description: get records based on the Auth status
     required: false
     type: "string"

   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmCovenantMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

