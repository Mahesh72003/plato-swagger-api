definitions:
 CfpmTmQuestionnaireMasterDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     categoryCode:
      type: string
      description: ""
     questionnaireId:
      type: string
      description: ""
     questionnaireDesc:
      type: string
      description: ""
     questionDetails:
      type: array
      items:
       $ref: '#/definitions/CfpmTmQuestionnaireDetailsDTO'
 CfpmTmQuestionnaireDetailsDTO:
  type: object
  properties:
     cfpmTmQuestionnaireMasterId:
      type: string
      description: ""
     factor:
      type: number
      description: ""
     id:
      type: string
      description: ""
     subCategoryCode:
      type: string
      description: ""
     questionCode:
      type: string
      description: ""
     questionDescription:
      type: string
      description: ""
     answerDetails:
      type: array
      items:
       $ref: '#/definitions/CfpmTmQstnAnswrDetailsDTO'
 CfpmTmQstnAnswrDetailsDTO:
  type: object
  properties:
     answerDescription:
      type: string
      description: ""
     answerCode:
      type: string
      description: ""
     cfpmTmQuestionnaireDetailsId:
      type: string
      description: ""
     id:
      type: string
      description: ""
     questionCode:
      type: string
      description: ""
     score:
      type: number
      description: ""
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CfpmTmQuestionnaireMasterCollection: 
  description: "Collection of questionnaire."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CfpmTmQuestionnaireMasterDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CfpmTmQuestionnaireMasterWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CfpmTmQuestionnaireMasterDTO"
