   summary: "Retrives the questionnairedetails by given ID."
   description:  "Retrives the questionnairedetails by ID."
   operationId: "getHistory"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the questionnairedetails based on given id."
