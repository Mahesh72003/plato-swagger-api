swagger: "2.0"
info:
 description: "This is a sample server productdefault server." 
 version: "1.0.0"
 title: "productdefault Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "productdefault"
   description: "This service for facility category maintenance."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../productdefault
   
 /productdefault/getByEntityTypeAndCategory:
  get:
   tags:
    - "productdefault"
   summary: "Retrieves all the primary productdefault."
   description:  "Retrieves all the primary productdefault."
   operationId: "getByEntityTypeAndCategory"
   parameters:
    - name: "entity"
      in: "query"
      description: "Category Code that needs to be fetched"
      required: true
      type: "string"
    - name: "entityType"
      in: "query"
      description: "Category Code that needs to be fetched"
      required: false
      type: "string"
    - name: "entityCategory"
      in: "query"
      description: "Category Code that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the primary productdefault list."
     schema:
      $ref: "#/definitions/CfpmTmProductDefaultDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error" 

 /productdefault:
  post:
   tags:
    - "productdefault"
   summary: "Adds a new productdefault."
   description: "Adds a new productdefault. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "productdefault" 
      in: "body" 
      description: "Request Body that contains data required for creating a new productdefault" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmProductDefaultDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created productdefault" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "productdefault"
   summary: "Get all valid productdefault."
   description:  "Get all valid productdefault. This endpoints will be used to Get all valid productdefault maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: entity
     in: query
     description: entity is single record to be fetched
     required: false
     type: string
   - name: entityType
     in: query
     description: entityType is single record to be fetched
     required: false
     type: string
   - name: entityCategory
     in: query
     description: entityCategory is single record to be fetched
     required: false
     type: string
 
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmProductDefaultCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../productdefault/xxx
#   DELETE    .../productdefault/xxx
#   GET       .../productdefault/xxx
#   GET       .../productdefault/xxx?version=latestrecord
#   GET       .../productdefault/xxx?version=1

 /productdefault/{id}:
  put:
   tags:
    - "productdefault"
   summary: "Update an existing productdefault."
   description:  "Update an existing productdefault."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the productdefault Maintenance"
      required: true
      type: "string"
    - name: "productdefault"
      in: "body"
      description: "Request Body that contains data required for updating an existing productdefault"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmProductDefaultDTO"
   responses:
    200:
     description: "Returns updated productdefault"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "productdefault"
   summary: "Retrieves the productdefault by ID."
   description:  "Retrieves the productdefault by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the productdefault based on given id."
     schema:
      $ref: "#/definitions/CfpmTmProductDefaultWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "productdefault"
   summary: "Deletes the productdefault identified by given ID."
   description:  "Deletes the productdefault identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the productdefault maintenance"
      required: true
      type: "string"
    - name: "productdefault"
      in: "body"
      description: Request body contain productdefault and Modification no of productdefault maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

