# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../productdefault/xxx/reopen

 /productdefault/{id}/reopen:
  patch:
   tags:
    - "productdefault"
   summary: "reopen the productdefault by given ID."
