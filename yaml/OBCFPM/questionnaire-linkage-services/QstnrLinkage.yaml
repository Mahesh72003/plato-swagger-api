swagger: "2.0"
info:
 description: "This is a sample server questionnairelinkage server." 
 version: "1.0.0"
 title: "questionnairelinkage Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "questionnairelinkage"
   description: " A micro service that will maintain questionnaire linkage details in a separate table. This service will also provide APIs for GET, PUT, DELETE, GET by id, Authorize the given record, Reopen and Close APIs for the maintenance records."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../questionnairelinkage

 /questionnairelinkage:
  post:
   tags:
    - "questionnairelinkage"
   summary: "Adds a new questionnairelinkage."
   description: "Adds a new questionnairelinkage. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "questionnairelinkage" 
      in: "body" 
      description: "Request Body that contains data required for creating a new questionnairelinkage" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmQstnrLinkageMasterDTO"
    - name: "bindingResult" 
      in: "body" 
      description: "Request Body that contains data required for creating a new questionnairelinkage" 
      required: false
      schema:
       $ref: "#/definitions/BindingResult"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created questionnairelinkage" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "questionnairelinkage"
   summary: "Get all valid questionnairelinkage."
   description:  "Get all valid questionnairelinkage. This endpoints will be used to Get all valid questionnairelinkage maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmQstnrLinkageMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /fetchQuestionnaireLinkage:
  get:
   tags:
    - "questionnairelinkage"
   summary: "Get all valid questionnairelinkage."
   description:  "Get all valid questionnairelinkage. This endpoints will be used to Get all valid questionnairelinkage maintenance records."
   operationId: "getQuestionnaireLinkageDetails"
   parameters:
   - name: userId
     in: header
     type: string
     required: true
   - name: branchCode
     in: header
     type: string
     required: true
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: industryCode
     in: query
     description: industry code of records to be fetched
     required: false
     type: string
   - name: subIndustryCode
     in: query
     description: "sub-industry code of record to be fetched"
     required: false
     type: string
   - name: sector
     in: query
     description: "sector of record to be fetched"
     required: false
     type: string
   - name: balanceSheetSize
     in: query
     description: "balancesheet size of record to be fetched"
     required: false
     type: number
   - name: categoryCode
     in: query
     description: "category code of record to be fetched"
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmQstnrLinkageMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../questionnairelinkage/xxx
#   DELETE    .../questionnairelinkage/xxx
#   GET       .../questionnairelinkage/xxx
#   GET       .../questionnairelinkage/xxx?version=latestrecord
#   GET       .../questionnairelinkage/xxx?version=1

 /questionnairelinkage/{id}:
  put:
   tags:
    - "questionnairelinkage"
   summary: "Update an existing questionnairelinkage."
   description:  "Update an existing questionnairelinkage."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the questionnairelinkage Maintenance"
      required: true
      type: "string"
    - name: "questionnairelinkage"
      in: "body"
      description: "Request Body that contains data required for updating an existing questionnairelinkage"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmQstnrLinkageMasterDTO"
    - name: "bindingResult" 
      in: "body" 
      description: "Request Body that contains data required for modify an existing record questionnairelinkage" 
      required: false
      schema:
       $ref: "#/definitions/BindingResult"
   responses:
    200:
     description: "Returns updated questionnairelinkage"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "questionnairelinkage"
   summary: "Retrieves the questionnairelinkage by ID."
   description:  "Retrieves the questionnairelinkage by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the questionnairelinkage based on given id."
     schema:
      $ref: "#/definitions/CfpmTmQstnrLinkageMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "questionnairelinkage"
   summary: "Deletes the questionnairelinkage identified by given ID."
   description:  "Deletes the questionnairelinkage identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the questionnairelinkage maintenance"
      required: true
      type: "string"
    - name: "questionnairelinkage"
      in: "body"
      description: Request body contain questionnairelinkage and Modification no of questionnairelinkage maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

