swagger: "2.0"
info:
  description: "This is a sample server Settlement server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Settlement Service"
host: "ofss222812:7701"
basePath: "/settlement-services"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "SettlementAPI"
    description: "API for Settlement's Operations"
    
schemes:
- "https"

paths:
  /web/v1/settlement:
    post:
      tags:
        - "settlementWeb"
      summary: "Create a new Settlement."
      description: "Create a new Settlement."
      operationId: "createSettlement"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "settlementCollection"
          in: "body"
          description: "Request Body that contains data required for creating a new settlement"
          required: true
          schema:
            $ref: "#/definitions/SettlementCollection"
      responses:
        201:
          description: "Returns the Id of the newly created settlement"
          headers:
            Location:
              description: "URL of newly created bidding"
              type: "string"
          schema:
              $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /web/v1/settlement/{entityId}:
    get:
      tags:
        - "settlementWeb"
      summary: "Retrieves the list of existing settlements."
      description:  "Retrieves the list of existing settlements."
      operationId: "getAllSettlements"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "entityId"
          in: "path"
          description: "Entity Id for which the settlement details has to be fetched."
          required: true
          type: "string"
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /web/v1/settlement/latest/{entityId}:
    get:
      tags:
        - "settlementWeb"
      summary: "Retrieves the Settlement by ID."
      description:  "Retrieves the Settlement by ID."
      operationId: "getSettlementById"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "entityId"
          in: "path"
          description: "Entity Id for which the settlement details has to be fetched."
          required: true
          type: "string" 
      responses:
        200:
          description: "Returns the settlement based on given entity id."
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /web/v1/settlement/{recordId}:
    put:
      tags:
        - "settlementWeb"
      summary: "Update an existing settlement."
      description:  "Update an existing settlement."
      operationId: "updateSettlement"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "recordId"
          in: "path"
          description: "Settlement that need to be updated"
          required: true
          type: "string"
        - name: "settlementCollection"
          in: "body"
          description: "Settlement that need to be updated"
          required: true
          schema:
            $ref: "#/definitions/SettlementCollection"
      responses:
        200:
          description: "Returns updated settlement model"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"          
    delete:
      tags:
        - "settlementWeb"
      summary: "Deletes the settlement identified by given ID."
      description:  "Deletes the settlement identified by given ID."
      operationId: "deleteSettlement"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "recordId"
          in: "path"
          description: "Id of the user that needs to be fetched"
          required: true
          type: "string"
      responses:
        200:
          description: "Successful operation."
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /web/v1/settlement/final:
    post:
      tags:
        - "settlementWeb"
      summary: "Submit Settlement."
      description: "Submit Settlement."
      operationId: "submitSettlement"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "transactionHeaderModel"
          in: "body"
          description: "Request Body that contains data required for creating a new settlement"
          required: true
          schema:
            $ref: "#/definitions/TransactionHeaderModel"
      responses:
        201:
          description: "Returns the Id of the newly created settlement"
          headers:
            Location:
              description: "URL of newly created settlement"
              type: "string"
          schema:
              $ref: "#/definitions/InlineResponse"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /web/v1/settlement/main/{entityId}:
    get:
      tags:
        - "settlementWeb"
      summary: "Retrieves the list of existing settlements."
      description:  "Retrieves the list of existing settlements."
      operationId: "getAllMainSettlements"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "entityId"
          in: "path"
          description: "Entity Id for which the settlement details has to be fetched."
          required: true
          type: "string"
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"    
definitions:
  InlineResponse:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      message:
       type: "string"
  RepresentationModel:
    allOf:
      - type: object
        discriminator: resource_type
  TransactionHeaderModel:
    type: "object"
    properties:
      processRefNo:
        type: "string"
      taskOutcome:
        type: "string"
      currentUser:
        type: "string"
      branchCode:
        type: "string"
      processName:
        type: "string"
      taskId:
        type: "string"
      currentStage:
        type: "string"
      tab:
        type: "string"
      taskPriority:
        type: "string"
      instanceId:
        type: "string"
      moduleCode:
        type: "string"
      isFromCAM:
        type: "boolean"
      externalCheckReq:
        type: "boolean"
      fieldInvestigationReq:
        type: "boolean"
      externalValuationReq:
        type: "boolean"
      internalValuationReq:
        type: "boolean"
      legalOpinionReq:
        type: "boolean"
      riskEvaluationReq:
        type: "boolean"
      externalCheckAgencySelected:
        type: "boolean"
      externalValAgencySelected:
        type: "boolean"
      legalFirmSelected:
        type: "boolean"
      isCollatCreateSelected:
        type: "boolean"
      collateralValue:
        type: "number"
      oldCollateralValue:
        type: "number"
      isFromCollateralEvaluation:
        type: "boolean"
      isFromCollateralReview:
        type: "boolean"
      isSubmissionAndAwaitingReq:
        type: "boolean"
      serviceName:
        type: "string"
      ownerEstimatedValue:
        type: "number"
      marketValue:
        type: "number"
      bankValue:
        type: "number"
      customerId:
        type: "string"
      collateralType:
        type: "string"
      collateralCode:
        type: "string"
      collateralCurrency:
        type: "string"
      taskCreationDate:
        type: "string"
        format: "date-time"
      submitFlag:
        type: "boolean"
      source:
        type: "string"
      isKYCRequired:
        type: "boolean"
      isCreditRatingRequired:
        type: "boolean"
      stageUpdateFlag:
        type: "boolean"
      collateralSubmissionReq:
        type: "boolean"
      awaitForConfirmation:
        type: "boolean"
      documentSafeKeepingReq:
        type: "boolean"
      updateCategory:
        type: "string"
  SettlementModel:
    description: "Settlement model"
    type: "object"
    properties:
      recordId:
        description: "Id of the settlement"
        type: "string"
      entityType:
        description: "Entity Type of the settlement"
        type: "string"
      entityId:
        description: "Entity ID of the settlement"
        type: "string"
      transferRefNumber:
        description: "Transfer Ref Number of the settlement"
        type: "string"
      transferFromBank:
        description: "Transfer From Bank of the settlement"
        type: "string"
      transferFromAccount:
        description: "Transfer From Account of the settlement"
        type: "string"
      transferToBank:
        description: "Transfer To Bank of the settlement"
        type: "string"        
      transferToAccount:
        description: "Transfer To Account of the settlement"
        type: "string"
      transferToBranch:
        description: "Transfer To Branch of the settlement"
        type: "string"        
      transferFromBranch:
        description: "Transfer From Branch of the settlement"
        type: "string"
      transferAmount:
        description: "Transfer Amount of the settlement"
        type: "integer"
        format: "int64"
      modeOfSettlement:
        description: "Mode of Settlement of the settlement"
        type: "string"
      createdBy:
        type: "string"
      createdDate:
        type: "string"
        format: "date-time"
      updatedBy:
        type: "string"
      updatedDate:
        type: "string"
        format: "date-time"
      versionNo:
        type: "integer"
        format: "int64"
      recordStat:
        type: "string"
      instrumentDetails:
       type: "array"
       items: { $ref: '#/definitions/InstrumentModel' }
  InstrumentModel:
    description: "Instrument model"
    type: "object"
    properties:
      id:
        description: "Id of the instrument"
        type: "string"
      entityId:
        description: "Entity ID of the instrument"
        type: "string"
      transferRefNumber:
        description: "Transfer Ref Number of the instrument"
        type: "string"
      inFavorOf:
        description: "In favor of the instrument"
        type: "string"
      instrumentNumber:
        description: "Instrument Number of the instrument"
        type: "string"
      instrumentDate:
        description: "Instrument Date of the instrument"
        type: "string"
        format: "date-time"       
      instrumentType:
        description: "Instrument Type of the instrument"
        type: "string"
      instrumentAmount:
        description: "Instrument Amount of the instrument"
        type: "integer"
        format: "int64"
      instrumentValidTill:
        description: "Instrument Valid Till of the instrument"
        type: "string"
        format: "date-time"
      parentId:
        type: "string"
  SettlementCollection:
    description: "Collection of Settlement."
    type: "object"
    properties:
      SettlementList:
        type: "array"
        items:
          $ref: "#/definitions/SettlementModel"