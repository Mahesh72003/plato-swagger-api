definitions:
  InlineResponse:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      message:
        type: "string"
  RepresentationModel:
    allOf:
      - type: object
        discriminator: resource_type
  ExternalCheckModel:
    description: "External Check model"
    type: "object"
    required:
      - collateralId
      - agencyId
      - externalChckOutcome
      - externalCheckDate
      - externalChckRemarks
    properties:
      parentId:
        type: "string"
      id:
        type: "string"
      collateralId:
        type: "string"
      agencyId:
        type: "string"
      agencyName:
        type: "string"
      externalChckOutcome:
        type: "string"
      externalChckRemarks:
        type: "string"
      externalCheckDate:
        type: "string"
        format: "date-time"
      versionNo:
        type: "integer"
        format: "int64"
      createdBy:
        type: "string"
      createdDate:
        type: "string"
        format: "date-time"
      updatedBy:
        type: "string"
      updatedDate:
        type: "string"
        format: "date-time"
      disclaimer:
        type: "string"
      recordStatus:
        type: "string"
      # PatchSet -Dec delete changes
      softDeleteFlag:
        type: "string"
      deleteStat:
        type: "string"
  ExternalCheckMasterModel:
    allOf:
      - $ref: '#/definitions/RepresentationModel'
      - type: object
        properties:
          recordId:
            type: "string"
          parentId:
            type: "string"
          collateralId:
            type: "string"
          recordStat:
            type: "string"
          versionNo:
            type: "integer"
            format: "int64"
          externalCheckList:
            type: "array"
            items:
              $ref: "#/definitions/ExternalCheckModel"
          replicationFlag:
            type: "boolean"
          applicationNumber:
            type: "string"
  ExternalCheckCollection:
    description: "Collection of External Check."
    type: "object"
    properties:
      ExternalCheckList:
        type: "array"
        items:
          $ref: "#/definitions/ExternalCheckMasterModel"
  TransactionHeaderModel:
    type: "object"
    properties:
      processRefNo:
        type: "string"
      taskOutcome:
        type: "string"
      currentUser:
        type: "string"
      branchCode:
        type: "string"
      processName:
        type: "string"
      taskId:
        type: "string"
      currentStage:
        type: "string"
      tab:
        type: "string"
      taskPriority:
        type: "string"
      instanceId:
        type: "string"
      moduleCode:
        type: "string"
      isFromCAM:
        type: "boolean"
      externalCheckReq:
        type: "boolean"
      fieldInvestigationReq:
        type: "boolean"
      externalValuationReq:
        type: "boolean"
      internalValuationReq:
        type: "boolean"
      legalOpinionReq:
        type: "boolean"
      riskEvaluationReq:
        type: "boolean"
      externalCheckAgencySelected:
        type: "boolean"
      externalValAgencySelected:
        type: "boolean"
      legalFirmSelected:
        type: "boolean"
      isCollatCreateSelected:
        type: "boolean"
      collateralValue:
        type: "number"
      oldCollateralValue:
        type: "number"
      isFromCollateralEvaluation:
        type: "boolean"
      isFromCollateralReview:
        type: "boolean"
      isSubmissionAndAwaitingReq:
        type: "boolean"
      serviceName:
        type: "string"
      ownerEstimatedValue:
        type: "number"
      marketValue:
        type: "number"
      bankValue:
        type: "number"
      customerId:
        type: "string"
      collateralType:
        type: "string"
      collateralCode:
        type: "string"
      collateralCurrency:
        type: "string"
      taskCreationDate:
        type: "string"
        format: "date-time"
      submitFlag:
        type: "boolean"
      source:
        type: "string"
      isKYCRequired:
        type: "boolean"
      isCreditRatingRequired:
        type: "boolean"
      stageUpdateFlag:
        type: "boolean"
      collateralSubmissionReq:
        type: "boolean"
      awaitForConfirmation:
        type: "boolean"
      documentSafeKeepingReq:
        type: "boolean"
      updateCategory:
        type: "string"
