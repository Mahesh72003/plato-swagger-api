paths:
  /web/v1/externalCheck:
    post:
      tags:
        - "ExternalCheckWeb"
      summary: "Creates a new External Check record for a particular collateral"
      description: "Creates a new External Check record for the collateral given in the request"
      operationId: "createExternalCheck"
      parameters:
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "externalCheckMasterModel"
          in: "body"
          description: "Request Body that contains data required for creating a new external check"
          required: true
          schema:
            $ref: "#/definitions/ExternalCheckMasterModel"
      responses:
        201:
          description: "Returns the Response Model with the Createed external check for the given Collateral"
          headers:
