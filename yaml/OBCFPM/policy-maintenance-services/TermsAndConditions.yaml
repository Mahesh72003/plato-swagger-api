 /termsandconditions/{id}/unauthorized:
  get:
   tags:
    - "termsandconditions"
   summary: "Retrives the termsandconditions by given ID."
   description:  "Retrives the termsandconditions identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
