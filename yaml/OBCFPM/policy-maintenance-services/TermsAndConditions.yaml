definitions:
 CfpmTmTermsAndConditionsDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     conditionCode:
      type: string
      description: "Condition code value"
     conditionDescription:
      type: string
      description: "Condition description value"
     industryCode:
      type: string
      description: "Industry code value"
     industryGrpCode:
      type: string
      description: "Inudstry group code value"
     sectorCode:
      type: string
      description: "Sector code vlaue"
     subIndustryCode:
      type: string
      description: ""
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CfpmTmTermsAndConditionsCollection: 
  description: "Collection of termsandconditions."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CfpmTmTermsAndConditionsDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CfpmTmTermsAndConditionsWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CfpmTmTermsAndConditionsDTO"
