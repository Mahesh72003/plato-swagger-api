# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../termsandconditions/xxx/close
 /termsandconditions/{id}/close:
  patch:
   tags:
    - "termsandconditions"
   summary: "Close the termsandconditions by given ID."
   description:  "Close the termsandconditions identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the termsandconditions maintenance"
      required: true
      type: "string"
    - name: "termsandconditions"
      in: "body"
      description: Request body contain termsandconditions and Modification no of termsandconditions maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

