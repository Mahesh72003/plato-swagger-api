swagger: "2.0"
info:
 description: "This is a sample server termsandconditions server." 
 version: "1.0.0"
 title: "termsandconditions Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "termsandconditions"
   description: "This service provide APIs for save, fetch, modify, authorize, close, reopen policy terms and conditions records. This service provide APIs for save, fetch, modify, authorize, close, reopen policy terms and conditions records. This service provide APIs for save, fetch, modify, authorize, close, reopen policy terms and conditions records. This service provide APIs for save, fetch, modify, authorize, close, reopen policy terms and conditions records."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../termsandconditions

 /termsandconditions:
  post:
   tags:
    - "termsandconditions"
   summary: "Adds a new termsandconditions."
   description: "Adds a new termsandconditions. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "termsandconditions" 
      in: "body" 
      description: "Request Body that contains data required for creating a new termsandconditions" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmTermsAndConditionsDTO"
#    - name: "bindingResult" 
#      in: "body" 
#      description: "Request Body that contains data required for creating a new termsandconditions" 
#      required: false
#      schema:
#       $ref: "#/definitions/BindingResult"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created termsandconditions" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "termsandconditions"
   summary: "Get all valid termsandconditions."
   description:  "Get all valid termsandconditions. This endpoints will be used to Get all valid termsandconditions maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: conditionCode
     required: false
     type: string
   - in: query
     name: industryCode
     required: false
     type: string
   - in: query
     name: industryGrpCode
     required: false
     type: string
   - in: query
     name: sectorCode
     required: false
     type: string
   - in: query
     name: subIndustryCode
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmTermsAndConditionsCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../termsandconditions/xxx
#   DELETE    .../termsandconditions/xxx
#   GET       .../termsandconditions/xxx
#   GET       .../termsandconditions/xxx?version=latestrecord
#   GET       .../termsandconditions/xxx?version=1

 /termsandconditions/{id}:
  put:
   tags:
    - "termsandconditions"
   summary: "Update an existing termsandconditions."
   description:  "Update an existing termsandconditions."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the termsandconditions Maintenance"
      required: true
      type: "string"
    - name: "termsandconditions"
      in: "body"
      description: "Request Body that contains data required for updating an existing termsandconditions"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmTermsAndConditionsDTO"
#    - name: "bindingResult" 
#      in: "body" 
#      description: "Request Body that contains data required for modify an existing record termsandconditions" 
#      required: false
#      schema:
#       $ref: "#/definitions/BindingResult"
   responses:
    200:
     description: "Returns updated termsandconditions"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "termsandconditions"
   summary: "Retrieves the termsandconditions by ID."
   description:  "Retrieves the termsandconditions by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the termsandconditions based on given id."
     schema:
      $ref: "#/definitions/CfpmTmTermsAndConditionsWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "termsandconditions"
   summary: "Deletes the termsandconditions identified by given ID."
   description:  "Deletes the termsandconditions identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the termsandconditions maintenance"
      required: true
      type: "string"
    - name: "termsandconditions"
      in: "body"
      description: Request body contain termsandconditions and Modification no of termsandconditions maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

