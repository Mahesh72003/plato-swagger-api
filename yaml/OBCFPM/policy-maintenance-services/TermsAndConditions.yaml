#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../termsandconditions/xxx/reopen

 /termsandconditions/{id}/reopen:
  patch:
   tags:
    - "termsandconditions"
   summary: "reopen the termsandconditions by given ID."
   description:  "reopen the termsandconditions identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
