swagger: "2.0"
info:
 description: "This is a sample server cautionlist server." 
 version: "1.0.0"
 title: "cautionlist Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "cautionlist"
   description: "A micro service that will maintain caution list details in a separate table. This service will also provide APIs for GET, PUT, DELETE, GET by id, Authorize the given record, Reopen and Close APIs for the maintenance records."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../cautionlist

 /cautionlist:
  post:
   tags:
    - "cautionlist"
   summary: "Adds a new cautionlist."
   description: "Adds a new cautionlist. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "cautionlist" 
      in: "body" 
      description: "Request Body that contains data required for creating a new cautionlist" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmPolicyCautionListDTO"
#    - name: "bindingResult" 
#      in: "body" 
#      description: "Request Body that contains data required for creating a new cautionlist" 
#      required: false
#      schema:
#       $ref: "#/definitions/BindingResult"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created cautionlist" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "cautionlist"
   summary: "Get all valid cautionlist."
   description:  "Get all valid cautionlist. This endpoints will be used to Get all valid cautionlist maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: industryCode
     required: false
     type: string
   - in: query
     name: industryGrpCode
     required: false
     type: string
   - in: query
     name: sectorCode
     required: false
     type: string
   - in: query
     name: subIndustryCode
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmPolicyCautionListCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../cautionlist/xxx
#   DELETE    .../cautionlist/xxx
#   GET       .../cautionlist/xxx
#   GET       .../cautionlist/xxx?version=latestrecord
#   GET       .../cautionlist/xxx?version=1

 /cautionlist/{id}:
  put:
   tags:
    - "cautionlist"
   summary: "Update an existing cautionlist."
   description:  "Update an existing cautionlist."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the cautionlist Maintenance"
      required: true
      type: "string"
    - name: "cautionlist"
      in: "body"
      description: "Request Body that contains data required for updating an existing cautionlist"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmPolicyCautionListDTO"
#    - name: "bindingResult" 
#      in: "body" 
#      description: "Request Body that contains data required for modify an existing record cautionlist" 
#      required: false
#      schema:
#       $ref: "#/definitions/BindingResult"
   responses:
    200:
     description: "Returns updated cautionlist"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "cautionlist"
   summary: "Retrieves the cautionlist by ID."
   description:  "Retrieves the cautionlist by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the cautionlist based on given id."
     schema:
      $ref: "#/definitions/CfpmTmPolicyCautionListWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "cautionlist"
   summary: "Deletes the cautionlist identified by given ID."
   description:  "Deletes the cautionlist identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the cautionlist maintenance"
      required: true
      type: "string"
    - name: "cautionlist"
      in: "body"
      description: Request body contain cautionlist and Modification no of cautionlist maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../cautionlist/xxx/approve

 /cautionlist/{id}/approve:
  patch:
   tags:
    - "cautionlist"
   summary: "Authorize the cautionlist by given ID."
   description:  "Authorize the cautionlist identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the cautionlist maintenance"
      required: true
      type: "string"
    - name: "cautionlist"
      in: "body"
      description: Request body contain cautionlist and Modification no of cautionlist maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../cautionlist/xxx/close
 /cautionlist/{id}/close:
  patch:
   tags:
    - "cautionlist"
   summary: "Close the cautionlist by given ID."
   description:  "Close the cautionlist identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the cautionlist maintenance"
      required: true
      type: "string"
    - name: "cautionlist"
      in: "body"
      description: Request body contain cautionlist and Modification no of cautionlist maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../cautionlist/xxx/reopen

 /cautionlist/{id}/reopen:
  patch:
   tags:
    - "cautionlist"
   summary: "reopen the cautionlist by given ID."
   description:  "reopen the cautionlist identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the cautionlist maintenance"
      required: true
      type: "string"
    - name: "cautionlist"
      in: "body"
      description: Request body contain cautionlist and Modification no of cautionlist maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supprorted http methods GET
#
# path examples----
#   GET       .../cautionlist/xxx/unauthorized

 /cautionlist/{id}/unauthorized:
  get:
   tags:
    - "cautionlist"
   summary: "Retrives the cautionlist by given ID."
   description:  "Retrives the cautionlist identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the cautionlist based on given id."
     schema:
       $ref: "#/definitions/CfpmTmPolicyCautionListCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to  history record for remitterid
#
#  supprorted http methods GETS
#
# path examples----
#   GET       .../cautionlist/xxx/history

 /cautionlist/{id}/history:
  get:
   tags:
    - "cautionlist"
   summary: "Retrives the cautionlist by given ID."
   description:  "Retrives the cautionlist by ID."
   operationId: "getHistory"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the cautionlist based on given id."
     schema:
       $ref: "#/definitions/CfpmTmPolicyCautionListCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
definitions:
 CfpmTmPolicyCautionListDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     cautionDescription:
      type: string
      description: "Detailed description of the caution."
     cautionName:
      type: string
      description: "Name of the caution."
     industryCode:
      type: string
      description: "Code of the Industry."
     industryGrpCode:
      type: string
      description: "Code of the industry group."
     sectorCode:
      type: string
      description: "Code of the sector."
     subIndustryCode:
      type: string
      description: "Code of the sub industry."
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CfpmTmPolicyCautionListCollection: 
  description: "Collection of policycautionlist."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CfpmTmPolicyCautionListDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CfpmTmPolicyCautionListWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CfpmTmPolicyCautionListDTO"
