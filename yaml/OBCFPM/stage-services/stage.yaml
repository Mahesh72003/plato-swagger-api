swagger: "2.0"
info:
  description: "This is a sample server Stage server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Stage Service"
host: "whf00bdm:7711"
basePath: "/stage-services"

tags:
  - name: "StageApi"
    description: "API for Stage Operations"
    
schemes:
- "http"

paths:
  /service/v1/stage/{entityReferenceNo}:
    post:
      consumes:
        - "application/json"
        - "application/xml"
      produces:
        - "application/json"
        - "application/xml"
      tags:
        - "stage"
      summary: "Calls stage service."
      description: "Calls stage service."
      operationId: "submitStages"
      parameters:
        - name: "entityReferenceNo"
          in: "path"
          type: "string"
          required: true
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "transactionHeaderModel"
          in: "body"
          description: "Request Body that contains data required for calling stage service"
          required: true
          schema:
            $ref: "#/definitions/TransactionHeaderModel"
      responses:
        200:
          description: "Returns the outcome of calling stage service"
          schema:
              type: "object"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /service/v1/stage/next/{entityReferenceNo}:
    post:
      consumes:
        - "application/json"
        - "application/xml"
      produces:
        - "application/json"
        - "application/xml"
      tags:
        - "stage"
      summary: "Calls stage service to call the appropriate service & update the TCM."
      description: "Calls stage service to call the appropriate service & update the TCM."
      operationId: "nextStages"
      parameters:
        - name: "entityReferenceNo"
          in: "path"
          type: "string"
          required: true
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "nextDetails"
          in: "body"
          description: "Request Body that contains data required for calling stage service"
          schema:
            $ref: "#/definitions/URIConfigModel"
      responses:
        200:
          description: "Returns the outcome of calling stage service"
          schema:
              $ref: "#/definitions/ResponseModel"
        201:
          description: "Returns the outcome of calling stage service"
          schema:
              $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /web/v1/validation/nextCheck:
    post:
      consumes:
        - "application/json"
        - "application/xml"
      produces:
        - "application/json"
        - "application/xml"
      tags:
