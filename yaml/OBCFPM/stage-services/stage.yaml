      summary: "Calls stage service to call the appropriate service & update the TCM."
      description: "Calls stage service to call the appropriate service & update the TCM."
      operationId: "nextStages"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "nextDetails"
          in: "body"
          description: "Request Body that contains data required for calling stage service"
