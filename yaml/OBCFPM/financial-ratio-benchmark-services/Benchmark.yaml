    - name: "financialRatioBenchmarkDetails"
      in: "body"
      description: Request body contain financial-ratio-benchmark-services and Modification no of financial-ratio-benchmark-services maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../financial-ratio-benchmark-services/xxx/reopen

 /benchmarkdetails/{id}/reopen:
  patch:
   tags:
    - "financial-ratio-benchmark-services"
   summary: "reopen the financial-ratio-benchmark-services by given ID."
   description:  "reopen the financial-ratio-benchmark-services identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the financial-ratio-benchmark-services maintenance"
