definitions:
 CfpmTmBenchmarkMasterDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     applicablePeriod:
      type: string
      description: ""
     balanceSheetCcy:
      type: string
      description: ""
     benchmarkCode:
      type: string
      description: ""
     customerSegment:
      type: string
      description: ""
     effectiveDate:
      type: string
      format: date
      description: ""
     fromBalanceSheetSize:
      type: number
      description: ""
     industryType:
      type: string
      description: ""
     toBalanceSheetSize:
      type: number
      description: ""
     CfpmTmBenchmarkDetailsDTO:
      type: array
      items:
       $ref: '#/definitions/CfpmTmBenchmarkDetailsDTO'
 CfpmTmBenchmarkDetailsDTO:
  type: object
  properties:
     absoluteRangeMax:
      type: number
      description: ""
     absoluteRangeMin:
      type: number
      description: ""
     bankBenchmarkValue:
      type: number
      description: ""
     benchmarkCode:
      type: string
      description: ""
     cfpmTmBenchmarkMasterId:
      type: string
      description: ""
     financialCode:
      type: string
      description: ""
     id:
      type: string
      description: ""
     industryBnchmrkVl:
      type: number
      description: ""
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CfpmTmBenchmarkMasterCollection: 
  description: "Collection of benchmark."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CfpmTmBenchmarkMasterDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CfpmTmBenchmarkMasterWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CfpmTmBenchmarkMasterDTO"
