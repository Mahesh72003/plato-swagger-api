 /benchmarkdetails/{id}/unauthorized:
  get:
   tags:
    - "financial-ratio-benchmark-services"
   summary: "Retrives the financial-ratio-benchmark-services by given ID."
   description:  "Retrives the financial-ratio-benchmark-services identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
