paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../financialcategory

 /financialcategory:
  post:
   tags:
    - "financialcategory"
   summary: "Adds a new financialcategory."
   description: "Adds a new financialcategory. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "financialcategory" 
      in: "body" 
      description: "Request Body that contains data required for creating a new financialcategory" 
      required: true
      schema:
       $ref: "#/definitions/CFPM_TM_FINANCIAL_CATEGORYDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created financialcategory" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "financialcategory"
   summary: "Get all valid financialcategory."
   description:  "Get all valid financialcategory. This endpoints will be used to Get all valid financialcategory maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: categoryCode
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CFPM_TM_FINANCIAL_CATEGORYCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../financialcategory/xxx
#   DELETE    .../financialcategory/xxx
#   GET       .../financialcategory/xxx
#   GET       .../financialcategory/xxx?version=latestrecord
#   GET       .../financialcategory/xxx?version=1

 /financialcategory/{id}:
  put:
   tags:
    - "financialcategory"
   summary: "Update an existing financialcategory."
   description:  "Update an existing financialcategory."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the financialcategory Maintenance"
      required: true
      type: "string"
    - name: "financialcategory"
      in: "body"
      description: "Request Body that contains data required for updating an existing financialcategory"
      required: true
      schema:
       $ref: "#/definitions/CFPM_TM_FINANCIAL_CATEGORYDTO"
   responses:
    200:
     description: "Returns updated financialcategory"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "financialcategory"
   summary: "Retrieves the financialcategory by ID."
   description:  "Retrieves the financialcategory by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the financialcategory based on given id."
     schema:
      $ref: "#/definitions/CFPM_TM_FINANCIAL_CATEGORYWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "financialcategory"
   summary: "Deletes the financialcategory identified by given ID."
   description:  "Deletes the financialcategory identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the financialcategory maintenance"
      required: true
      type: "string"
    - name: "financialcategory"
      in: "body"
      description: Request body contain financialcategory and Modification no of financialcategory maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
     
