swagger: "2.0"
info:
  description: "This is a sample server Pricing server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Pricing Service"
host: "whf00anh:7751"
basePath: "/pricing-services"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "chargeWeb"
    description: "API for Legal Opinion's Operations"
    
schemes:
- "https"

paths:
  /web/v1/charge:
    post:
      tags:
        - "chargeWeb"
      summary: "Creates a new Charge."
      description: "Creates a new Charge."
      operationId: "createCharge"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: false
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "charge"
          in: "body"
          description: "Request Body that contains data required for creating a new charge"
          required: true
          schema:
            $ref: "#/definitions/ChargeMasterModel"
      responses:
        201:
          description: "Returns the Id of the newly created charge"
          headers:
            Location:
              description: "URL of newly created charge"
              type: "string"
          schema:
              $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
  /web/v1/charge/{recordId}:
    put:
      tags:
        - "chargeWeb"
      summary: "Update an existing charge."
      description:  "Update an existing charge."
      operationId: "updateCharge"
      parameters:
        - name: "recordId"
          in: "path"
          description: "Charge that need to be updated"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false  
        - name: "charge"
          in: "body"
          description: "Request Body that contains data required for updating an existing charge"
          required: true
          schema:
            $ref: "#/definitions/ChargeMasterModel"
      responses:
        200:
          description: "Returns updated charge"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"          
    delete:
      tags:
        - "chargeWeb"
      summary: "Deletes the charge identified by given ID."
      description:  "deletes the charge identified by given ID."
      operationId: "deleteCharge"
      parameters:
        - name: "id"
          in: "path"
          description: "Id of the user that needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false 
      responses:
        200:
          description: "Successful operation."
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /web/v1/charge/{entityId}:
    get:
      tags:
        - "chargeWeb"
      summary: "Retrieves the list of existing charges."
      description:  "Retrieves the list of existing charges."
      operationId: "getAllChargesByEntityId"
      parameters:
        - name: "entityId"
          in: "path"
          description: "Id of the user that needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false 
        - name: "limit"
          in: "query"
          required: false
          description: "limit to be fetched"
          type: "integer"
        - name: "offset"
          in: "query"
          required: false
          description: "offset of the limit"
          type: "integer"                 
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"   
  /web/v1/charge/latest/{entityId}:
    get:
      tags:
        - "chargeWeb"
      summary: "Retrieves the charge by ID."
      description:  "Retrieves the charge by ID."
      operationId: "getLatestChargeById"
      parameters:
        - name: "entityId"
          in: "path"
          description: "Id of the user that needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false 
      responses:
        200:
          description: "Returns the charge based on given id."
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"                    
  /web/v1/charge/final:
    post:
      tags:
        - "chargeWeb"
      summary: "Creates new charge details."
      description: "Creates new charge details."
      operationId: "submitCharge"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false 
        - name: "transactionHeaderModel"
          in: "body"
          description: "Request Body that contains data required for creating a new charge"
          required: true
          schema:
            $ref: "#/definitions/TransactionHeaderModel"
      responses:
        201:
          description: "Returns the Id of the newly created opinion details"
          headers:
            Location:
              description: "URL of newly created opinion details"
              type: "string"
          schema:
              $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
definitions:
  TransactionHeaderModel:
    type: "object"
    properties:
      processRefNo:
        type: "string"
      taskOutcome:
        type: "string"
      currentUser:
        type: "string"
      branchCode:
        type: "string"
      processName:
        type: "string"
      taskId:
        type: "string"
      currentStage:
        type: "string"
      tab:
        type: "string"
      taskPriority:
        type: "string"
      instanceId:
        type: "string"
      moduleCode:
        type: "string"
      isFromCAM:
        type: "boolean"
      externalCheckReq:
        type: "boolean"
      fieldInvestigationReq:
        type: "boolean"
      externalValuationReq:
        type: "boolean"
      internalValuationReq:
        type: "boolean"
      legalOpinionReq:
        type: "boolean"
      riskEvaluationReq:
        type: "boolean"
      externalCheckAgencySelected:
        type: "boolean"
      externalValAgencySelected:
        type: "boolean"
      legalFirmSelected:
        type: "boolean"
      isCollatCreateSelected:
        type: "boolean"
      collateralValue:
        type: "number"
      oldCollateralValue:
        type: "number"
      isFromCollateralEvaluation:
        type: "boolean"
      isFromCollateralReview:
        type: "boolean"
      isSubmissionAndAwaitingReq:
        type: "boolean"
      serviceName:
        type: "string"
      ownerEstimatedValue:
        type: "number"
      marketValue:
        type: "number"
      bankValue:
        type: "number"
      customerId:
        type: "string"
      collateralType:
        type: "string"
      collateralCode:
        type: "string"
      collateralCurrency:
        type: "string"
      taskCreationDate:
        type: "string"
        format: "date-time"
      submitFlag:
        type: "boolean"
      source:
        type: "string"
      isKYCRequired:
        type: "boolean"
      isCreditRatingRequired:
        type: "boolean"
      stageUpdateFlag:
        type: "boolean"
      collateralSubmissionReq:
        type: "boolean"
      awaitForConfirmation:
        type: "boolean"
      documentSafeKeepingReq:
        type: "boolean"
      updateCategory:
        type: "string"
  InlineResponse:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      message:
       type: "string"
  ChargeMasterModel:
    description: "Charge Master model"
    allOf:
      - $ref: '#/definitions/RepresentationModel'
      - type: "object"
        required:
         - entityId
        properties:
         recordId:
           type: "string"
         entityId:
           type: "string"
         versionNo:
           type: "integer"
           format: "int64"
         recordStat:
           type: "string"
         createdBy:
           type: "string"
         createdDate:
           type: "string"
           format: "date-time"
         updatedBy:
           type: "string"
         updatedDate:
           type: "string"
           format: "date-time"
         collBasePrice:
           type: "number"
         lastValuedAmount:
           type: "number"
         finalCollateralValue:
           type: "number"
         reviewComments:
           type: "string"
         approverComments:
           type: "string"  
         chargeDetails:
           type: "array"
           items:
             $ref: "#/definitions/ChargeModel"
  ChargeModel:
    description: "Charge model"
    type: "object"
    required:
      - chargeCode
      - chargeCurrency
      - chargeAmount
    properties:
      id:
        type: "string"
      entityType:
        type: "string"
      chargeCode:
        type: "string"
      chargeDesc:
        type: "string"  
      chargeCurrency:
        type: "string"
      chargeAmount:
        type: "number"
      isChargeWaived:
        type: "boolean"
      waivedAmount:
        type: "number"        
      netChargeAmount:
        type: "number"
      waiverRemarks:
        type: "string"
      parentId:
        type: "string"
  ChargeCollection:
    description: "Collection of charges."
    type: "object"
    properties:
      chargeList:
        type: "array"
        items:
          $ref: "#/definitions/ChargeMasterModel"
  RepresentationModel:
    allOf:
      - type: object
        discriminator: resource_type
      