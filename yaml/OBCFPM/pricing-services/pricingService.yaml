swagger: "2.0"
info:
  description: "This is a sample server Pricing server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Pricing Service"
host: "whf00anh:7751"
basePath: "/pricing-services"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "chargeWeb"
    description: "API for Pricing's Operations"
    
schemes:
- "https"
paths:
  /service/v1/charge/{entityId}:
    get:
      tags:
        - "chargeService"
      summary: "Retrieves the list of existing charges."
      description:  "Retrieves the list of existing charges."
      operationId: "getAllChargeMain"
      parameters:
        - name: "tenantId"
          in: "header"
          type: "string"
          required: true
        - name: "entityId"
          in: "path"
          description: "Id of the user that needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
        - name: "offset"
          in: "query"
          description: "Offset for which data needs to be fetched"
          required: false
          type: "integer"
        - name: "limit"
          in: "query"
          description: "Limit the number of collateral data need to be fetched"
          required: false
          type: "integer"          
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"