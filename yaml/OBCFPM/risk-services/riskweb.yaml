definitions:
  InlineResponse:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      message:
        type: "string"
  InlineResponse201:
    type: "object"
    description: "Id of the newly created resource"
    properties:
      id:
        type: "string"
  RepresentationModel :
    allOf:
      - type: object
        discriminator: resource_type
  RiskTypeModel:
    description: "Risk Type model"
    type: "object"
    properties:
      id:
        type: "string"
      parentId:
        type: "string"
      risktype:
        type: "string"
      comments:
        type: "string"
      severity:
        type: "string"
      approvalComments:
        type: "string"
      versionNo:
        type: "integer"
        format: "int64"
      isApproved:
        type: "boolean"
      # PatchSet -Dec delete changes
      softDeleteFlag:
        type: "string"
      deleteStat:
        type: "string"
  TransactionHeaderModel:
    type: "object"
    properties:
      processRefNo:
        type: "string"
      taskOutcome:
        type: "string"
      currentUser:
        type: "string"
      branchCode:
        type: "string"
      processName:
        type: "string"
      taskId:
