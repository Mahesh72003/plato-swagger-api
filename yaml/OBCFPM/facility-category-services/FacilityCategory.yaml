definitions:
 CfpmTmFacilityCategoryDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     categoryCode:
      type: string
      description: ""
      minLength: 1
      maxLength: 4
     categoryDescription:
      type: string
      description: ""
     checkerTimestamp:
      type: string
      format: date
      description: ""
     makerTimestamp:
      type: string
      format: date
      description: ""
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CfpmTmFacilityCategoryCollection: 
  description: "Collection of facilitycategory."
  type: "object"
  properties:
