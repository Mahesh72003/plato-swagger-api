paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../facilitycategory
   
 /facilitycategory/getcategorycode:
  get:
   tags:
    - "facilitycategory"
   summary: "Retrieves all the primary facilitycategory."
   description:  "Retrieves all the primary facilitycategory."
   operationId: "getCategoryDescriptionBasedOnCode"
   parameters:
    - name: "categoryCode"
      in: "query"
      description: "Category Code that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the primary facilitycategory list."
     schema:
      $ref: "#/definitions/CfpmTmFacilityCategoryCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error" 

 /facilitycategory:
  post:
   tags:
    - "facilitycategory"
   summary: "Adds a new facilitycategory."
   description: "Adds a new facilitycategory. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "facilitycategory" 
      in: "body" 
      description: "Request Body that contains data required for creating a new facilitycategory" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmFacilityCategoryDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created facilitycategory" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "facilitycategory"
   summary: "Get all valid facilitycategory."
   description:  "Get all valid facilitycategory. This endpoints will be used to Get all valid facilitycategory maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: categoryCode
     in: query
     description: categoryCode is single record to be fetched
     required: false
     type: string 
   - name: authStatus
     in: query
     description: authStatus is for all record to be fetched
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmFacilityCategoryCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../facilitycategory/xxx
#   DELETE    .../facilitycategory/xxx
#   GET       .../facilitycategory/xxx
#   GET       .../facilitycategory/xxx?version=latestrecord
#   GET       .../facilitycategory/xxx?version=1

 /facilitycategory/{id}:
  put:
   tags:
    - "facilitycategory"
   summary: "Update an existing facilitycategory."
   description:  "Update an existing facilitycategory."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the facilitycategory Maintenance"
      required: true
      type: "string"
    - name: "facilitycategory"
      in: "body"
      description: "Request Body that contains data required for updating an existing facilitycategory"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmFacilityCategoryDTO"
   responses:
    200:
     description: "Returns updated facilitycategory"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "facilitycategory"
   summary: "Retrieves the facilitycategory by ID."
   description:  "Retrieves the facilitycategory by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the facilitycategory based on given id."
     schema:
      $ref: "#/definitions/CfpmTmFacilityCategoryWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "facilitycategory"
   summary: "Deletes the facilitycategory identified by given ID."
   description:  "Deletes the facilitycategory identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the facilitycategory maintenance"
      required: true
      type: "string"
    - name: "facilitycategory"
      in: "body"
      description: Request body contain facilitycategory and Modification no of facilitycategory maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

