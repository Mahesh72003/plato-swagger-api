swagger: "2.0"
info:
 description: "This is a sample server terms conditions maintenance server." 
 version: "1.0.0"
 title: "terms conditions maintenance Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "termsconditions"
   description: "This service for terms conditions maintenance"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../termsconditions
   
 /termsconditions/getconditionCode:
  get:
   tags:
    - "termsconditions"
   summary: "Retrieves all the primary termsconditions."
   description:  "Retrieves all the primary termsconditions."
   operationId: "getTermsConditionsDescriptionBasedOnCode"
   parameters:
    - name: "conditionCode"
      in: "query"
      description: "condition code that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the primary termsconditions list."
     schema:
      $ref: "#/definitions/CfpmTmTermsConditionsMaintenanceCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error" 

 /termsconditions:
  post:
   tags:
    - "termsconditions"
   summary: "Adds a new termsconditions."
   description: "Adds a new termsconditions. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "termsconditions" 
      in: "body" 
      description: "Request Body that contains data required for creating a new termsconditions" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmTermsConditionsMaintenanceDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created termsconditions" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "termsconditions"
   summary: "Get all valid termsconditions."
   description:  "Get all valid termsconditions. This endpoints will be used to Get all valid termsconditions maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: conditionCode
     in: query
     description: conditionCode is single record to be fetched
     required: false
     type: string 
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmTermsConditionsMaintenanceCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../termsconditions/xxx
#   DELETE    .../termsconditions/xxx
#   GET       .../termsconditions/xxx
#   GET       .../termsconditions/xxx?version=latestrecord
#   GET       .../termsconditions/xxx?version=1

 /termsconditions/{id}:
  put:
   tags:
    - "termsconditions"
   summary: "Update an existing termsconditions."
   description:  "Update an existing termsconditions."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the termsconditions Maintenance"
      required: true
      type: "string"
    - name: "termsconditions"
      in: "body"
      description: "Request Body that contains data required for updating an existing termsconditions"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmTermsConditionsMaintenanceDTO"
   responses:
    200:
     description: "Returns updated termsconditions"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "termsconditions"
   summary: "Retrieves the termsconditions by ID."
   description:  "Retrieves the termsconditions by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the termsconditions based on given id."
     schema:
      $ref: "#/definitions/CfpmTmTermsConditionsMaintenanceWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "termsconditions"
   summary: "Deletes the termsconditions identified by given ID."
   description:  "Deletes the termsconditions identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the termsconditions maintenance"
      required: true
      type: "string"
    - name: "termsconditions"
      in: "body"
      description: Request body contain termsconditions and Modification no of termsconditions maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../termsconditions/xxx/approve

 /termsconditions/{id}/approve:
  patch:
   tags:
    - "termsconditions"
   summary: "Authorize the termsconditions by given ID."
   description:  "Authorize the termsconditions identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the termsconditions maintenance"
      required: true
      type: "string"
    - name: "termsconditions"
      in: "body"
      description: Request body contain termsconditions and Modification no of termsconditions maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../termsconditions/xxx/close
 /termsconditions/{id}/close:
  patch:
   tags:
    - "termsconditions"
   summary: "Close the termsconditions by given ID."
   description:  "Close the termsconditions identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the termsconditions maintenance"
      required: true
      type: "string"
    - name: "termsconditions"
      in: "body"
      description: Request body contain termsconditions and Modification no of termsconditions maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../termsconditions/xxx/reopen

 /termsconditions/{id}/reopen:
  patch:
   tags:
    - "termsconditions"
   summary: "reopen the termsconditions by given ID."
   description:  "reopen the termsconditions identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the termsconditions maintenance"
      required: true
      type: "string"
    - name: "termsconditions"
      in: "body"
      description: Request body contain termsconditions and Modification no of termsconditions maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supprorted http methods GET
#
# path examples----
#   GET       .../termsconditions/xxx/unauthorized

 /termsconditions/{id}/unauthorized:
  get:
   tags:
    - "termsconditions"
   summary: "Retrives the termsconditions by given ID."
   description:  "Retrives the termsconditions identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the termsconditions based on given id."
     schema:
       $ref: "#/definitions/CfpmTmTermsConditionsMaintenanceCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to  history record for remitterid
#
#  supprorted http methods GETS
#
# path examples----
#   GET       .../termsconditions/xxx/history

 /termsconditions/{id}/history:
  get:
   tags:
    - "termsconditions"
   summary: "Retrives the termsconditions by given ID."
   description:  "Retrives the termsconditions by ID."
   operationId: "getHistory"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the termsconditions based on given id."
     schema:
       $ref: "#/definitions/CfpmTmTermsConditionsMaintenanceCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
definitions:
 CfpmTmTermsConditionsMaintenanceDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     conditionCode:
      type: string
      description: ""
      minLength: 1
      maxLength: 4
     termsDescription:
      type: string
      description: ""
     conditionType:
      type: string
      description: ""
     conditionClause:
      type: string
      description: ""
     checkerTimestamp:
      type: string
      format: date
      description: ""
     makerTimestamp:
      type: string
      format: date
      description: ""
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CfpmTmTermsConditionsMaintenanceCollection: 
  description: "Collection of termsconditions."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CfpmTmTermsConditionsMaintenanceDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CfpmTmTermsConditionsMaintenanceWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CfpmTmTermsConditionsMaintenanceDTO"
