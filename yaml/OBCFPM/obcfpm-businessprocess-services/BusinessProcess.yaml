swagger: "2.0"
info:
 description: "This is a sample server businessprocess server." 
 version: "1.0.0"
 title: "businessprocess Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "businessprocess"
   description: "Business Process Service"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../businessprocess

 /businessprocess:
  post:
   tags:
    - "businessprocess"
   summary: "Adds a new businessprocess."
   description: "Adds a new businessprocess. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "businessprocess" 
      in: "body" 
      description: "Request Body that contains data required for creating a new businessprocess" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmBusinessProcessDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created businessprocess" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "businessprocess"
   summary: "Get all valid businessprocess."
   description:  "Get all valid businessprocess. This endpoints will be used to Get all valid businessprocess maintenance records."
   operationId: "getAllBusinessProcess"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: businessProcessCode
     required: false
     type: string
   - in: query
     name: id
     required: false
     type: string
   - in: query
     name: processCode
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmBusinessSubProcessCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"     
 /businessprocess/transactioncontroller/{businessProcessCode}:
  post:
   tags:
    - "businessprocess"
   summary: "Adds a new businessprocess to TCM."
   description: "Adds a new businessprocess. Add additional information here for this endpoint."
   operationId: "saveTransactionControllerRecord"
   parameters:
    - name: "businessProcessCode" 
      in: "path" 
      description: "Request Body that contains data required for creating a new businessprocess in TCM" 
      required: true
      type: "string"
    - name: "BPCModel" 
      in: "body" 
      description: "Request Body that contains data required for creating a new processCode in TCM" 
      required: true
      schema:
       $ref: "#/definitions/BPCModel"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created businessprocess" 
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmBusinessProcessWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../businessprocess/xxx
#   DELETE    .../businessprocess/xxx
#   GET       .../businessprocess/xxx
#   GET       .../businessprocess/xxx?version=latestrecord
#   GET       .../businessprocess/xxx?version=1

 /businessprocess/{id}:
  put:
   tags:
    - "businessprocess"
   summary: "Update an existing businessprocess."
   description:  "Update an existing businessprocess."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the businessprocess Maintenance"
      required: true
      type: "string"
    - name: "businessprocess"
      in: "body"
      description: "Request Body that contains data required for updating an existing businessprocess"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmBusinessProcessDTO"
   responses:
    200:
     description: "Returns updated businessprocess"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "businessprocess"
   summary: "Retrieves the businessprocess by ID."
   description:  "Retrieves the businessprocess by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the businessprocess based on given id."
     schema:
      $ref: "#/definitions/CfpmTmBusinessProcessWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "businessprocess"
   summary: "Deletes the businessprocess identified by given ID."
   description:  "Deletes the businessprocess identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the businessprocess maintenance"
      required: true
      type: "string"
    - name: "businessprocess"
      in: "body"
      description: Request body contain businessprocess and Modification no of businessprocess maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

 /businessprocess/businessprocesscode/{businessprocess}:  
  get:
   tags:
    - "businessprocess"
   summary: "Retrieves the businessprocess by businessprocess."
   description:  "Retrieves the businessprocess by businessprocess."
   operationId: "getByBusinessProcess"
   parameters:
    - name: "businessprocess"
      in: "path"
      description: "businessprocess of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the businessprocess based on given businessprocess."
     schema:
      $ref: "#/definitions/CfpmTmBusinessProcessWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 /businessprocess/byProcessCodeAndStage/{businessprocess}/{stageCode}:  
  get:
   tags:
    - "businessprocess"
   summary: "Retrieves the businessprocess by businessprocess."
   description:  "Retrieves the businessprocess by businessprocess."
   operationId: "getByProcessCodeAndStage"
   parameters:
    - name: "businessprocess"
      in: "path"
      description: "businessprocess of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "stageCode"
      in: "path"
      description: "stage code"
      required: true
      type: "string"      
   responses:
    200:
     description: "Returns the businessprocess based on given businessprocess."
     schema:
       type: "object"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
        
 /businessprocess/get/stageConfig/{processCode}/{stageCode}/{componentName}:  
  get:
   tags:
    - "stagefieldconfig"
   summary: "Retrieves the businessprocess by businessprocess."
   description:  "Retrieves the businessprocess by businessprocess."
   operationId: "getAllStageConfig"
   parameters:
    - name: "processCode"
