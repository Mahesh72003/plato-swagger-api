swagger: "2.0"
info:
 description: "This is a sample server questionnaire process linkage server." 
 version: "1.0.0"
 title: "Questionnaire Process Linkage Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "categoryprocess"
   description: "A micro service that will maintain category process details in a separate table. This service will also provide APIs for GET, PUT, DELETE, GET by id, Authorize the given record, Reopen and Close APIs for the maintenance records."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../categoryprocess

 /categoryprocess:
  post:
   tags:
    - "categoryprocess"
   summary: "Adds a new categoryprocess."
   description: "Adds a new categoryprocess. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "categoryprocess" 
      in: "body" 
      description: "Request Body that contains data required for creating a new categoryprocess" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmCatProcessMasterDTO"
#    - name: "bindingResult" 
#      in: "body" 
#      description: "Request Body that contains data required for creating a new categoryprocess" 
#      required: false
#      schema:
#       $ref: "#/definitions/BindingResult"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created categoryprocess" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "categoryprocess"
   summary: "Get all valid categoryprocess."
   description:  "Get all valid categoryprocess. This endpoints will be used to Get all valid categoryprocess maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmCatProcessMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /fetchCategoryCode:
  get:
   tags:
    - "categoryprocess"
   summary: "Get all valid categoryprocess."
   description:  "Get all valid categoryprocess. This endpoints will be used to Get all valid categoryprocess maintenance records."
   operationId: "getCategoryCodeDetails"
   parameters:
   - name: userId
     in: header
     type: string
     required: true
   - name: branchCode
     in: header
     type: string
     required: true
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: stageId
     in: query
     description: stage ID of records to be fetched
     required: false
     type: string
   - name: processCode
     in: query
     description: process code of records to be fetched
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmCatProcessMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../categoryprocess/xxx
#   DELETE    .../categoryprocess/xxx
#   GET       .../categoryprocess/xxx
#   GET       .../categoryprocess/xxx?version=latestrecord
#   GET       .../categoryprocess/xxx?version=1

 /categoryprocess/{id}:
  put:
   tags:
    - "categoryprocess"
   summary: "Update an existing categoryprocess."
   description:  "Update an existing categoryprocess."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the categoryprocess Maintenance"
      required: true
      type: "string"
    - name: "categoryprocess"
      in: "body"
      description: "Request Body that contains data required for updating an existing categoryprocess"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmCatProcessMasterDTO"
#    - name: "bindingResult" 
#      in: "body" 
#      description: "Request Body that contains data required for modify an existing record categoryprocess" 
#      required: false
#      schema:
#       $ref: "#/definitions/BindingResult"
   responses:
    200:
     description: "Returns updated categoryprocess"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "categoryprocess"
   summary: "Retrieves the categoryprocess by ID."
   description:  "Retrieves the categoryprocess by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the categoryprocess based on given id."
     schema:
      $ref: "#/definitions/CfpmTmCatProcessMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "categoryprocess"
   summary: "Deletes the categoryprocess identified by given ID."
   description:  "Deletes the categoryprocess identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the categoryprocess maintenance"
      required: true
      type: "string"
    - name: "categoryprocess"
      in: "body"
      description: Request body contain categoryprocess and Modification no of categoryprocess maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../categoryprocess/xxx/approve

 /categoryprocess/{id}/approve:
  patch:
   tags:
    - "categoryprocess"
   summary: "Authorize the categoryprocess by given ID."
   description:  "Authorize the categoryprocess identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the categoryprocess maintenance"
      required: true
      type: "string"
    - name: "categoryprocess"
      in: "body"
      description: Request body contain categoryprocess and Modification no of categoryprocess maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../categoryprocess/xxx/close
 /categoryprocess/{id}/close:
  patch:
   tags:
    - "categoryprocess"
   summary: "Close the categoryprocess by given ID."
   description:  "Close the categoryprocess identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the categoryprocess maintenance"
      required: true
      type: "string"
    - name: "categoryprocess"
      in: "body"
      description: Request body contain categoryprocess and Modification no of categoryprocess maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../categoryprocess/xxx/reopen

 /categoryprocess/{id}/reopen:
  patch:
   tags:
    - "categoryprocess"
   summary: "reopen the categoryprocess by given ID."
   description:  "reopen the categoryprocess identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the categoryprocess maintenance"
      required: true
      type: "string"
    - name: "categoryprocess"
      in: "body"
      description: Request body contain categoryprocess and Modification no of categoryprocess maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supprorted http methods GET
#
# path examples----
#   GET       .../categoryprocess/xxx/unauthorized

 /categoryprocess/{id}/unauthorized:
  get:
   tags:
    - "categoryprocess"
   summary: "Retrives the categoryprocess by given ID."
   description:  "Retrives the categoryprocess identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the categoryprocess based on given id."
     schema:
       $ref: "#/definitions/CfpmTmCatProcessMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to  history record for remitterid
#
#  supprorted http methods GETS
#
# path examples----
#   GET       .../categoryprocess/xxx/history

 /categoryprocess/{id}/history:
  get:
   tags:
    - "categoryprocess"
   summary: "Retrives the categoryprocess by given ID."
   description:  "Retrives the categoryprocess by ID."
   operationId: "getHistory"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the categoryprocess based on given id."
