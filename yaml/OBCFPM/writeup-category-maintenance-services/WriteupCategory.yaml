swagger: "2.0"
info:
 description: "This is a sample server writeupcategory server." 
 version: "1.0.0"
 title: "writeupcategory Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "writeupcategory"
   description: "writeUp category service is a maintenance  service."
schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../writeupcategory

 /writeupcategory/getcategorycode:
  get:
   tags:
    - "writeupcategory"
   summary: "Retrieves all the primary writeupcategory."
   description:  "Retrieves all the primary writeupcategory."
   operationId: "getCategoryDescriptionBasedOnCode"
   parameters:
    - name: "writeupCategoryCode"
      in: "query"
      description: "Category Code that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the primary writeupcategory list."
     schema:
      $ref: "#/definitions/CfpmTmWriteupCategoryCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error" 

 /writeupcategory:
  post:
   tags:
    - "writeupcategory"
   summary: "Adds a new writeupcategory."
   description: "Adds a new writeupcategory. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "writeupcategory" 
      in: "body" 
      description: "Request Body that contains data required for creating a new writeupcategory" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmWriteupCategoryDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created writeupcategory" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "writeupcategory"
   summary: "Get all valid writeupcategory."
   description:  "Get all valid writeupcategory. This endpoints will be used to Get all valid writeupcategory maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: writeupCategoryCode
     in: query
     description: writeupCategoryCode is single record to be fetched
     required: false
     type: string
   - name: writeupCategoryDesc
     in: query
     description: writeupCategoryDesc is single record to be fetched
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmWriteupCategoryCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../writeupcategory/xxx
#   DELETE    .../writeupcategory/xxx
#   GET       .../writeupcategory/xxx
#   GET       .../writeupcategory/xxx?version=latestrecord
#   GET       .../writeupcategory/xxx?version=1

 /writeupcategory/{id}:
  put:
   tags:
    - "writeupcategory"
   summary: "Update an existing writeupcategory."
   description:  "Update an existing writeupcategory."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the writeupcategory Maintenance"
      required: true
      type: "string"
    - name: "writeupcategory"
      in: "body"
      description: "Request Body that contains data required for updating an existing writeupcategory"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmWriteupCategoryDTO"
   responses:
    200:
     description: "Returns updated writeupcategory"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "writeupcategory"
   summary: "Retrieves the writeupcategory by ID."
   description:  "Retrieves the writeupcategory by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the writeupcategory based on given id."
     schema:
      $ref: "#/definitions/CfpmTmWriteupCategoryWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "writeupcategory"
   summary: "Deletes the writeupcategory identified by given ID."
   description:  "Deletes the writeupcategory identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the writeupcategory maintenance"
      required: true
      type: "string"
    - name: "writeupcategory"
      in: "body"
      description: Request body contain writeupcategory and Modification no of writeupcategory maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

