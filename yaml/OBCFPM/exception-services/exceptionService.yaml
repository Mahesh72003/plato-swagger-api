            $ref: "#/definitions/CamExceptionServiceModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error" 
    delete:
      tags:
        - "camExceptionService"
      summary: "Deletes the camException identified by given ID."
      description:  "deletes the camException identified by given ID."
      operationId: "deleteCamExceptionService"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false 
        - name: "exceptionId"
          in: "path"
          description: "exceptionId of the user that needs to be fetched"
          required: true
          type: "string"
      responses:
        200:
          description: "Successful operation."
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
definitions:
  InlineResponse:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      message:
       type: "string"
  CamExceptionServiceModel:
    type: "object"
    required:
      - applicationNumber
      - requestFrom
      - customerId
      - utilizationCurrency
      - utilizationAmount
      - externalReferenceNumber
    properties:
      exceptionId:
        type: "string"
      applicationNumber:
        type: "string"
      customerId:
        type: "string"
      customerName:
        type: "string"
      customerType:
        type: "string"
      customerBranchName:
        type: "string"
      requestFrom:
        type: "string"
      utilizationCurrency:
        type: "string"
      utilizationAmount:
        type: "number"
      exceptionStatus:
        type: "string"
      externalReferenceNumber:
        type: "string"
  CamExceptionCollection:
    description: "Collection of CamException."
    type: "object"
    properties:
      CamExceptionList:
        type: "array"
        items:
          $ref: "#/definitions/CamExceptionServiceModel"
