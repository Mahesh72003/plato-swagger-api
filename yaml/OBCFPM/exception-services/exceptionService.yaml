        - "camExceptionService"
      summary: "Retrieves CamException by ID."
      description:  "Retrieves CamException by ID."
      operationId: "getCamExceptionServiceById"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "exceptionId"
          in: "path"
          description: "exceptionId of the user that needs to be fetched"
          required: true
          type: "string"
      responses:
        200:
