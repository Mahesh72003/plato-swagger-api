          required: true
          schema:
            $ref: "#/definitions/CamExceptionServiceModel"
      responses:
        200:
          description: "Returns the stage updation output"
          headers:
            Location:
              description: "URL of newly created camException"
              type: "string"
          schema:
              $ref: "#/definitions/InlineResponse"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
    get:
      tags:
        - "camExceptionService"
      summary: "Retrieves the list of existing camExceptions."
      description:  "Retrieves the list of existing camExceptions."
      operationId: "getAllCamExceptionsService"
      parameters:
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "exceptionId"
          in: "query"
          description: " CamException Id of the user that needs to be fetched"
          required: false
          type: "string"
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/CamExceptionCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /service/v1/camException/{exceptionId}:          
    put:
      tags:
        - "camExceptionService"
      summary: "Update an existing camException."
      description:  "Update an existing camException."
      operationId: "updateCamExceptionService"
      parameters:
        - name: "exceptionId"
          in: "path"
