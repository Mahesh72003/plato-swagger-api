swagger: "2.0"
info:
 description: "This is a sample server emailconfiguration server." 
 version: "1.0.0"
 title: "emailconfiguration Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "emailconfiguration"
   description: "cmc email notification is to provide capability to define a template with dynamic values substitute using APIs and send email notification.cmc email notification is to provide capability to define a template with dynamic values substitute using APIs and send email notification."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../emailconfiguration

 /emailconfiguration:
  post:
   tags:
    - "emailconfiguration"
   summary: "Adds a new emailconfiguration."
   description: "Adds a new emailconfiguration. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "emailconfiguration" 
      in: "body" 
      description: "Request Body that contains data required for creating a new emailconfiguration" 
      required: true
      schema:
       $ref: "#/definitions/CmcTmEmailConfigurationsDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created emailconfiguration" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "emailconfiguration"
   summary: "Get all valid emailconfiguration."
   description:  "Get all valid emailconfiguration. This endpoints will be used to Get all valid emailconfiguration maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmEmailConfigurationsCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../emailconfiguration/xxx
#   DELETE    .../emailconfiguration/xxx
#   GET       .../emailconfiguration/xxx
#   GET       .../emailconfiguration/xxx?version=latestrecord
#   GET       .../emailconfiguration/xxx?version=1

 /emailconfiguration/{id}:
  put:
   tags:
    - "emailconfiguration"
   summary: "Update an existing emailconfiguration."
   description:  "Update an existing emailconfiguration."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the emailconfiguration Maintenance"
      required: true
      type: "string"
    - name: "emailconfiguration"
      in: "body"
      description: "Request Body that contains data required for updating an existing emailconfiguration"
      required: true
      schema:
       $ref: "#/definitions/CmcTmEmailConfigurationsDTO"
   responses:
    200:
     description: "Returns updated emailconfiguration"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "emailconfiguration"
   summary: "Retrieves the emailconfiguration by ID."
   description:  "Retrieves the emailconfiguration by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the emailconfiguration based on given id."
     schema:
      $ref: "#/definitions/CmcTmEmailConfigurationsWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "emailconfiguration"
   summary: "Deletes the emailconfiguration identified by given ID."
   description:  "Deletes the emailconfiguration identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the emailconfiguration maintenance"
      required: true
      type: "string"
    - name: "emailconfiguration"
      in: "body"
      description: Request body contain emailconfiguration and Modification no of emailconfiguration maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

