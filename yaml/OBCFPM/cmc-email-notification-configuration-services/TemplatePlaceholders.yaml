swagger: "2.0"
info:
 description: "This is a sample server emailtemplateplaceholder server." 
 version: "1.0.0"
 title: "emailtemplateplaceholder Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "emailtemplateplaceholder"
   description: "cmc email notification is to provide capability to define a template with dynamic values substitute using APIs and send email notification.cmc email notification is to provide capability to define a template with dynamic values substitute using APIs and send email notification."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../emailtemplateplaceholder

 /emailtemplateplaceholder:
  post:
   tags:
    - "emailtemplateplaceholder"
   summary: "Adds a new emailtemplateplaceholder."
   description: "Adds a new emailtemplateplaceholder. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "emailtemplateplaceholder" 
      in: "body" 
      description: "Request Body that contains data required for creating a new emailtemplateplaceholder" 
      required: true
      schema:
       $ref: "#/definitions/CmcTmTemplatePlaceholdersDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created emailtemplateplaceholder" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "emailtemplateplaceholder"
   summary: "Get all valid emailtemplateplaceholder."
   description:  "Get all valid emailtemplateplaceholder. This endpoints will be used to Get all valid emailtemplateplaceholder maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: domain
     required: false
     type: string
   - in: query
     name: eventCode
     required: false
     type: string
   - in: query
     name: placeholderCode
     required: false
     type: string
   - in: query
     name: placeholderDesc
     required: false
     type: string
   - in: query
     name: placeholderType
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmTemplatePlaceholdersCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

 /emailtemplateplaceholder/eventCode/{eventCode}:
  get:
   tags:
    - "emailtemplateplaceholder"
   summary: "Get all valid emailtemplateplaceholder."
   description:  "Get all valid emailtemplateplaceholder. This endpoints will be used to Get all valid emailtemplateplaceholder maintenance records."
   operationId: "getAllByEventCode"
   parameters:
   - name: "eventCode"
     in: "path"
     description: "key of the emailtemplateplaceholder Maintenance"
     required: true
     type: "string"
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmTemplatePlaceholdersCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../emailtemplateplaceholder/xxx
#   DELETE    .../emailtemplateplaceholder/xxx
#   GET       .../emailtemplateplaceholder/xxx
#   GET       .../emailtemplateplaceholder/xxx?version=latestrecord
#   GET       .../emailtemplateplaceholder/xxx?version=1

 /emailtemplateplaceholder/{id}:
  put:
   tags:
    - "emailtemplateplaceholder"
   summary: "Update an existing emailtemplateplaceholder."
   description:  "Update an existing emailtemplateplaceholder."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the emailtemplateplaceholder Maintenance"
      required: true
      type: "string"
    - name: "emailtemplateplaceholder"
      in: "body"
      description: "Request Body that contains data required for updating an existing emailtemplateplaceholder"
      required: true
      schema:
       $ref: "#/definitions/CmcTmTemplatePlaceholdersDTO"
   responses:
    200:
     description: "Returns updated emailtemplateplaceholder"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "emailtemplateplaceholder"
   summary: "Retrieves the emailtemplateplaceholder by ID."
   description:  "Retrieves the emailtemplateplaceholder by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the emailtemplateplaceholder based on given id."
     schema:
      $ref: "#/definitions/CmcTmTemplatePlaceholdersWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "emailtemplateplaceholder"
   summary: "Deletes the emailtemplateplaceholder identified by given ID."
   description:  "Deletes the emailtemplateplaceholder identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the emailtemplateplaceholder maintenance"
      required: true
      type: "string"
    - name: "emailtemplateplaceholder"
      in: "body"
      description: Request body contain emailtemplateplaceholder and Modification no of emailtemplateplaceholder maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

