swagger: "2.0"
info:
 description: "This is a sample server events server." 
 version: "1.0.0"
 title: "events Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "events"
   description: "cmc email notification is to provide capability to define a template with dynamic values substitute using APIs and send email notification.cmc email notification is to provide capability to define a template with dynamic values substitute using APIs and send email notification."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../events

 /events:
  post:
   tags:
    - "events"
   summary: "Adds a new events."
   description: "Adds a new events. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "events" 
      in: "body" 
      description: "Request Body that contains data required for creating a new events" 
      required: true
      schema:
       $ref: "#/definitions/CmcTmEventsDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created events" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "events"
   summary: "Get all valid events."
   description:  "Get all valid events. This endpoints will be used to Get all valid events maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: eventCode
     in: query
     required: false
     type: string
   - name: eventName
     in: query
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmEventsCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../events/xxx
#   DELETE    .../events/xxx
#   GET       .../events/xxx
#   GET       .../events/xxx?version=latestrecord
#   GET       .../events/xxx?version=1

 /events/{id}:
  put:
   tags:
    - "events"
   summary: "Update an existing events."
   description:  "Update an existing events."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the events Maintenance"
      required: true
      type: "string"
    - name: "events"
      in: "body"
      description: "Request Body that contains data required for updating an existing events"
      required: true
      schema:
       $ref: "#/definitions/CmcTmEventsDTO"
   responses:
    200:
     description: "Returns updated events"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "events"
   summary: "Retrieves the events by ID."
   description:  "Retrieves the events by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the events based on given id."
     schema:
      $ref: "#/definitions/CmcTmEventsWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "events"
   summary: "Deletes the events identified by given ID."
   description:  "Deletes the events identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the events maintenance"
      required: true
      type: "string"
    - name: "events"
      in: "body"
      description: Request body contain events and Modification no of events maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

