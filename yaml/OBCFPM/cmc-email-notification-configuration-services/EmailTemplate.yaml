   summary: "Authorize the emailtemplate by given ID."
   description:  "Authorize the emailtemplate identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the emailtemplate maintenance"
      required: true
      type: "string"
    - name: "emailtemplate"
      in: "body"
      description: Request body contain emailtemplate and Modification no of emailtemplate maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../emailtemplate/xxx/close
 /emailtemplate/{id}/close:
  patch:
   tags:
    - "emailtemplate"
   summary: "Close the emailtemplate by given ID."
   description:  "Close the emailtemplate identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the emailtemplate maintenance"
      required: true
      type: "string"
    - name: "emailtemplate"
      in: "body"
      description: Request body contain emailtemplate and Modification no of emailtemplate maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../emailtemplate/xxx/reopen

 /emailtemplate/{id}/reopen:
  patch:
   tags:
    - "emailtemplate"
   summary: "reopen the emailtemplate by given ID."
   description:  "reopen the emailtemplate identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the emailtemplate maintenance"
      required: true
      type: "string"
    - name: "emailtemplate"
      in: "body"
      description: Request body contain emailtemplate and Modification no of emailtemplate maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supprorted http methods GET
#
# path examples----
#   GET       .../emailtemplate/xxx/unauthorized

 /emailtemplate/{id}/unauthorized:
  get:
   tags:
    - "emailtemplate"
   summary: "Retrives the emailtemplate by given ID."
   description:  "Retrives the emailtemplate identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the emailtemplate based on given id."
     schema:
       $ref: "#/definitions/CmcTmEmailTemplateCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to  history record for remitterid
#
#  supprorted http methods GETS
#
# path examples----
