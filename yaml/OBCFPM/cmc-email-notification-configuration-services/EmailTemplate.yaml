swagger: "2.0"
info:
 description: "This is a sample server emailtemplate server." 
 version: "1.0.0"
 title: "emailtemplate Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "emailtemplate"
   description: "cmc email notification is to provide capability to define a template with dynamic values substitute using APIs and send email notification.cmc email notification is to provide capability to define a template with dynamic values substitute using APIs and send email notification."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../emailtemplate

 /emailtemplate:
  post:
   tags:
    - "emailtemplate"
   summary: "Adds a new emailtemplate."
   description: "Adds a new emailtemplate. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "emailtemplate" 
      in: "body" 
      description: "Request Body that contains data required for creating a new emailtemplate" 
      required: true
      schema:
       $ref: "#/definitions/CmcTmEmailTemplateDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created emailtemplate" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "emailtemplate"
   summary: "Get all valid emailtemplate."
   description:  "Get all valid emailtemplate. This endpoints will be used to Get all valid emailtemplate maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CmcTmEmailTemplateCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../emailtemplate/xxx
#   DELETE    .../emailtemplate/xxx
#   GET       .../emailtemplate/xxx
#   GET       .../emailtemplate/xxx?version=latestrecord
#   GET       .../emailtemplate/xxx?version=1

 /emailtemplate/{id}:
  put:
   tags:
    - "emailtemplate"
   summary: "Update an existing emailtemplate."
   description:  "Update an existing emailtemplate."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the emailtemplate Maintenance"
      required: true
      type: "string"
    - name: "emailtemplate"
      in: "body"
      description: "Request Body that contains data required for updating an existing emailtemplate"
      required: true
      schema:
       $ref: "#/definitions/CmcTmEmailTemplateDTO"
   responses:
    200:
     description: "Returns updated emailtemplate"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "emailtemplate"
   summary: "Retrieves the emailtemplate by ID."
   description:  "Retrieves the emailtemplate by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the emailtemplate based on given id."
     schema:
      $ref: "#/definitions/CmcTmEmailTemplateWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "emailtemplate"
   summary: "Deletes the emailtemplate identified by given ID."
   description:  "Deletes the emailtemplate identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the emailtemplate maintenance"
      required: true
      type: "string"
    - name: "emailtemplate"
      in: "body"
      description: Request body contain emailtemplate and Modification no of emailtemplate maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

