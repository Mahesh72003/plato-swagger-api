definitions:
 CmcTmEmailTemplateDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     createdBy:
      type: string
      description: ""
     createdDate:
      type: string
      format: date
      description: ""
     emailCcList:
      type: string
      description: ""
     emailSubject:
      type: string
      description: ""
     emailToList:
      type: string
      description: ""
     parentId:
      type: string
      description: ""
     documentAttached:
      type: string
      description: ""
     isApprovalTemplate:
      type: string
      description: ""
     templateCode:
      type: string
      description: ""
     eventCode:
      type: string
      description: ""
     templateMessage:
      type: string
      description: ""
     templateName:
      type: string
      description: ""
     updatedBy:
      type: string
      description: ""
     updatedDate:
      type: string
      format: date
      description: ""
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CmcTmEmailTemplateCollection: 
  description: "Collection of emailtemplate."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CmcTmEmailTemplateDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CmcTmEmailTemplateWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CmcTmEmailTemplateDTO"
