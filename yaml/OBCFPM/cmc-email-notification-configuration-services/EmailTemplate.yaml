 /emailtemplate/templateCode/{templateCode}:
  get:
   tags:
    - "emailtemplate"
   summary: "Retrives the events by given eventCode."
   description:  "Retrives the events by given eventCode"
   operationId: "getTemplateByTemplateCode"
   parameters:
    - name: "templateCode"
      in: "path"
      description: "templateCode of the user that needs to be fetched"
      required: true
