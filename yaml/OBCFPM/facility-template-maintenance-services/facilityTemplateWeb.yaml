definitions:
 CfpmTmFcltyTemplateMstrDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     checkerTimestamp:
      type: string
      format: date
      description: ""
     makerTimestamp:
      type: string
      format: date
      description: ""
     templateName:
      type: string
      description: ""
     templateCode:
      type: string
      description: ""
      minLength: 1
      maxLength: 4      
     CfpmTmFcltyTemplateDetailsDTO:
      type: array
      items:
       $ref: '#/definitions/CfpmTmFcltyTemplateDetailsDTO'
    required:
     - modNo
 CfpmTmFcltyTemplateDetailsDTO:
  type: object
  properties:
     facilityCategory:
      type: string
      description: ""
     facilityDescription:
      type: string
      description: ""
     facilityType:
      type: string
      description: ""
     id:
      type: string
      description: ""
     lineCode:
      type: string
      description: ""
     lineSerial:
      type: string
      description: ""
     parentFacilityId:
      type: string
      description: ""
     isSecured:
      type: boolean
     commitmentStatus:
      type: string
      description: ""
     isCascadeSecured:
      type: boolean   
     isCascadeCommited:
      type: boolean  
     isCascadeFunded:
      type: boolean               
     childTemplateFacility:
      type: array
      items:
       $ref: '#/definitions/CfpmTmFcltyTemplateDetailsDTO'
     parentId:
      type: string
      description: ""
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 BindingResult:
  type: object
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CfpmTmFcltyTemplateMstrCollection: 
  description: "Collection of fcltytemplatemstr."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CfpmTmFcltyTemplateMstrDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CfpmTmFcltyTemplateMstrWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CfpmTmFcltyTemplateMstrDTO"
