swagger: "2.0"
info:
 description: "This is a sample server facilityTemplate server." 
 version: "1.0.0"
 title: "facilityTemplate Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "facilityTemplate"
   description: "Facility Template Maintenance Service to default facilities during creation which makes the user job easier. Based on template code, we can maintain the relationship in facility template table. It is saved and authorized. Once it is authorized we can use it to default facility template."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../facilityTemplate

 /facilityTemplate:
  post:
   tags:
    - "facilityTemplate"
   summary: "Adds a new facilityTemplate."
   description: "Adds a new facilityTemplate. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "facilityTemplate" 
      in: "body" 
      description: "Request Body that contains data required for creating a new facilityTemplate" 
      required: true
      schema:
       $ref: "#/definitions/CfpmTmFcltyTemplateMstrDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created facilityTemplate" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "facilityTemplate"
   summary: "Get all valid facilityTemplate."
   description:  "Get all valid facilityTemplate. This endpoints will be used to Get all valid facilityTemplate maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: templateCode
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: string
   - name: templateName
     in: query
     description: templateName need to be set to fetch summary record, defult value is false
     required: false
     type: string     
   - name: isTree
     in: query
     description: isTree need to be set to fetch summary record, defult value is false
     required: false
     type: string             
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CfpmTmFcltyTemplateMstrCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../facilityTemplate/xxx
#   DELETE    .../facilityTemplate/xxx
#   GET       .../facilityTemplate/xxx
#   GET       .../facilityTemplate/xxx?version=latestrecord
#   GET       .../facilityTemplate/xxx?version=1
 /facilityTemplate/byTemplateCode/{templateCode}:
  get:
   tags:
    - "facilityTemplate"
   summary: "Update an existing facilityTemplate."
   description:  "Update an existing facilityTemplate."
   operationId: "getMaintenanceDataByTemplateCode"
   parameters:
    - name: "templateCode"
      in: "path"
      description: "key of the facilityTemplate Maintenance"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns updated facilityTemplate"
     schema:
      $ref: "#/definitions/CfpmTmFcltyTemplateMstrDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /facilityTemplate/{id}:
  put:
   tags:
    - "facilityTemplate"
   summary: "Update an existing facilityTemplate."
   description:  "Update an existing facilityTemplate."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the facilityTemplate Maintenance"
      required: true
      type: "string"
    - name: "facilityTemplate"
      in: "body"
      description: "Request Body that contains data required for updating an existing facilityTemplate"
      required: true
      schema:
       $ref: "#/definitions/CfpmTmFcltyTemplateMstrDTO"
   responses:
    200:
     description: "Returns updated facilityTemplate"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "facilityTemplate"
   summary: "Retrieves the facilityTemplate by ID."
   description:  "Retrieves the facilityTemplate by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the facilityTemplate based on given id."
     schema:
      $ref: "#/definitions/CfpmTmFcltyTemplateMstrWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "facilityTemplate"
   summary: "Deletes the facilityTemplate identified by given ID."
   description:  "Deletes the facilityTemplate identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the facilityTemplate maintenance"
      required: true
      type: "string"
    - name: "facilityTemplate"
      in: "body"
      description: Request body contain facilityTemplate and Modification no of facilityTemplate maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

