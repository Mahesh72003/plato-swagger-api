        type: "string" 
      alertId:
        type: "string"
      alertType:
        type: "string"      
      customerId:
        description: "Entity Ref Type of the Comment"
        type: "string"   
      rmId:
        type: "string"                     
      customerName:
        description: "Entity Ref No of the Comment"
        type: "string"   
      type:
        description: "Source Type of the Comment"
        type: "string"
      reason:
        description: "Source Type of the Comment"
        type: "string"
      criticality:
        description: "Source Type of the Comment"
        type: "string"          
      amount:
        description: "Subject of the Comment"
        type: "number" 
      entityId:
        type: "string"
      entityType:
        type: "string"
      entityDescription:
        type: "string"
      entityCategory:
        type: "string"
      entitySubCategory:
        type: "string"  
      alertStatus:
        type: "string"
      dismissFlag:
        type: "string"
      actionReferenceNo:
        type: string
      alertInitiationDate:
        type: "string"
        format: "date-time"
      alertActionDate:
        type: "string"
        format: "date-time"
      alertExpiryDate:
        type: "string"
        format: "date-time"                   
      action:
        description: "Email Initiator of the Comment"
        type: "string"    
  InlineResponse:
    type: "object"
    description: "Response of the newly created resource"
    properties:
      message:
       type: "string"          
  TransactionHeaderModel:
