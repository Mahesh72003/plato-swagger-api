paths:
  /web/v1/alerts/{rmId}:
    get:
      tags:
        - "AlertsWeb"
      summary: "Retrieves the alerts for a particular RMID."
      description:  "Retrieves the alerts for a particular RMID."
      operationId: "getAlertsByRmId"
      parameters:
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: false 
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false   
        - name: "contentType"
          in: "header"
          type: "string"
          required: false 
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false 
        - name: "rmId"
          in: "path"
          description: "Id of the user that needs to be fetched"
          required: true
          type: "string"
        - name: "limit"
          in: "query"
          required: false
          description: "limit to be fetched"
          type: "integer"
        - name: "offset"
          in: "query"
          required: false
          description: "offset of the limit"
          type: "integer" 
      responses:
        200:
          description: "Retrieves the alerts for a particular RMID."
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /web/v1/alerts/{id}:
    put:
      tags:
        - "AlertsWeb"
      summary: "Updates the table with the data for a particular ID."
      description:  "Updates the table with the data for a particular ID."
      operationId: "updateAlert"
      parameters:
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: true
        - name: "authToken"
          in: "header"
          type: "string"
          required: false 
        - name: "appId"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false   
        - name: "contentType"
          in: "header"
          type: "string"
          required: false 
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false 
        - name: "alertsModel"
          in: "body"
          description: "Request Body that contains data required for updating the alerts table"
          required: true
          schema:
            $ref: "#/definitions/AlertsModel"
      responses:
        200:
          description: "Updates the table with the data for a particular ID."
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"        
