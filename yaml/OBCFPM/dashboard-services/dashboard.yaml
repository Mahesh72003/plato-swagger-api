      processName:
        type: "string"
      taskId:
        type: "string"
      currentStage:
        type: "string"
      tab:
        type: "string"
      taskPriority:
        type: "string"
      instanceId:
        type: "string"
      moduleCode:
        type: "string"
      isFromCAM:
        type: "boolean"
      externalCheckReq:
        type: "boolean"
      fieldInvestigationReq:
        type: "boolean"
      externalValuationReq:
        type: "boolean"
      internalValuationReq:
        type: "boolean"
      legalOpinionReq:
        type: "boolean"
      riskEvaluationReq:
        type: "boolean"
      externalCheckAgencySelected:
        type: "boolean"
      externalValAgencySelected:
        type: "boolean"
      legalFirmSelected:
        type: "boolean"
      isCollatCreateSelected:
        type: "boolean"
      collateralValue:
        type: "number"
      oldCollateralValue:
        type: "number"
      isFromCollateralEvaluation:
        type: "boolean"
      isFromCollateralReview:
        type: "boolean"
      isSubmissionAndAwaitingReq:
        type: "boolean"
      serviceName:
        type: "string"
      ownerEstimatedValue:
        type: "number"
      marketValue:
        type: "number"
      bankValue:
        type: "number"
      customerId:
        type: "string"
      collateralType:
        type: "string"
      collateralCode:
        type: "string"
      collateralCurrency:
        type: "string"
      taskCreationDate:
        type: "string"
        format: "date-time"
      submitFlag:
        type: "boolean"
      source:
        type: "string"
      isKYCRequired:
        type: "boolean"
      isCreditRatingRequired:
        type: "boolean"
      stageUpdateFlag:
        type: "boolean"
      collateralSubmissionReq:
        type: "boolean"
      awaitForConfirmation:
        type: "boolean"
      documentSafeKeepingReq:
        type: "boolean"
      updateCategory:
