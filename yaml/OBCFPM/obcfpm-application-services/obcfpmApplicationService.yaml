swagger: "2.0"
info:
  description: "This is a sample server OBCFPM Application server. You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "OBCFPM Application Service"
host: "whf00bbk.in.oracle.com:8109"
basePath: "/obcfpm-application-service"
consumes:
  - "application/json"
  - "application/xml"
produces:
  - "application/json"
  - "application/xml"
tags:
  - name: "OBCFPMApplicationAPI"
    description: "API for OBCFPM Application Operations"
    
schemes:
- "https"

paths:
  /service/v1/applications/{applicationId}:
    get:
      produces:
        - "application/json"
        - "application/xml"
      tags:
        - "applicationsService"
      summary: "Retrieves the application service Details by Application Id."
      description:  "Retrieves the application service Details by Application Id."
      operationId: "getApplicationDetailsById"
      parameters:
        - name: "applicationId"
          in: "path"
          description: "application id of the user that needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystem"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystemReferenceNo"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: false
        - name: "authToken"
          in: "header"
          type: "string"
          required: true
        - name: "tenantId"
          in: "header"
          type: "string"
          required: false
        - name: "contentType"
          in: "header"
          type: "string"
          required: false
        - name: "branchDate"
          in: "header"
          type: "string"
          format: "date-time"
          required: false
      responses:
        200:
          description: "Returns the application service details based on given id."
          schema:
            $ref: "#/definitions/ResponseModel"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
  /service/v1/applications/status/{applicationId}:
    get:
      produces:
        - "application/json"
        - "application/xml"
      tags:
        - "applicationsService"
      summary: "Retrieves the application status details by Application Id."
      description:  "Retrieves the application status details by Application Id."
      operationId: "getApplicationStatusById"
      parameters:
        - name: "applicationId"
          in: "path"
          description: "application id of the user that needs to be fetched"
          required: true
          type: "string"
        - name: "appId"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystem"
          in: "header"
          type: "string"
          required: false
        - name: "externalSystemReferenceNo"
          in: "header"
          type: "string"
          required: false
        - name: "userId"
          in: "header"
          type: "string"
          required: true
        - name: "branchCode"
          in: "header"
          type: "string"
          required: false
        - name: "authToken"
          in: "header"
