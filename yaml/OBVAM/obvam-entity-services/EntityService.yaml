swagger: "2.0"
info:
 description: "This service is used to maintain virtual entity and is responsible for validating provided data and maintaining valid virtual entity account to the mask maintained for a bank parameter." 
 version: "1.0.0"
 title: "virtualentities Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "virtualentityService"
   description: "This service is used to maintain virtual entity and is responsible for validating provided data and maintaining valid virtual entity account to the mask maintained for a bank parameter."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../service/virtualentities

 /service/virtualentities:
  post:
   tags:
    - "virtualentityService"
   summary: "Adds a new virtualentities."
   description: "Adds a new virtualentities. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "virtualentities" 
      in: "body" 
      description: "Request Body that contains data required for creating a new virtualentities" 
      required: true
      schema:
       $ref: "#/definitions/EntityMasterSaveRequestDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created virtualentities" 
       type: "string"
     schema:
       $ref: "#/definitions/VirtualEntityServiceResponseWrapperDTO"
    400:
     description: "Bad request error, the server is unable to process the request."
    401:
     description: "Unauthorized request error, invalid credentials."
    403:
     description: "Request denied, no permission to access the request. "
    405:
     description: "Request denied, invalid input."
    500:
     description: "Internal server error."
  get:
   tags:
    - "virtualentityService"
   summary: "Get all valid virtualentities."
   description:  "Get all valid virtualentities. This endpoints will be used to Get all valid virtualentities maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: checkerId
     required: false
     type: string
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: entityType
     required: false
     type: string
   - in: query
     name: virtualEntityName
     required: false
     type: string
   - in: query
     name: virtualEntityId
     required: false
     type: string
   - in: query
     name: realCustomerNo
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/EntityMasterServiceCollection"
    400:
     description: "Bad request error, the server is unable to process the request."
    401:
     description: "Unauthorized request error, invalid credentials."
    403:
     description: "Request denied, no permission to access the request. "
    405:
     description: "Request denied, invalid input."
    500:
     description: "Internal server error."

# path to modify existing record by virtualEntityId and get the existing record identified by virtualEntityId
#
#  supprorted http methods PUT, GET
#
# path examples----
#   PUT       .../service/virtualentities/xxx

 /service/virtualentities/{virtualEntityId}:
  put:
   tags:
    - "virtualentityService"
   summary: "Update an existing virtualentities."
   description:  "Update an existing virtualentities."
   operationId: "modifyRecord"
   parameters:
    - name: sourceCode
      description: "Source from which request is initiated"
      in: header     
      required: true
      type: string
    - name: "virtualEntityId"
      in: "path"
      description: "Id of the virtualentities Maintenance"
      required: true
      type: "string"
    - name: "dto"
      in: "body"
      description: "Request Body that contains data required for updating an existing virtualentities"
      required: true
      schema:
       $ref: "#/definitions/EntityMasterModifyRequestDTO"
   responses:
    200:
     description: "Returns updated virtualentities"
     schema:
      $ref: "#/definitions/VirtualEntityServiceResponseWrapperDTO"
    400:
     description: "Bad request error, the server is unable to process the request."
    401:
     description: "Unauthorized request error, invalid credentials."
    403:
     description: "Request denied, no permission to access the request. "
    405:
     description: "Request denied, invalid input."
    500:
     description: "Internal server error."
  get:
   tags:
    - "virtualentityService"
   summary: "Get the virtualentities by given virtualEntityId."
   description:  "Get the virtualentities identified by given virtualEntityId."
   operationId: "getByVirtualEntityId"
   parameters:
    - name: "virtualEntityId"
      in: "path"
      description: "Key of the virtualentities maintenance"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      type: "string"
      required: false
      description: version of the virtualentities maintenance"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/EntityMasterServiceWrapperDTO"
    400:
     description: "Bad request error, the server is unable to process the request."
    401:
     description: "Unauthorized request error, invalid credentials."
    403:
     description: "Request denied, no permission to access the request. "
    500:
     description: "Internal server error."

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../service/virtualentities/xxx/close
 /service/virtualentities/{virtualEntityId}/close:
  patch:
   tags:
    - "virtualentityService"
   summary: "Close the virtualentities by given virtualEntityId."
   description:  "Close the virtualentities identified by given virtualEntityId."
   operationId: "closeRecord"
   parameters:
    - name: "virtualEntityId"
      in: "path"
      description: "Key of the virtualentities maintenance"
      required: true
      type: "string"
    - name: "keyDto"
      in: "body"
      required: false
      description: Request body contain virtualentities and Modification no of virtualentities maintenance which need to be closed"
      schema:
       $ref: "#/definitions/CloseDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/VirtualEntityServiceResponseWrapperDTO"
    400:
     description: "Bad request error, the server is unable to process the request."
    401:
     description: "Unauthorized request error, invalid credentials."
    403:
     description: "Request denied, no permission to access the request."
    500:
     description: "Internal server error."

# path to  history record for remitterid
#
#  supprorted http methods GETS
#
# path examples----
#   GET       .../service/virtualentities/entitieswithaccountdetails

 /service/virtualentities/entitieswithaccountdetails:
  get:
   tags:
    - "virtualentityService"
   summary: "Retrives the virtual entities with Details of accounts under that entity for a given real customer."
   description:  "Retrives the virtual entities with Details of accounts under that entity for a given real customer."
   operationId: "getEntitiesWithAccountDetails"
   parameters:
    - name: offset
      in: query
      description: offset is starting no of records to be fetched
      required: false
      type: integer  
    - name: limit
      in: query
      description: limit is maximum no of records to be fetched
      required: false
      type: integer	  
    - name: "realCustomerNo"
      in: "query"
      description: "real customer number whose entities needs to be fetched"
      required: true
      type: "string"
    - name: "virtualEntityId"
      in: "query"
      description: "virtual Entity Id"
      required: false
      type: "string"
    - name: "virtualEntityName"
      in: "query"
      description: "virtual Entity Name"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the virtualentities based on given id."
     schema:
       $ref: "#/definitions/EntityServiceWithAccountDetailsCollection"
    400:
     description: "Bad request error, the server is unable to process the request."
    401:
     description: "Unauthorized request error, invalid credentials."
    403:
     description: "Request denied, no permission to access the request. "
    500:
     description: "Internal server error."
 /service/virtualentities/idWithModNos/{virtualEntityId}:
  get:
   tags:
    - "virtualentityService"
   summary: "Retrives the id  by given virtualEntityId."
   description:  "Retrives the id by virtualEntityId."
   operationId: "idWithModNos"
   parameters:
    - name: "virtualEntityId"
      in: "path"
      description: "virtualEntityId of the entity whose id needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the accounts based on given id."
     schema:
       $ref: "#/definitions/IdWithModNoDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 
