swagger: "2.0"
info:
 description: "This is the API documentation for the read-only Projection Service API which gives distinct virtual account currency for a real customer number" 
 version: "1.0.0"
 title: "distinctCurrencyService"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "distinctCurrencyService"
   description: "API for distinct virtual account currency for a real customer"

schemes:
- "https"

paths:

# path fetch all valid records or by intent
#
# supported http method GET
#
# path example ../distinctCurrencies
 /service/distinctCurrencies:
  get:
   tags:
    - "distinctCurrencyService"
   summary: "Fetches distinct virtual account currency for a real customer"
   description:  "This endpoint will be used to fetch distinct virtual account currency for a real customer"
   operationId: "getDistinctCurrencies"
   parameters:
   - in: header
     name: sourceCode
     required: true
     type: string
   - in: query
     name: realCustomerNo
     required: true
     type: string
   - in: query
     name: virtualEntityId
     description: "Virtual Entity Id"
     required: false
     type: string
   responses:
    200:
     description: "Returns list of distinct currencies for a real customer number from readonly virtual account table"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/DistinctCurrenciesServiceCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"     
 
definitions:     
 DistinctCurrencieserviceDTO:
    type: object
    properties:
     currency:
      type: string
      description: "Virtual Account Currency"
 DistinctCurrenciesServiceCollection: 
  description: "Collection of distinct currencies for a real customer number from readonly virtual account table"
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/DistinctCurrencieserviceDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer