swagger: "2.0"
info:
 description: "This is service API document for account products operations. Pass appId = VAM" 
 version: "1.0.0"
 title: "Account H2H File Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "accountH2HFileService"
   description: "This service can create Corporate Specific Virtual Account products. These products are further used to create virtual accounts. Product level preferences must be enabled before enabling the preference for account."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../accountproducts

 /service/account/parsefile:  
  post:
   consumes:
   - multipart/form-data
   - application/json
   tags:
     - AccountFileUpload
   summary: Adds a new datasegment details.
   description: Adds a new datasegment details.
   operationId: parseFile
   parameters:
   - in: formData
     name: upfile
     type: file
     description: The file to upload.
   - name: fileDetailsDTO
     in: formData
     description: Request Body that contains data required for creating a new datasegment
     required: true
     type: string
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created accounts" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /service/account/parsefileAsync:  
  post:
   consumes:
   - multipart/form-data
   - application/json
   tags:
     - AccountFileUploadAsync
   summary: Adds a new datasegment details.
   description: Adds a new datasegment details.
   operationId: parseFileAsync
   parameters:
   - in: formData
     name: upfile
     type: file
     description: The file to upload.
   - name: fileDetailsDTO
     in: formData
     description: Request Body that contains data required for creating a new datasegment
     required: true
     type: string
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created accounts" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /service/account/handoffProcess:  
    post:
      tags:
        - HostAccount
      summary: Adds a new File to obvam
      description: Adds a new File to obvam. Add additional information here for this
        endpoint.
      operationId: processFile
      parameters:
        - name: fileDto
          in: body
          description: Fetches the starting number of the offset records
          required: true
          schema:
            $ref: '#/definitions/FileDetailsDTO'
      responses:
        '201':
          description: 'Returns message of succes or failure '
          headers:
            Location:
              description: File Received
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        '400':
          description: Malformed syntax.
        '401':
          description: Request does not have sufficient credentials.
        '403':
          description: Request is not authorized.
        '405':
          description: Invalid input
        '500':
          description: Internal error
 /service/account/handoffAsync:  
    post:
      tags:
        - HostAccountAsync
      summary: Adds a new File to obvam
      description: Adds a new File to obvam. Add additional information here for this
        endpoint.
      operationId: processFileAsync
      parameters:
        - name: fileDto
          in: body
          description: Fetches the starting number of the offset records
          required: true
          schema:
            $ref: '#/definitions/FileDetailsDTO'
      responses:
        '201':
          description: 'Returns message of succes or failure '
          headers:
            Location:
              description: File Received
              type: string
          schema:
            $ref: '#/definitions/FileDetailsDTO'
        '400':
          description: Malformed syntax.
        '401':
          description: Request does not have sufficient credentials.
        '403':
          description: Request is not authorized.
        '405':
          description: Invalid input
        '500':
          description: Internal error
 /service/account/h2hAckFile:
   post:
     tags:
       - HostAckFileProcessing
     summary: Adds a new File to obvam
     description: Adds a new File to obvam. Add additional information here for this
       endpoint.
     operationId: processAckFile
     parameters:
       - name: fileDto
         in: body
         description: Fetches the starting number of the offset records
         required: true
         schema:
           $ref: '#/definitions/AckFileDTO'
     responses:
       '201':
         description: 'Returns message of success or failure '
         headers:
           Location:
             description: File Received
             type: string
         schema:
           $ref:  "#/definitions/ResponseDtoWrapper"
       '400':
         description: Malformed syntax.
       '401':
         description: Request does not have sufficient credentials.
       '403':
         description: Request is not authorized.
       '405':
         description: Invalid input
       '500':
         description: Internal error
 
 /service/account/h2hAckFileAsync:
   post:
     tags:
       - HostAckFileProcessingAsync
     summary: Adds a new File to obvam
     description: Adds a new File to obvam. Add additional information here for this
       endpoint.
     operationId: processAckFileAsync
     parameters:
       - name: fileDto
         in: body
         description: Fetches the starting number of the offset records
         required: true
         schema:
           $ref: '#/definitions/AckFileDTO'
     responses:
       '201':
         description: 'Returns message of succes or failure '
         headers:
           Location:
             description: File Received
             type: string
         schema:
           $ref:  "#/definitions/ResponseDtoWrapper"
       '400':
         description: Malformed syntax.
       '401':
         description: Request does not have sufficient credentials.
       '403':
         description: Request is not authorized.
       '405':
         description: Invalid input
       '500':
         description: Internal error
 
definitions:
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 FileDetailsDTO:
  type: object
