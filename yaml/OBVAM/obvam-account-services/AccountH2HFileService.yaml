      description: "File Original Name"
     fileModifiedName:
      type: string
      description: "File modified Name"
     fileSize:
      type: integer
      format: int64
      description: "Size of file for parsing"
     formatName:
      type: string
     createdBy:
      type: string
      description: "Indicates the system who have created the file"
     createdDate:
      type: string
      format: date
      description: "File Creation Date"
     modifiedBy:
      type: string
      description: "Indicate the user who modified the file"
     modifiedDate:
      type: string
      format: date
