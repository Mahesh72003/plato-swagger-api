swagger: "2.0"
info:
 description: "This is a Virtual accounts Closure service." 
 version: "1.0.0"
 title: "accounts Closure Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "accountClosure"
   description: "Virtual Account Closure for Virtual Entity can be created using this service."

schemes:
- "https"

paths:
 /service/accountclosureapi:
  post:
   tags:
    - "accountClosure"
   summary: "Adds a new Closure Account."
   description: "Adds a new Closure accounts. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "accountclosure" 
      in: "body" 
      description: "Request Body that contains data required for creating a new Virtual Account Closure" 
      required: true
      schema:
       $ref: "#/definitions/AccountClosureSaveServiceApiMasterDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created accounts" 
       type: "string"
     schema:
       $ref: "#/definitions/AccClosureServiceApiDTOWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

  get:
   tags:
    - "accountClosure"
   summary: "Gets all valid Virtual Account Closure records."
   description: "Fetches all valid records that have been maintained."
   operationId: "getAllClosures"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth needs to be set to fetch record that are unauthorized and/or closed, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is the starting number of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is the maximum number of records to be fetched
     required: false
     type: integer
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: branchCode
     required: false
     type: string
   - in: query
     name: checkerId
     required: false
     type: string
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: modNo
     required: false
     type: integer
   - in: query
     name: requestRefNo
     required: false
     type: string
   - in: query
     name: sourceRefNo
     required: false
     type: string
   - in: query
     name: sourceCode
     required: false
     type: string
   responses:
    201:
     description: "Returns Virtual Account Closure records"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/AccountClosureCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  
 /service/web/accountclosureapi:
  post:
   tags:
    - "accountClosure"
   summary: "Adds a new Closure Account."
   description: "Adds a new Closure accounts. Add additional information here for this endpoint."
   operationId: "saveRecordWebApi"
   parameters:
    - name: "accountclosure" 
      in: "body" 
      description: "Request Body that contains data required for creating a new Virtual Account Closure" 
      required: true
      schema:
       $ref: "#/definitions/VamTmAccountClosureDsModel"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created accounts" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /service/accountclosureapi/{reqRefNo}/approve:
  patch:
   tags:
    - "accountClosure"
   summary: "Authorize the Virtual Account Closure record by given Identification Number."
   description: "Authorize the version of the record identified by the Identification Number and Modification Number provided."
   operationId: "authorizeServiceApi"
   parameters:
    - name: "reqRefNo"
      in: "path"
      description: "Request refernce number of the closure request"
      required: true
      type: "string"
    - name: "accountclosure"
      in: "body"
      description: "Request body must contain Identification Number and Modification Number of Virtual Account Closure record which needs to be authorized"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/AccClosureServiceApiDTOWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 /service/accountclosureapi/{id}/approvewebapi:
  patch:
   tags:
    - "accountClosure"
   summary: "Authorize the Virtual Account Closure record by given Identification Number."
   description: "Authorize the version of the record identified by the Identification Number and Modification Number provided."
   operationId: "authorizeWebApi"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the Virtual Account Closure record that has been maintained."
      required: true
      type: "string"
    - name: "accountclosure"
      in: "body"
      description: "Request body must contain Identification Number and Modification Number of Virtual Account Closure record which needs to be authorized"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 /service/accountclosureapi/{reqRefNo}/delete:
  patch:
   tags:
    - "accountClosure"
   summary: "Deletes the Virtual Account Closure record identified by given Identification Number."
   description: "Deletes the version of the record identified by the Identification Number and Modification Number provided."
   operationId: "delete"
   parameters:
    - name: "reqRefNo"
      in: "path"
      description: "Key of the Virtual Account Closure record that has been maintained."
      required: true
      type: "string"
    - name: "accountclosure"
      in: "body"
      description: "Request body must contain Identification Number and Modification Number of Virtual Account Closure record which needs to be deleted"
      required: true
      schema:
       $ref: "#/definitions/OrchestratorDTO"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ClosureReqDetailsResponseDto"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
     
 /service/accountclosureapi/getByNK/{requestRefNo}:
  get:
   tags:
    - "accountClosure"
   summary: "Get by Natural Key the Virtual Account Closure record"
   description: "Authorize the version of the record identified by the Identification Number and Modification Number provided."
   operationId: "getByNK"
   parameters:
    - name: "requestRefNo"
      in: "path"
      description: "Request refernce number of the closure request"
      required: true
      type: "string"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/VirtualAccountClosureServiceWrapperDto"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
     

      
definitions:
 VirtualAccountClosureServiceApiMasterDTO:
  type: object  
  allOf:
  - type: object
    properties:
     requestRefNo:
      type: string
      description: "Reference number of Virtual Account Closure Request"
     sourceRefNo:
      type: string
      description: "Reference Number for the Virtual Account Closure Request from Source"
     sourceCode:
      type: string
      description: "Source Code for the VA closure Request"
     VirtualAccountClosureDetailsDTO:
      type: array
      items:
       $ref: "#/definitions/VirtualAccountClosureServiceApiDetailsDTO"
       
 VirtualAccountClosureServiceApiDetailsDTO:
  type: object
  properties:
     requestRefNo:
      type: string
      description: "Reference number of Virtual Account Closure Request"
     sourceRefNo:
      type: string
      description: "Source Reference number of Virtual Account Closure Request"
     virtualAccountNo:
      type: string
      description: "Virtual Account number for which closure is requested"
     vaClosureRefNum:
      type: string
      description: "Reference Number for Virtual Account Number"
      
 AccountClosureSaveServiceApiMasterDTO:
  type: object  
  properties:
     sourceCode:
      type: string
