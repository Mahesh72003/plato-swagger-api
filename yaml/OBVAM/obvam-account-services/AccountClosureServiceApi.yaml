     AccountClosureSaveDetailsDTO:
       type: array
       items:
        $ref: "#/definitions/AccountClosureSaveDetailsDTO"
       
 AccountClosureSaveDetailsDTO:
  type: object
  properties:
     virtualAccountNo:
