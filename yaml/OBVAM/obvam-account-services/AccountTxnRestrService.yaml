swagger: "2.0"
info:
 description: "This is Account level transaction restriction through service apis." 
 version: "1.0.0"
 title: "acctxnrestriction Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "acctxnrestrictionService"
   description: "Account level transaction restriction -service apis "
 
schemes:
- "https"
 
paths:
 
# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../acctxnrestriction
 
 /service/acctxnrestriction:
  post:
   tags:
    - "acctxnrestrictionService"
   summary: "Adds/updates account transaction restriction."
   description: "Custom api that will either add /edit transaction restriction at account level"
   operationId: "acctxnrestrictionCustom"
   parameters:
    - name: "acctxnrestriction" 
      in: "body" 
      description: "Request Body that contains data required for acctxnrestriction" 
      required: true
      schema:
       $ref: "#/definitions/VamTmAccountTxnRestrSaveServiceDTO"
    - name: "sourceCode" 
      in: header 
      description: "source code" 
      required: true
      type: string
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created acctxnrestriction" 
       type: "string"
     schema:
       $ref: "#/definitions/AcctTxnRestrResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 
definitions:
 VamTmAccountTxnRestrSaveServiceDTO:
  type: object
  allOf:
  - type: object
    properties:
     limitCode:
      type: string
      description: "Limit code"
     virtualAccountNo:
      type: string
      description: "Virtual account number"       
     VamTmAccountTxnRestrDetailServiceDTO:
      type: array
      items:
       $ref: '#/definitions/VamTmAccountTxnRestrDetailSaveDTO'
    required:
     - limitCode
     - virtualAccountNo
 VamTmAccountTxnRestrDetailSaveDTO:
  type: object
  properties:
     count:
      type: number
      description: "allowed count of transaction for the specific restriction"
     restrictionId:
      type: string
      description: "the restriction id for which count is getting captured"
  required:
   - count
   - restrictionId     
 VamTmAccountTxnRestrMasterServiceDTO:
  type: object
  allOf:
  - type: object
    properties:
     limitCode:
      type: string
      description: "Limit code"
     virtualAccountNo:
      type: string
      description: "Virtual account number"
     makerId:
      type: string
      description: "Maker ID of Virtual Account"
     makerDateStamp:
      type: string
      description: "Date and Time when Virtual Account is created or modified or closed or reopened"
     checkerId:
      type: string
      description: "Checker ID of Virtual Account"
     checkerDateStamp:
      type: string
      description: "Date and Time when some action on Virtual Account is authorized"
     modNo:
      type: integer
      description: "Version number of Virtual Account"
     recordStatus:
      type: string
      description: "Record Status of Virtual Account"
     authStatus:
      type: string
      description: "Authorization Status of Virtual Account"
     onceAuth:
      type: string
      description: "Flag that indicated if Virtual Account is authorized once or not"
     doerRemarks:
      type: string
      description: "Remarks made by Maker"
     approverRemarks:
      type: string
      description: "Remarks made by Approver"       
     VamTmAccountTxnRestrDetailServiceDTO:
      type: array
      items:
       $ref: '#/definitions/VamTmAccountTxnRestrDetailServiceDTO'
    required:
     - limitCode
     - virtualAccountNo     
 VamTmAccountTxnRestrDetailServiceDTO:
  type: object
  properties:
     count:
      type: number
      description: "allowed count of transaction for the specific restriction"
     restrictionId:
      type: string
      description: "the restriction id for which count is getting captured"
     virtualAccountNo:
      type: string
      description: "virtual account number"
  required:
   - count
   - restrictionId
 AcctTxnRestrResponseDtoWrapper:
    type: object
    properties:
      messages:
        $ref: "#/definitions/AcctTxnRestrServiceResponseDto"
      data:
        $ref: "#/definitions/VamTmAccountTxnRestrMasterServiceDTO"
 AcctTxnRestrServiceResponseCode:
    type: object
    properties:
      Code:
        type: string
      Desc:
        type: string
      Type:
        type: string
      Language:
        type: string
 AcctTxnRestrServiceResponseDto:
    type: object
    properties:
      status:
        type: string
      codes:
        type: array
        items:
          $ref: "#/definitions/AcctTxnRestrServiceResponseCode"