     $ref: "#/definitions/RemitterIdServiceResponseCode"
 RemitterIdServiceResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
 RemitterIdServiceCollection: 
  description: "Collection of remitterid."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/RemitterIdServiceResponseDataDto"
   paging:
    $ref: "#/definitions/PagingDto"
    
 RemitterIdServiceResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/RemitterIdServiceResponseDto"
   data:
    $ref: "#/definitions/RemitterIdServiceResponseDataDto"
    
 ResponseResourceSupport:
  type: object
 RemitterIdServiceWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/RemitterIdServiceResponseDataDto"
 RemitterIdDownloadCollection:
  description: "Collection of Remitter download."
  type: object
  properties:
   data:
    type: object
    items:
     $ref: "#/definitions/RemitterIdDownloadDTO"
   messages:
    $ref: "#/definitions/RemitterIdServiceResponseDto"
 RemitterIdcountServiceCollection:
  type: object
  properties:
   data:
    type: array
    items:
     $ref: "#/definitions/RemitterIdcountServiceDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 RemitterIdDownloadDTO:
  type: object
  properties:
     realCustomerNo:
      description: "Real Customer"
      type: string     
     virtualIdentifier:
      description: "Virtual Identifier"
      type: string
     remitterData:
      type: string
      description: "remitter details for the real customer and identifier"
 RemitterIdcountServiceDTO:
  type: object
