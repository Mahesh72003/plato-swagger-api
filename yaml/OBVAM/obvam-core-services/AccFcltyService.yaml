swagger: "2.0"
info:
 description: "This is the Service API document for Account Facility operations.Pass appId = VAC"
 version: "1.0.0"
 title: "accfcltys Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "accfcltysService"
   description: "This is the Service for Account Facility Creation and maintenance. This function is used to define the real customer and its real accounts for which virtual accounts can be created. It has a Real Customer LOV field which has one to many Relation with Real Accounts of that customer."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../accountfacility

 /service/accountfacility:
  get:
   tags:
    - "accfcltysService"
   summary: "Get all valid accfcltys."
   description:  "Get all the valid accfcltys. This endpoint will be used to Get all valid accfcltys maintenance records."
   operationId: "getAllFacility"
   parameters:
   - name: includecloseandunauth
     in: query
     description: "includecloseandunauth need to be set to fetch summary record, defult value is false"
     required: false
     type: boolean
   - name: offset
     in: query
     description: "offset is starting no of records to be fetched"
     required: false
     type: integer
   - name: limit
     in: query
     description: "limit is maximum no of records to be fetched"
     required: false
     type: integer
   - in: query
     name: defaultVirtualEntity
     required: false
     type: string
     description: "virtual entity id"
   - in: query
     name: realCustomerNo
     required: false
     type: string
     description: "real customer number"
   - in: query
     name: makerId
     required: false
     type: string
     description: "maker of the record"
   - in: query
     name: checkerId
     required: false
     type: string
     description: "checker of the record"
   - in: query
     name: recordStat
     required: false
     type: string
     description: "record status"
   - in: query
     name: authStat
     required: false
     type: string
     description: "auth status"
   - name: sourceCode
     description: "Source from which request is initiated"
     in: header     
     required: true
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/AccountFacilityMasterServiceCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
# path to get Facility Enabled Accounts for a Customer
#
#  supprorted http methods GET
#
# path examples----
#   GET       ...service/accountfacility/vaenabledaccounts

 /service/accountfacility/vaenabledaccounts:
  get:
   tags:
    - "accfcltysService"
   summary: "Retrieves the accfcltys for the realCustomerNo."
   description:  "Retrieves the accfcltys for the realCustomerNo."
   operationId: "getVAEnabledAccounts"
   parameters:
    - name: offset
      in: query
      description: offset is starting no of records to be fetched
      required: false
      type: integer
    - name: limit
      in: query
      description: limit is maximum no of records to be fetched
      required: false
      type: integer
    - name: "realCustomerNo"
      in: "query"
      description: "realCustomerNo of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "realAccountNo"
      in: "query"
      description: "Real account number that needs to be fetched"
      required: false
      type: "string"
    - name: "branchCode"
      in: "query"
      description: "Branch code of the real account number"
      required: false
      type: "string"
    - name: "accountClass"
      in: "query"
      description: "Account class of real account number"
      required: false
      type: "string"
    - name: "sourceSystem"
      in: "query"
      description: "sourceSystem of real account number"
      required: false
      type: "string"
    - name: sourceCode
      description: "Source from which request is initiated"
      in: header     
      required: true
      type: string
         
   responses:
    200:
     description: "Returns the accfcltys based on given id."
     schema:
      $ref: "#/definitions/AccountFacilityDetailServiceCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
 /service/accountfacility/vaenabledaccountswithDesc:
  get:
   tags:
    - "accfcltysService"
   summary: "Retrieves the accfcltys for the realCustomerNo."
   description:  "Retrieves the accfcltys for the realCustomerNo."
   operationId: "getVAEnabledAccountsWithDesc"
   parameters:
    - name: offset
      in: query
      description: offset is starting no of records to be fetched
      required: false
      type: integer
    - name: limit
      in: query
      description: limit is maximum no of records to be fetched
      required: false
      type: integer
    - name: "realCustomerNo"
      in: "query"
      description: "realCustomerNo of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "realAccountNo"
      in: "query"
      description: "Real account number that needs to be fetched"
      required: false
      type: "string"
    - name: "branchCode"
      in: "query"
      description: "Branch code of the real account number"
      required: false
      type: "string"
    - name: "accountClass"
      in: "query"
      description: "Account class of real account number"
      required: false
      type: "string"
    - name: "sourceSystem"
      in: "query"
      description: "sourceSystem of real account number"
      required: false
      type: "string"
    - name: sourceCode
      description: "Source from which request is initiated"
      in: header     
      required: true
      type: string
    - name: "realAccountCcy"
      in: "query"
      description: "currency of the real account"
      required: false
      type: "string"      
         
   responses:
    200:
     description: "Returns the accfcltys based on given id."
     schema:
      $ref: "#/definitions/AccountFacilityDetailDescServiceCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"     
 /service/sanctionCheckParameters/{customerNumber}:
  get:
   tags:
    - "accfcltysService"
   summary: "Get all parameter related to sanction check"
   description:  "Get all parameter related to sanction check. This endpoint will be used to Get all parameters related to sanction check"
   operationId: "getSanctionChkParameters"
   parameters:
   - name: customerNumber
     in: path
     description: customer number for which sanction check status need to be determined and other parameters need to be fetched 
     required: true
     type: string
   responses:
    201:
     description: "Returns sanction check parameters"
     schema:
       $ref: "#/definitions/SanctionCheckParametersDto"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /service/accfcltybankparams/{keyId}:
  get:
   tags:
    - "accfcltysService"
   summary: "Get all parameter related to sanction check"
   description:  "Get parameter related to bank and default virtual entity. This endpoint will be used to Get all parameters related to sanction check"
   operationId: "getAccFacAndBankParameters"
   parameters:
   - name: keyId
     in: path
     description: 'KeyId for which bank and facility parameters need to be determined' 
     required: true
     type: string
   responses:
    201:
     description: "Returns sanction check parameters"
     schema:
       $ref: "#/definitions/AccFcltyBankParamDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"        
definitions:
 AccountFacilityServiceMasterDTO:
  type: object
  allOf:
  - type: object
    properties:
     defaultVirtualEntity:
      type: string
      description: "Default Virtual Entity"
      minLength: 1
      maxLength: 12
     realCustomerNo:
      type: string
      description: "Valid Real Customer Number from common core"
      minLength: 1
      maxLength: 20
     makerId:
      type: string
      description: "Maker Id"
     makerDateStamp:
      type: string
      description: "Maker Date Stamp"
     checkerId:
      type: string
      description: "Checker Id"
     checkerDateStamp:
      type: string
      description: "Checker Date Stamp"
     modNo:
      type: number
      description: "Modification Number"
     recordStatus: 
      type: string
      description: "Record Status"
     authStatus:
      type: string
      description: "Auth Status"
     onceAuth:
      type: string
      description: "Once Authorized"
     doerRemarks:
      type: string
      description: "Maker Remarks"
     approverRemarks:
      type: string
      description: "Checker Remarks"
     sanctionChkExempted:
      type: string
      description: "Sanction check exempted"
      pattern: '[Y,N]' 
     AccountFacilityServiceDetailDTO:
      type: array
      items:
       $ref: '#/definitions/AccountFacilityServiceDetailDTO'
     AccountFacilityDetailDescServiceDTO:
      type: array
      items:
       $ref: '#/definitions/AccountFacilityDetailDescServiceDTO'       
     EntityServiceMasterDTO:
       $ref: '#/definitions/EntityServiceMasterDTO'
    required:
     - realCustomerNo
 AccountFacilityServiceDetailDTO:
  type: object
  properties:
     branchCode:
      type: string
      description: "Branch Code"
      minLength: 3
      maxLength: 3
     realCustomerNo:
      type: string
      description: "Real Customer Number "
      minLength: 1
      maxLength: 20
     realAccountNo:
      type: string
      description: "Real Account Number for the Customer"
      minLength: 1
      maxLength: 34
     realAccountCcy:
      type: string
      description: "Real Account Number Currency"
      minLength: 3
      maxLength: 3
     accountClass:
      type: string
      description: "Account Class of Real Account Number"
     sourceSystem:
      type: string
      description: "Source System of Real Account Number"
  required:
   - realCustomerNo
   - realAccountNo
   - sourceSystem
 AccountFacilityDetailDescServiceDTO:
  type: object
  properties:
     branchCode:
      type: string
