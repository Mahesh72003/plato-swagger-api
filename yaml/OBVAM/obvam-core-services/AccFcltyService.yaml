      minLength: 3
      maxLength: 3
     accountClass:
      type: string
      description: "Account Class of Real Account Number"
     sourceSystem:
      type: string
      description: "Source System of Real Account Number"
  required:
   - realCustomerNo
   - realAccountNo
   - sourceSystem
