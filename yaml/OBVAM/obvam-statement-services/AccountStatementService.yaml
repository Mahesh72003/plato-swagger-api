 /service/statement/fetch:
  get:
   tags:
    - "accountStatementService"
   summary: "Fetch messages"
   description:  "Fetch messages for the given parameters."
   operationId: "fetch"
   parameters:
   - name: "realCustomer"
     in: "query"
     description: "Real Customer Number"
     required: false
     type: "string"
   - name: "entityId"
     in: "query"
     description: "Entity Id"
     required: false
     type: "string"
   - name: "accountBranch"
     in: "query"
     description: "Account Branch"
     required: false
     type: "string"
   - name: "accountNo"
     in: "query"
     description: "Virtual Account Number"
     required: false
     type: "string"
   - name: "msgType"
     in: "query"
     description: "Message Type MT<> & CAMT<>"
     required: false
     type: "string"  
   - name: "fromDate"
     in: "query"
     description: "From Date"
     required: true
     type: "string"  
     pattern: "[0-9]{4}[-][0-9]{2}[-][0-9]{2}"
   - name: "toDate"
     in: "query"
     description: "To Date"
     required: true
     type: "string"  
     pattern: "[0-9]{4}[-][0-9]{2}[-][0-9]{2}"
   responses:
    201:
     description: "Returns list of messages"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/MessageOutDTOCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 #ui changes end
definitions:
 StatementInDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     virtualEntity:
      type: string
      description: "Virtual entity for which the account statement has to be generated."
     virtualAccountNumber:
      type: string
      description: "Virtual account number for which the account statement has to be generated. Please give ALL for consolidated report"
     fromDate:
      type: string
      pattern: "[0-9]{4}[-][0-9]{2}[-][0-9]{2}"
      description: "Date from when the transactions have to be fetched"
     toDate:
      type: string
      pattern: "[0-9]{4}[-][0-9]{2}[-][0-9]{2}"
      description: "Date till when the transactions have to be fetched"
    required:
     - virtualEntity
     - fromDate
     - toDate
 StatementDTO:
  type: object
  properties:
   headerDTO:
    $ref: "#/definitions/HeaderStatementDTO"
   bodyDTO:
    type: "array"
    items: 
     $ref: "#/definitions/StatementBodyDTO"
 HeaderStatementDTO:
  type: object
  properties:
   realCustomerNo:
    type: string
   virtualCustomerNo:
    type: string
   virtualCustomerName:
    type: string
   addressLine1:
    type: string
   addressLine2:
    type: string
   addressLine3:
    type: string
   addressLine4:
    type: string
   pincode:
    type: string
   countryCode:
    type: string
 StatementBodyDTO:
  type: object
  properties:
   branchCode:
    type: string
   virtualAccountNo:
    type: string
   currentBalance:
      type: number
   openBalance:
      type: number
   closingBalance:
      type: number
   #swift changes begin
   virtualAccCcy:
    type: string
   ibanAccNo:
    type: string
   #swift changes end
   detailsDTO:
    type: "array"
    items: 
     $ref: "#/definitions/StatementBodyDetDTO"
 StatementBodyDetDTO:
  type: object
  properties:
   currency:
    type: string
   trnDate:
    type: string
   trnCode:
    type: string
   valueDate:
    type: string
   transactionDescription:
    type: string
   processingReferenceNo:
    type: string
   deposit:
      type: number
   withdrawal:
      type: number
   runningBalance:
    type: number
   #swift changes begin
   swiftTag61:
    type: string
   swiftTag86:
    type: string
   #swift changes end
   #sprint-11 changes begin
   id:
    type: string
   #sprint-11 changes end
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 StatementDTOCollection: 
  description: "Collection of entries."
  type: "object"
  properties:
   data:
    $ref: "#/definitions/StatementDTO"
   messages:
    $ref: "#/definitions/ResponseDto"
 StatementServiceAdviceDTOCollection: 
  description: "Collection of entries."
  type: "object"
  properties:
   data:
    $ref: "#/definitions/AdviceResponse"
   messages:
    $ref: "#/definitions/ResponseDto"
 ReportResponse: 
   type: object
 #swift changes begin
 MessageOutDTO:
  description: "SWIFT / CAMT message"
  type: object
  properties:
   id:
    type: string
   branch:
    type: string
   branchDate:
    type: string
   message:
    type: string
   msgType:
    type: string
   parentReferenceNo:
    type: string
   referenceNo:
    type: string
   virtualAccountNo:
    type: string
   makerId:
    type: string
   makerDtStamp:
    type: string
    format: date
   virtualEntityId:
    description: Virtual Entity id for accounts
    type: string
 MessageOutDTOCollection:
  description: "Collection of SWIFT / CAMT messages."
  type: object
  properties:
   data:
    type: array
    items:
     $ref: "#/definitions/MessageOutDTO"
   messages:
    $ref: "#/definitions/ResponseDto"
 #swift changes end