swagger: "2.0"
info:
 description: "This service is used to generate individual and consolidated account statement." 
 version: "1.0.0"
 title: "obvam-statement-services Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "accountStatementService"
   description: "This service is used to generate individual and consolidated account statement."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../obvam-statement-services

 /service/accStatement:
  post:
   tags:
    - "accountStatementService"
   summary: "Get all valid obvam-statement-services."
   description:  "Get all valid obvam-statement-services. This endpoints will be used to Get all valid obvam-statement-services maintenance records."
   operationId: "generateStatement"
   parameters:
    - name: sourceCode
      description: "Source from which request is initiated"
      in: header     
      required: true
      type: string
    - name: "statementInDTO" 
      in: "body" 
      description: "Request body contains data required to create a new obvam-statement-services." 
      required: true
      schema:
       $ref: "#/definitions/StatementInDTO"
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/StatementAdviceDTOCollection"
    400:
     description: "Bad request error, the server is unable to process the request"
    401:
     description: "Unauthorized request error, invalid credentials"
    403:
     description: "Request denied, no permission to access the request"
    405:
     description: "Request denied, invalid input"
    500:
     description: "Internal server error"
