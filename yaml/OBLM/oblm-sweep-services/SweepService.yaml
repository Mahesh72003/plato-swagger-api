  /sweepservice/adhoc/{id}/reject:
   patch:
    tags:
     - "adhocsweep"
    summary: "Reject the structure by given ID."
    description:  "Reject the structure identified by given ID."
    operationId: "rejectRecord"
    parameters:
     - name: "id"
       in: "path"
       description: "Key of the structure maintenance"
       required: true
       type: "string"
     - name: "rejectDTO"
       in: "body"
       description: Request body contain structure and Modification no of structure maintenance  which need to be closed
       required: true
       schema:
        $ref: "#/definitions/KeyDto"
    responses:
     200:
      description: "Successful operation."
      schema:
       $ref: "#/definitions/ResponseDtoWrapper"
     400:
      description: "Malformed syntax."
     401:
      description: "Request does not have sufficient credentials."
     403:
      description: "Request is not authorized."
     500:
      description: "Internal error"
  /sweepservice/adhoc/{id}/approve:
