        description: ''
      structureMasterId:
        type: string
        description: ''
      accountNumber:
        type: string
        description: ''
      branchCode:
        type: string
        description: ''
      batchDataId:
        type: string
        description: ''
      accountCurrency:
        type: string
        description: ''         
      instructionId:
        type: string
        description: ''
      frequencyId:
        type: string
        description: ''
      lastSuccessfulSweepDate:
        type: string
        format: date
        description: ''
      fromDate:
        description: "starting Date"
