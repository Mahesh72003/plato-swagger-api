        in: body
        description: Request Body that contains data required for running a sweep batch
        required: true
        schema:
          $ref: '#/definitions/LmsSweepStructuresDTO'
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: URL of newly created sweepmaster data
