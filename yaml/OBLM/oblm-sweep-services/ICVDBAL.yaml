  description: "IcAccntResponseDTO."
  type: "object"
  properties:
   warnings:
    description: "Warning Code List"
    type: "array"
    items:
     $ref: "#/definitions/WarningCodeDTO"
   errors:
    description: "Error Code List"
    type: "array"
    items:
