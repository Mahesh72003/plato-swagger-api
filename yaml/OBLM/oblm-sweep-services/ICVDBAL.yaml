swagger: "2.0"
info:
 description: "IC Input Service." 
 version: "1.0.0"
 title: "IC Input Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "icInput"
   description: "This Service is used to save and IC Inputs from external services"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../intRule

 /intInput/vdBalLM:
  post:
   tags:
    - "vdBalLM"
   summary: "Save and Auth VD Bal"
   description: "Save and Auth VD Bal .."
   operationId: "saveVdBal"
   parameters:
    - name: "vdBal" 
      in: "body" 
      description: "Request Body that contains data required for saving VD bal " 
      required: true
      schema:
       $ref: "#/definitions/VDBalDetailsDTO"
    - name: "branchCode"
      in: "header"
      description: "Transaction Branch"
      required: true
      type: "string"
    - name: "userId"
      in: "header"
      description: "User ID"
      required: true
      type: "string"
    - name: "source"
      in: "header"
      description: "Source Code"
      required: true
      type: "string"
    - name: "destAppId"
      in: "header"
      description: "Application ID"
      required: true
      type: "string"
    - name: "checkerId"
      in: "header"
      description: "Checker ID"
      required: true
      type: "string"
   responses:
    200: 
     description: "Returns message of succes or failure " 
     schema:
       $ref: "#/definitions/VDBalResponseDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /intInput/icAccnt:
  post:
   tags:
    - "icAccnt"
   summary: "Save and Auth IC Account"
   description: "Save and Auth IC Account"
   operationId: "saveIcAccnt"
   parameters:
    - name: "vdBal" 
      in: "body" 
      description: "Request Body that contains data required for saving VD bal " 
      required: true
      schema:
       $ref: "#/definitions/IcAccntDetailsDTO"
    - name: "branchCode"
      in: "header"
      description: "Transaction Branch"
      required: true
      type: "string"
    - name: "userId"
      in: "header"
      description: "User ID"
      required: true
      type: "string"
    - name: "source"
      in: "header"
      description: "Source Code"
      required: true
      type: "string"
    - name: "destAppId"
      in: "header"
      description: "Application ID"
      required: true
      type: "string"
    - name: "checkerId"
      in: "header"
      description: "Checker ID"
      required: true
      type: "string"
   responses:
    200: 
     description: "Returns message of succes or failure " 
     schema:
       $ref: "#/definitions/IcAccntResponseDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
    
