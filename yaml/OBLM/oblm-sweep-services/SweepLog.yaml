swagger: '2.0'
info:
  description: This is a sample server sweepmonitor server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: Sweep Monitor
host: api-plato.us.oracle.com:8080
basePath: /api/1.0
consumes:
- application/json
- application/xml
produces:
- application/json
- application/xml
tags:
- name: SweepMonitorAPI
  description: API for sweepmonitor Operations
schemes:
- https
paths:
  /sweepmonitor/modifySweepLog:
    post:
      tags:
      - sweepmonitor
      summary: Update an existing sweep log data.
      description: Update an existing sweep log data.
      operationId: modifySweepLog
      parameters:
      - name: sweepLog
        in: body
        description: Request Body that contains data required for updating an existing sweepLog
        required: true
        schema:
          $ref: '#/definitions/LmsTbSweepLogDTO'
      responses:
        200:
          description: Returns updated sweep log
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /sweepmonitor/modifySweepStatus:
    post:
      tags:
      - sweepmonitor
      summary: Update list of existing sweep log data.
      description: Update list of existing sweep log data.
      operationId: modifySweepStatus
      parameters:
      - name: sweepLogList
        in: body
        description: Request Body that contains list of data required for updating an existing sweepLog
        required: true
        schema:
           $ref: '#/definitions/LmsTbSweepLogCollection'
      responses:
        200:
          description: Returns updated sweep log
          schema:
            type: array
            items:
             $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /sweepmonitor/authSweepStatus:
    post:
      tags:
      - sweepmonitor
      summary: Update list of existing sweep log data.
      description: Update list of existing sweep log data.
      operationId: authSweepStatus
      parameters:
      - name: sweepLogList
        in: body
        description: Request Body that contains list of data required for updating an existing sweepLog
        required: true
        schema:
           $ref: '#/definitions/LmsTbSweepLogCollection'
      responses:
        200:
          description: Returns updated sweep log
          schema:
            type: array
            items:
             $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error          
  /sweepmonitor:
    get:
      tags:
      - sweepmonitor
      summary: Get all valid sweepmonitor.
      description: Get all valid sweepmonitor. This endpoints will be used to Get all valid sweepmonitor maintenance records.
      operationId: getAll
      parameters:
      - name: includecloseandunauth
        in: query
        description: includecloseandunauth need to be set to fetch summary record, defult value is false
        required: false
        type: boolean
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      - name: executionId
        in: query
        required: false
        type: string
      - name: interfaceMasterId
        in: query
        required: false
        type: string
      - name: sweepId
        in: query
        required: false
        type: string
      - name: bookDateFrom
        in: query
        required: false
        type: string
      - name: bookDateTo
        in: query 
        required: false
        type: string
      - name: valueDateFrom
        in: query
        required: false
        type: string
      - name: valueDateTo
        in: query
        required: false
        type: string
      - name: customerId
        in: query
        required: false
        type: string
      - name: structureId
        in: query
        required: false
        type: string
      - name: filterBy
        in: query
        required: false
        type: string
      - name: toCcy
        in: query
        required: false
        type: string
      - name: crossCcy
        in: query
        required: false
        type: boolean
      - name: fromAccount
        in: query
        required: false
        type: string
      - name: toAccount
        in: query
        required: false
        type: string        
      - name: isReverseSweep
        in: query
        required: false
        type: string
      - name: extSysRefId
        in: query
        required: false
        type: string 
      - name: isExtSysFilter
        in: query
        description: isExtSysFilter need to be set to fetch non null isExtSysFilter
        required: false
        type: string
      - name: onlyLinkedCustomers
        in: query
        description: onlyLinkedCustomers need to be set to fetch sweep log based on only Linked Customers
        required: false
        type: string           
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/LmsTbSweepLogCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    post:
      tags:
      - sweepmonitor
      summary: Add new data for sweep monitor.
      description: Adds a new sweep monitor. Add additional information here for this endpoint.
      operationId: save
      parameters:
      - name: sweepLogDTO
        in: body
        description: Request Body that contains data required for creating a new sweep monitor
        required: true
        schema:
          $ref: '#/definitions/LmsTbSweepLogDTO'
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: URL of newly created sweep monitor data
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /sweepmonitor/{id}:
    put:
      tags:
      - sweepmonitor
      summary: Update an existing sweep log data.
      description: Update an existing sweep log data.
      operationId: modifyRecord
      parameters:
      - name: id
        in: path
        description: key of the sweep log data
        required: true
        type: string
      - name: sweepLog
        in: body
        description: Request Body that contains data required for updating an existing sweepLog
        required: true
        schema:
          $ref: '#/definitions/LmsTbSweepLogDTO'
      responses:
        200:
          description: Returns updated sweep log
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /sweepmonitor/pendingsweeps:
    get:
      tags:
      - sweepmonitor
      summary: Get all pending sweep logs.
      description: Get all pending sweep logs. This endpoints will be used to Get all pending sweep records.
      operationId: getPendingSweeps
      responses:
        201:
          description: Returns message of success or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/LmsTbSweepLogCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error        
  /sweepmonitor/eod-validation:
    get:
      tags:
      - sweepmonitor
      summary: for a given branch and branch date, validates whether sweep log contains pending sweeps.
      description: for a given branch and branch date, validates whether sweep log contains pending sweeps.
      operationId: validateBranchForEod
      parameters:
      - name: branchCode
        in: query
        description: branch code to validate sweeps
        required: true
        minLength: 3
        maxLength: 4
        type: string
      responses:
        200:
          description: Returns true or false
          headers:
            Location:
              description: ''
              type: string
          
          schema:
            type: boolean
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /sweepmonitor/sweepValidation:
    get:
      tags:
      - sweepmonitor
      summary: for a given account, check sweep in-progress for that day
      description: for a given account, check sweep in-progress for that day
      operationId: validateSweepCheck
      parameters:
      - name: accountNumber
        in: query
        description: account number to validate sweep check
        required: true
        type: string
      - name: messageLogTime
        in: query
        description: messageLogTime to validate sweep check
        required: true
        type: string
      responses:
        200:
          description: Returns true or false
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/SweepCheckResponseDTO'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
     
