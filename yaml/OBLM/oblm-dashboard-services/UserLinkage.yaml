definitions:
 LmmTmUserLinkageMasterDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     userId:
      type: string
      description: ""
     LmmTmUserCustomersDTO:
      type: array
      items:
       $ref: '#/definitions/LmmTmUserCustomersDTO'
    required:
     - userId
 LmmTmUserCustomersDTO:
  type: object
  properties:
     customerId:
      type: string
      description: ""
     id:
      type: string
      description: ""
     userLinkageMasterId:
      type: string
      description: ""
  required:
   - customerId
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 LmmTmUserLinkageMasterCollection: 
  description: "Collection of userlinkage."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/LmmTmUserLinkageMasterDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 LmmTmUserLinkageMasterWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/LmmTmUserLinkageMasterDTO"
 LmmTvRmlinkageDTO:
  type: object
  properties:
   customerId:
    type: string
   customerName:
    type: string
 LmmTvRmlinkageCollection:
   type: object
   properties:
    userId:
     type: string
    userName:
     type: string
    data: 
     type: array
     items:
       $ref: "#/definitions/LmmTvRmlinkageDTO"
