swagger: "2.0"
info:
 description: "This is a sample server rmlinkage server." 
 version: "1.0.0"
 title: "rmlinkage Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "rmlinkage"
   description: " "
schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../rmlinkage

 /rmlinkage:
  post:
   tags:
    - "rmlinkage"
   summary: "Adds a new rmlinkage."
   description: "Adds a new rmlinkage. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "rmlinkage" 
      in: "body" 
      description: "Request Body that contains data required for creating a new rmlinkage" 
      required: true
      schema:
       $ref: "#/definitions/LmmTmUserLinkageMasterDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created rmlinkage" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "rmlinkage"
   summary: "Get all valid rmlinkage."
   description:  "Get all valid rmlinkage. This endpoints will be used to Get all valid rmlinkage maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: userId
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/LmmTmUserLinkageMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
# path for getByuserid from table view 
 /rmlinkage/getbyuserid/{userid}:
  get:
   tags:
    - "rmlinkage"
   summary: "Get all valid rmlinkage customer."
   description:  "Get all valid rmlinkage customer. This endpoints will be used to Get all valid rmlinkage customer."
   operationId: "getByUserId"
   parameters:
   - name: "userid"
     in: "path"
     description: "UserId of the user that needs to be fetched"
     required: true
     type: "string"
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/LmmTvRmlinkageCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"     

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../rmlinkage/xxx
#   DELETE    .../rmlinkage/xxx
#   GET       .../rmlinkage/xxx
#   GET       .../rmlinkage/xxx?version=latestrecord
#   GET       .../rmlinkage/xxx?version=1

 /rmlinkage/{id}:
  put:
   tags:
    - "rmlinkage"
   summary: "Update an existing rmlinkage."
   description:  "Update an existing rmlinkage."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the rmlinkage Maintenance"
      required: true
      type: "string"
    - name: "rmlinkage"
      in: "body"
      description: "Request Body that contains data required for updating an existing rmlinkage"
      required: true
      schema:
       $ref: "#/definitions/LmmTmUserLinkageMasterDTO"
   responses:
    200:
     description: "Returns updated rmlinkage"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "rmlinkage"
   summary: "Retrieves the rmlinkage by ID."
   description:  "Retrieves the rmlinkage by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the rmlinkage based on given id."
     schema:
      $ref: "#/definitions/LmmTmUserLinkageMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "rmlinkage"
   summary: "Deletes the rmlinkage identified by given ID."
   description:  "Deletes the rmlinkage identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the rmlinkage maintenance"
      required: true
      type: "string"
    - name: "rmlinkage"
      in: "body"
      description: Request body contain rmlinkage and Modification no of rmlinkage maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../rmlinkage/xxx/approve

 /rmlinkage/{id}/approve:
  patch:
   tags:
    - "rmlinkage"
   summary: "Authorize the rmlinkage by given ID."
   description:  "Authorize the rmlinkage identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the rmlinkage maintenance"
      required: true
      type: "string"
    - name: "rmlinkage"
      in: "body"
      description: Request body contain rmlinkage and Modification no of rmlinkage maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../rmlinkage/xxx/close
 /rmlinkage/{id}/close:
  patch:
   tags:
    - "rmlinkage"
   summary: "Close the rmlinkage by given ID."
   description:  "Close the rmlinkage identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the rmlinkage maintenance"
      required: true
      type: "string"
    - name: "rmlinkage"
      in: "body"
      description: Request body contain rmlinkage and Modification no of rmlinkage maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../rmlinkage/xxx/reopen

 /rmlinkage/{id}/reopen:
  patch:
   tags:
    - "rmlinkage"
   summary: "reopen the rmlinkage by given ID."
   description:  "reopen the rmlinkage identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the rmlinkage maintenance"
      required: true
      type: "string"
    - name: "rmlinkage"
      in: "body"
      description: Request body contain rmlinkage and Modification no of rmlinkage maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supprorted http methods GET
#
# path examples----
#   GET       .../rmlinkage/xxx/unauthorized

 /rmlinkage/{id}/unauthorized:
  get:
   tags:
    - "rmlinkage"
   summary: "Retrives the rmlinkage by given ID."
   description:  "Retrives the rmlinkage identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
