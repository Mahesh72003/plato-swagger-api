swagger: "2.0"
info:
  description: "This is a sample  server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Dashboard Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
- "application/json"
- "application/xml"
produces:
- "application/json"
- "application/xml"
tags:
- name: "CurrencyBalanceAPI"
  description: "API for Currency Balances Operations"

schemes:
- "https"

paths:
  /currencybalance:
    get:
      tags:
      - "CurrencyBalanceAPI"
      summary: "Retrieves the CurrencyBalance by ID."
      description:  "Retrieves the CurrencyBalance by ID. Add additional information here for the this endpoint."
      operationId: "getData"
      parameters:
      - name: "customerId"
        in: "query"
        description: "Customer Id(s) for which data needs to be fetched"
        required: false
        type: "string"
      - name: "structureId"
        in: "query"
        description: "Structure Id(s) for which data needs to be fetched"
        required: false
        type: "string"
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      responses:
        200:
          description: "Returns the currency balances based on given id."
          schema:
            $ref: "#/definitions/LmdTbCurrencyBalanceCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
definitions:
  LmdTbCurrencyBalanceDTO:
    description: "CurrencyBalance DTO"
    type: "object"
    allOf:
    - $ref: '#/definitions/GenericDto'
    - type: object
      properties:
        structureId:
          description: "structure id in Currency Balance"
          type: string
        valueDate:
          description: "value date in Currency Balance"
          type: string
          format: date
        accountNumber:
          description: "account number in Currency Balance"
          type: string
        branchCode:
          description: "branch Code in Currency Balance"
          type: string
        availableBalance:
          description: "Available Balance in Currency Balance"
          type: integer
        currencyCode:
          description: "Currency code in Customer Balance"
          type: string
        customerId:
          description: "Customer Id for Currency Balance"
          type: string
        userId:
          description: "User Id  of the Currency Balance"
          type: string
      required:
      - id
  ResponseDto:
    type: object
    properties:
      id:
        type: string
      status:
        type: string
      codes:
        type: array
        items:
          $ref: '#/definitions/ResponseCode'
      requestId:
        type: string
  ResponseCode:
    type: object
    properties:
      Code:
        type: string
      Desc:
        type: string
      Type:
        type: string
      Language:
        type: string
      args:
        type: array
        items:
          type: object
      arg:
        type: string
  GenericDto:
    allOf:
    - type: object
      discriminator: resource_type
  LmdTbCurrencyBalanceCollection:
    description: Collection of Currency Balances
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/LmdTbCurrencyBalanceDTO'
      paging:
        $ref: '#/definitions/PagingDto'
  PagingDto:
    type: object
    properties:
      totalResults:
        type: integer
  ResponseDtoWrapper:
    type: object
    properties:
      messages:
        $ref: '#/definitions/ResponseDto'
      data:
        $ref: '#/definitions/ResponseResourceSupport'
  ResponseResourceSupport:
    type: object
  LmdTbCurrencyBalanceWrapperDTO:
    type: object
    properties:
      data:
        $ref: '#/definitions/LmdTbCurrencyBalanceDTO'
 