swagger: "2.0"
info:
  description: "This is a sample  server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)"
  version: "1.0.0"
  title: "Dashboard Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
- "application/json"
- "application/xml"
produces:
- "application/json"
- "application/xml"
tags:
- name: "InterestDetailsAPI"
  description: "API for Interest Details Operations"

schemes:
- "https"

paths:
  /interestdetails:
    post:
      tags:
      - "InterestDetailsAPI"
      summary: "Adds a new Interest Details."
      description: "Adds a new Interest Details. Add additional information here for this endpoint."
      operationId: "save"
      parameters:
      - name: "interestdetails"
        in: "body"
        description: "Request Body that contains data required for creating a new interestdetails"
        required: true
        schema:
          $ref: "#/definitions/LmdTbInterestDetailsDTO"
      responses:
        201:
          description: "Returns message of success or failure "
          headers:
            Location:
              description: "URL of newly created Interest Details"
              type: "string"
          schema:
            $ref: "#/definitions/ResponseDtoWrapper"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
    get:
      tags:
      - "InterestDetailsAPI"
      summary: "Retrieves the list of existing InterestDetails."
      description:  "Retrieves the list of existing InterestDetails. Add additional information here for the this endpoint."
      operationId: "getData"
      parameters:
      - name: customerId
        in: query
        description: fetch record according to customerId
        required: false
        type: string
      - name: structureId
        in: query
        description: fetch record according to structureId
        required: false
        type: string
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      responses:
        200:
          description: "Successful performs the operation"
          schema:
            $ref: "#/definitions/InterestDetailsCollection"
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        500:
          description: "Internal error"
definitions:
  InterestDetailsDTO:
    description: "InterestDetails DTO for view"
    type: "object"
    allOf:
    - $ref: '#/definitions/GenericDto'
    - type: object
      properties:
        interestEarned:
          description: "interest earned"
          type: integer
        interestPaid:
          description: "interest paid"
          type: integer
        customerId:
          description: "customer Id"
          type: string
        month:
          description: "month"
          type: string
        structureId:
          description: "structureId"
          type: string
  LmdTbInterestDetailsDTO:
    description: "InterestDetails DTO for saving the data"
    type: "object"
    allOf:
    - $ref: '#/definitions/GenericDto'
    - type: object
      properties:
        accountNumber:
          description: "accountNumber in Interest Details"
          type: string
        customerId:
          description: "Customer Id for Interest Details"
          type: string
        branchCode:
          description: "branchCode  of the Interest Details"
          type: string
        currencyCode:
          description: "currencyCode  of the Interest Details"
          type: string
        month:
          description: "month  of the Interest Details"
          type: string
        structureId:
          description: "structureId  of the Interest Details"
          type: string
        interestEarned:
          description: "interest earned in Interest Details"
          type: integer
        interestPaid:
          description: "interest paid  of the Interest Details"
          type: integer
  ResponseDto:
    type: object
    properties:
      id:
        type: string
      status:
        type: string
      codes:
        type: array
        items:
          $ref: '#/definitions/ResponseCode'
      requestId:
        type: string
  ResponseCode:
    type: object
    properties:
      Code:
        type: string
      Desc:
        type: string
      Type:
        type: string
      Language:
        type: string
      args:
        type: array
        items:
          type: object
      arg:
        type: string
  GenericDto:
    allOf:
    - type: object
      discriminator: resource_type
  InterestDetailsCollection:
    description: Collection of InterestDetails
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/InterestDetailsDTO'
      paging:
        $ref: '#/definitions/PagingDto'
  PagingDto:
    type: object
    properties:
      totalResults:
        type: integer
  ResponseDtoWrapper:
    type: object
    properties:
      messages:
        $ref: '#/definitions/ResponseDto'
      data:
        $ref: '#/definitions/ResponseResourceSupport'
  ResponseResourceSupport:
    type: object
  LmdTbInterestDetailsWrapperDTO:
    type: object
    properties:
      data:
        $ref: '#/definitions/LmdTbInterestDetailsDTO'      
 