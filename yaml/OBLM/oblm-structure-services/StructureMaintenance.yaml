        in: query
        description: customerId need to be set to fetch structures for particular customer
        required: false
        type: string
      - name: headerBranchCode
        in: query
        description: headerBranchCode need to be set to fetch structures for particular Branch code
        required: false
        type: string  
      - name: structureId
        in: query
        description: structureId need to be set to fetch structures for particular customer
        required: false
        type: string
      - name: structureDescription
        in: query
        description: structureDescription need to be set to fetch structures for particular customer
        required: false
        type: string
      - name: structureType
        in: query
        description: structureType need to be set to fetch structures for particular customer
        required: false
        type: string
      - name: headerAccountNumber
        in: query
        description: headerAccountNumber need to be set to fetch structures for particular customer
        required: false
        type: string
      - name: isSimulation
        in: query
        description: isSimulation need to be set to fetch structures related to simulation
        required: false
        type: string 
      - name: structureStatus
        in: query
        description: structureStatus need to be set to fetch structures based on status
        required: false
        type: string
      - name: authStat
        in: query
        description: authStat need to be set to fetch structures based on authStat
        required: false
        type: string
      - name: recordStat
        in: query
        description: recordStat need to be set to fetch structures based on recordStat
        required: false
        type: string
      - name: accountNumber
        in: query
        description: accountNumber need to be set to fetch structures based on accountNumber
        required: false
        type: string  
      - name: isExpired
        in: query
        description: isExpired need to be set to fetch structures based on isExpired
        required: false
        type: string
      - name: isDirty
        in: query
        description: isDirty need to be set to fetch structures based on isDirty
        required: false
        type: string
      - name: onlyLinkedCustomers
        in: query
        description: onlyLinkedCustomers need to be set to fetch structures based on only Linked Customers
        required: false
        type: string        
      - name: branchCode
        in: query
        description: branchCode need to be set to fetch structures based on branchCode both in parent and child
        required: false
        type: string
      - name: multiBankFlag
        in: query
        description: multiBankFlag structures need to be set to fetch
        required: false
        type: string
      - name: interestMethod
        in: query
        description: interest method of the structure that need to be fetched
        required: false
        type: string
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/LmmTmStructureCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    post:
