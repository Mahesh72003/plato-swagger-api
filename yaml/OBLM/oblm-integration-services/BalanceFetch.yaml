swagger: '2.0'
info:
  description: This is a sample server balance server.
  version: 1.0.0
  title: Balance Service
host: api-plato.us.oracle.com:8080
basePath: /api/1.0
consumes:
- application/json
produces:
- application/json
tags:
- name: balanceFetch
  description: ''
schemes:
- https
paths:
  /balanceFetch:
    get:
      tags:
      - balanceFetch
      summary: Get all balances.
      description: Get all balances. This endpoints will be used to Get all balances.
      operationId: getAll
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/LmxTmAccountVdBalCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    post:
      tags:
      - balanceFetch
      summary: Add a new balances
      description: Adds a new balances. Add additional information here for this endpoint.
      operationId: saveRecord
      parameters:
      - name: balanceFetch
        in: body
        description: Request Body that contains data required for creating a new balances
        required: true
        schema:
          $ref: '#/definitions/LmxTmAccountVdBalDTO'
      responses:
        201:
          description: 'Returns message of succes or failure '
          headers:
            Location:
              description: URL of newly created balances
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /balanceFetch/accounts:
    post:
      tags:
      - balanceFetch
      summary: Retrieves the balance by ID.
      description: Retrieves the balance by ID.
      operationId: getByAccounts
      parameters:
      - name: balanceRequest
        in: body
        description: Request Body that contains data required for fetching account balances
        required: true
        schema:
          $ref: '#/definitions/LmxTmAccountVdBalCollection'
      responses:
        200:
          description: Returns the balance based on given id.
          schema:
            $ref: '#/definitions/LmxTmAccountVdBalCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /balanceFetch/valueDate:
    post:
      tags:
      - balanceFetch
      summary: Retrieves the accoubt by ValueDate.
      description: Retrieves the accoubt by ValueDate.
      operationId: getByValueDate
      parameters:
      - name: balanceRequest
        in: body
        description: Request Body that contains data required for fetching account 
        required: true
        schema:
          $ref: '#/definitions/LmxTmAccountVdBalCollection'
      responses:
        200:
          description: Returns the balance based on given id.
          schema:
            $ref: '#/definitions/LmxTmAccountVdBalCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /balanceFetch/getByAcctNoValueDate:
    post:
      tags:
      - balanceFetch
      summary: Retrieves the account by AccountNo and ValueDate.
      description: Retrieves the accoubt by AccountNo and ValueDate.
      operationId: getByAcctNoValueDate
      parameters:
      - name: balanceRequest
        in: body
        description: Request Body that contains data required for fetching account 
        required: true
        schema:
          $ref: '#/definitions/LmxTmAccountVdBalCollection'
      responses:
        200:
          description: Returns the balance based on given id.
          schema:
            $ref: '#/definitions/LmxTmAccountVdBalCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error        
  /balanceFetch/{id}:
    put:
      tags:
      - balanceFetch
      summary: Update a balance.
      description: Update a balance.
      operationId: modifyRecord
      parameters:
      - name: id
        in: path
        description: key of the balance
        required: true
        type: string
      - name: balanceFetch
        in: body
        description: Request Body that contains data required for updating balanes
        required: true
        schema:
          $ref: '#/definitions/LmxTmAccountVdBalDTO'
      responses:
        200:
          description: Returns updated bank
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
    get:
      tags:
      - balanceFetch
      summary: Retrieves the balance by ID.
      description: Retrieves the balance by ID.
      operationId: getById
      parameters:
      - name: id
        in: path
        description: Id of the user that needs to be fetched
        required: true
        type: string
      - name: version
        in: query
        description: Id of the user that needs to be fetched
        required: false
        type: string
      responses:
        200:
          description: Returns the balance based on given id.
          schema:
            $ref: '#/definitions/LmxTmAccountVdBalWrapperDTO'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error
  /balanceFetch/getBySourceRef/{sourceRef}:
    get:
      tags:
      - balanceFetch
      summary: Retrieves the balance by ID.
      description: Retrieves the balance by ID.
      operationId: getBySourceRef
      parameters:
      - name: sourceRef
        in: path
        description: Id of the user that needs to be fetched
        required: true
        type: string
      responses:
        200:
          description: Returns the balance based on given id.
          schema:
            $ref: '#/definitions/LmxTmAccountVdBalCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        500:
          description: Internal error          
  /balanceFetch/getVDBalance:
    post:
      tags:
      - getVDBalance
      summary: Get all valid value dated balances for the specified  account.
      description: Get all valid value dated balances for the specified  account and date combinations.
      operationId: getVDBalance
      parameters:
      - name: vdBalanceDetails
        in: body
        description: Request Body that contains data required for fetching balances of the speficied  accounts
        required: true
        schema:
          $ref: '#/definitions/VDBalanceRequestDTO'
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/VDBalanceDTO'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /balanceFetch/availableBalance:
    get:
      tags:
      - getAvailableBalance
      summary: Get availabgle balance for the specified  query params.
      description: Get all valid value dated balances for the specified  account and date combinations.
      operationId: getAvailableBalance
      parameters:
      - name: accountNumber
        in: query
        description: Account Number
        required: true
        type: string
      - name: branchCode
        in: query
        description: Branch Code
        required: true
        type: string
      - name: valueDate
        in: query
        description: Branch Code
        required: true
        type: string
      responses:
        200:
          description: Returns message of success or failure
          schema:
            $ref: '#/definitions/LmxTmAccountVdBalDTO'
        204:
          description: There is no result for the query params
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error          
