swagger: "2.0"
info:
 description: "This is a sample server withholdingtax server." 
 version: "1.0.0"
 title: "withholdingtax Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "withholdingtax"
   description: ""

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../withholdingtax

 /withholdingtax:
  post:
   tags:
    - "withholdingtax"
   summary: "Adds a new withholdingtax."
   description: "Adds a new withholdingtax. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "withholdingtax" 
      in: "body" 
      description: "Request Body that contains data required for creating a new withholdingtax" 
      required: true
      schema:
       $ref: "#/definitions/LmxTmInterestmapDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created withholdingtax" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "withholdingtax"
   summary: "Get all valid withholdingtax."
   description:  "Get all valid withholdingtax. This endpoints will be used to Get all valid withholdingtax maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/LmxTmInterestmapCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../withholdingtax/xxx
#   DELETE    .../withholdingtax/xxx
#   GET       .../withholdingtax/xxx
#   GET       .../withholdingtax/xxx?version=latestrecord
#   GET       .../withholdingtax/xxx?version=1

 /withholdingtax/{id}:
  put:
   tags:
    - "withholdingtax"
   summary: "Update an existing withholdingtax."
   description:  "Update an existing withholdingtax."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the withholdingtax Maintenance"
      required: true
      type: "string"
    - name: "withholdingtax"
      in: "body"
      description: "Request Body that contains data required for updating an existing withholdingtax"
      required: true
      schema:
       $ref: "#/definitions/LmxTmInterestmapDTO"
   responses:
    200:
     description: "Returns updated withholdingtax"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "withholdingtax"
   summary: "Retrieves the withholdingtax by ID."
   description:  "Retrieves the withholdingtax by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the withholdingtax based on given id."
     schema:
      $ref: "#/definitions/LmxTmInterestmapWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "withholdingtax"
   summary: "Deletes the withholdingtax identified by given ID."
   description:  "Deletes the withholdingtax identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the withholdingtax maintenance"
      required: true
      type: "string"
    - name: "withholdingtax"
      in: "body"
      description: Request body contain withholdingtax and Modification no of withholdingtax maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to Authorize existing record.
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../withholdingtax/xxx/approve

 /withholdingtax/{id}/approve:
  patch:
   tags:
    - "withholdingtax"
   summary: "Authorize the withholdingtax by given ID."
   description:  "Authorize the withholdingtax identified by given ID."
   operationId: "authorize"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the withholdingtax maintenance"
      required: true
      type: "string"
    - name: "withholdingtax"
      in: "body"
      description: Request body contain withholdingtax and Modification no of withholdingtax maintenance which need to be approved"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to close existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../withholdingtax/xxx/close
 /withholdingtax/{id}/close:
  patch:
   tags:
    - "withholdingtax"
   summary: "Close the withholdingtax by given ID."
   description:  "Close the withholdingtax identified by given ID."
   operationId: "closeRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the withholdingtax maintenance"
      required: true
      type: "string"
    - name: "withholdingtax"
      in: "body"
      description: Request body contain withholdingtax and Modification no of withholdingtax maintenance which need to be closed"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to reopen existing record
#
#  supprorted http methods PATCH
#
# path examples----
#   PATCH       .../withholdingtax/xxx/reopen

 /withholdingtax/{id}/reopen:
  patch:
   tags:
    - "withholdingtax"
   summary: "reopen the withholdingtax by given ID."
   description:  "reopen the withholdingtax identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the withholdingtax maintenance"
      required: true
      type: "string"
    - name: "withholdingtax"
      in: "body"
      description: Request body contain withholdingtax and Modification no of withholdingtax maintenance which need to be reopen"
      required: true
      schema:
       $ref: "#/definitions/KeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to get all unauthorized records
#
#  supprorted http methods GET
#
# path examples----
#   GET       .../withholdingtax/xxx/unauthorized

 /withholdingtax/{id}/unauthorized:
  get:
   tags:
    - "withholdingtax"
   summary: "Retrives the withholdingtax by given ID."
   description:  "Retrives the withholdingtax identified by given ID."
   operationId: "authQuery"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the withholdingtax based on given id."
     schema:
       $ref: "#/definitions/LmxTmInterestmapCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

# path to  history record for remitterid
#
#  supprorted http methods GETS
#
# path examples----
