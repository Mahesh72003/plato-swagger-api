     description: "Internal error"
 /withholdingtax/buildadvantageinterestpool/{todayDate}: 
  post:
   tags:
    - "withholdingtax"
   summary: "Save the total child amount in ICTBLmChildSumInt table."
   description:  "Save the total child amount in ICTBLmChildSumInt table."
   operationId: "buildAdvantageInterestPool"
   parameters:
    - name: "todayDate"
      in: "path"
      description: "Today Date of the header branch"
      required: true
      type: "string"   
    - name: "LmmTmStructureDto" 
      in: "body" 
      description: "Request Body that contains StructureMasterDTO" 
      required: true
      schema:
       $ref: "#/definitions/LmmTmStructureDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created withholdingtax" 
       type: "string"
     schema:
      $ref: "#/definitions/ICTBLmChildSumIntDTOCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"     
