swagger: "2.0"
info:
  description: 'IC Input Service.'
  version: 1.0.0
  title: 'IC Input Service'
host: 'api-plato.us.oracle.com:8080'
basePath: /api/1.0
consumes:
  - application/json
produces:
  - application/json
tags:
  -
    name: icInput
    description: 'This Service is used to save IC Inputs from external services'
schemes:
  - https
paths:
  /rateBrnDef/rateCode:
    get:
      tags:
        - rateBrnDef
      summary: 'Get all rateCodes'
      description: 'Get all rateCodes'
      operationId: fetchRateCode
      responses:
        '200':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/RateCodesDTO'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'
  /vdBalMaster:
    post:
      tags:
        - vdBalMaster
      summary: 'Save VD Bal'
      description: 'Save VD Bal ..'
      operationId: saveVdBal
      parameters:
        -
          name: vdBal
          in: body
          description: 'Request Body that contains data required for saving VD bal '
          required: true
          schema:
            $ref: '#/definitions/VDBalMasterDTO'
      responses:
        '201':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/VDBalResponseDTO'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'
  /accrLiqDetails:
    post:
      tags:
        - vdBalMaster
      summary: 'accrual liquidation details'
      description: 'accrual liquidation details'
      operationId: accrLiqDetails
      parameters:
        -
          name: accrLiqDetails
          in: body
          description: 'Request Body that contains data required for accrual liquidation details '
          required: true
          schema:
            $ref: '#/definitions/AccrLiqDetailsDTO'
      responses:
        '201':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/AccrLiqDetailsResponseDTO'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'
  /vdBal:
    get:
      tags:
        - vdBal
      summary: 'Get VD Bal'
      description: 'Get VD Bal'
      operationId: getVdBal
      parameters:
        -
          name: brn
          in: query
          description: 'Fetch Based on Branch Code, defult value is true'
          required: true
          type: string
        -
          name: acc
          in: query
          description: 'Fetch Based on Account Number, defult value is true'
          required: true
          type: string
        -
          name: valDt
          in: query
          description: 'Fetch Based on Value Date, defult value is true'
          required: true
          type: string
        -
          name: ccy
          in: query
          description: 'Fetch Based on Currency, defult value is true'
          required: true
          type: string
      responses:
        '200':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/VDBalDetailsDTO'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'
