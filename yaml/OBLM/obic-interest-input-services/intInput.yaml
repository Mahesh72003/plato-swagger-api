    get:
      tags:
        - accruedAmt
      summary: 'Get Accured Amount'
      description: 'Get Accured Amount'
      operationId: getAccruedAmt
      parameters:
        -
          name: brn
          in: query
          description: 'Fetch Based on Branch Code, defult value is true'
          required: true
          type: string
        -
          name: acc
          in: query
          description: 'Fetch Based on Account Number, defult value is true'
          required: true
          type: string
        -
          name: source
          in: query
          description: 'Fetch Based on Account Number, defult value is true'
          required: true
          type: string
      responses:
        '200':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/AccruedAmtResponseDTO'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'
  /icAccntMaster:
    post:
      tags:
        - icAccntMaster
      summary: 'Save and Auth IC Accounts'
      description: 'Save and Auth IC Accounts'
      operationId: saveIcAccnts
      parameters:
        -
          name: icAccnt
          in: body
          description: 'Request Body that contains data required for saving IC Accnt '
          required: true
          schema:
            $ref: '#/definitions/IcAccntMasterDTO'
      responses:
        '201':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/IcAccntResponseDTO'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'
  /icAccntModify:
    post:
      tags:
        - icAccntMaster
      summary: 'modify IC Accounts'
      description: 'modify IC Accounts'
      operationId: modifyIcAccnts
      parameters:
        -
          name: icAccnt
          in: body
          description: 'Request Body that contains data required for modifying IC Accnt '
          required: true
          schema:
            $ref: '#/definitions/IcAccntModifyDTO'
      responses:
        '201':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/IcAccntResponseDTO'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'
  /icAccntMaster/recState:
    post:
      tags:
        - icAccntMaster
      summary: 'close account'
      description: 'update recordState to C conditions met'
      operationId: closeAccnt
      parameters:
        -
          name: accDetails
          in: body
          description: 'source, sourceBranch, sourceAcc, currency'
          required: true
          schema:
            $ref: '#/definitions/SrcBrnAccCcyDTO'
      responses:
        '201':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/GenericResponseDTO'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'
  /icAccnt/intliqd:
    post:
      tags:
        - icAccntMaster
      summary: 'account close pre-process'
      description: 'IC account close pre-processing: maintQueue population'
      operationId: prepareAccountClose
      parameters:
        -
          name: maintQueueDetails
          in: body
          description: 'Request Body that contains data required for maintQueue population'
          required: true
          schema:
            $ref: '#/definitions/maitQueuDetailsDTO'
      responses:
        '201':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/GenericResponseDTO'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'      



          
  /icOtherBalMaster:
    post:
      tags:
