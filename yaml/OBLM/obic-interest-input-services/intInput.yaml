definitions:
  maitQueuDetailsDTO:
    type: object
    properties:
      branch:
        type: string
        minLength: 3
        maxLength: 3
      acc:
        type: string
        minLength: 1
        maxLength: 20
      liqDate:
        type: string
        description: 'liquidationDate'        
  SrcBrnAccCcyDTO:
    type: object
    properties:
      source:
        type: string
        minLength: 1
        maxLength: 35
      branch:
        type: string
        minLength: 3
        maxLength: 3
      acc:
        type: string
        minLength: 1
        maxLength: 20
      currency:
        type: string
        minLength: 3
        maxLength: 3
  RateCodesDTO:
    type: object
    properties:
      rateCodeList:
        description: "all rate codes"
        type: array
        items:
          type: string
  ChgSplCondnDto:
    type: object
    properties:
     brn:
      type: string
      description: ""
     acc:
      type: string
     chgProdList:
      type: array
      items:
        type: object
        properties:
          prod:
            type: string
          accPr:
            type: object
            properties:
             process:
              type: number
             waive:
              type: string
             genUca:
              type: string
             recordStat:
              type: string
             onceAuth:
              type: string
             udeCcy:
              type: string
             minAmt:
