          in: query
          description: ''
          required: false
          type: string
        -
          name: extAccGrpDesc
          in: query
          description: ''
          required: false
          type: string
        -
          name: ccyCode
          in: query
          description: ''
          required: false
          type: string
        -
          name: udeEffDt
          in: query
          description: ''
          required: false
          type: string
        -
          name: branchCode
          in: query
          description: ''
          required: false
          type: string
      responses:
        '200':
          description: 'Returns message of succes or failure '
          schema:
            $ref: '#/definitions/GenUdeValsDTOList'
        '400':
          description: 'Malformed syntax.'
        '401':
          description: 'Request does not have sufficient credentials.'
        '403':
          description: 'Request is not authorized.'
        '405':
          description: 'Invalid input'
        '500':
          description: 'Internal error'
    post:
      tags:
        - genCondnUdeVals
      summary: 'Save udevals'
      description: 'Save udeVals'
      operationId: saveUdeValues
      parameters:
        -
          name: genCondnUdeVals
          in: body
          description: 'udevals to be saved'
          required: true
