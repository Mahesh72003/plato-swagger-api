swagger: "2.0"
info:
 description: "This is a sample server loan server." 
 version: "1.0.0"
 title: "loan Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "loan"
   description: ""

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../loan

 /loan:
  post:
   tags:
    - "loan"
   summary: "Adds a new loan."
   description: "Adds a new loan. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "loan" 
      in: "body" 
      description: "Request Body that contains data required for creating a new loan" 
      required: true
      schema:
       $ref: "#/definitions/IclTbLoanDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created loan" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "loan"
   summary: "Get all valid loan."
   description:  "Get all valid loan. This endpoints will be used to Get all valid loan maintenance records."
   operationId: "getAll"
   parameters:
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: loanReference
     in: query
     description: loan reference
     required: false
     type: string
   - name: borrowingCustomerId
     in: query
     description: borrower customer ID
     required: false
     type: string
   - name: lendingCustomerId
     in: query
     description: lender customer ID
     required: false
     type: string
   - name: customerId1
     in: query
     description: customer 1 Id
     required: false
     type: string
   - name: customerId2
     in: query
     description: customer 2 ID
     required: false
     type: string
   - name: creditDisbursementAccount
     in: query
     description: credit disbursement account
     required: false
     type: string
   - name: debitDisbursementAccount
     in: query
     description: dedit disbursement account
     required: false
     type: string
   - name: debitDisbursementCurrency
     in: query
     description: debit disbursement currency
     required: false
     type: string
   - name: debitDisbursementAmount
     in: query
     description: debit amount
     required: false
     type: number
   - name: debitDisbursementAmountFrom
     in: query
     description: debit amount from
     required: false
     type: number
   - name: debitDisbursementAmountTo
     in: query
     description: debit amount to
     required: false
     type: number
   - name: iclReference
     in: query
     description: icl reference
     required: false
     type: string
   - name: disbursementDateFrom
     in: query
     description: loan date from
     required: false
     type: string
   - name: disbursementDateTo
     in: query
     description: loan date to
     required: false
     type: string
   - name: loanIcProductCode
     in: query
     description: loan IC product
     required: false
     type: string
   - name: loanMaturityDate
     in: query
     description: loan maturity date
     required: false
     type: string
   - name: loanStatus
     in: query
     description: loan status
     required: false
     type: string
   - name: loanType
     in: query
     description: loan type
     required: false
     type: string
   - name: parentCustomerId
     in: query
     description: parent customer Id
     required: false
     type: string
   - name: settlementReference
     in: query
     description: settlement reference
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/IclTbLoanCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /loan/{id}:
  get:
   tags:
    - "loan"
   summary: "Retrieves the loan by ID."
   description:  "Retrieves the loan by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns the loan based on given id."
     schema:
      $ref: "#/definitions/IclTbLoanWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  put:
   tags:
    - "loan"
   summary: "Update an existing loan."
   description:  "Update an existing loan."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the loan Maintenance"
      required: true
      type: "string"
    - name: "loan"
      in: "body"
      description: "Request Body that contains data required for updating an existing loan"
      required: true
      schema:
       $ref: "#/definitions/IclTbLoanDTO"
   responses:
    200:
     description: "Returns updated loan"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /loan/{sweepLogId}/updateLoanStatus/{loanStatus}:
  patch:
   tags:
    - "loan"
   summary: "Update existing loan status."
   description:  "Update existing loan status."
   operationId: "updateLoanStatus"
   parameters:
    - name: "sweepLogId"
      in: "path"
      description: "sweep log ID of the under which loan has created"
      required: true
      type: "string"
    - name: "loanStatus"
      in: "path"
      description: "loanStatus"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns updated loan"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /loan/{sweepLogId}/reject:
  patch:
   tags:
    - "loan"
   summary: "Reject an existing loan."
   description:  "Reject an existing loan."
   operationId: "rejectLoan"
   parameters:
    - name: "sweepLogId"
      in: "path"
      description: "sweep log ID of the loan Maintenance"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns updated loan"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /loan/{sweepLogId}/recordRepayment:
  patch:
   tags:
    - "loan"
   summary: "Record payment on an existing loan.."
   description:  "Record payment on an existing loan."
   operationId: "recordRepayment"
   parameters:
    - name: "sweepLogId"
      in: "path"
      description: "sweep log ID of the loan Maintenance"
      required: true
      type: "string"
    - name: "iclRepayLoanDTO" 
      in: "body" 
      description: "Request Body that contains data required for creating a new loan" 
      required: true
      schema:
       $ref: "#/definitions/IclRepayLoanDTO"
   responses:
    200:
     description: "Returns updated loan"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created loan" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /loan/{id}/initiateSettlement:
  post:
   tags:
    - "loan"
   summary: "initiate loan settlement."
   description: "This API initiate reverse sweep and interest payment"
   operationId: "initiateSettlement"
   parameters:
    - name: "id"
      in: "path"
      description: "sweep log ID of the loan Maintenance"
      required: true
      type: "string"
    - name: "loan" 
      in: "body" 
      description: "Request Body that contains required data for initiating a  a loan settlement" 
      required: true
      schema:
       $ref: "#/definitions/IclTbLoanDTO"
   responses:
    200:
     description: "Returns updated loan"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created loan" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /loan/{id}/updateSweepLogID/{sweepLogId}:
  patch:
   tags:
    - "loan"
   summary: "Update sweep log id."
   description: "This API initiate reverse sweep and interest payment"
   operationId: "updateSweepLogID"
   parameters:
    - name: "id"
      in: "path"
      description: "ID of the loan Maintenance"
      required: true
      type: "string"
    - name: "sweepLogId"
      in: "path"
      description: "sweep log ID of the loan Maintenance"
      required: true
      type: "string"
   responses:
    200:
     description: "Returns updated loan"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created loan" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /loan/pending/{lendingCustId}/{borrowingCustId}:
  get:
   tags:
    - "loan"
   summary: "Get pending loans for given customers"
   description:  "Get pending loans for given customers"
   operationId: "getPendingLoans"
   parameters:
    - name: "lendingCustId"
      in: "path"
      description: "lending customer ID"
      required: true
      type: "string"
    - name: "borrowingCustId"
      in: "path"
      description: "borrowing customer ID"
      required: true
      type: "string"
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/IclTbLoanListDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

