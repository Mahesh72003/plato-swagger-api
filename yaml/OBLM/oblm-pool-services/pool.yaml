swagger: '2.0'
info:
  description: This is a sample server Pool Batch server.
  version: 1.0.0
  title: pool Service
host: api-plato.us.oracle.com:8080
basePath: /api/1.0
consumes:
- application/json
produces:
- application/json
tags:
- name: pool
  description: ''
schemes:
- https
paths:
  /pool:
    post:
      tags:
      - pool
      summary: Invoking Pool Batch for Structure
      description: Invoking Pool Batch for Structure. Add additional information here for this endpoint.
      operationId: invokePoolforStructure
      parameters:
      - name: pool
        in: body
        description: Request Body that contains data required for invoking a pool batch for structure
        required: false
        schema:
          $ref: '#/definitions/LmmTmPoolStructureDTO'
      responses:
        201:
          description: Returns message of success or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /pool/{branchCode}/{jobId}:
    post:
      tags:
      - pool
      summary: Invoking Pool Batch for Branch
      description: Invoking Pool Batch for Branch. Add additional information here for this endpoint.
      operationId: invokePoolforBranchAsync
      parameters:
      - name: branchCode
        in: path
        description: Branch Code for Pool Execution
        required: true
        type: string
      - name: jobId
        in: path
        description: Branch Code for Pool Execution
        required: true
        type: string        
      responses:
        201:
          description: Returns message of success or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /pool/eod/{branchCode}/{jobId}:
    post:
      tags:
      - pool
      summary: Invoking Pool Batch for Branch
      description: Invoking Pool Batch for Branch. Add additional information here for this endpoint.
      operationId: invokePoolforBranch
      parameters:
      - name: branchCode
        in: path
        description: Branch Code for Pool Execution
        required: true
        type: string
      - name: jobId
        in: path
        description: Branch Code for Pool Execution
        required: true
        type: string        
      responses:
        201:
          description: Returns message of success or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error          
  /pool/log:
    get:
      tags:
      - pool
      summary: Fetch Pool log for Structure
      description: Fetching Pool log for Structure. Add additional information here for this endpoint.
      operationId: fetchPoolLog
      parameters:
      - name: customerId
        in: query
        description: customerId need to be set to fetch pool log for particular customer
        required: false
        type: string
      - name: structureId
        in: query
        description: structureId need to be set to fetch pool log for particular structure
        required: false
        type: string
      - name: bookDateFrom
        in: query
        required: false
        type: string
      - name: bookDateTo
        in: query
        required: false
        type: string
      - name: filterBy
        in: query
        required: false
        type: string
      responses:
        201:
          description: Returns message of success or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/LmpTbPoolMonitorCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
