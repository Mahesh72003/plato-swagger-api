swagger: '2.0'
info:
  description: This is a sample server Pool Reallocation server.  You can find out more about Swagger at [swagger.io](http://swagger.io) and about data types at [Swagger Data Types](https://swagger.io/docs/specification/data-models/data-types/)
  version: 1.0.0
  title: PoolReallocation
host: api-plato.us.oracle.com:8080
basePath: /api/1.0
consumes:
- application/json
- application/xml
produces:
- application/json
- application/xml
tags:
- name: PoolReallocationAPI
  description: API for Pool Reallocation Operations
schemes:
- https
paths:
  /poolRealloc:
    get:
      tags:
      - poolRealloc
      summary: Get all valid poolRealloc data.
      description: Get all valid poolRealloc data. This endpoints will be used to Get all valid poolRealloc maintenance records.
      operationId: fetchReallocationLog
      parameters:
      - name: offset
        in: query
        description: offset is starting no of records to be fetched
        required: false
        type: integer
      - name: limit
        in: query
        description: limit is maximum no of records to be fetched
        required: false
        type: integer
      - name: bookDateFrom
        in: query
        required: false
        type: string
      - name: bookDateTo
        in: query
        required: false
        type: string
      - name: valueDateFrom
        in: query
        required: false
        type: string
      - name: valueDateTo
        in: query
        required: false
        type: string
      - name: customerId
        in: query
        required: false
        type: string
      - name: structureId
        in: query
        required: false
        type: string
      - name: filterBy
        in: query
        required: false
        type: string
      - name: reallocationId
        in: query
        required: false
        type: string
      - name: executionId
        in: query
        required: false
        type: string
      - name: interfaceMasterId
        in: query
        description: 
        required: false
        type: string
      - name: onlyLinkedCustomers
        in: query
        description: onlyLinkedCustomers need to be set to fetch sweep log based on only Linked Customers
        required: false
        type: string
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/LmpTbPoolReallocLogCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /poolRealloc/execute:
    post:
      tags:
      - poolRealloc
      summary: Invoking Reallocation Batch for Structure
      description: Invoking Reallocation Batch for Structure. Add additional information here for this  endpoint.
      operationId: invokeRealloc
      parameters:
      - name: reallocStructureDTO
        in: body
        description: structure list for Reallocation
        required: true
        schema:
          $ref: '#/definitions/LmmTmPoolStructureCollection'
      responses:
        201:
          description: Returns message of success or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /poolRealloc/execute/async:
    post:
      tags:
      - poolRealloc
      summary: Invoking Reallocation Batch for Structure
      description: Invoking Reallocation Batch for Structure. Add additional information here for this  endpoint.
      operationId: invokeReallocAsync
      parameters:
      - name: reallocStructureCollection
        in: body
        description: Request Body that contains data required for running a reallocation batch
        required: true
        schema:
          $ref: '#/definitions/LmmTmPoolStructureCollection'
      responses:
        201:
          description: Returns message of succes or failure
          headers:
            Location:
              description: URL of newly created sweepmaster data
              type: string
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /poolRealloc/withholdingtax:
    post:
      tags:
      - poolRealloc
      summary: Invoking Withholding Tax for Structure
      description: Invoking Withholding Tax for Structure. Add additional information here for this  endpoint.
      operationId: withHoldingTax
      parameters:
      - name: structureId
        in: body
        description: Request Body that contains data required for withholdingtax execution
        required: false
        schema:
          $ref: '#/definitions/String'
      responses:
        201:
          description: Returns message of success or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/ICTBLmChildSumIntDTOCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /poolRealloc/withholdingtax/{headerBranchCode}/{interestMethod}/{structureType}:
    post:
      tags:
      - poolRealloc
      summary: Invoking Withholding Tax for Structure
      description: Invoking Withholding Tax for Structure. Add additional information here for this  endpoint.
      operationId: withHoldingTax
      parameters:
      - name: headerBranchCode
        in: path
        description: Header Branch Code of the structure for which the wht needs to be calculated
        required: true
        type: "string"
      - name: interestMethod
        in: path
        description: Interest method of the structure
        required: true
        type: "string"
      - name: structureType
        in: path
        description: Structure type Pool/Hybrid.
        required: true
        type: "string"
      responses:
        201:
          description: Returns message of success or failure
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error          
  /poolRealloc/icEntries:
    get:
      tags:
      - reallocIcEntries
      summary: Fetch Ic History Entries
      description: Fetch Ic History Entries.
      operationId: fetchIcEntries
      parameters:
      - name: "branchCode"
        in: "query"
        description: "branch for fetching entries"
        required: true
        type: "string"   
      responses:
        200:
          description: Returns Ic Entries
          schema:
            type: array
            items:
             $ref: '#/definitions/IcEntry'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error 
  /poolRealloc/icEntriesForAccrHandOff:
    get:
      tags:
      - reallocIcEntries
      summary: Fetch Ic History Entries For Accrual HandOff
      description: Fetch Ic History Entries For Accrual HandOff
      operationId: fetchIcEntriesForAccrualHandOff
      parameters:
      - name: "branchCode"
        in: "query"
        description: "branch for fetching entries"
        required: true
        type: "string"   
      responses:
        200:
          description: Returns Ic Entries
          schema:
            type: array
            items:
             $ref: '#/definitions/IcEntry'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error   
  /poolRealloc/modifyReallocLog:
    post:
      tags:
      - poolRealloc
      summary: Update an existing reallocation log data.
      description: Update an existing reallocation log data.
      operationId: modifyReallocLog
      parameters:
      - name: reallocationLog
        in: body
        description: Request Body that contains data required for updating an existing reallocation log
        required: true
        schema:
          $ref: '#/definitions/LmpTbPoolReallocLogDTO'
      responses:
        200:
          description: Returns updated reallocation log
          schema:
            $ref: '#/definitions/ResponseDtoWrapper'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
  /poolRealloc/pendingreallocations:
    get:
      tags:
      - poolRealloc
      summary: Get all pending reallocation logs.
      description: Get all pending reallocation logs. This endpoints will be used to Get all reallocation sweep records.
      operationId: getPendingReallocLogs
      responses:
        201:
          description: Returns message of success or failure
          headers:
            Location:
              description: ''
              type: string
          schema:
            $ref: '#/definitions/LmpTbPoolReallocLogCollection'
        400:
          description: Malformed syntax.
        401:
          description: Request does not have sufficient credentials.
        403:
          description: Request is not authorized.
        405:
          description: Invalid input
        500:
          description: Internal error
