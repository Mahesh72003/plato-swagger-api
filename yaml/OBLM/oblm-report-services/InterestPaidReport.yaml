swagger: "2.0"
info:
 description: "This is a sample server InterestPaid server." 
 version: "1.0.0"
 title: "Interest Paid report Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "interest paid report"
   description: "Interest Paid report creation and retrieving"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../interestpaidreport

 /interestpaidreport/generateReport:     
  post:
   tags:
    - "interestpaidreport"
   summary: "Get all valid interestpaidreport."
   description:  "Get all valid interestpaidreport. This endpoints will be used to Get all valid interestpaid maintenance records."
   operationId: "generateInterestPaidReport"
   parameters:
     - name: InterestPaidReportInputDTO
       in: "body"
       description: "Request Body that contains data required for creating a new oblm-report-services" 
       required: true
       schema:
         $ref: "#/definitions/InterestPaidReportInputDTO"   
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/InterestPaidReportDTOCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 
 /interestpaidreport/saveReallocationDetails:
  post:
   tags:
    - "interestpaidreport"
   summary: "Adds a new interestpaidreport."
   description: "Adds a new interestpaidreport. Add additional information here for this endpoint."
   operationId: "saveReallocationDetails"
   parameters:
    - name: ReallocationDetailsDTO 
      in: "body" 
      description: "Request Body that contains data required for creating a new interestpaidreport" 
      required: true
      schema:
       $ref: "#/definitions/ReallocationDetailsDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created interestreport" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /interestpaidreport/updateReallocationDetails:
  put:
   tags:
    - "interestpaidreport"
   summary: "update ReallocationDetails."
   description: "update ReallocationDetails. Add additional information here for this endpoint."
   operationId: "updateReallocationDetails"
   parameters:
    - name: ReallocationDetailsDTO 
      in: "body" 
      description: "Request Body that contains data required for updating ReallocationDetails" 
      required: true
      schema:
       $ref: "#/definitions/ReallocationDetailsDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of updating ReallocationDetails" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
          
 /interestpaidreport/saveReallocationLog:
  post:
   tags:
    - "interestpaidreport"
   summary: "Adds a new interestpaidreport."
   description: "Adds a new interestpaidreport. Add additional information here for this endpoint."
   operationId: "saveReallocationLog"
   parameters:
    - name: ReallocationLogDTOList
      in: "body" 
      description: "Request Body that contains data required for creating a new interestpaidreport" 
      required: true
      schema:
       $ref: "#/definitions/ReallocationLogDTOCollection"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created interestreport" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"     
 
 /interestpaidreport/saveIctbEntriesHistory:
  post:
   tags:
    - "interestpaidreport"
   summary: "Adds a new interestpaidreport."
   description: "Adds a new interestpaidreport. Add additional information here for this endpoint."
   operationId: "saveIctbEntriesHistory"
   parameters:
    - name: IctbEntriesHistoryDTO 
      in: "body" 
      description: "Request Body that contains data required for creating a new interestpaidreport" 
      required: true
      schema:
