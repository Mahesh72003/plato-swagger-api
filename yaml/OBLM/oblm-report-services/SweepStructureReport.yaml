- "https"

paths:
  /sweepStructureReport/generateReport:
    post:
      tags:
        - "SweepStructureReportAPI"
      summary: "Get all valid oblm-report-services."
      description: "Get all valid oblm-report-services. This endpoints will be used to Get all valid oblm-report-services maintenance records."
      operationId: "generateReport"
      parameters:
        - name: "SweepStrInDTO" 
          in: "body" 
          description: "Request Body that contains data required for creating a new oblm-report-services" 
          required: true
          schema:
            $ref: "#/definitions/SweepStrInDTO"
      responses:
        201:
          description: "Returns the Id of the customer"
          headers:
            Location:
              description: "URL of SweepStructure report"
              type: "string"
          schema:
              $ref: "#/definitions/SweepStructureReportDTOCollection"  
        400:
          description: "Malformed syntax."
        401:
          description: "Request does not have sufficient credentials."
        403:
          description: "Request is not authorized."
        405:
          description: "Invalid input"
        500:
          description: "Internal error"
