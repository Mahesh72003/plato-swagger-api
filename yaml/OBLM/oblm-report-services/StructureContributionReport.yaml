swagger: "2.0"
info:
 description: "This is a sample server structurereport server." 
 version: "1.0.0"
 title: "structure contribution report Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "structure contribution report"
   description: "Structure contribution report creation and retrieving"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../structurecontributionreport
 /structurecontributionreport/generateReport:     
  post:
   tags:
    - "structurecontributionreport"
   summary: "Get all valid structurecontributionreport."
   description:  "Get all valid structurecontributionreport. This endpoints will be used to Get all valid structurecontributionreport maintenance records."
   operationId: "generateStructureContributionreport"
   parameters:
     - name: StructureContributionReportInputDTO
       in: "body"
       description: "Request Body that contains data required for creating a new oblm-report-services" 
       required: true
       schema:
         $ref: "#/definitions/StructureContributionReportInputDTO"   
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/StructureMasterReportDTOCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /structurecontributionreport/save:
  post:
   tags:
    - "structurecontributionreport"
   summary: "Adds a new structurecontributionreport."
   description: "Adds a new structurecontributionreport. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "structurecontributionreport" 
      in: "body" 
      description: "Request Body that contains data required for creating a new structurecontributionreport" 
      required: true
      schema:
       $ref: "#/definitions/ReportContributionDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created structurecontributionreport" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
