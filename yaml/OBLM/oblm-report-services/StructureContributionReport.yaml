      liquidityType:
       type: string
       description: ""
      participatingAccount:
       type: number
       description: ""
      numberOfSweepPool:
       type: number
       description: ""
      structureTurnover:
       type: number
       description: ""      
  StructureMasterbodyDTO:
   type: object
   allOf:
   - $ref: '#/definitions/GenericDto'
   - type: object
     properties:  
      structureId:
       type: string
       description: ""
      structureDescription:
       type: string
       description: "" 
      effectiveDate:
       type: string
       #format: date
       description: ""
      endDate:
       type: string
       #format: date
       description: ""
      versionNo:
       type: number
       description: ""
      liquidityType:
       type: string
       description: ""
      structureDomain:
       type: string
       description: ""
      isMultiBank:
       type: string
       description: ""
      isCrossCurrency:
       type: string
       description: ""
      structureStatus:
       type: string
       description: ""
      participatingAccountCount:
       type: number
       description: ""
      numberOfSweepPool:
       type: number
       description: ""
      headerAccountNumber:
       type: string
       description: ""
      headerAccountDescription:
       type: string
       description: ""                
      headerAccountCurrency:
       type: string
       description: ""
      structureTurnover:
       type: number
       description: ""       
  StructureDetailsDTO:
   type: object
   properties:
     customerId:
       type: string 
     sweepPoolId:
      type: string
      description: ""
     liquidityType:
      type: string
      description: "" 
     childAccountNumber:
      type: string
      description: ""
     childAccountDescription:
      type: string
      description: ""
     childBranchCode:
      type: string
      description: ""              
     childBranchName:
      type: string
      description: ""
     childCurrencyCode:
      type: string
      description: ""
     sweepPoolContribution:
      type: number
      description: ""
     parentAccountNumber:
      type: string
      description: ''
     parentAccountDescription:
      type: string
      description: ''
     parentBranchCode:
      type: string
      description: ''
     parentBranchName:
      type: string
      description: ''
     parentCurrencyCode:
      type: string
      description: ''
     sweepOrPoolContribution:
      type: number
      description: ""                                           
     valueDate:
      type: string
      #format: date
      description: ""
     fxRate:
      type: number
      description: "" 
  ModListKeyDto:
   type: object
   properties:
    modNos:
     type: array
     items:
      type: integer
    remarks:
     type: string
  KeyDto:
   type: object
   properties:
    modNo:
     type: integer
    remarks:
     type: string
  ResponseDto:
   type: object
   properties:
    id:
     type: string
    status:
     type: string
    codes:
     type: array
     items:
      $ref: "#/definitions/ResponseCode"
    requestId:
     type: string
  StructureContributionReportInputDTO:
   type: "object"
   allOf:
   - $ref: '#/definitions/GenericDto'
   - type: object
     properties:
      customerId:
       type: string
      structureId:
       type: string
      liquidityType:
       type: string 
      fromDate:
       type: string
       format: date
      toDate:
       description: To Date of Exceptions
       type: string
       format: date
  UserInformationDTO:
   type: object
   properties: 
      userId:
       type: string
       description: Generated By user id
      dateAndTime:
       type: string
       description: Generated At time
  ReportContributionDTO:
   type: object
   properties:
    LmrTbContributionDTO:
     type: "array"
     items:    
      $ref: "#/definitions/LmrTbContributionDTO"   
  LmrTbContributionDTO:
    type: object
    allOf:
    - $ref: '#/definitions/GenericDto'
    - type: object
      properties:
        executionId:
          type: string
          description: ''
        structureId:
          type: string
          description: ''
        toAccountNumber:
          type: string
          description: ''
        toAccountBranch:
          type: string
          description: ''
        toAccountCurrency:
          type: string
          description: ''
        fromAccountNumber:
          type: string
          description: ''
        fromAccountBranch:
          type: string
          description: ''
        fromAccountCurrency:
          type: string
          description: ''
        contributionAmount:
          type: number
          description: ''
        fromCurrencyAmount:
          type: number
          description: ''
        valueDate:
          type: string
          format: date
          description: ''
        fxrate:
          type: number
          description: ''
        status:
          type: string
          description: ''
        modNumber:
          type: string
          description: ''            
  ResponseCode:
   type: object
   properties:
    Code:
     type: string
    Desc:
     type: string
    Type:
     type: string
    Language:
     type: string
    args:
     type: array
     items:
      type: object
    arg:
     type: string
  GenericDto:
   allOf:
    - type: object
      discriminator: resource_type
  StructureMasterReportDTOCollection: 
   description: "Collection of structuredummy."
   type: "object"
   properties:
    messages:
     $ref: "#/definitions/ResponseDto"
    data:
     $ref: "#/definitions/ReportResponse" 
  StructureMasterDTOCollection: 
   description: "Collection of entries."
   type: "object"
   properties:
    userInfo:
     type: object
     items:
      $ref: "#/definitions/UserInformationDTO"
    datahead:
     type: "array"
     items:
      $ref: "#/definitions/StructureMasterheaderDTO"
    datadetails:
     type: "array"
     items:
      $ref: "#/definitions/StructureDetailsDTO"  
    data:
     type: "array"
     items:
      $ref: "#/definitions/StructureMasterbodyDTO"     
    messages:
     $ref: "#/definitions/ResponseDto"  
  PagingDto:
   type: object
   properties:
    totalResults:
     type: integer
  ResponseDtoWrapper:
   type: object
   properties:
    messages:
     $ref: "#/definitions/ResponseDto"
    data:
     $ref: "#/definitions/ResponseResourceSupport"
  ResponseResourceSupport:
   type: object
  StructureMasterWrapperDTO:
   type: object
   properties:
    data:
     $ref: "#/definitions/StructureMasterbodyDTO"
