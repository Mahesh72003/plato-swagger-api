swagger: "2.0"
info:
 description: "This is a sample server realtimeliquiditystructure server." 
 version: "1.0.0"
 title: "realtimeliquiditystructure Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/v1"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "realtimeliquiditystructure"
   description: "Real Time Liquidity Structure"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../structure

 /structure:
  post:
   tags:
    - "realtimeliquiditystructure"
   summary: "Adds a new realtimeliquiditystructure."
   description: "Adds a new realtimeliquiditystructure. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "realtimeliquiditystructure" 
      in: "body" 
      description: "Request Body that contains data required for creating a new realtimeliquiditystructure" 
      required: true
      schema:
       $ref: "#/definitions/LrtTmStructureMasterDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created realtimeliquiditystructure" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "realtimeliquiditystructure"
   summary: "Get all valid realtimeliquiditystructure."
   description:  "Get all valid realtimeliquiditystructure. This endpoints will be used to Get all valid realtimeliquiditystructure maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - name: structureId
     in: query
     type: string
   - name: structureDescription
     in: query
     type: string
   - name: customerId
     in: query
     type: string
   - name: headerAccountNumber
     in: query
     type: string
   - name: onlyLinkedCustomers
     in: query
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/LrtTmStructureMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 /structure/key:
  get:
   tags:
    - "realtimeliquiditystructure"
   summary: "Retrieves the realtimeliquiditystructure by ID."
   description:  "Retrieves the realtimeliquiditystructure by ID."
   operationId: "getStructureId"
   responses:
    200:
     description: "Returns the realtimeliquiditystructure based on given id."
     schema:
      $ref: "#/definitions/LrtTmStructureMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../structure/xxx
#   DELETE    .../structure/xxx
#   GET       .../structure/xxx
#   GET       .../structure/xxx?version=latestrecord
#   GET       .../structure/xxx?version=1
 /structure/{id}:
  put:
   tags:
    - "realtimeliquiditystructure"
   summary: "Update an existing realtimeliquiditystructure."
   description:  "Update an existing realtimeliquiditystructure."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the realtimeliquiditystructure Maintenance"
      required: true
      type: "string"
    - name: "realtimeliquiditystructure"
      in: "body"
      description: "Request Body that contains data required for updating an existing realtimeliquiditystructure"
      required: true
      schema:
       $ref: "#/definitions/LrtTmStructureMasterDTO"
   responses:
    200:
     description: "Returns updated realtimeliquiditystructure"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "realtimeliquiditystructure"
   summary: "Retrieves the realtimeliquiditystructure by ID."
   description:  "Retrieves the realtimeliquiditystructure by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the realtimeliquiditystructure based on given id."
     schema:
      $ref: "#/definitions/LrtTmStructureMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  post:
   tags:
    - "realtimeliquiditystructure"
   summary: "Retrieves the realtimeliquiditystructure by ID."
   description:  "Retrieves the realtimeliquiditystructure by ID."
   operationId: "getById"
   parameters:
    - name: "realtimeliquiditystructure" 
      in: "body" 
      description: "Request Body that contains data required for fetch realtimeliquiditystructure" 
      required: true
      schema:
       $ref: "#/definitions/LrtTmStructureMasterDTO"
   responses:
    200:
     description: "Returns the realtimeliquiditystructure based on given id."
     schema:
      $ref: "#/definitions/LrtTmStructureMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "realtimeliquiditystructure"
   summary: "Deletes the realtimeliquiditystructure identified by given ID."
   description:  "Deletes the realtimeliquiditystructure identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the realtimeliquiditystructure maintenance"
      required: true
      type: "string"
    - name: "realtimeliquiditystructure"
      in: "body"
      description: Request body contain realtimeliquiditystructure and Modification no of realtimeliquiditystructure maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

