definitions:
 LrtTmRtlParamMasterDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     ismultiaccAllowed:
      type: string
      description: ""
     sysName:
      type: string
      description: ""
     ccyTolerance:
      type: number
      description: ""
     LrtTmRtlParamCountryDTO:
      type: array
      items:
       $ref: '#/definitions/LrtTmRtlParamCountryDTO'
     LrtTmRtlParamCurrencyDTO:
      type: array
      items:
       $ref: '#/definitions/LrtTmRtlParamCurrencyDTO'
     LrtTmRtlParamInterfaceDTO:
      type: array
      items:
       $ref: '#/definitions/LrtTmRtlParamInterfaceDTO'
 LrtTmRtlParamCountryDTO:
  type: object
  properties:
     rtlParamMasterId:
      type: string
      description: ""
     countryCode:
      type: string
      description: ""
     id:
      type: string
      description: ""
  required:
   - rtlParamMasterId
   - countryCode
   - id
 LrtTmRtlParamCurrencyDTO:
  type: object
  properties:
     rtlParamMasterId:
      type: string
      description: ""
     currencyCode:
      type: string
      description: ""
     id:
      type: string
      description: ""
 LrtTmRtlParamInterfaceDTO:
  type: object
  properties:
     branchId:
      type: string
      description: ""
     rtlParamMasterId:
      type: string
      description: "" 
     branchCode:
      type: string
      description: ""
     id:
      type: string
      description: ""
     interfaceId:
      type: string
      description: ""
     externalSystemId:
      type: string
      description: ""
     methodName:
      type: string
      description: ""
  required:
   - branchId
   - id
   - interfaceId
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 LrtTmRtlParamMasterCollection: 
  description: "Collection of rtlParam."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/LrtTmRtlParamMasterDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 LrtTmRtlParamMasterWrapperDTO:
