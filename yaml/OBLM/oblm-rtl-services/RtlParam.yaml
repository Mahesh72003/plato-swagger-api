    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "realtimeliquidityparameter"
   summary: "Retrieves the realtimeliquidityparameter by ID."
   description:  "Retrieves the realtimeliquidityparameter by ID."
   operationId: "getById"
   parameters:
