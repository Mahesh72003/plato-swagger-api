#
#  supprorted http methods POST and GET
#
# path example ../parameter

 /parameter:
  post:
   tags:
    - "realtimeliquidityparameter"
   summary: "Adds a new realtimeliquidityparameter."
   description: "Adds a new realtimeliquidityparameter. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "realtimeliquidityparameter" 
      in: "body" 
      description: "Request Body that contains data required for creating a new realtimeliquidityparameter" 
      required: true
      schema:
       $ref: "#/definitions/LrtTmRtlParamMasterDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created realtimeliquidityparameter" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "realtimeliquidityparameter"
   summary: "Get all valid realtimeliquidityparameter."
   description:  "Get all valid realtimeliquidityparameter. This endpoints will be used to Get all valid realtimeliquidityparameter maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/LrtTmRtlParamMasterCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
