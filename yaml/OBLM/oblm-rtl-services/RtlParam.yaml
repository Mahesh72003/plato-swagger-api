      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the realtimeliquidityparameter based on given id."
     schema:
      $ref: "#/definitions/LrtTmRtlParamMasterWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "realtimeliquidityparameter"
   summary: "Deletes the realtimeliquidityparameter identified by given ID."
   description:  "Deletes the realtimeliquidityparameter identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the realtimeliquidityparameter maintenance"
      required: true
      type: "string"
    - name: "realtimeliquidityparameter"
      in: "body"
      description: Request body contain realtimeliquidityparameter and Modification no of realtimeliquidityparameter maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
