swagger: "2.0"
info:
 description: "This is a sample server realtimeliquiditytransaction server." 
 version: "1.0.0"
 title: "realtimeliquiditytransaction Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/v1"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "RtlTxnMonitor"
   description: "Real Time Liquidity"

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../structure

 /RtlTransaction/initiateRtlTxn:
  post:
   tags:
    - "initiateRTLTxn"
   summary: "Initiate RTL Txn."
   description: "Initiate RTL Txn"
   operationId: "initiateRTLTxn"
   parameters:
    - name: "lrtTmRtlTxnMasterDTO" 
      in: "body" 
      description: "Request Body that contains data required for initiating a new real time liquidity txn" 
      required: true
      schema:
       $ref: "#/definitions/LrtTmRtlTxnMasterDTO"
   responses:
    201: 
     description: "Returns message of success or failure "
     headers:
      Location:
       description: "URL of initiating real time txn" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
 
 /RtlTransaction/postRtl:
  post:
   tags:
    - "postRtl"
   summary: "Post RTL Txn."
   description: "Post RTL Txn"
   operationId: "postRtl"
   parameters:
    - name: "lrtTmRtlTxnMasterDTO" 
      in: "body" 
      description: "Request Body that contains data required for post a real time liquidity txn" 
      required: true
      schema:
       $ref: "#/definitions/LrtTmRtlTxnMasterDTO"
   responses:
    201: 
     description: "Returns message of success or failure "
     headers:
      Location:
       description: "URL of posting real time txn" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
     
 /RtlTransaction/undoRtl:
  post:
   tags:
    - "undoRtl"
   summary: "Undo RTL Txn."
   description: "Undo RTL Txn"
   operationId: "undoRtl"
   parameters:
    - name: "lrtTmRtlTxnMasterDTO" 
      in: "body" 
      description: "Request Body that contains data required for undo a real time liquidity txn" 
      required: true
      schema:
       $ref: "#/definitions/LrtTmRtlTxnMasterDTO"
   responses:
    201: 
     description: "Returns message of success or failure "
     headers:
      Location:
       description: "URL of undo real time txn" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"    
     
 /RtlTransaction/modifyRtlTxn:
  patch:
   tags:
    - "rtlmodify"
   summary: "modify all valid rtl transaction."
   description:  "modify all valid realtimeliquiditytransaction."
   operationId: "modifyRtlTxn"
   parameters:
    - name: "lrtTmRtlTxnMasterDTO" 
      in: "body" 
      description: "Request Body that contains data required for initiating a new real time liquidity txn" 
      required: true
      schema:
       $ref: "#/definitions/LrtTmRtlTxnMasterDTO"
   responses:
    201:
     description: "Returns message of success or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"    
 
 /RtlTransaction/fetch:
  get:
   tags:
    - "rtlmonitor"
   summary: "Get all valid rtl transaction."
   description:  "Get all valid realtimeliquiditytransaction."
   operationId: "getRtlTxn"
   parameters:
      - name: rtlStructureId
        in: query
        required: false
        type: string
      - name: txnDateFrom
        in: query
        required: false
        type: string
      - name: txnDateTo
        in: query
        required: false
        type: string
      - name: customerId
        in: query
        required: false
        type: string
   responses:
    201:
     description: "Returns message of success or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/LrtTmRtlTxnMasterDTOCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

 /RtlTransaction/fetchSublimitLog:
   get:
     tags:
       - "rtlsublimitmonitor"
     summary: "Get all valid rtl sublimit transactions."
     description:  "Get all valid realtimeliquiditytransaction involving sublimits."
     operationId: "getRtlSublimitTxnLogs"
     parameters:
       - name: rtlStructureMasterId
         in: query
         required: false
         type: string
       - name: rtlStructureId
         in: query
         required: false
         type: string
       - name: txnDateFrom
         in: query
         required: false
         type: string
       - name: txnDateTo
         in: query
         required: false
         type: string
       - name: customerId
         in: query
         required: false
         type: string
       - name: accountNumber
         in: query
         required: false
         type: string
     responses:
       201:
         description: "Returns message of success or failure"
         headers:
           Location:
             description: ""
             type: "string"
         schema:
           $ref: "#/definitions/LrtTmRtlSublimitLogsDTOCollection"
       400:
         description: "Malformed syntax."
       401:
         description: "Request does not have sufficient credentials."
       403:
         description: "Request is not authorized."
       405:
         description: "Invalid input"
       500:
         description: "Internal error"

 /RtlTransaction/fetchSublimitDetails:
   get:
     tags:
       - "rtlsublimitmonitor"
     summary: "Get sublimit details on a structure."
     description:  "Get sublimit details on a structure."
     operationId: "getRtlSublimitDetails"
     parameters:
       - name: rtlStructureId
         in: query
         required: false
         type: string
       - name: customerId
         in: query
         required: false
         type: string
       - name: accountNumber
         in: query
         required: false
         type: string
     responses:
       201:
         description: "Returns message of success or failure"
         headers:
           Location:
             description: ""
             type: "string"
         schema:
           $ref: "#/definitions/LrtTmRtlSublimitDTOCollection"
       400:
         description: "Malformed syntax."
       401:
         description: "Request does not have sufficient credentials."
       403:
         description: "Request is not authorized."
       405:
         description: "Invalid input"
       500:
         description: "Internal error"
