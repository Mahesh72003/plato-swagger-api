swagger: "2.0"
info:
 description: "This is a sample server coreaccounts server." 
 version: "1.0.0"
 title: "coreaccounts Service"
host: "api-plato.us.oracle.com:8080"
basePath: "/api/1.0"
consumes:
 - "application/json"
produces:
 - "application/json"
tags:
 - name: "coreaccounts"
   description: "This service is used to maintain external accounts for customers and maps the source system account number to external account maintained.It give us options to specify various parameters of the account like account is active or not credit or debit is allowed or not etc."

schemes:
- "https"

paths:

# path to create a new record and fetch all valid records or by intent
#
#  supprorted http methods POST and GET
#
# path example ../coreaccounts

 /coreaccounts:
  post:
   tags:
    - "coreaccounts"
   summary: "Adds a new coreaccounts."
   description: "Adds a new coreaccounts. Add additional information here for this endpoint."
   operationId: "saveRecord"
   parameters:
    - name: "coreaccounts" 
      in: "body" 
      description: "Request Body that contains data required for creating a new coreaccounts" 
      required: true
      schema:
       $ref: "#/definitions/CoreAccountDTO"
   responses:
    201: 
     description: "Returns message of succes or failure " 
     headers:
      Location:
       description: "URL of newly created coreaccounts" 
       type: "string"
     schema:
       $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "coreaccounts"
   summary: "Get all valid coreaccounts."
   description:  "Get all valid coreaccounts. This endpoints will be used to Get all valid coreaccounts maintenance records."
   operationId: "getAll"
   parameters:
   - name: includecloseandunauth
     in: query
     description: includecloseandunauth need to be set to fetch summary record, defult value is false
     required: false
     type: boolean
   - name: offset
     in: query
     description: offset is starting no of records to be fetched
     required: false
     type: integer
   - name: limit
     in: query
     description: limit is maximum no of records to be fetched
     required: false
     type: integer
   - in: query
     name: countryCode
     required: false
     type: string
   - in: query
     name: address1
     required: false
     type: string
   - in: query
     name: authStat
     required: false
     type: string
   - in: query
     name: recordStat
     required: false
     type: string
   - in: query
     name: onceAuth
     required: false
     type: string
   - in: query
     name: modNo
     required: false
     type: integer
   - in: query
     name: checkerId
     required: false
     type: string
   - in: query
     name: makerId
     required: false
     type: string
   - in: query
     name: accountClass
     required: false
     type: string
   - in: query
     name: acStatDormant
     required: false
     type: string
   - in: query
     name: acStatFrozen
     required: false
     type: string
   - in: query
     name: glStatBlocked
     required: false
     type: string
   - in: query
     name: acStatNoDr
     required: false
     type: string
   - in: query
     name: acStatNoCr
     required: false
     type: string
   - in: query
     name: custAcName
     required: false
     type: string
   - in: query
     name: custAcCcy
     required: false
     type: string
   - in: query
     name: customerNo
     required: false
     type: string
   - in: query
     name: sourceSystemAccBrn
     required: false
     type: string
   - in: query
     name: sourceSystemAccNo
     required: false
     type: string
   - in: query
     name: sourceSystem
     required: false
     type: string
   - in: query
     name: custAcIban
     required: false
     type: string
   - in: query
     name: hostCode
     required: false
     type: string
   - in: query
     name: custAccountNo
     required: false
     type: string
   responses:
    201:
     description: "Returns message of succes or failure"
     headers: 
      Location:
       description: ""
       type: "string"
     schema:
       $ref: "#/definitions/CoreAccountCollection"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"

# path to modify existing record, delete existing record and fetch valid records by id or by intent( includes latestRecord, version no)
#
#  supprorted http methods PUT, DELETE and GET
#
# path examples----
#   PUT       .../coreaccounts/xxx
#   DELETE    .../coreaccounts/xxx
#   GET       .../coreaccounts/xxx
#   GET       .../coreaccounts/xxx?version=latestrecord
#   GET       .../coreaccounts/xxx?version=1

 /coreaccounts/{id}:
  put:
   tags:
    - "coreaccounts"
   summary: "Update an existing coreaccounts."
   description:  "Update an existing coreaccounts."
   operationId: "modifyRecord"
   parameters:
    - name: "id"
      in: "path"
      description: "key of the coreaccounts Maintenance"
      required: true
      type: "string"
    - name: "coreaccounts"
      in: "body"
      description: "Request Body that contains data required for updating an existing coreaccounts"
      required: true
      schema:
       $ref: "#/definitions/CoreAccountDTO"
   responses:
    200:
     description: "Returns updated coreaccounts"
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    405:
     description: "Invalid input"
    500:
     description: "Internal error"
  get:
   tags:
    - "coreaccounts"
   summary: "Retrieves the coreaccounts by ID."
   description:  "Retrieves the coreaccounts by ID."
   operationId: "getById"
   parameters:
    - name: "id"
      in: "path"
      description: "Id of the user that needs to be fetched"
      required: true
      type: "string"
    - name: "version"
      in: "query"
      description: "Id of the user that needs to be fetched"
      required: false
      type: "string"
   responses:
    200:
     description: "Returns the coreaccounts based on given id."
     schema:
      $ref: "#/definitions/CoreAccountWrapperDTO"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"
  delete:
   tags:
    - "coreaccounts"
   summary: "Deletes the coreaccounts identified by given ID."
   description:  "Deletes the coreaccounts identified by given ID. Add additional information here for the this endpoint."
   operationId: "delete"
   parameters:
    - name: "id"
      in: "path"
      description: "Key of the coreaccounts maintenance"
      required: true
      type: "string"
    - name: "coreaccounts"
      in: "body"
      description: Request body contain coreaccounts and Modification no of coreaccounts maintenance which need to be deleted"
      required: true
      schema:
       $ref: "#/definitions/ModListKeyDto"
   responses:
    200:
     description: "Successful operation."
     schema:
      $ref: "#/definitions/ResponseDtoWrapper"
    400:
     description: "Malformed syntax."
    401:
     description: "Request does not have sufficient credentials."
    403:
     description: "Request is not authorized."
    500:
     description: "Internal error"

