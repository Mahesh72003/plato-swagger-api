#
# path examples----
#   PATCH       .../coreaccounts/xxx/reopen

 /coreaccounts/{id}/reopen:
  patch:
   tags:
    - "coreaccounts"
   summary: "reopen the coreaccounts by given ID."
   description:  "reopen the coreaccounts identified by given ID."
   operationId: "reopenRecord"
   parameters:
    - name: "id"
