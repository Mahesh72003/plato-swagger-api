definitions:
 CoreAccountDTO:
  type: object
  allOf:
  - $ref: '#/definitions/GenericDto'
  - type: object
    properties:
     countryCode:
      type: string
      description: "Country Code"
      minLength: 0
      maxLength: 4
     address4:
      type: string
      description: "Fourth line of the customer?s address"
      minLength: 0
      maxLength: 105
     address3:
      type: string
      description: "Third line of the customer?s address"
      minLength: 0
      maxLength: 105
     address2:
      type: string
      description: "Second line of the customer?s address"
      minLength: 0
      maxLength: 105
     address1:
      type: string
      description: "First line of the customer?s address"
      minLength: 0
      maxLength: 105
     ecaCheckReq:
      type: string
      description: "Indicates that ECA check is required for the external customer account"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     accountClass:
      type: string
      description: "Account class of the external customer account. It can be Normal account or Nostro account"
     acStatDormant:
      type: string
      description: "Indicates that the account status is dormant"
      minLength: 1
      maxLength: 1
      pattern: '[Y,N]'
     acStatFrozen:
      type: string
      description: "Indicate that the account status is frozen"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     glStatBlocked:
      type: string
      description: "Indicates that the account status is blocked"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     acStatNoDr:
      type: string
      description: "Indicates that the account does not have any debit facility"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     acStatNoCr:
      type: string
      description: "Indicates that the account does not have any credit facility"
      minLength: 0
      maxLength: 1
      pattern: '[Y,N]'
     acOpenDate:
      type: string
      pattern: "[0-9]{4}[-][0-9]{2}[-][0-9]{2}"
      description: "The date on which account is being opened"
     custAcName:
      type: string
      description: "Name of the account holder"
      minLength: 0
      maxLength: 105
      pattern: '[a-zA-Z0-9\s]+'
     custAcCcy:
      type: string
      description: "Currency in which the account is being created"
     customerNo:
      type: string
      description: "Customer number to which the account number is being linked"
     sourceSystemAccBrn:
      type: string
      description: "Branch to which the account belongs to"
     sourceSystemAccNo:
      type: string
      description: "Account number as in the source system"
      minLength: 0
      maxLength: 35
      pattern: '[a-zA-Z0-9]+'
     sourceSystem:
      type: string
      description: "Name of the source system"
     custAcIban:
      type: string
      description: "IBAN that is linked to the customer"
      minLength: 0
      maxLength: 35
      pattern: '[a-zA-Z0-9]+'
     hostCode:
      type: string
      description: "The host code that is linked to the logged in user of the branch."
     custAccountNo:
      type: string
      description: "Account number of the External customer"
      minLength: 1
      maxLength: 20
      pattern: '[a-zA-Z0-9]+'
    required:
     - custAcName
     - customerNo
     - sourceSystemAccBrn
     - sourceSystemAccNo
     - sourceSystem
     - hostCode
     - custAccountNo
 ModListKeyDto:
  type: object
  properties:
   modNos:
    type: array
    items:
     type: integer
   remarks:
    type: string
 KeyDto:
  type: object
  properties:
   modNo:
    type: integer
   remarks:
    type: string
 ResponseDto:
  type: object
  properties:
   id:
    type: string
   status:
    type: string
   codes:
    type: array
    items:
     $ref: "#/definitions/ResponseCode"
   requestId:
    type: string
 ResponseCode:
  type: object
  properties:
   Code:
    type: string
   Desc:
    type: string
   Type:
    type: string
   Language:
    type: string
   args:
    type: array
    items:
     type: object
   arg:
    type: string
 GenericDto:
  allOf:
   - type: object
     discriminator: resource_type
 CoreAccountCollection: 
  description: "Collection of coreaccount."
  type: "object"
  properties:
   data:
    type: "array"
    items: 
     $ref: "#/definitions/CoreAccountDTO"
   paging:
    $ref: "#/definitions/PagingDto"
 PagingDto:
  type: object
  properties:
   totalResults:
    type: integer
 ResponseDtoWrapper:
  type: object
  properties:
   messages:
    $ref: "#/definitions/ResponseDto"
   data:
    $ref: "#/definitions/ResponseResourceSupport"
 ResponseResourceSupport:
  type: object
 CoreAccountWrapperDTO:
  type: object
  properties:
   data:
    $ref: "#/definitions/CoreAccountDTO"
 StepStatusUpdateDto:
  type: object
  properties:
     id:
      type: string
     branchId:
      type: string
      minLength: 0
      maxLength: 3
     currentDate:
      type: string
     jobId:
      type: string
     stepId:
      type: string
     action:
      type: string
     status:
      type: string
     statusDescription:
      type: string
      
 InvokeForgetBatchDTO:
  type: object
  properties:
     retentionPeriod:
      type: number
     branchCode:
      type: string
     eodDate:
      type: string
     eodId:
      type: string
     eodJobId:
      type: string
     eodStepId:
      type: string
